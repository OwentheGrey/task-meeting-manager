    addRow.append(nameAddInp, emailAddInp, addBtn);
    wrap.append(addRow);

    return wrap;
  }

  // ============================================================
  // v3.2.1 — Discovery (full + narrow modes + similarity + diagnostics)
  // v3.4.6 — Resumable: string responses from the bridge mark chunk/parent failures
  // and stash a _resumeSnapshot on the result so the user can pick up from the
  // failure point. Yearly extrapolation uses effectiveScanDays from the chunks
  // that actually succeeded — partial scans no longer underestimate frequency.
  // ============================================================
  async function discoverCommittees(mode, resumeFrom) {
    const isResume = !!resumeFrom;
    showSave("saving", isResume ? "Resuming discovery…" : "Discovering committees…");
    const days = mode === "narrow" ? 7 : 365;
    const knownIds = new Set([
      ...(STATE.committees || []).map(c => c.recurringEventId).filter(Boolean),
      ...(STATE.dismissedRecurringEventIds || [])
    ]);
    // Reuse the candidates dict + diag from a paused run when resuming.
    const candidates = (resumeFrom && resumeFrom.candidates) || {};
    const diag = (resumeFrom && resumeFrom.diag) || {
      mode,
      windowDays: days,
      chunksAttempted: 0,
      chunksSucceeded: 0,
      chunksFailed: 0,
      chunkErrors: [],
      eventsScanned: 0,
      eventsWithRid: 0,
      eventsKnownSkipped: 0,
      eventsTooFewAttendees: 0,
      eventsSoloOwen: 0,
      uniqueRids: 0,
      sampleResponseShapes: [],
      attendeesMissing: 0,
      chunkSucceededIndices: []  // v3.4.6 — feeds effectiveScanDays
    };
    // Reset resumable flags — will be set if we hit another bridge interruption this pass.
    diag.resumable = false;
    diag.resumeFromChunk = null;
    diag.resumeFromParent = null;

    // Iterate by month for full mode (12 chunks) so each Owen-filtered window stays well under transport caps.
    // Narrow mode = single 7-day chunk.
    const chunks = mode === "narrow" ? 1 : 12;
    const now = (resumeFrom && resumeFrom.now) ? new Date(resumeFrom.now) : new Date();
    const stepDays = Math.ceil(days / chunks);
    const startChunk = (resumeFrom && typeof resumeFrom.nextChunkIdx === "number") ? resumeFrom.nextChunkIdx : 0;
    let interrupted = false;

    for (let i = startChunk; i < chunks; i++) {
      // chunksAttempted = high-water mark of i+1 across this run + any prior runs
      diag.chunksAttempted = Math.max(diag.chunksAttempted, i + 1);
      const startTime = new Date(now.getTime() - (i + 1) * stepDays * 86400000).toISOString();
      const endTime = new Date(now.getTime() - i * stepDays * 86400000).toISOString();
      let chunkInterrupted = false;
      try {
        // v3.2.5 — paginate via nextPageToken so we capture more than 50 events per chunk
        let pageToken = undefined;
        let pageNum = 0;
        const MAX_PAGES = 5;
        let chunkEvents = [];
        let chunkData = null;
        let chunkShape = "(unset)";
        do {
          const params = { startTime, endTime, fullText: OWNER_EMAIL, pageSize: 50, orderBy: "startTime" };
          if (pageToken) params.pageToken = pageToken;
          const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", params);
          const { data, shape } = unwrapMcp(evRaw);
          chunkData = data; chunkShape = shape;
          if (typeof data === "string") {
            // v3.4.6 — bridge interruption ("Artifact is not currently shown" or similar).
            // Mark this chunk failed (NOT succeeded) and pause so the user can Resume.
            diag.chunkErrors.push({ chunk: i, page: pageNum, msg: "API string response: " + data.slice(0, 100) });
            chunkInterrupted = true;
            break;
          }
          const evs = pickArr(data, "events") || pickArr(data, "items") || (Array.isArray(data) ? data : []);
          chunkEvents = chunkEvents.concat(evs);
          pageToken = data && data.nextPageToken;
          pageNum++;
          diag.pagesFetched = (diag.pagesFetched || 0) + 1;
        } while (pageToken && pageNum < MAX_PAGES);

        if (chunkInterrupted) {
          diag.chunksFailed++;
          diag.resumable = true;
          diag.resumeFromChunk = i;
          interrupted = true;
          break;
        }

        // Sample shape from the first successful chunk we ever record.
        if (!diag.sampleResponseShapes.length) {
          const keys = (chunkData && typeof chunkData === "object") ? Object.keys(chunkData).slice(0, 10) : [typeof chunkData];
          let preview = "";
          if (typeof chunkData === "string") preview = chunkData.slice(0, 400);
          else if (chunkData && typeof chunkData === "object") {
            try { preview = JSON.stringify(chunkData).slice(0, 400); } catch (e) { preview = "(unstringifiable)"; }
          } else preview = String(chunkData);
          diag.sampleResponseShapes.push({ chunk: i, shape: chunkShape, dataKeys: keys, dataIsArray: Array.isArray(chunkData), preview });
        }
        const events = chunkEvents;
        diag.chunksSucceeded++;
        if (!diag.chunkSucceededIndices.includes(i)) diag.chunkSucceededIndices.push(i);
        diag.eventsScanned += events.length;
        if (events.length > 0 && !diag.sampleEventKeys) {
          diag.sampleEventKeys = Object.keys(events[0]).slice(0, 12);
        }
        events.forEach(e => {
          // Path 1 (preferred): event IS the recurring parent, has a recurrence RRULE
          const isParent = Array.isArray(e.recurrence) && e.recurrence.length > 0;
          // Path 2 (fallback): event is an instance of a recurring series
          const rid = e.recurringEventId;
          if (!isParent && !rid) return;
          if (isParent) diag.eventsWithRecurrence = (diag.eventsWithRecurrence || 0) + 1;
          if (rid) diag.eventsWithRid++;
          const canonicalId = isParent ? e.id : rid;
          if (knownIds.has(canonicalId)) { diag.eventsKnownSkipped++; return; }
          const atts = (e.attendees || []).filter(a => !a.resource && a.email);
          if (atts.length < 3) { diag.eventsTooFewAttendees++; return; }
          if (atts.length === 1 && atts[0].email && atts[0].email.toLowerCase() === OWNER_EMAIL.toLowerCase()) { diag.eventsSoloOwen++; return; }
          if (!candidates[canonicalId]) {
            candidates[canonicalId] = {
              recurringEventId: canonicalId,
              sample: e,
              attendees: atts,
              isParent,
              recurrenceRule: isParent ? e.recurrence : null,
              occurrences: 0
            };
          }
          candidates[canonicalId].occurrences++;
        });
      } catch (err) {
        diag.chunksFailed++;
        const msg = err && err.message ? err.message : String(err);
        diag.chunkErrors.push({ chunk: i, msg: msg.slice(0, 200) });
        console.error("[discover] chunk failed", { i, err });
      }
    }
    diag.uniqueRids = Object.keys(candidates).length;
    diag.uniqueCandidates = Object.keys(candidates).length;

    // v3.4.6 — effective scan days: stepDays × (number of chunks that actually succeeded).
    // Used in the year extrapolation below so partial scans don't undershoot.
    const succeededCount = (diag.chunkSucceededIndices && diag.chunkSucceededIndices.length) || 0;
    const effectiveScanDays = Math.max(stepDays, succeededCount * stepDays);
    diag.effectiveScanDays = effectiveScanDays;

    // v3.2.5 — Fetch the recurring parent event for every instance-only candidate so we can read the RRULE
    // and estimate yearly frequency accurately. Cap at 100 fetches to bound runtime; sort by occurrence
    // count desc so the most-active candidates get RRULEs first.
    // v3.4.6 — supports resume via _parentFetched flag on each candidate.
    const needsParent = Object.values(candidates).filter(c => !c.isParent && !c.recurrenceRule);
    needsParent.sort((a, b) => b.occurrences - a.occurrences);
    const parentList = needsParent.slice(0, 100);
    diag.parentFetchAttempts = diag.parentFetchAttempts || 0;
    diag.parentFetchSucceeded = diag.parentFetchSucceeded || 0;
    diag.parentFetchWithRRULE = diag.parentFetchWithRRULE || 0;
    const startParent = (resumeFrom && typeof resumeFrom.nextParentIdx === "number") ? resumeFrom.nextParentIdx : 0;
    if (!interrupted) {
      for (let j = startParent; j < parentList.length; j++) {
        const cand = parentList[j];
        if (cand._parentFetched) continue;
        diag.parentFetchAttempts++;
        try {
          const parentRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__get_event", { eventId: cand.recurringEventId });
          const { data: parent } = unwrapMcp(parentRaw);
          if (typeof parent === "string") {
            // v3.4.6 — same bridge interruption pattern. Pause and offer Resume.
            diag.parentFetchAttempts--;  // it didn't actually run successfully
            diag.resumable = true;
            diag.resumeFromParent = j;
            interrupted = true;
            break;
          }
          cand._parentFetched = true;
          const parentEvent = parent && (parent.event || parent);
          if (!parentEvent) continue;
          diag.parentFetchSucceeded++;
          if (Array.isArray(parentEvent.recurrence) && parentEvent.recurrence.length) {
            cand.recurrenceRule = parentEvent.recurrence;
            diag.parentFetchWithRRULE++;
          }
          if (parentEvent.summary && !cand.sample.summary) cand.sample.summary = parentEvent.summary;
          const atts = (parentEvent.attendees || []).filter(a => !a.resource && a.email);
          if (atts.length > cand.attendees.length) cand.attendees = atts;
        } catch (e) {
          cand._parentFetched = true;  // don't retry on subsequent resumes
        }
      }
    }

    // Estimate occurrences/year from RRULE when available, otherwise extrapolate from the
    // EFFECTIVE scan window (only chunks that succeeded), not the requested window.
    Object.values(candidates).forEach(c => {
      if (c.recurrenceRule) c.estimatedYearlyOccurrences = estimateOccurrencesFromRRULE(c.recurrenceRule);
      else c.estimatedYearlyOccurrences = Math.round((c.occurrences / effectiveScanDays) * 365);
    });

    // Final filter: ≥12 estimated yearly occurrences for full mode; narrow mode is permissive
    const list = Object.values(candidates)
      .filter(c => c.attendees && c.attendees.length >= 3)
      .filter(c => mode === "narrow" || (c.estimatedYearlyOccurrences || 0) >= 12);

    // Similarity check vs existing committees (charter §"Rename / restart detection")
    list.forEach(cand => {
      let bestMatch = null, bestScore = 0;
      (STATE.committees || []).forEach(existing => {
        if (!existing.members || !existing.members.length) return;
        const exEmails = new Set(existing.members.map(m => (m.email || "").toLowerCase()));
        const candEmails = cand.attendees.map(a => (a.email || "").toLowerCase());
        const overlap = candEmails.filter(e => exEmails.has(e)).length;
        const overlapPct = candEmails.length ? overlap / candEmails.length : 0;
        if (overlapPct >= 0.8) { if (overlapPct > bestScore) { bestScore = overlapPct; bestMatch = existing; } }
      });
      if (bestMatch) cand.possibleRenameOf = bestMatch.id;
    });

    diag.candidatesPassingFilter = list.length;
    showSave("saved", list.length + " candidate" + (list.length === 1 ? "" : "s") + " (scanned " + diag.eventsScanned + " events" + (interrupted ? " — paused, click Resume" : "") + ")");

    // v3.4.6 — when interrupted, snapshot the in-progress state so Resume can pick it up.
    const result = {
      candidates: list,
      diag,
      ranAt: new Date().toISOString(),
      _resumeSnapshot: interrupted ? {
        mode,
        candidates,            // dict keyed by canonicalId — preserved across resumes
        diag,
        now: now.toISOString(),
        nextChunkIdx: diag.resumeFromChunk != null ? diag.resumeFromChunk : chunks,
        nextParentIdx: diag.resumeFromParent != null ? diag.resumeFromParent : 0
      } : null
    };
    discoveryCache = result;
    return result;
  }

  // Crude RRULE → estimated yearly occurrence count (good enough for ≥12/year filter)
  function estimateOccurrencesFromRRULE(rules) {
    const rrule = (rules || []).find(r => typeof r === "string" && r.toUpperCase().startsWith("RRULE:")) || "";
    const u = rrule.toUpperCase();
    const intMatch = u.match(/INTERVAL=(\d+)/);
    const interval = intMatch ? parseInt(intMatch[1], 10) : 1;
    const countMatch = u.match(/COUNT=(\d+)/);
    if (countMatch) return parseInt(countMatch[1], 10);
    if (u.includes("FREQ=DAILY")) return Math.floor(260 / interval);
    if (u.includes("FREQ=WEEKLY")) {
      const bydayMatch = u.match(/BYDAY=([A-Z,]+)/);
      const days = bydayMatch ? bydayMatch[1].split(",").length : 1;
      return Math.floor((52 * days) / interval);
    }
    if (u.includes("FREQ=MONTHLY")) return Math.floor(12 / interval);
    if (u.includes("FREQ=YEARLY")) return Math.floor(1 / interval);
    return 12;
  }

  function renderDiscoveryView(result) {
    // v3.2.6 — fall back to module cache if called without args (after add/skip removes a candidate)
    if (!result) result = discoveryCache;
    const candidates = (result && result.candidates) || [];
    const diag = (result && result.diag) || null;
    const dos = document.getElementById("dossier"); dos.innerHTML = "";

    // Header row with title + Done button so user can return to current selection
    const header = ce("div", { style: "display:flex;align-items:center;gap:12px;margin-bottom:6px" });
    header.append(ce("h2", { style: "margin:0;flex:1" }, "Committee discovery"));
    if ((STATE.committees || []).length) {
      // v3.4.1a — promoted to primary; clearer cue once user has added committees
      header.append(ce("button", { class: "btn primary done-discovery", onclick: () => {
        const last = STATE.committees[STATE.committees.length - 1];
        STATE.selectedCommitteeId = last.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
        renderRoster(); renderDossier();
      } }, "✓ Done — view committees →"));
    }
    dos.append(header);

    // v3.4.6 — pre-flight reminder. The Cowork bridge returns "Artifact is not currently shown"
    // when the panel loses focus mid-call, which silently truncates discovery. Tell the user.
    dos.append(ce("div", {
      style: "padding:8px 12px;background:#fff7ed;border:1px solid #fdba74;border-radius:6px;font-size:12px;line-height:1.5;margin-bottom:8px;color:#7c2d12"
    }, "ℹ️ Discovery makes 12+ Calendar API calls. Keep this artifact in view until it finishes — switching tabs or scrolling away interrupts lookups. If interrupted, a Resume button will appear."));

    dos.append(ce("div", { class: "meta" }, candidates.length + " candidate" + (candidates.length === 1 ? "" : "s") + " in the working list. Adding a committee removes it from this list — your remaining candidates stay until you click Done or run Re-discover."));

    // v3.4.6 — Resume box: when a paused snapshot is present, offer a one-click resume.
    if (result && result._resumeSnapshot) {
      const reason = diag && diag.resumeFromChunk != null
        ? ("Discovery paused at chunk " + (diag.resumeFromChunk + 1) + " of " + diag.chunksAttempted + ". Bridge reported the artifact wasn't visible.")
        : (diag && diag.resumeFromParent != null
          ? ("Discovery paused mid parent-event lookup (" + diag.resumeFromParent + " of " + (diag.parentFetchAttempts + (diag.resumeFromParent || 0)) + "). Bridge reported the artifact wasn't visible.")
          : "Discovery paused. Bridge reported the artifact wasn't visible.");
      const box = ce("div", { style: "padding:10px 12px;background:#fef3c7;border:1px solid #f59e0b;border-radius:6px;margin:8px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap" });
      box.append(ce("div", { style: "flex:1;min-width:220px;font-size:13px;color:#78350f" }, reason));
      box.append(ce("button", { class: "btn primary", onclick: async () => {
        const snap = result._resumeSnapshot;
        if (!snap) return;
        const next = await discoverCommittees(snap.mode, snap);
        renderDiscoveryView(next);
      } }, "▶ Resume from where it stopped"));
      dos.append(box);
    }

    // Diagnostic panel — surfaces the funnel so we can see why 0 candidates if that happens
    if (diag) {
      // v3.4.1a — diagnostics always collapsed by default; expand on demand
      const dp = ce("details", { class: "discovery-diag" });
      dp.append(ce("summary", {}, "Discovery diagnostics — click to expand"));
      const tbl = ce("div", { style: "font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;padding:8px 12px;background:rgba(0,0,0,.03);border-radius:4px;margin-top:6px" });
      const row = (k, v) => { tbl.append(ce("div", {}, k + ": " + v)); };
      row("Mode", diag.mode + " · window " + diag.windowDays + " days");
      row("Chunks", diag.chunksSucceeded + " ok / " + diag.chunksFailed + " failed of " + diag.chunksAttempted + " attempted");
      // v3.4.6 — surface effective scan window so partial-scan extrapolation makes sense
      if (diag.effectiveScanDays) row("Effective scan window", String(diag.effectiveScanDays) + " days (used for yearly extrapolation)");
      row("Pages fetched (across all chunks)", String(diag.pagesFetched || 0));
      row("Parent-event fetches", (diag.parentFetchSucceeded || 0) + " ok / " + (diag.parentFetchAttempts || 0) + " attempted, " + (diag.parentFetchWithRRULE || 0) + " yielded RRULE");
      row("Events scanned", String(diag.eventsScanned));
      row("Events w/ recurrence (RRULE parents)", String(diag.eventsWithRecurrence || 0));
      row("Events w/ recurringEventId (instances)", String(diag.eventsWithRid));
      row("Events known/dismissed (skipped)", String(diag.eventsKnownSkipped));
      row("Events with <3 attendees", String(diag.eventsTooFewAttendees));
      row("Events solo Owen-only", String(diag.eventsSoloOwen || 0));
      row("Unique candidates collected", String(diag.uniqueCandidates || diag.uniqueRids || 0));
      row("Candidates passing final filter", String(diag.candidatesPassingFilter));
      if (diag.sampleEventKeys) row("Sample event keys", JSON.stringify(diag.sampleEventKeys));
      if (diag.sampleResponseShapes && diag.sampleResponseShapes.length) {
        const s = diag.sampleResponseShapes[0];
        row("First chunk unwrap shape", s.shape || "(unknown)");
        row("First chunk data keys", JSON.stringify(s.dataKeys));
        row("First chunk data is array", String(s.dataIsArray));
        if (s.preview) {
          tbl.append(ce("div", { style: "margin-top:6px;color:var(--muted)" }, "First chunk data preview (first 400 chars):"));
          tbl.append(ce("div", { style: "white-space:pre-wrap;word-break:break-all;background:rgba(0,0,0,.05);padding:6px 8px;border-radius:3px;font-size:11px;max-height:200px;overflow:auto" }, s.preview));
        }
      }
      if (diag.chunkErrors && diag.chunkErrors.length) {
        tbl.append(ce("div", { style: "color:var(--bad);margin-top:6px" }, "Errors:"));
        diag.chunkErrors.forEach(e => tbl.append(ce("div", { style: "color:var(--bad);font-size:11px" }, "  chunk " + e.chunk + ": " + e.msg)));
      }
      dp.append(tbl);
      dos.append(dp);
    }

    if (!candidates.length) {
      dos.append(ce("div", { class: "due", style: "margin-top:12px" }, "No candidates surfaced. If you expected committees, expand the diagnostic panel above to see where the funnel dropped to zero — common causes: zero events scanned (transport / network), 0 events-with-recurringEventId (singleEvents flag may not be expanding instances), or all events filtered as <3 attendees (the API may be returning summary-only events without attendees lists; the parent fetch should have caught those — if attendeesMissing > 0 and uniqueRids stays high, that path may need work)."));
      return;
    }
    // Helper to remove a candidate from the cache + re-render in place
    function removeFromCache(rid) {
      if (!discoveryCache) return;
      discoveryCache.candidates = discoveryCache.candidates.filter(c => c.recurringEventId !== rid);
      expandedAddCardId = null;
      renderDiscoveryView();
    }

    candidates.forEach(cand => {
      const samp = cand.sample || {};
      const card = ce("div", { class: "discovery-card" });
      card.append(ce("h3", {}, samp.summary || "(unnamed)"));
      const freqLabel = cand.recurrenceRule ? ("RRULE: ~" + cand.estimatedYearlyOccurrences + "/yr") : ("est " + cand.estimatedYearlyOccurrences + "/yr from " + cand.occurrences + " seen");
      card.append(ce("div", { class: "meta" }, freqLabel + " · attendees: " + cand.attendees.length));
      if (cand.possibleRenameOf) {
        const ex = (STATE.committees || []).find(x => x.id === cand.possibleRenameOf);
        card.append(ce("div", { class: "warn-banner" }, "Possible rename / restart of: " + (ex && ex.name) + " (≥80% attendee overlap + similar time)"));
      }
      card.append(ce("div", { class: "meta" }, cand.attendees.slice(0, 6).map(a => a.email).join(", ") + (cand.attendees.length > 6 ? ", + " + (cand.attendees.length - 6) + " more" : "")));

      const isExpanded = expandedAddCardId === cand.recurringEventId;
      const acts = ce("div", { class: "discovery-actions" });

      // Primary Add — toggles inline expansion instead of navigating away
      acts.append(ce("button", { class: "btn primary", onclick: () => {
        expandedAddCardId = isExpanded ? null : cand.recurringEventId;
        renderDiscoveryView();
      } }, isExpanded ? "▾ Cancel" : "Add as committee"));

      if (cand.possibleRenameOf) {
        acts.append(ce("button", { class: "btn tiny", onclick: () => {
          const ex = (STATE.committees || []).find(x => x.id === cand.possibleRenameOf);
          if (!ex) return;
          ex.recurringEventId = cand.recurringEventId;
          persistState("Merge candidate into " + ex.id);
          showSave("saved", "Merged into " + ex.name);
          removeFromCache(cand.recurringEventId);
        } }, "Merge into existing"));
      }
      acts.append(ce("button", { class: "btn tiny", onclick: () => removeFromCache(cand.recurringEventId) }, "Skip"));
      acts.append(ce("button", { class: "btn tiny danger", onclick: () => {
        STATE.dismissedRecurringEventIds = STATE.dismissedRecurringEventIds || [];
        STATE.dismissedRecurringEventIds.push(cand.recurringEventId);
        persistState("Dismiss " + cand.recurringEventId);
        removeFromCache(cand.recurringEventId);
      } }, "Always skip"));
      card.append(acts);

      // Inline-expand details panel — shown when this card is the expandedAddCardId
      if (isExpanded) {
        const panel = ce("div", { class: "discovery-expand" });
        // Name (pre-filled from event summary)
        panel.append(ce("label", {}, "Name"));
        const nameInp = ce("input", { type: "text", spellcheck: "true", value: samp.summary || "" });
        panel.append(nameInp);
        // Role
        panel.append(ce("label", {}, "Your role on this committee"));
        const roleSel = ce("select", {});
        [["owner","Owner — I drive this meeting"],["contributor","Contributor — I attend and engage"],["optional","Optional — I rarely engage"]].forEach(([val, lbl]) => {
          const o = ce("option", { value: val }, lbl);
          if (val === "contributor") o.selected = true;
          roleSel.append(o);
        });
        panel.append(roleSel);
        // Purpose
        panel.append(ce("label", {}, "Purpose (optional)"));
        const purposeInp = ce("textarea", { spellcheck: "true", placeholder: "Why this meeting exists — feeds the 'what to ask the team' prompt." });
        panel.append(purposeInp);
        // v3.4.1a — Project assignment (with auto-suggestion based on title + attendees)
        panel.append(ce("label", {}, "Linked project (optional)"));
        const activeProjects = (STATE.projects || []).filter(p => p.status !== "done");
        const projSel = ce("select", {});
        projSel.append(ce("option", { value: "" }, "— No project —"));
        activeProjects.forEach(p => projSel.append(ce("option", { value: p.id }, p.name)));
        // Auto-suggest the top-scoring project from suggestProjectFor
        const sugg = suggestProjectFor(samp.summary || "", cand.attendees.map(a => a.email));
        if (sugg.length) {
          projSel.value = sugg[0].project.id;
          panel.append(ce("div", { class: "meta", style: "font-size:10px;margin-top:2px" }, "Auto-suggested: " + sugg[0].project.name + " (" + sugg[0].reasons.join(", ") + ")"));
        }
        panel.append(projSel);
        // Save / Cancel buttons
        const btnRow = ce("div", { style: "display:flex;gap:6px;margin-top:6px" });
        btnRow.append(ce("button", { class: "btn primary", onclick: () => {
          const seed = {
            recurringEventId: cand.recurringEventId,
            name: nameInp.value || samp.summary || "",
            purpose: purposeInp.value || "",
            cadence: "",
            role: roleSel.value,
            projectIds: projSel.value ? [projSel.value] : [],
            members: cand.attendees.map(a => ({
              email: a.email,
              name: a.displayName || a.email.split("@")[0],
              optional: !!a.optional,
              memberRole: a.organizer ? "organizer" : null,
              hasContributed: false,
              taskCountIn90d: 0,
              inputCountIn90d: 0
            }))
          };
          addCommittee(seed, { noNavigate: true });
          showSave("saved", "Added: " + (seed.name || "(unnamed)"));
          removeFromCache(cand.recurringEventId);
        } }, "Save"));
        btnRow.append(ce("button", { class: "btn tiny", onclick: () => {
          expandedAddCardId = null;
          renderDiscoveryView();
        } }, "Cancel"));
        panel.append(btnRow);
        card.append(panel);
      }

      dos.append(card);
    });
  }

  function renderRoster() {
    const root = document.getElementById("roster-sections"); if (!root) return;
    root.innerHTML = "";

    // ---- v3.4.1b — Sidebar compact-mode toggle ----
    const isCompact = (function() { try { return localStorage.getItem("tmm.sidebar.compact") === "1"; } catch (e) { return false; } })();
    const appEl = document.getElementById("app");
    if (appEl) {
      if (isCompact) appEl.classList.add("sidebar-compact");
      else appEl.classList.remove("sidebar-compact");
    }
    const toggleBtn = ce("button", {
      class: "sidebar-toggle",
      title: isCompact ? "Expand sidebar" : "Collapse sidebar to icons",
      onclick: () => {
        try { localStorage.setItem("tmm.sidebar.compact", isCompact ? "0" : "1"); } catch (e) {}
        renderRoster();
      }
    }, [
      ce("span", { class: "toggle-icon" }, isCompact ? "▶" : "◀"),
      ce("span", { class: "toggle-label" }, "Collapse sidebar")
    ]);
    root.append(toggleBtn);

    // ---- MY TASKS section (TSKMGR-53) — replaces "Today" entry, lands at top of Quick Views area ----
    const myTasks = ce("div", { class: "mytasks-section" });
    const myTasksHead = ce("div", { class: "mytasks-head" });
    myTasksHead.append(ce("h2", {}, "My Tasks"));
    const archivedNow = getShowArchived();
    const archCb = ce("input", { type: "checkbox", id: "mytasks-archived-cb" });
    archCb.checked = archivedNow;
    archCb.addEventListener("change", () => { setShowArchived(archCb.checked); renderDossier(); });
    const archLabel = ce("label", { class: "mytasks-archive-toggle", for: "mytasks-archived-cb" }, [archCb, document.createTextNode(" Show archived")]);
    myTasksHead.append(archLabel);
    myTasks.append(myTasksHead);

    // TSKMGR-76 — sidebar tab strip removed. Sub-view switching is done via the
    // main content tab strip (Week / UAT / Must / Attention).
    root.append(myTasks);

    // TSKMGR-55 — Collaborators section (ad-hoc UAT testers not in STATE.partners).
    // Only renders when at least one UAT item has a non-partner tester.
    // TODO TSKMGR-55 future — explicit "promote to 1:1" affordance on collaborator entries.
    let collabs = [];
    try { collabs = collectCollaborators(); } catch (e) { console.warn("[sidebar collab build] failed", e); }
    if (collabs.length) {
      const collabSection = ce("div", { class: "collaborators-section" });
      collabSection.append(ce("h2", { class: "views-h" }, "Collaborators"));
      collabs.forEach(c => {
        const isActive = STATE.selectedView === "collaborator" && STATE.selectedCollaboratorId === c.value;
        const row = ce("div", {
          class: "view-row" + (isActive ? " active" : "") + (c.hasStuck ? " has-stuck" : ""),
          title: c.label + " · " + c.items.length + " UAT item" + (c.items.length === 1 ? "" : "s") + (c.hasStuck ? " · has stuck items" : ""),
          onclick: () => {
            STATE.selectedView = "collaborator";
            STATE.selectedCollaboratorId = c.value;
            renderRoster();
            renderDossier();
          }
        }, [
          ce("div", { class: "view-icon" }, c.hasStuck ? "🔥" : "🧪"),
          ce("div", {}, c.label),
          ce("span", { class: "collab-count" }, String(c.items.length))
        ]);
        collabSection.append(row);
      });
      root.append(collabSection);
    }

    // ---- TSKMGR-76 — Quick views: only "My Tasks" + "Plan Next Week" ----
    const quickviews = ce("div", { class: "quickviews", id: "quickviews" });
    quickviews.append(ce("h2", { class: "views-h" }, "Quick views"));
    // Active tag filter row (shown when user is browsing a tag)
    if (STATE.selectedView === "tag" && STATE.activeTagFilter) {
      quickviews.append(ce("div", { title: "Tag: " + STATE.activeTagFilter, class: "view-row active", onclick: () => { renderRoster(); renderDossier(); } }, [ce("div", { class: "view-icon" }, "🏷"), ce("div", {}, "Tag: " + STATE.activeTagFilter)]));
    }
    // My Tasks — switches to the My Tasks main-content view (tab strip at top picks sub-view)
    const myTasksActive = STATE.selectedView === "mytasks";
    quickviews.append(ce("div", { title: "My Tasks", class: "view-row" + (myTasksActive ? " active" : ""), onclick: () => { STATE.selectedView = "mytasks"; renderRoster(); renderDossier(); } }, [
      ce("div", { class: "view-icon" }, "✅"),
      ce("div", {}, "My Tasks")
    ]));
    // Plan Next Week (Friday planning). Always reachable; Friday-after-3pm hint badge kept.
    const isFri = (new Date().getDay() === 5) && (new Date().getHours() >= 15);
    const fridayActive = STATE.selectedView === "friday-planning";
    quickviews.append(ce("div", { title: "Plan Next Week" + (isFri ? " (Friday)" : ""), class: "view-row" + (fridayActive ? " active" : ""), onclick: () => { STATE.selectedView = "friday-planning"; renderRoster(); renderDossier(); } }, [
      ce("div", { class: "view-icon" }, "🗓"),
      ce("div", {}, "Plan Next Week" + (isFri ? "  ★" : ""))
    ]));
    root.append(quickviews);

    // ---- Three collapsible roster sections: Partners / Committees / Projects ----
    const sectionState = (key) => { try { return localStorage.getItem("tmm." + key + ".collapsed") === "1"; } catch (e) { return false; } };
    const setSectionState = (key, collapsed) => { try { localStorage.setItem("tmm." + key + ".collapsed", collapsed ? "1" : "0"); } catch (e) {} };

    // v3.4.1b — Section icons (visible only when sidebar is in compact mode via CSS)
    const SECTION_ICONS = { partners: "👤", committees: "👥", projects: "🗂" };

    function renderSection(key, title, count, addLabel, addHandler, body) {
      const collapsed = sectionState(key);
      const wrap = ce("div", { class: "roster-section" + (collapsed ? " collapsed" : "") });
      const head = ce("div", { class: "roster-section-head", title: title + (count >= 0 ? " (" + count + ")" : "") }, [
        ce("span", { class: "caret", onclick: (e) => { e.stopPropagation(); setSectionState(key, !collapsed); renderRoster(); } }, collapsed ? "▶" : "▼"),
        ce("span", { class: "section-icon", onclick: (e) => { e.stopPropagation(); setSectionState(key, !collapsed); renderRoster(); } }, SECTION_ICONS[key] || "•"),
        ce("span", { class: "roster-section-title", onclick: (e) => { e.stopPropagation(); setSectionState(key, !collapsed); renderRoster(); } }, title + (count >= 0 ? " (" + count + ")" : "")),
        addHandler ? ce("button", { class: "roster-section-add", title: addLabel, onclick: (e) => { e.stopPropagation(); addHandler(); } }, "+") : null
      ].filter(Boolean));
      wrap.append(head);
      if (!collapsed) wrap.append(body);
      return wrap;
    }

    // Partners
    const partnersBody = ce("div", { class: "roster-section-body", id: "roster" });
    if (!STATE.partners.length) {
      partnersBody.append(ce("div", { class: "roster-empty" }, "No partners yet — click + to add."));
    } else {
      STATE.partners.forEach(p => {
        const unconfigured = !p.email || !p.name;
        const isActive = p.id === STATE.selectedPartnerId && STATE.selectedKind === "partner" && (STATE.selectedView || "partner") === "partner";
        const row = ce("div", { title: (p.name || "(unnamed)") + " · " + relshipShort(p.relationshipType), class: "partner-row" + (isActive ? " active" : "") + (unconfigured ? " unconfigured" : ""), onclick: () => { STATE.selectedPartnerId = p.id; STATE.selectedKind = "partner"; STATE.selectedView = "partner"; renderRoster(); renderDossier(); persistState("Switch partner"); } }, [
          makePartnerAvatar(p, 26),
          ce("div", { class: "partner-meta" }, [
            ce("div", { class: "nm" }, p.name || "(unnamed)"),
            ce("div", { class: "sub" }, [
              ce("span", { class: "rel-pill rel-" + (p.relationshipType || "peer") }, relshipShort(p.relationshipType)),
              " ",
              ce("span", {}, (p.cadence || "no cadence").split("•")[0].trim())
            ])
          ])
        ]);
        partnersBody.append(row);
      });
    }
    root.append(renderSection("partners", "Partners", STATE.partners.length, "Add partner", addPartner, partnersBody));

    // Committees (v3.2 — clickable rows + discovery)
    const commBody = ce("div", { class: "roster-section-body", id: "roster-committees" });
    if (!(STATE.committees || []).length) {
      commBody.append(ce("div", { class: "roster-empty" }, "No committees yet."));
    } else {
      STATE.committees.forEach(c => {
        const isActive = c.id === STATE.selectedCommitteeId && STATE.selectedKind === "committee";
        const visMembers = visibleMembers(c).length;
        const totMembers = (c.members || []).length;
        const memLabel = visMembers === totMembers ? (totMembers + " members") : (visMembers + "/" + totMembers + " members");
        const row = ce("div", { title: (c.name || "(unnamed)") + " · " + (c.role || "contributor") + " · " + ((c.members || []).length) + " members", class: "partner-row" + (isActive ? " active" : ""), onclick: () => { STATE.selectedCommitteeId = c.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee"; renderRoster(); renderDossier(); persistState("Switch committee"); } }, [
          ce("div", { class: "avatar" }, c.shortCode ? c.shortCode.toUpperCase().slice(0, 2) : initials(c.name)),
          ce("div", { class: "partner-meta" }, [
            ce("div", { class: "nm" }, c.name || "(unnamed)"),
            ce("div", { class: "sub" }, [
              ce("span", { class: "role-badge role-" + (c.role || "contributor") }, c.role || "contributor"),
              " · " + memLabel
            ])
          ])
        ]);
        commBody.append(row);
      });
    }
    // v3.2.6 — if we already have cached candidates, offer "Resume discovery list (N)" + a separate "Re-search" link.
    // Otherwise just show "Discover committees" which kicks off a full search.
    if (discoveryCache && discoveryCache.candidates && discoveryCache.candidates.length) {
      const resumeBtn = ce("button", { class: "btn tiny", style: "margin-top:6px;width:100%", onclick: () => {
        STATE.selectedView = "discovery";
        STATE.selectedKind = null;
        renderRoster();
        renderDiscoveryView();
      } }, "Resume discovery list (" + discoveryCache.candidates.length + ")");
      commBody.append(resumeBtn);
      const refreshLink = ce("button", { class: "btn tiny", style: "margin-top:4px;width:100%;font-size:10px;color:var(--muted)", onclick: async () => {
        if (!confirm("Re-run the 12-month search? This will replace the current working list.")) return;
        STATE.selectedView = "discovery"; STATE.selectedKind = null;
        renderRoster();
        const dos = document.getElementById("dossier"); dos.innerHTML = "";
        dos.append(ce("h2", {}, "Committee discovery"));
        dos.append(ce("div", { class: "due" }, "Walking 12 months of calendar (filtered to events involving you) in monthly chunks… this can take ~30s. Keep this artifact in view — switching tabs interrupts lookups."));
        const result = await discoverCommittees("full");
        renderDiscoveryView(result);
      } }, "↻ Re-search (replaces list)");
      commBody.append(refreshLink);
    } else {
      const discoverBtn = ce("button", { class: "btn tiny", style: "margin-top:6px;width:100%", onclick: async () => {
        STATE.selectedView = "discovery"; STATE.selectedKind = null;
        renderRoster();
        const dos = document.getElementById("dossier"); dos.innerHTML = "";
        dos.append(ce("h2", {}, "Committee discovery"));
        dos.append(ce("div", { class: "due" }, "Walking 12 months of calendar (filtered to events involving you) in monthly chunks… this can take ~30s. Keep this artifact in view — switching tabs interrupts lookups."));
        const result = await discoverCommittees("full");
        renderDiscoveryView(result);
      } }, "Discover committees (12-mo)");
      commBody.append(discoverBtn);
    }
    root.append(renderSection("committees", "Committees", (STATE.committees || []).length, "Add committee", () => addCommittee(), commBody));

    // Projects (v3.3.0b — filter archived by default; show via toggle)
    const projBody = ce("div", { class: "roster-section-body", id: "roster-projects" });
    const allProjects = STATE.projects || [];
    const showArchived = (function () { try { return localStorage.getItem("tmm.projects.showArchived") === "1"; } catch(e) { return false; } })();
    const archivedProjects = allProjects.filter(p => p.status === "done");
    const visibleProjects = showArchived ? allProjects : allProjects.filter(p => p.status !== "done");
    if (!allProjects.length) {
      projBody.append(ce("div", { class: "roster-empty" }, "No projects yet."));
    } else if (!visibleProjects.length) {
      projBody.append(ce("div", { class: "roster-empty" }, "All " + archivedProjects.length + " projects archived."));
    } else {
      visibleProjects.forEach(pr => {
        const isActive = pr.id === STATE.selectedProjectId && STATE.selectedKind === "project";
        const row = ce("div", { title: (pr.name || "(unnamed)") + " · " + (pr.status || "active"), class: "partner-row" + (isActive ? " active" : "") + (pr.status === "done" ? " archived" : ""), onclick: () => {
          STATE.selectedProjectId = pr.id; STATE.selectedKind = "project"; STATE.selectedView = "project";
          renderRoster(); renderDossier(); persistState("Switch project");
        } }, [
          ce("div", { class: "avatar" }, pr.shortCode ? pr.shortCode.toUpperCase().slice(0, 2) : initials(pr.name)),
          ce("div", { class: "partner-meta" }, [
            ce("div", { class: "nm" }, projectLabel(pr, false)),
            ce("div", { class: "sub" }, [
              ce("span", { class: "project-status status-" + (pr.status || "active") }, pr.status || "active")
            ])
          ])
        ]);
        projBody.append(row);
      });
    }
    if (archivedProjects.length) {
      projBody.append(ce("button", { class: "btn tiny", style: "margin-top:6px;width:100%;font-size:10px;color:var(--muted)", onclick: () => {
        try { localStorage.setItem("tmm.projects.showArchived", showArchived ? "0" : "1"); } catch(e) {}
        renderRoster();
      } }, showArchived ? "Hide archived (" + archivedProjects.length + ")" : "Show archived (" + archivedProjects.length + ")"));
    }
    const projVisibleCount = showArchived ? allProjects.length : (allProjects.length - archivedProjects.length);
    root.append(renderSection("projects", "Projects", projVisibleCount, "Add project", () => {
      addProject({ id: "project-" + Date.now(), name: "(new project)" });
    }, projBody));

    // Reference & Settings (v3.5.1 — added settings; dark mode lives here)
    const footer = ce("div", { class: "sidebar-footer", id: "sidebar-footer" });
    footer.append(ce("h2", { class: "views-h" }, "Reference & Settings"));
    footer.append(ce("div", { title: "Definitions", class: "view-row" + (STATE.selectedView === "definitions" ? " active" : ""), onclick: () => { STATE.selectedView = "definitions"; renderRoster(); renderDossier(); } }, [ce("div", { class: "view-icon" }, "📖"), ce("div", {}, "Definitions")]));
    // TSKMGR-93 Phase 1 — Settings view (partner profiles + Drive integration)
    footer.append(ce("div", { title: "Settings", class: "view-row" + (STATE.selectedView === "settings" ? " active" : ""), onclick: () => { STATE.selectedView = "settings"; renderRoster(); renderDossier(); } }, [ce("div", { class: "view-icon" }, "⚙"), ce("div", {}, "Settings")]));
    // v3.5.1 — Theme toggle moved here. Render as a view-row so it matches Definitions visually.
    const isDark = document.documentElement.classList.contains("theme-dark");
    footer.append(ce("div", {
      title: isDark ? "Switch to light mode" : "Switch to dark mode",
      class: "view-row",
      onclick: () => {
        const goingDark = !document.documentElement.classList.contains("theme-dark");
        document.documentElement.classList.toggle("theme-dark", goingDark);
        try { localStorage.setItem("tmm.v3.theme", goingDark ? "dark" : "light"); } catch (e) {}
        renderRoster();

  // v3.5.3 — Export/Import state helpers
  function exportStateToFile() {
    try {
      const raw = localStorage.getItem(SHADOW_KEY);
      if (!raw) {
        alert("No saved state found in this browser's storage. Have you used the artifact yet?");
        return;
      }
      // Validate parse before download
      let parsed;
      try { parsed = JSON.parse(raw); } catch (e) {
        alert("Saved state is corrupt — can't parse JSON. See console for details.");
        console.error("[v3.5.3 export] JSON parse failed", e, raw.slice(0, 400));
        return;
      }
      const counts = {
        partners: (parsed.state && parsed.state.partners || []).length,
        committees: (parsed.state && parsed.state.committees || []).length,
        projects: (parsed.state && parsed.state.projects || []).length,
        items: parsed.itemCount || 0,
        savedAt: parsed.savedAt
      };
      const blob = new Blob([raw], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
      a.href = url;
      a.download = "tmm-state-export-" + stamp + ".json";
      a.click();
      URL.revokeObjectURL(url);
      console.log("[v3.5.3 export] Downloaded", a.download, counts);
      showSave("saved",
        "Exported " + counts.partners + " partners + " +
        counts.committees + " committees + " + counts.projects + " projects (" +
        a.download + ")"
      );
    } catch (e) {
      console.error("[v3.5.3 export] failed", e);
      alert("Export failed: " + (e && e.message ? e.message : e));
    }
  }
  function openImportStateModal() {
    // Build modal on-demand so we don't bloat HTML with seldom-used UI
    const backdrop = ce("div", { id: "import-state-backdrop", style: "position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;display:flex;align-items:center;justify-content:center" });
    const modal = ce("div", { style: "background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:20px;width:min(640px,92vw);max-height:80vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,0.4)" });
    modal.append(ce("h3", { style: "margin:0 0 8px" }, "Import state"));
    modal.append(ce("div", { class: "meta", style: "font-size:13px;line-height:1.5;margin-bottom:12px" },
      "Paste the entire contents of an exported JSON file below. This REPLACES the current state in this browser. The current state will be backed up to localStorage under tmm.v3.preImportBackup so it's recoverable if needed."));
    const textarea = ce("textarea", {
      id: "import-state-textarea",
      placeholder: "Paste the full JSON content of your exported file here...",
      style: "width:100%;min-height:200px;font-family:ui-monospace,monospace;font-size:11px;padding:8px;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--fg);box-sizing:border-box"
    });
    modal.append(textarea);
    const stats = ce("div", { id: "import-state-stats", class: "meta", style: "font-size:12px;margin-top:8px;min-height:18px" }, "");
    modal.append(stats);
    textarea.addEventListener("input", () => {
      const v = textarea.value.trim();
      if (!v) { stats.textContent = ""; return; }
      try {
        const p = JSON.parse(v);
        const ps = (p.state && p.state.partners || []).length;
        const cs = (p.state && p.state.committees || []).length;
        const prj = (p.state && p.state.projects || []).length;
        stats.textContent = "Looks valid: " + ps + " partners, " + cs + " committees, " + prj + " projects" +
          (p.savedAt ? " (saved " + new Date(p.savedAt).toLocaleString() + ")" : "");
        stats.style.color = "var(--good)";
      } catch (e) {
        stats.textContent = "Not valid JSON yet (" + e.message + ")";
        stats.style.color = "var(--bad)";
      }
    });
    const btnRow = ce("div", { style: "display:flex;gap:8px;justify-content:flex-end;margin-top:14px" });
    const cancelBtn = ce("button", { class: "btn", onclick: () => backdrop.remove() }, "Cancel");
    const importBtn = ce("button", { class: "btn primary", onclick: () => doImportState(textarea.value, backdrop) }, "Import + reload");
    btnRow.append(cancelBtn);
    btnRow.append(importBtn);
    modal.append(btnRow);
    backdrop.append(modal);
    document.body.append(backdrop);
    setTimeout(() => textarea.focus(), 50);
  }
  function doImportState(text, backdropEl) {
    const trimmed = (text || "").trim();
    if (!trimmed) { alert("Paste the JSON contents first."); return; }
    let parsed;
    try { parsed = JSON.parse(trimmed); } catch (e) {
      alert("Not valid JSON: " + e.message);
      return;
    }
    if (!parsed.state || typeof parsed.state !== "object") {
      alert("JSON doesn't have a 'state' field. Are you sure this is an exported tmm-state-export-*.json file?");
      return;
    }
    if (!confirm(
      "Replace current state with imported data?\n\n" +
      "Current: " + ((STATE.partners || []).length) + " partners / " + ((STATE.committees || []).length) + " committees / " + ((STATE.projects || []).length) + " projects\n" +
      "Importing: " + ((parsed.state.partners || []).length) + " partners / " + ((parsed.state.committees || []).length) + " committees / " + ((parsed.state.projects || []).length) + " projects\n\n" +
      "Current state will be backed up to localStorage under tmm.v3.preImportBackup."
    )) return;
    try {
      // Back up current state before replacing
      const cur = localStorage.getItem(SHADOW_KEY);
      if (cur) localStorage.setItem("tmm.v3.preImportBackup", cur);
      // Write the new shadow
      localStorage.setItem(SHADOW_KEY, trimmed);
      console.log("[v3.5.3 import] Replaced shadow. Reloading...");
      if (backdropEl) backdropEl.remove();
      location.reload();
    } catch (e) {
      console.error("[v3.5.3 import] failed", e);
      alert("Import failed: " + (e && e.message ? e.message : e));
    }
  }

    if (STATE.selectedView === "tag" && STATE.activeTagFilter) { renderTagView(STATE.activeTagFilter); return; }
    if (STATE.selectedView === "filter" && STATE.activeFilter) { renderFilterView(STATE.activeFilter); return; }
    if (STATE.selectedView === "discovery") {
      // If we have a cached result, repaint from it; otherwise leave whatever the discovery flow drew
      if (discoveryCache) renderDiscoveryView();

    if (STATE.selectedView === "friday-planning") { renderFridayPlanning(); return; }
    if (STATE.selectedView === "collaborator") { renderCollaboratorPanel(STATE.selectedCollaboratorId); return; }

      if (pr) { renderProjectDossier(pr); return; }

  STATE.seedFlags = STATE.seedFlags || {};

  ];

    PROJECT_SEED.forEach(seed => {
      let proj = (STATE.projects || []).find(p => p.id === seed.id || p.name.toLowerCase() === seed.name.toLowerCase());
      if (!proj) {
        STATE.projects = STATE.projects || [];

        proj = normalizeProject({ id: seed.id, name: seed.name, shortCode: seed.shortCode, emoji: seed.emoji || "", description: seed.description, status: "active", tagAlias: seed.tagAlias });
        STATE.projects.push(proj);
        seededAny = true;
      }
      // Link any existing committee whose name matches a pattern
      (STATE.committees || []).forEach(c => {
        if (!c.name) return;
        const matched = seed.committeePatterns.some(re => re.test(c.name));
        if (matched) {
          c.projectIds = c.projectIds || [];

            c.projectIds.push(proj.id);
