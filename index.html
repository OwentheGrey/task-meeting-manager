  // Get or create the "Partner Profiles" Drive folder
  async function ensureRelationalFolder() {
    if (STATE.relationalFolderId) return STATE.relationalFolderId;
    try {
      const searchRaw = await window.cowork.callMcpTool("mcp__google-drive__search", {
        query: "name = 'Partner Profiles' and mimeType = 'application/vnd.google-apps.folder'",
        pageSize: 5
      });
      const searchResult = searchRaw.structuredContent ?? JSON.parse(searchRaw.content[0].text);
      if (searchResult.files && searchResult.files.length > 0) {
        STATE.relationalFolderId = searchResult.files[0].id;
        persistState("Set relational folder ID");
        return STATE.relationalFolderId;
      }
      const createRaw = await window.cowork.callMcpTool("mcp__google-drive__createFolder", {
        name: "Partner Profiles"
      });
      const created = createRaw.structuredContent ?? JSON.parse(createRaw.content[0].text);
      STATE.relationalFolderId = created.id;
      persistState("Created Partner Profiles folder");
      return STATE.relationalFolderId;
    } catch (e) {
      console.warn("[ensureRelationalFolder]", e);
      return null;
    }
  }

  // Create a new profile doc for a partner
  async function createRelationalDoc(partner) {
    try {
      const folderId = await ensureRelationalFolder();
      if (!folderId) return null;
      const title = (partner.name || "Partner") + " — Relational Profile";
      const initialContent = `# ${title}\n\n## Family\n\n## Important Dates\n\n## Interests & Hobbies\n\n## Living Location\n\n## Travel & Work Travel\n\n## Pets\n\n## Recent Life Events\n\n## Prayer Requests\n\n## Follow-Ups\n\n## Notes\n`;
      const raw = await window.cowork.callMcpTool("mcp__google-drive__createGoogleDoc", {
        title: title,
        content: initialContent,
        folderId: folderId
      });
      const result = raw.structuredContent ?? JSON.parse(raw.content[0].text);
      const docId = result.id || result.documentId || null;
      if (docId) {
        partner.relationalDocId = docId;
        persistState("Created relational doc for " + (partner.name || "partner"));
      }
      return docId;
    } catch (e) {
      console.warn("[createRelationalDoc]", e);
      return null;
    }
  }

  // Read a partner's profile doc (with 10-minute TTL caching)
  async function readRelationalDoc(partner) {
    if (!partner.relationalDocId) return null;
    try {
      const cache = STATE.relationalCache || {};
      const cached = cache[partner.id];
      const TEN_MIN = 10 * 60 * 1000;
      if (cached && cached.fetchedAt && (Date.now() - new Date(cached.fetchedAt).getTime()) < TEN_MIN) {
        return cached.content;
      }
      const raw = await window.cowork.callMcpTool("mcp__google-drive__readGoogleDoc", {
        documentId: partner.relationalDocId
      });
      const result = raw.structuredContent ?? JSON.parse(raw.content[0].text);
      let content = null;
      if (typeof result === "string") content = result;
      else if (result.body) content = JSON.stringify(result.body);
      else if (result.content) content = typeof result.content === "string" ? result.content : JSON.stringify(result.content);
      STATE.relationalCache = STATE.relationalCache || {};
      STATE.relationalCache[partner.id] = { content, fetchedAt: new Date().toISOString() };
      return content;
    } catch (e) {
      console.warn("[readRelationalDoc]", e);
      return null;
    }
  }

  // Append a note to a specific section of a partner's profile doc
  async function appendRelationalNote(partner, section, noteText) {
    if (!partner.relationalDocId) return false;
    try {
      const today = new Date().toISOString().split("T")[0];
      const formattedNote = "\n" + today + " — " + noteText.trim();
      const raw = await window.cowork.callMcpTool("mcp__google-drive__readGoogleDoc", {
        documentId: partner.relationalDocId
      });
      const result = raw.structuredContent ?? JSON.parse(raw.content[0].text);
      let currentContent = typeof result === "string" ? result : (result.content || result.body || "");
      if (typeof currentContent !== "string") currentContent = JSON.stringify(currentContent);
      const sectionHeading = "## " + section;
      const sectionIdx = currentContent.indexOf(sectionHeading);
      if (sectionIdx === -1) {
        const notesIdx = currentContent.indexOf("## Notes");
        if (notesIdx !== -1) {
          currentContent = currentContent.slice(0, notesIdx + "## Notes".length) + formattedNote + currentContent.slice(notesIdx + "## Notes".length);
        } else {
          currentContent += "\n## Notes\n" + formattedNote;
        }
      } else {
        const afterSection = currentContent.indexOf("\n## ", sectionIdx + sectionHeading.length);
        if (afterSection !== -1) {
          currentContent = currentContent.slice(0, afterSection) + formattedNote + currentContent.slice(afterSection);
        } else {
          currentContent += formattedNote;
        }
      }
      await window.cowork.callMcpTool("mcp__google-drive__updateGoogleDoc", {
        documentId: partner.relationalDocId,
        content: currentContent
      });
      if (STATE.relationalCache) delete STATE.relationalCache[partner.id];
      return true;
    } catch (e) {
      console.warn("[appendRelationalNote]", e);
      return false;
    }
  }

  // Initialize relational docs for all qualified partners
  async function initializeAllRelationalDocs(btnEl) {
    if (btnEl) { btnEl.disabled = true; btnEl.textContent = "Initializing…"; }
    const qualified = STATE.partners.filter(function(p) {
      let sourceCount = 0;
      const agenda = (p.agenda || []).length;
      const commits = ((p.commitments && p.commitments.ownerToPartner) || []).length +
                      ((p.commitments && p.commitments.partnerToOwner) || []).length +
                      ((p.commitments && p.commitments.joint) || []).length;
      const meetings = (p.meetingLog || []).length;
      const threads = (p.topicThreads || []).length;
      if (agenda > 0) sourceCount++;
      if (commits > 0) sourceCount++;
      if (meetings > 0) sourceCount++;
      if (threads > 0) sourceCount++;
      if (p.slackUserId) sourceCount++;
      if (p.email) sourceCount++;
      const total = agenda + commits + meetings + threads;
      return total >= 4 && sourceCount >= 2;
    });
    for (const p of qualified) {
      if (!p.relationalDocId) {
        await createRelationalDoc(p);
      }
    }
    persistState("Initialize All relational docs");
    renderSettings();
  }

  // Parse a markdown section from a doc string
  function _parseRelationalSection(content, sectionName) {
    if (!content || typeof content !== "string") return "";
    const heading = "## " + sectionName;
    const idx = content.indexOf(heading);
    if (idx === -1) return "";
    const start = idx + heading.length;
    const nextIdx = content.indexOf("\n## ", start);
    const raw = (nextIdx === -1 ? content.slice(start) : content.slice(start, nextIdx)).trim();
    return raw;
  }

  // Render the relational panel section for a partner dossier
  function renderRelationalPanel(p) {
    const panel = ce("section", { class: "block relational-panel" });
    panel.append(ce("h3", {}, ["Relational", ce("span", { class: "pill synth" }, "Drive doc")]));

    // --- 1. Relational Touchpoints ---
    const now = new Date();
    const in14 = new Date(now.getTime() + 14 * 24 * 60 * 60 * 1000);
    const relItems = (p.agenda || []).filter(function(a) {
      if (a.completed) return false;
      const isRelational = a.relational === true ||
        (Array.isArray(a.tags) && a.tags.some(function(t) { return /pray|prayer|personal/i.test(t); })) ||
        /pray|prayer|family|personal|travel|vacation/i.test(a.title || "") ||
        /pray|prayer|family|personal|travel|vacation/i.test(a.detail || "");
      if (!isRelational) return false;
      if (!a.dueBy) return true;
      const due = new Date(a.dueBy);
      return due >= now && due <= in14;
    });

    if (relItems.length > 0) {
      const tpDiv = ce("div", { style: "margin-bottom:12px" });
      tpDiv.append(ce("div", { class: "relational-touchpoints-label" }, "RELATIONAL TOUCHPOINTS"));
      const ul = ce("ul", { class: "agenda-list" });
      relItems.forEach(function(a) {
        const li = ce("li", {});
        const ttl = ce("div", { class: "ttl" }, a.title || "(untitled)");
        const det = ce("div", { class: "det" }, a.detail || "");
        li.append(ce("div", { class: "agenda-line" }, [ce("div", { class: "body" }, [ttl, det])]));
        ul.append(li);
      });
      tpDiv.append(ul);
      panel.append(tpDiv);
    }

    if (!p.relationalDocId) {
      // No doc yet — show create button
      const noDoc = ce("div", { class: "relational-no-doc" }, "This partner doesn't have a profile doc yet. ");
      const createBtn = ce("button", { class: "btn tiny", onclick: async function() {
        createBtn.disabled = true; createBtn.textContent = "Creating…";
        await createRelationalDoc(p);
        renderDossier();
      }}, "Create Profile Doc");
      noDoc.append(createBtn);
      panel.append(noDoc);
      return panel;
    }

    // --- 2. Partner brief (async load) ---
    const briefDiv = ce("div", { class: "relational-brief" });
    briefDiv.append(ce("div", { class: "due" }, "Loading…"));
    panel.append(briefDiv);

    const briefLinks = ce("div", { style: "display:flex;gap:10px;align-items:center;margin-bottom:8px" });
    briefLinks.append(ce("a", { class: "relational-doc-link", href: "https://docs.google.com/document/d/" + p.relationalDocId + "/edit", target: "_blank", rel: "noopener" }, "View full profile →"));
    const refreshBtn = ce("button", { class: "btn tiny subtle", onclick: function() {
      if (STATE.relationalCache) delete STATE.relationalCache[p.id];
      renderDossier();
    }}, "Refresh");
    briefLinks.append(refreshBtn);
    panel.append(briefLinks);

    // Fire async load
    (async function() {
      try {
        const content = await readRelationalDoc(p);
        briefDiv.innerHTML = "";
        if (!content) {
          briefDiv.append(ce("div", { class: "due" }, "Could not load profile. Check Drive permissions."));
          return;
        }
        const SECTIONS = [
          { name: "Family", lines: 3 },
          { name: "Living Location", lines: 1 },
          { name: "Travel & Work Travel", lines: 2 },
          { name: "Pets", lines: 1 },
          { name: "Prayer Requests", lines: 99 }
        ];
        let hasAny = false;
        SECTIONS.forEach(function(s) {
          const raw = _parseRelationalSection(content, s.name);
          if (!raw) return;
          const lines = raw.split("\n").filter(function(l) { return l.trim(); }).slice(0, s.lines);
          if (!lines.length) return;
          hasAny = true;
          briefDiv.append(ce("h4", {}, s.name));
          lines.forEach(function(l) {
            briefDiv.append(ce("div", {}, l.replace(/^[-*]\s*/, "")));
          });
        });
        if (!hasAny) briefDiv.append(ce("div", { class: "due" }, "Profile is empty — add notes below."));
      } catch (e) {
        briefDiv.innerHTML = "";
        briefDiv.append(ce("div", { class: "due", style: "color:var(--bad)" }, "Error loading profile: " + e.message));
      }
    })();

    // --- 3. Add note form ---
    const form = ce("div", { class: "relational-note-form" });
    const SECTION_OPTIONS = ["Family","Important Dates","Interests & Hobbies","Living Location","Travel & Work Travel","Pets","Recent Life Events","Prayer Requests","Follow-Ups","Notes"];
    const sectionSel = ce("select", {});
    SECTION_OPTIONS.forEach(function(s) {
      sectionSel.append(ce("option", { value: s }, s));
    });
    const noteTA = ce("textarea", { placeholder: "Add a note…", spellcheck: "true" });
    const statusDiv = ce("div", { class: "due" });
    const saveBtn = ce("button", { class: "btn primary tiny", onclick: async function() {
      const noteText = noteTA.value.trim();
      if (!noteText) { statusDiv.textContent = "Note is empty."; return; }
      saveBtn.disabled = true; saveBtn.textContent = "Saving…"; statusDiv.textContent = "";
      const ok = await appendRelationalNote(p, sectionSel.value, noteText);
      saveBtn.disabled = false; saveBtn.textContent = "Save";
      if (ok) { statusDiv.style.color = "var(--good)"; statusDiv.textContent = "Saved!"; noteTA.value = ""; setTimeout(function() { statusDiv.textContent = ""; }, 3000); }
      else { statusDiv.style.color = "var(--bad)"; statusDiv.textContent = "Error saving — check console."; }
    }}, "Save");
    form.append(sectionSel, noteTA, ce("div", { style: "display:flex;gap:8px;align-items:center" }, [saveBtn, statusDiv]));
    panel.append(form);
    return panel;
  }

  // v3.4.2a — render compact source_context line for any task-shaped item.
  // Returns null if no context, otherwise a small caption div.
  function renderContextLine(item) {
    const ctx = item && item.source_context;
    if (!ctx) return null;
    const parts = [];
    if (ctx.meeting_label) parts.push(ctx.meeting_label);
    if (ctx.excerpt) {
      const ex = ctx.excerpt.length > 140 ? ctx.excerpt.slice(0, 137) + "…" : ctx.excerpt;
      parts.push("“" + ex + "”");
    }
    if (!parts.length) return null;
    return ce("div", { class: "context-line", title: ctx.excerpt || ctx.meeting_label || "" }, "ⓘ " + parts.join(" — "));
  }

  // Renders a Documents block listing manualNotesUrl + attached invite docs.
  // Works for committees (entity has manualNotesUrl + attachedDocuments) and
  // projects (which only have attachedDocuments rolled up from linked committees).
  function renderDocumentsSection(entity, opts) {
    opts = opts || {};
    const docs = (entity.attachedDocuments || []).filter(d => d && d.url);
    const hasManual = entity.manualNotesUrl && entity.manualNotesUrl.length;
    if (!docs.length && !hasManual && !opts.showWhenEmpty) return null;

    const sec = ce("section", { class: "block" });
    sec.append(ce("h3", {}, "📎 Documents"));

    if (hasManual) {
      const row = ce("div", { class: "doc-row doc-row-manual" }, [
        ce("span", { class: "doc-kind" }, "MANUAL"),
        ce("a", { href: entity.manualNotesUrl, target: "_blank", rel: "noopener" }, "Manual notes document"),
        ce("span", { class: "meta" }, " — read by the reconciler in addition to Gemini Notes")
      ]);
      sec.append(row);
    }

    if (docs.length) {
      sec.append(ce("div", { class: "meta", style: "margin-top:6px" }, docs.length + " document" + (docs.length === 1 ? "" : "s") + " auto-discovered from calendar invite attachments:"));
      docs.forEach(d => {
        const row = ce("div", { class: "doc-row" }, [
          ce("span", { class: "doc-kind invite" }, "INVITE"),
          ce("a", { href: d.url, target: "_blank", rel: "noopener" }, d.title || "(unnamed document)"),
          d.addedAt ? ce("span", { class: "meta" }, " · added " + fmtDate(d.addedAt.slice(0, 10))) : null
        ].filter(Boolean));
        sec.append(row);
      });
    }

    if (!hasManual && !docs.length) {
      sec.append(ce("div", { class: "due" }, "No documents yet. Set a manual notes URL in the profile, or wait for the reconciler to discover invite attachments."));
    }
    return sec;
  }

  // Project documents are rolled up from linked committees + the project's own attachedDocuments.
  function renderProjectDocumentsSection(project) {
    const ownDocs = (project.attachedDocuments || []).map(d => ({ ...d, source: "project" }));
    const linkedCommittees = (STATE.committees || []).filter(c => Array.isArray(c.projectIds) && c.projectIds.includes(project.id));
    const linkedDocs = [];
    linkedCommittees.forEach(c => {
      (c.attachedDocuments || []).forEach(d => {
        if (d && d.url) linkedDocs.push({ ...d, source: "committee", sourceName: c.name, sourceId: c.id });
      });
      if (c.manualNotesUrl) linkedDocs.push({ url: c.manualNotesUrl, title: "Manual notes — " + c.name, kind: "manual", source: "committee", sourceName: c.name, sourceId: c.id });
    });
    const all = ownDocs.concat(linkedDocs);
    // Dedupe by URL
    const seen = new Set();
    const unique = [];
    all.forEach(d => { if (d.url && !seen.has(d.url)) { seen.add(d.url); unique.push(d); } });

    if (!unique.length) return null;
    const sec = ce("section", { class: "block" });
    sec.append(ce("h3", {}, "📎 Documents"));
    sec.append(ce("div", { class: "meta" }, unique.length + " document" + (unique.length === 1 ? "" : "s") + " linked across committees + project."));
    unique.forEach(d => {
      const tag = d.kind === "manual" ? "MANUAL" : (d.source === "committee" ? "INVITE" : "PROJECT");
      const row = ce("div", { class: "doc-row" }, [
        ce("span", { class: "doc-kind " + (d.kind === "manual" ? "doc-row-manual" : "invite") }, tag),
        ce("a", { href: d.url, target: "_blank", rel: "noopener" }, d.title || "(unnamed)"),
        d.sourceName ? ce("span", { class: "meta" }, " · from " + d.sourceName) : null
      ].filter(Boolean));
      sec.append(row);
    });
    return sec;
  }

  // Cross-pollination panel: committee action items where assigneeEmail matches this partner.
  // Items remain owned by the committee; this panel is a read-through view onto the canonical record.
  function renderCrossPollinationPanel(partner) {
    if (!partner || !partner.email) return null;
    const matches = [];
    (STATE.committees || []).forEach(c => {
      (c.actionItems || []).forEach(a => {
        if (!a.assigneeEmail) return;
        if (a.assigneeEmail.toLowerCase() !== partner.email.toLowerCase()) return;
        if (a.status === "done" || a.status === "cancelled") return;
        matches.push({ committee: c, item: a });
      });
    });
    if (!matches.length) return null;

    const sec = ce("section", { class: "block crosspoll-panel" });
    sec.append(ce("h3", {}, ["From committees", ce("span", { class: "pill synth" }, matches.length + " open")]));
    sec.append(ce("div", { class: "meta" }, "Action items assigned to " + (partner.name || partner.email) + " in committees Owen attends. Items remain owned by their committees — edit them there to reflect changes everywhere."));

    // Group by committee for readability
    const byCommittee = {};
    matches.forEach(m => { (byCommittee[m.committee.id] = byCommittee[m.committee.id] || { committee: m.committee, items: [] }).items.push(m.item); });

    Object.values(byCommittee).forEach(grp => {
      const grpDiv = ce("div", { class: "cp-group" });
      grpDiv.append(ce("div", { class: "cp-group-head", onclick: () => {
        STATE.selectedCommitteeId = grp.committee.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
        renderRoster(); renderDossier();
      } }, [
        ce("span", { class: "linked-kind kind-committee" }, "committee"),
        ce("strong", {}, " " + (grp.committee.name || grp.committee.id)),
        ce("span", { class: "meta" }, " · " + grp.items.length + " open"),
        ce("span", { class: "meta", style: "margin-left:auto" }, "open →")
      ]));
      grp.items.forEach(it => {
        const row = ce("div", { class: "cp-item" });
        row.append(ce("div", { class: "cp-text" }, [
          ce("span", { class: "ai-text" }, it.text || "(no text)"),
          ce("span", { class: "est-pill" }, " ⏱ " + estimateMinutes(it) + " min")
        ]));
        const meta = ce("div", { class: "meta cp-meta" });
        meta.append(ce("span", { class: "cp-status status-" + (it.status || "open") }, (it.status || "open").toUpperCase()));
        meta.append(document.createTextNode(" · " + (it.dueBy ? "due " + fmtDate(it.dueBy) : "no due date")));
        if (it.priority) meta.append(document.createTextNode(" · priority " + it.priority));
        row.append(meta);
        const ctxEl = renderContextLine(it);
        if (ctxEl) row.append(ctxEl);
        grpDiv.append(row);
      });
      sec.append(grpDiv);
    });
    return sec;
  }

  // Returns a small badge listing partner names this item is cross-visible to.
  // Item is a committee action item; we check assigneeEmail against partner.email list.
  function crossPolLinkBadge(item) {
    if (!item || !item.assigneeEmail) return null;
    const matches = (STATE.partners || []).filter(p => (p.email || "").toLowerCase() === item.assigneeEmail.toLowerCase());
    if (!matches.length) return null;
    const wrap = ce("span", { class: "cp-link-badge", title: "Also surfaces on this partner's 1:1 dossier" });
    wrap.append(document.createTextNode("→ also on "));
    matches.forEach((p, i) => {
      const a = ce("a", { onclick: (e) => { e.preventDefault(); STATE.selectedPartnerId = p.id; STATE.selectedKind = "partner"; STATE.selectedView = "partner"; renderRoster(); renderDossier(); } }, p.name || p.email);
      if (i > 0) wrap.append(document.createTextNode(", "));
      wrap.append(a);
    });
    wrap.append(document.createTextNode("'s 1:1"));
    return wrap;
  }

  // ============================================================
  // v3.2 — Committees: data model, CRUD, render dispatcher
  // ============================================================
  function addCommittee(seed, opts) {
    opts = opts || {};
    const id = (seed && seed.id) || ("committee-" + Date.now());
    // TSKMGR-61 — base shape comes from seed; canonical defaults are filled
    // in by normalizeCommittee() below so we only have to maintain field
    // defaults in one place (COMMITTEE_SCHEMA).
    const c = Object.assign({ id, name: "" }, seed || {});
    normalizeCommittee(c);
    STATE.committees = STATE.committees || [];
    STATE.committees.push(c);
    if (!opts.noNavigate) {
      STATE.selectedCommitteeId = id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
    }
    persistState("Add committee");
    if (!opts.noNavigate) { renderRoster(); renderDossier(); }
    return c;
  }
  function removeCommittee(id) {
    const c = (STATE.committees || []).find(x => x.id === id); if (!c) return;
    if (!confirm(`Remove ${c.name || c.id}? This drops the committee's dossier from the artifact.`)) return;
    STATE.committees = STATE.committees.filter(x => x.id !== id);
    if (STATE.selectedCommitteeId === id) {
      STATE.selectedCommitteeId = null;
      STATE.selectedKind = "partner";
      STATE.selectedView = "partner";
    }
    persistState("Remove committee " + id);
    renderRoster(); renderDossier();
  }

  // ============================================================
  // v3.3 — Projects: CRUD + aggregate dossier
  // ============================================================
  function slugify(s) { return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 50) || ("project-" + Date.now()); }
  function addProject(seed) {
    seed = seed || {};
    const id = seed.id || slugify(seed.name || "project");
    // TSKMGR-61 — base shape comes from seed; canonical defaults are filled
    // in by normalizeProject() below so we only have to maintain field
    // defaults in one place (PROJECT_SCHEMA).
    const p = Object.assign({ id, name: seed.name || "" }, seed);
    normalizeProject(p);
    STATE.projects = STATE.projects || [];
    STATE.projects.push(p);
    STATE.selectedProjectId = id;
    STATE.selectedKind = "project";
    STATE.selectedView = "project";
    persistState("Add project");
    renderRoster(); renderDossier();
    return p;
  }
  function removeProject(id) {
    const p = (STATE.projects || []).find(x => x.id === id); if (!p) return;
    if (!confirm(`Remove project ${p.name || p.id}? Items tagged with this project keep their projectId reference but the aggregate view goes away.`)) return;
    STATE.projects = STATE.projects.filter(x => x.id !== id);
    if (STATE.selectedProjectId === id) {
      STATE.selectedProjectId = null;
      STATE.selectedKind = "partner";
      STATE.selectedView = "partner";
    }
    persistState("Remove project " + id);
    renderRoster(); renderDossier();
  }

  // Aggregate items across partners + committees that belong to a project
  // (either via projectId === project.id, or via a tag matching project.tagAlias)
  function projectItems(p) {
    const matches = it => {
      if (it.projectId && it.projectId === p.id) return true;
      if (p.tagAlias && Array.isArray(it.tags) && it.tags.includes(p.tagAlias)) return true;
      return false;
    };
    const out = { actionItems: [], commitments: [], decisions: [], topicThreads: [], agenda: [] };
    (STATE.partners || []).forEach(pa => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        ((pa.commitments && pa.commitments[lane]) || []).forEach(c => { if (matches(c)) out.commitments.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: c, lane }); });
      });
      (pa.agenda || []).forEach(a => { if (matches(a)) out.agenda.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: a }); });
      (pa.decisions || []).forEach(d => { if (matches(d)) out.decisions.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: d }); });
      (pa.topicThreads || []).forEach(t => { if (matches(t)) out.topicThreads.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: t }); });
    });
    (STATE.committees || []).forEach(co => {
      (co.actionItems || []).forEach(a => { if (matches(a)) out.actionItems.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: a }); });
      (co.agenda || []).forEach(a => { if (matches(a)) out.agenda.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: a }); });
      (co.decisions || []).forEach(d => { if (matches(d)) out.decisions.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: d }); });
      (co.topicThreads || []).forEach(t => { if (matches(t)) out.topicThreads.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: t }); });
    });
    return out;
  }

  // Find every meeting (partner 1:1 or committee) linked to this project
  function projectMeetings(p) {
    const out = [];
    (STATE.partners || []).forEach(pa => {
      const items = (pa.agenda || []).concat(...["ownerToPartner","partnerToOwner","joint"].map(l => (pa.commitments && pa.commitments[l]) || []));
      const hasProject = items.some(it => (it.projectId === p.id) || (p.tagAlias && Array.isArray(it.tags) && it.tags.includes(p.tagAlias)));
      if (hasProject) out.push({ kind: "partner", id: pa.id, name: pa.name, cadence: pa.cadence });
    });
    (STATE.committees || []).forEach(co => {
      const inProjectIds = Array.isArray(co.projectIds) && co.projectIds.includes(p.id);
      const items = (co.agenda || []).concat(co.actionItems || []);
      const hasItems = items.some(it => (it.projectId === p.id) || (p.tagAlias && Array.isArray(it.tags) && it.tags.includes(p.tagAlias)));
      if (inProjectIds || hasItems) out.push({ kind: "committee", id: co.id, name: co.name, cadence: co.cadence, role: co.role });
    });
    return out;
  }

  function renderProjectDossier(p) {
    const dos = document.getElementById("dossier"); dos.innerHTML = "";
    dos.append(renderSprintStrip());

    // Header
    var projectRefreshBtn = ce("button", {
      class: "refresh-btn",
      title: "Refresh Jira & calendar data for " + (p.name || "this project"),
      onclick: async function () {
        projectRefreshBtn.classList.add("spinning");
        try { delete liveCache[p.id]; delete jiraCache[p.id]; } catch (e) { console.warn("[project refresh]", e); }
        projectRefreshBtn.classList.remove("spinning");
        renderDossier();
      }
    }, "↻");
    const head = ce("div", { class: "pheader" }, [
      ce("div", {}, [
        ce("h1", {}, [
          projectLabel(p, false) || "(unnamed project)",
          ce("span", { class: "role" }, [
            ce("span", { class: "project-status status-" + (p.status || "active") }, p.status || "active")
          ]),
          projectRefreshBtn
        ]),
        (p.startDate || p.endDate) ? ce("div", { class: "cadence" }, (p.startDate ? fmtDate(p.startDate) : "?") + " → " + (p.endDate ? fmtDate(p.endDate) : "ongoing")) : null,
        p.description ? ce("div", { class: "purpose meta" }, p.description) : null
      ].filter(Boolean))
    ]);
    dos.append(head);

    const items = projectItems(p);
    const meetings = projectMeetings(p);

    // Members union
    const memberMap = {};
    meetings.forEach(m => {
      if (m.kind === "committee") {
        const co = STATE.committees.find(x => x.id === m.id);
        if (co) (co.members || []).forEach(mem => { if (mem.email) memberMap[mem.email] = mem; });
      } else if (m.kind === "partner") {
        const pa = STATE.partners.find(x => x.id === m.id);
        if (pa && pa.email) memberMap[pa.email] = { email: pa.email, name: pa.name };
      }
    });
    const members = Object.values(memberMap);

    // Members chip strip (uses committee member-chip styling)
    if (members.length) {
      const chipWrap = ce("div", { class: "member-chips" });
      members.forEach(m => {
        const isOwen = (m.email || "").toLowerCase() === OWNER_EMAIL.toLowerCase();
        chipWrap.append(ce("span", { class: "member-chip" + (isOwen ? " is-owen" : ""), title: m.email }, [
          ce("span", { class: "avatar tiny" }, initials(m.name || m.email)),
          ce("span", { class: "member-name" }, (m.name || m.email).split(" ")[0])
        ]));
      });
      dos.append(chipWrap);
    } else {
      dos.append(ce("div", { class: "due", style: "margin-bottom:10px" }, "Solo project — no other members linked yet."));
    }

    // Balance ribbon — strategic vs tactical across all items in the project
    const aggregatedItems = [].concat(
      items.actionItems.map(x => x.item),
      items.commitments.map(x => x.item),
      items.agenda.map(x => x.item)
    );
    // TSKMGR-65 — include project-rooted actionItems in the ribbon count so the percentages
    // reflect every category-bearing item under the project. They're rendered separately in
    // the dedicated "Action items" section below, so keep them out of the "Open work" list
    // to avoid duplication.
    const ribbonItems = aggregatedItems.concat(p.actionItems || []);
    if (ribbonItems.length) {
      const cats = { strategic: 0, tactical: 0, status: 0 };
      ribbonItems.forEach(it => { const c = it.category || "tactical"; cats[c] = (cats[c] || 0) + 1; });
      const total = cats.strategic + cats.tactical + cats.status;
      const pct = (n) => total ? Math.round((n / total) * 100) : 0;
      // v3.4.8 — fix: pass numeric counts (not category names) to pct()
      const ribbon = ce("div", { class: "balance-ribbon" }, [
        ce("div", { class: "ribbon-segment seg-strategic", style: "flex:" + pct(cats.strategic) }, pct(cats.strategic) + "% strategic"),
        ce("div", { class: "ribbon-segment seg-tactical",  style: "flex:" + pct(cats.tactical)  }, pct(cats.tactical)  + "% tactical"),
        ce("div", { class: "ribbon-segment seg-status",    style: "flex:" + pct(cats.status)    }, pct(cats.status)    + "% status")
      ]);
      dos.append(ribbon);
    }

    // Action items + commitments combined, rendered with the by-due-date helper
    const allOpen = aggregatedItems.filter(it => it.status !== "done" && it.status !== "cancelled");
    if (allOpen.length) {
      const sec = ce("section", { class: "block" });
      sec.append(ce("h3", {}, ["Open work", ce("span", { class: "pill synth" }, allOpen.length + "")]));
      sec.append(renderActionItemsByDueDate(allOpen, null));
      dos.append(sec);
    }

    // Recent decisions across the project
    if (items.decisions.length) {
      const dec = ce("section", { class: "block" });
      dec.append(ce("h3", {}, "Recent decisions across the project"));
      items.decisions
        .slice()
        .sort((a, b) => (b.item.when || "").localeCompare(a.item.when || ""))
        .slice(0, 20)
        .forEach(({ item: d, source }) => dec.append(ce("div", { class: "decision" }, [
          ce("div", {}, d.text),
          ce("div", { class: "meta" }, fmtDate(d.when) + " · from " + source),
          d.tags && d.tags.length ? tagPills(d.tags) : null
        ].filter(Boolean))));
      dos.append(dec);
    }

    // Topic threads
    if (items.topicThreads.length) {
      const tt = ce("section", { class: "block" });
      tt.append(ce("h3", {}, "Topic threads"));
      items.topicThreads.forEach(({ item: t, source }) => tt.append(ce("details", {}, [
        ce("summary", {}, t.title + "  ·  " + source),
        ce("div", { class: "body" }, [t.summary, t.tags && t.tags.length ? tagPills(t.tags) : null].filter(Boolean))
      ])));
      dos.append(tt);
    }

    // Linked meetings
    const lm = ce("section", { class: "block" });
    lm.append(ce("h3", {}, "Linked meetings"));
    if (!meetings.length) lm.append(ce("div", { class: "due" }, "No linked meetings yet. Tag a committee with this project (in its profile) or tag any item with " + (p.tagAlias ? "tag '" + p.tagAlias + "'" : "this project") + " to surface it here."));
    meetings.forEach(m => {
      const row = ce("div", { class: "linked-meeting", onclick: () => {
        if (m.kind === "partner") { STATE.selectedPartnerId = m.id; STATE.selectedKind = "partner"; STATE.selectedView = "partner"; }
        else { STATE.selectedCommitteeId = m.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee"; }
        renderRoster(); renderDossier();
      } }, [
        ce("span", { class: "linked-kind kind-" + m.kind }, m.kind),
        ce("span", {}, " " + m.name + (m.role ? " (" + m.role + ")" : "") + (m.cadence ? " · " + m.cadence.split("•")[0].trim() : ""))
      ]);
      lm.append(row);
    });
    dos.append(lm);

    // TSKMGR-65 — Project-rooted action items (parallel to committee actionItems).
    // Rendered above attachedDocuments and mirrors the committee dossier "Action items" pattern.
    // `renderActionItemRow` looks up assigneeEmail against the second arg's `.members`; we pass
    // a synthetic shim built from the project's rolled-up members so the assignee chip resolves
    // to the member's display name when possible.
    p.actionItems = p.actionItems || [];
    const paiSec = ce("section", { class: "block" });
    const openCount = p.actionItems.filter(a => a.status !== "done" && a.status !== "cancelled" && !a.completed).length;
    paiSec.append(ce("h3", {}, ["Action items", ce("span", { class: "pill synth" }, openCount + " open")]));
    const projectShim = { members: members };
    paiSec.append(renderActionItemsByDueDate(p.actionItems, projectShim));
    dos.append(paiSec);

    // v3.4.3a — Project documents rolled up from linked committees
    const projDocsSec = renderProjectDocumentsSection(p);
    if (projDocsSec) dos.append(projDocsSec);

    // v3.3.0b — Jira section on projects (reuses partner/committee pattern)
    if (p.jiraQueries && p.jiraQueries.length) {
      const jiraSec = renderJiraSection(p);
      if (jiraSec) dos.append(jiraSec);
    }

    dos.append(renderProjectProfile(p));
    loadSprintStrip();
    if (p.jiraQueries && p.jiraQueries.length) loadJira(p);
  }

  function renderProjectProfile(p) {
    const sec = ce("section", { class: "block" });
    sec.append(ce("h3", {}, ["Project profile", ce("span", { class: "pill synth" }, "editable")]));
    const grid = ce("div", { class: "profile-grid" });
    const fields = [
      { key: "name", label: "Name", tag: "input", type: "text", spellcheck: true },
      { key: "shortCode", label: "Short code", tag: "input", type: "text", maxlength: 2, help: "Optional 2-character label shown in the avatar circle when sidebar is collapsed (e.g. 'CN' for Connections). Falls back to name initials if blank." },
      { key: "emoji", label: "Emoji", tag: "input", type: "text", maxlength: 2, help: "Optional emoji shown before the project name in chips and labels (e.g. 🔗)." },
      { key: "description", label: "Description", tag: "textarea", spellcheck: true, help: "What is this project, what's the goal, what phase is it in. Feeds owner-shape committees' 'what to ask the team' prompt." },
      { key: "tagAlias", label: "Tag alias", tag: "input", type: "text", help: "Tag string this project subsumes. Items with this tag are aggregated under the project automatically. e.g., 'Connections-V1.0'." },
      { key: "startDate", label: "Start date", tag: "input", type: "date" },
      { key: "endDate", label: "End date", tag: "input", type: "date", help: "Leave blank for ongoing." }
    ];
    fields.forEach(f => {
      grid.append(ce("label", {}, f.label));
      const inp = ce(f.tag, { type: f.type || undefined });
      if (f.maxlength) inp.maxLength = f.maxlength;
      if (f.spellcheck) inp.spellcheck = true;
      inp.value = p[f.key] || "";
      inp.addEventListener("input", () => {
        let v = inp.value;
        if (f.maxlength && v.length > f.maxlength) v = v.slice(0, f.maxlength);
        if (f.key === "shortCode") v = v.toUpperCase();
        if (v !== inp.value) inp.value = v;
        p[f.key] = v || (f.type === "date" ? null : "");
      });
      inp.addEventListener("blur", () => { if (f.key === "shortCode") renderRoster(); persistState("Edit project." + f.key); });
      const wrap = ce("div", {}, [inp]);
      if (f.help) wrap.append(ce("div", { class: "meta" }, f.help));
      grid.append(wrap);
    });

    // Status select
    grid.append(ce("label", {}, "Status"));
    const statusSel = ce("select", {});
    [["active","Active"],["dormant","Dormant"],["done","Done"]].forEach(([val, lbl]) => {
      const o = ce("option", { value: val }, lbl);
      if ((p.status || "active") === val) o.selected = true;
      statusSel.append(o);
    });
    statusSel.addEventListener("change", () => { p.status = statusSel.value; persistState("Edit project.status"); renderRoster(); renderDossier(); });
    grid.append(statusSel);

    // v3.3.0b — Jira queries editor (mirrors partner / committee profile pattern)
    grid.append(ce("label", {}, "Jira queries"));
    const jqWrap = ce("div", {});
    if (!p.jiraQueries) p.jiraQueries = [];
    p.jiraQueries.forEach((q, idx) => {
      const row = ce("div", { style: "border:1px dashed var(--line);border-radius:4px;padding:8px;margin-bottom:6px" });
      const labInp = ce("input", { type: "text", value: q.label || "", placeholder: "Label" });
      const jqlInp = ce("textarea", { placeholder: "JQL", style: "min-height:50px;font-family:ui-monospace,monospace;font-size:12px" });
      jqlInp.value = q.jql || "";
      labInp.addEventListener("input", () => q.label = labInp.value);
      labInp.addEventListener("blur", () => { jiraCache[p.id] = null; persistState("Edit project Jira query label"); });
      jqlInp.addEventListener("input", () => q.jql = jqlInp.value);
      jqlInp.addEventListener("blur", () => { jiraCache[p.id] = null; persistState("Edit project Jira query JQL"); });
      const del = ce("button", { class: "btn tiny danger", style: "margin-top:4px", onclick: () => { p.jiraQueries.splice(idx, 1); jiraCache[p.id] = null; persistState("Remove project Jira query"); renderDossier(); } }, "Remove");
      row.append(labInp, jqlInp, del);
      jqWrap.append(row);
    });
    jqWrap.append(ce("button", { class: "btn tiny", onclick: () => { p.jiraQueries.push({ id: "q-" + Date.now(), label: "New query", jql: "", limit: 15 }); jiraCache[p.id] = null; persistState("Add project Jira query"); renderDossier(); } }, "+ Add Jira query"));
    grid.append(jqWrap);

    // TSKMGR-45 — Slack channel mapping editor
    grid.append(ce("label", {}, "Slack channel"));
    grid.append(_renderSlackChannelEditor(p, "project"));

    grid.append(ce("label", {}, "Project ID"));
    grid.append(ce("div", { class: "meta" }, [ce("code", {}, p.id)]));

    sec.append(grid);

    // v3.3.0b — Archive instead of remove. Active/dormant projects show Archive; archived show Restore.
    const acts = ce("div", { class: "profile-actions" });
    if (p.status === "done") {
      acts.append(ce("button", { class: "btn tiny", onclick: () => {

  // Promote a tag string to a first-class project. Creates the project with tagAlias = tag.
  // Items keep their tags array, so the existing tag continues to work — but they now also
  // aggregate under the new project automatically (via tagAlias matching in projectItems).
  function promoteTagToProject(tag) {
    if (!tag) return;
    // Don't double-promote
    const existing = (STATE.projects || []).find(p => p.tagAlias === tag);
    if (existing) {
      STATE.selectedProjectId = existing.id; STATE.selectedKind = "project"; STATE.selectedView = "project";
      renderRoster(); renderDossier();

      return existing;
    }
    return addProject({ id: "project-" + Date.now(), name: tag, tagAlias: tag });
  }

  // Score existing active projects for likelihood of being the right project for a committee/meeting.
  // Inputs: committee name (or meeting title) + attendee emails.
  // Algorithm:
  //   +3 title contains project.tagAlias (case-insensitive)
  //   +3 title contains project.name (case-insensitive)
  //   +2 ≥1 attendee email matches a member of a meeting already linked to that project
  //   +1 any committee linked to the project shares ≥1 attendee
  function suggestProjectFor(meetingTitle, attendeeEmails) {
    const projects = (STATE.projects || []).filter(p => p.status !== "done");
    if (!projects.length) return [];
    const title = (meetingTitle || "").toLowerCase();
    const atts = (attendeeEmails || []).map(e => (e || "").toLowerCase()).filter(Boolean);
    const scored = projects.map(p => {
      let score = 0;
      const reasons = [];
      if (p.tagAlias && title.includes(p.tagAlias.toLowerCase())) { score += 3; reasons.push("title contains tag"); }
      if (p.name && title.includes(p.name.toLowerCase())) { score += 3; reasons.push("title contains project name"); }
      // Attendee overlap with linked committees
      const linkedCommittees = (STATE.committees || []).filter(c => Array.isArray(c.projectIds) && c.projectIds.includes(p.id));
      if (linkedCommittees.length) {
        const linkedEmails = new Set();
        linkedCommittees.forEach(c => (c.members || []).forEach(m => { if (m.email) linkedEmails.add(m.email.toLowerCase()); }));
        const overlap = atts.filter(e => linkedEmails.has(e)).length;
        if (overlap > 0) { score += 2; reasons.push(overlap + " attendee overlap with linked committees"); }
      }
      return { project: p, score, reasons };
    }).filter(s => s.score > 0);
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, 3);
  }

  // Suggest projects for an item (agenda/action item/commitment) by looking at its tags
  function suggestProjectForItem(item) {
    if (!item.tags || !item.tags.length) return [];
    const projects = (STATE.projects || []).filter(p => p.status !== "done");
    const matches = [];
    item.tags.forEach(tag => {
      const p = projects.find(x => x.tagAlias === tag);
      if (p && !matches.find(m => m.project.id === p.id)) matches.push({ project: p, score: 3, reasons: ["tag matches alias"] });
    });
    return matches.slice(0, 3);
  }

  function recentWins(days) {

  let fridayCalCache = null; // { ts: number, cal: { start, end, busyByDay, events } | null }

  function getNextWeekRange() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const dow = today.getDay();
    const daysToMon = ((1 - dow + 7) % 7) || 7; // upcoming Monday, never today
    const monday = new Date(today); monday.setDate(today.getDate() + daysToMon); monday.setHours(0, 0, 0, 0);

  async function loadNextWeekCalendar(forceRefresh) {
    if (!forceRefresh && fridayCalCache && Date.now() - fridayCalCache.ts < 300000) return fridayCalCache.cal;
    const { start, end } = getNextWeekRange();
    try {
      const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", {
        startTime: start.toISOString(),
        endTime: end.toISOString(),
        fullText: OWNER_EMAIL,
        pageSize: 50,
        orderBy: "startTime"
      });
      const { data } = unwrapMcp(evRaw);
      if (typeof data === "string") { fridayCalCache = { ts: Date.now(), cal: null }; return null; }
      const events = (pickArr(data, "events") || pickArr(data, "items") || []).filter(e => e.status !== "cancelled" && e.eventType !== "birthday");
      const busyByDay = {};
      events.forEach(e => {
        const sIso = e.start && (e.start.dateTime || e.start.date);
        const eIso = e.end && (e.end.dateTime || e.end.date);
        if (!sIso || !eIso) return;
        const eStart = new Date(sIso); const eEnd = new Date(eIso);
        if (isNaN(eStart) || isNaN(eEnd)) return;
        let cursor = new Date(eStart); cursor.setHours(0, 0, 0, 0);
        const lastDay = new Date(eEnd);
        while (cursor <= lastDay) {
          const dayKey = cursor.toISOString().slice(0, 10);
          const dayStart = new Date(cursor);
          const dayEnd = new Date(cursor); dayEnd.setHours(23, 59, 59, 999);
          const intervalStart = eStart > dayStart ? eStart : dayStart;
          const intervalEnd = eEnd < dayEnd ? eEnd : dayEnd;
          if (intervalEnd > intervalStart) {
            (busyByDay[dayKey] = busyByDay[dayKey] || []).push({ start: intervalStart, end: intervalEnd, summary: e.summary || "(busy)" });
          }
          cursor.setDate(cursor.getDate() + 1);
        }
      });
      Object.keys(busyByDay).forEach(d => busyByDay[d].sort((a, b) => a.start - b.start));
      const cal = { start, end, busyByDay, events };
      fridayCalCache = { ts: Date.now(), cal };
      return cal;
    } catch (err) {
      console.error("[friday] loadNextWeekCalendar failed", err);
      fridayCalCache = { ts: Date.now(), cal: null };

  // Build per-day open slots: 8:30am-12pm + 1pm-5pm minus busy intervals.
  // Returns map dayKey → [{ start, end, slot: "morning"|"afternoon" }] sorted by start.
  function buildDailySlots(weekDays, busyByDay) {
    const slotsByDay = {};
    weekDays.forEach(d => {
      const dayKey = d.toISOString().slice(0, 10);
      // v3.4.1a — working hours 9am-5pm (was 8:30am-5pm). Lunch 12-1.
      const morningStart = new Date(d); morningStart.setHours(9, 0, 0, 0);
      const morningEnd = new Date(d); morningEnd.setHours(12, 0, 0, 0);
      const afternoonStart = new Date(d); afternoonStart.setHours(13, 0, 0, 0);
      const afternoonEnd = new Date(d); afternoonEnd.setHours(17, 0, 0, 0);
      let free = [
        { start: morningStart, end: morningEnd, slot: "morning" },
        { start: afternoonStart, end: afternoonEnd, slot: "afternoon" }
      ];
      (busyByDay[dayKey] || []).forEach(b => {
        const next = [];
        free.forEach(f => {
          if (b.end <= f.start || b.start >= f.end) { next.push(f); return; }
          if (b.start <= f.start && b.end >= f.end) return; // covered
          if (b.start <= f.start) { next.push({ start: b.end, end: f.end, slot: f.slot }); return; }
          if (b.end >= f.end) { next.push({ start: f.start, end: b.start, slot: f.slot }); return; }
          next.push({ start: f.start, end: b.start, slot: f.slot });
          next.push({ start: b.end, end: f.end, slot: f.slot });
        });
        free = next.filter(f => f.end > f.start);
      });
      slotsByDay[dayKey] = free;
    });
    return slotsByDay;
  }

  function isEmailLikeTask(item) {
    const text = (item.text || item.title || "").toLowerCase();
    return (item.verifyVia && item.verifyVia.type === "email_sent") || /^(reply|send|respond|email)\b/.test(text);
  }

  function proposeBlocks(taskRecords, busyByDay) {
    if (!busyByDay) return [];
    const proposals = [];
    const range = getNextWeekRange();
    // TSKMGR-49 — 2-week horizon: collect all weekdays
    const weekDays = [];
    var _cursor = new Date(range.start);
    while (_cursor <= range.end && weekDays.length < 10) {
      var _dow = _cursor.getDay();
      if (_dow >= 1 && _dow <= 5) weekDays.push(new Date(_cursor));
      _cursor.setDate(_cursor.getDate() + 1);
    }
    const slotsByDay = buildDailySlots(weekDays, busyByDay);
    const sorted = taskRecords.slice().sort(fridayTaskSort);

    // v3.4.4e — honor manual drag-drop overrides first (skip the auto-fit pass for those)
    const overrideRecs = sorted.filter(rec => rec.item.proposedSlotOverride && rec.item.proposedSlotOverride.start && rec.item.proposedSlotOverride.end);
    overrideRecs.forEach(rec => {
      const ovr = rec.item.proposedSlotOverride;
      const start = new Date(ovr.start);
      const end = new Date(ovr.end);
      proposals.push({ rec, slot: { start, end }, manuallyPlaced: true });
      // Mark this slot as "consumed" in slotsByDay so auto-fit doesn't double-book
      const dayKey = start.toISOString().slice(0, 10);
      const daySlots = slotsByDay[dayKey] || [];
      // Don't bother surgically splitting — just push a fake busy interval for accuracy
      slotsByDay[dayKey] = daySlots.map(s => {
        if (end <= s.start || start >= s.end) return s;
        if (start <= s.start && end >= s.end) return null; // covered
        if (start <= s.start) return { start: end, end: s.end, slot: s.slot };
        if (end >= s.end) return { start: s.start, end: start, slot: s.slot };
        return { start: s.start, end: start, slot: s.slot, _split: { start: end, end: s.end, slot: s.slot } };
      }).filter(Boolean).flatMap(s => s._split ? [{ start: s.start, end: s.end, slot: s.slot }, s._split] : [s]);
    });

    const remaining = sorted.filter(rec => !overrideRecs.includes(rec));

    remaining.forEach(rec => {
      const item = rec.item;
      const minutes = estimateMinutes(item);
      const isMorningTask = item.category === "strategic";
      const isAfternoonTask = isEmailLikeTask(item);
      const dueLimit = item.dueBy ? new Date(item.dueBy + "T23:59:59") : null;
      let placed = false;

      for (let di = 0; di < weekDays.length && !placed; di++) {
        const day = weekDays[di];
        if (dueLimit && day > dueLimit) break;
        const dayKey = day.toISOString().slice(0, 10);
        const daySlots = slotsByDay[dayKey] || [];
        // Try preferred slot type first, then fall back
        const ordered = isMorningTask
          ? daySlots.slice().sort((a, b) => (a.slot === "morning" ? -1 : 1) - (b.slot === "morning" ? -1 : 1))
          : isAfternoonTask
          ? daySlots.slice().sort((a, b) => (a.slot === "afternoon" ? -1 : 1) - (b.slot === "afternoon" ? -1 : 1))
          : daySlots.slice();

        for (let i = 0; i < ordered.length && !placed; i++) {
          const s = ordered[i];
          const slotMins = (s.end - s.start) / 60000;
          if (slotMins < minutes) continue;
          const blockStart = new Date(s.start);
          const blockEnd = new Date(blockStart.getTime() + minutes * 60000);
          // Update slot list: replace s with whatever's left after block + 15min buffer
          const idx = daySlots.indexOf(s);
          const replacements = [];
          const bufferEnd = new Date(blockEnd.getTime() + 15 * 60000);
          if (bufferEnd < s.end) replacements.push({ start: bufferEnd, end: s.end, slot: s.slot });
          daySlots.splice(idx, 1, ...replacements);
          proposals.push({ rec, slot: { start: blockStart, end: blockEnd } });
          placed = true;
        }
      }
      if (!placed) proposals.push({ rec, unscheduled: true, reason: dueLimit && weekDays[0] > dueLimit ? "Due before next week starts" : "No slot fits this week" });
    });
    return proposals;
  }

  function collectOpenTasksForBlocking() {
    const out = [];
    const _now = new Date(); _now.setHours(0,0,0,0);
    const _twoWeeksOut = new Date(_now); _twoWeeksOut.setDate(_now.getDate() + 14); _twoWeeksOut.setHours(23,59,59,999);
    const inBlockingWindow = (dueBy) => { if (!dueBy) return false; const d = new Date(dueBy); return d >= _now && d <= _twoWeeksOut; };
    (STATE.partners || []).forEach(pa => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {

    (STATE.committees || []).forEach(co => {

        out.push({ item: a, kind: "action", source: co.name, sourceId: co.id, sourceKind: "committee" });
      });
    });
    // Partner agendas (Owen's own prep items — no ownership filter needed)
    (STATE.partners || []).forEach(pa => {
      (pa.agenda || []).forEach(a => {
        if (a.calendar_block_event_id) return;
        if (a.completed) return;
        if (!inBlockingWindow(a.dueBy)) return;
        out.push({ item: a, kind: "agenda", source: pa.name, sourceId: pa.id, sourceKind: "partner" });
      });
    });
    // Committee agendas (Owen-only: no assigneeEmail or assigneeEmail === OWNER_EMAIL)
    (STATE.committees || []).forEach(co => {
      (co.agenda || []).forEach(a => {
        if (a.calendar_block_event_id) return;
        if (a.completed) return;
        if (!inBlockingWindow(a.dueBy)) return;
        if (a.assigneeEmail && a.assigneeEmail.toLowerCase() !== OWNER_EMAIL.toLowerCase()) return;
        out.push({ item: a, kind: "agenda", source: co.name, sourceId: co.id, sourceKind: "committee" });
      });
    });
    // Project action items (Owen-only: no assigneeEmail or assigneeEmail === OWNER_EMAIL)
    (STATE.projects || []).forEach(proj => {
      if (proj.status === "done") return;
      (proj.actionItems || []).forEach(a => {
        if (a.calendar_block_event_id) return;
        if (a.status === "done" || a.status === "cancelled") return;
        if (!inBlockingWindow(a.dueBy)) return;
        if (a.assigneeEmail && a.assigneeEmail.toLowerCase() !== OWNER_EMAIL.toLowerCase()) return;
        out.push({ item: a, kind: "action", source: proj.name, sourceId: proj.id, sourceKind: "project" });
      });
    });
    return out;
  }

        if (typeof data === "string") {
          showSave("error", "Calendar create failed: " + data.slice(0, 80));
          if (btn) { btn.disabled = false; btn.textContent = "Accept"; }
          return;
        }
      }
      const eventId = (data && (data.id || (data.event && data.event.id))) || true;
      rec.item.calendar_block_event_id = eventId;
      // v3.4.4e — clear any drag-drop slot override now that the block is committed
      delete rec.item.proposedSlotOverride;
      fridayCalCache = null; // invalidate so next-week-at-a-glance reflects the new block
      showSave("saved", "Block created");
      persistState("Time-block accepted");
      renderFridayPlanning();
    } catch (e) {
      showSave("error", "Calendar create failed: " + (e && e.message ? e.message : e));
      if (btn) { btn.disabled = false; btn.textContent = "Accept"; }
    }
  }

  function renderBusyFreeMap(busyByDay) {
    const wrap = ce("div", { class: "busy-free-map" });
    const range = getNextWeekRange();
    for (let i = 0; i < 5; i++) {
      const day = new Date(range.start); day.setDate(range.start.getDate() + i);
      const dayKey = day.toISOString().slice(0, 10);
      const busy = busyByDay[dayKey] || [];
      const row = ce("div", { class: "bf-row" });
      row.append(ce("div", { class: "bf-day" }, fmtDayLabel(day)));
      const busyMins = busy.reduce((sum, b) => {
        // v3.4.1a — workday window 9:00-17:00 (Owen's working hours)
        const ds = new Date(day); ds.setHours(9, 0, 0, 0);
        const de = new Date(day); de.setHours(17, 0, 0, 0);
        const s = b.start > ds ? b.start : ds;
        const e = b.end < de ? b.end : de;
        return sum + Math.max(0, (e - s) / 60000);
      }, 0);
      const totalWork = 8 * 60; // 8 hours = 480 min from 9:00 to 5:00
      const freeMins = Math.max(0, totalWork - busyMins - 60); // minus 1hr lunch
      row.append(ce("div", { class: "bf-summary" }, busy.length === 0 ? "Wide open · ~" + Math.round(freeMins / 60) + "h free" : busy.length + " event" + (busy.length === 1 ? "" : "s") + " · ~" + Math.round(freeMins / 60) + "h free"));
      if (busy.length) {
        const detailDiv = ce("div", { class: "bf-detail meta" });
        const labels = busy.slice(0, 4).map(b => fmtTimeRange(b.start, b.end) + " " + (b.summary.length > 30 ? b.summary.slice(0, 27) + "…" : b.summary));
        detailDiv.textContent = labels.join("  ·  ") + (busy.length > 4 ? " · +" + (busy.length - 4) + " more" : "");
        row.append(detailDiv);
      }
      wrap.append(row);
    }
    return wrap;
  }

  // v3.4.0 — Friday-planning task ordering.
  // Primary: dueBy ascending (overdue first → earliest → undated last).
  // Secondary: source key (partner-X / committee-Y) — groups same-source tasks adjacent to reduce transition fatigue.
  // Tertiary: priority (must > should > nice).
  function fridayTaskSort(a, b) {
    const aDue = a.item.dueBy || "9999-12-31";
    const bDue = b.item.dueBy || "9999-12-31";
    const dueDiff = aDue.localeCompare(bDue);
    if (dueDiff !== 0) return dueDiff;
    const aKey = a.sourceKind + "-" + a.sourceId;
    const bKey = b.sourceKind + "-" + b.sourceId;
    if (aKey !== bKey) return aKey.localeCompare(bKey);
    return priorityRank(a.item) - priorityRank(b.item);
  }

  function renderPwTaskCard(rec, proposal) {
    const item = rec.item;
    // v3.4.4e — draggable card. Drag handle is the visible cue but the entire card is the drag source.
    // Action selects/buttons stop propagation so they remain interactive.
    const card = ce("div", { class: "pw-card", draggable: "true" });
    card.dataset.taskId = item.id;
    card.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", item.id);
      e.dataTransfer.effectAllowed = "move";
      card.classList.add("dragging");
      // Mark all day columns as drop-active for visual hint
      document.querySelectorAll(".pw-cal-day").forEach(d => d.classList.add("drop-active"));
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      document.querySelectorAll(".pw-cal-day").forEach(d => { d.classList.remove("drop-active"); d.classList.remove("drop-hover"); });
    });
    card.append(ce("div", { class: "pw-card-handle", title: "Drag this card onto the calendar to set a custom slot" }, "✥"));

    // Name + priority chip (with NEW badge if recently created — v3.4.9)
    const pri = item.priority || "should";
    const nameDiv = ce("div", { class: "pw-card-name" }, item.text || item.title || "(untitled)");
    nameDiv.append(ce("span", { class: "pw-card-priority pri-" + pri, title: pri + " priority — drives block length" }, pri));
    appendNewBadge(nameDiv, item);
    card.append(nameDiv);

    // Proposed slot meta
    let metaText;
    if (proposal && !proposal.unscheduled && proposal.slot) {
      metaText = fmtDayLabel(proposal.slot.start) + " · " + fmtTimeRange(proposal.slot.start, proposal.slot.end) + " · " + estimateMinutes(item) + " min";
    } else if (proposal && proposal.unscheduled) {
      metaText = "Unscheduled — " + (proposal.reason || "no slot fits") + " · est " + estimateMinutes(item) + " min";
    } else {
      metaText = "Not in proposals · est " + estimateMinutes(item) + " min";
    }
    card.append(ce("div", { class: "pw-card-meta" }, metaText));

    // Description from source_context excerpt or item.detail
    const desc = (item.source_context && item.source_context.excerpt) || item.detail || "";
    if (desc) card.append(ce("div", { class: "pw-card-desc" }, desc.length > 200 ? desc.slice(0, 197) + "…" : desc));

    // Due + source line
    const dueLabel = item.dueBy ? "Due " + fmtDate(item.dueBy) : "No due date";
    const fromLabel = " — from " + rec.source;
    card.append(ce("div", { class: "pw-card-meta" }, dueLabel + fromLabel));

    // Action row: Project picker, Priority cycle, Discuss-with picker, Accept (if scheduled)
    const actions = ce("div", { class: "pw-card-actions" });

    const projects = (STATE.projects || []).filter(p => p.status !== "done");
    const projSel = ce("select", { class: "pw-action project-btn", title: "Assign to project" });
    projSel.append(ce("option", { value: "" }, item.projectId ? "Project: (clear)" : "+ Project"));
    projects.forEach(p => {
      const o = ce("option", { value: p.id }, "→ " + p.name);
      if (item.projectId === p.id) o.selected = true;
      projSel.append(o);
    });
    // Auto-suggest hint label change
    if (!item.projectId) {
      const sugg = suggestProjectForItem(item);
      if (sugg.length) {
        projSel.options[0].textContent = "Suggest: " + sugg[0].project.name;
      }
    } else {
      const cur = projects.find(p => p.id === item.projectId);
      if (cur) projSel.options[0].textContent = cur.name;
    }
    projSel.addEventListener("change", () => {
      item.projectId = projSel.value || null;
      persistState("PW: set project");
      renderFridayPlanning();
    });
    actions.append(projSel);

    actions.append(ce("button", { class: "pw-action priority-btn priority-btn-" + pri, title: "Click to cycle priority", onclick: () => {
      const order = ["must", "should", "nice"];
      item.priority = order[(order.indexOf(pri) + 1) % order.length];
      persistState("PW: cycle priority");
      renderFridayPlanning();
    } }, pri.toUpperCase()));

    // Time duration dropdown — 15min increments from 15 to 120
    var curEst = estimateMinutes(item);
    var timeSel = ce("select", { class: "pw-action", title: "Block duration (drives calendar slot length)" });
    for (var m = 15; m <= 120; m += 15) {
      var opt = ce("option", { value: String(m) }, m + " min");
      if (m === curEst) opt.selected = true;
      timeSel.append(opt);
    }
    // If current estimate doesn't land on a 15-min increment, add it as an option
    if (curEst % 15 !== 0 || curEst < 15 || curEst > 120) {
      var custom = ce("option", { value: String(curEst), selected: true }, curEst + " min");
      timeSel.prepend(custom);
    }
    timeSel.addEventListener("change", function () {
      item.estimated_minutes = parseInt(timeSel.value, 10);
      persistState("PW: set block duration");
      renderFridayPlanning();
    });
    actions.append(timeSel);

    const discussSel = ce("select", { class: "pw-action discuss-btn", title: "Add this task to a 1:1 or committee agenda" });
    discussSel.append(ce("option", { value: "" }, "Discuss with →"));
    (STATE.partners || []).forEach(p => {
      if (rec.sourceKind === "partner" && rec.sourceId === p.id) return;
      discussSel.append(ce("option", { value: "partner:" + p.id }, "1v1: " + (p.name || p.id)));
    });
    (STATE.committees || []).forEach(c => {
      if (rec.sourceKind === "committee" && rec.sourceId === c.id) return;
      discussSel.append(ce("option", { value: "committee:" + c.id }, "Committee: " + (c.name || c.id)));
    });
    discussSel.addEventListener("change", () => {
      if (!discussSel.value) return;
      const [kind, id] = discussSel.value.split(":");
      if (kind === "partner") addToPartnerDiscussion(item, id, rec);
      else if (kind === "committee") addToCommitteeDiscussion(item, id, rec);
      discussSel.value = "";
    });
    actions.append(discussSel);

    if (proposal && !proposal.unscheduled && proposal.slot) {
      const acceptBtn = ce("button", { class: "pw-action pw-accept", title: "Create this calendar block" }, "✓ Accept");
      acceptBtn.addEventListener("click", () => acceptBlock(proposal, acceptBtn));
      actions.append(acceptBtn);
    }
    // v3.4.4e — Reset slot button when a manual drag override is active
    if (item.proposedSlotOverride) {
      actions.append(ce("button", { class: "pw-action", title: "Clear the manual placement and let the auto-fit proposer suggest a slot again", onclick: () => {
        delete item.proposedSlotOverride;
        persistState("Reset slot override");
        renderFridayPlanning();
      } }, "↺ Reset slot"));
    }

    card.append(actions);
    return card;
  }

  function renderPwWeekCalendar(cal, proposals) {
    const HOUR_HEIGHT = 56;
    const HOURS = [9, 10, 11, 12, 13, 14, 15, 16];
    const range = getNextWeekRange();
    // TSKMGR-49 — 2-week horizon: collect all weekdays (skip Sat/Sun)
    const weekDays = [];
    var cursor = new Date(range.start);
    while (cursor <= range.end && weekDays.length < 10) {
      var dayOfWeek = cursor.getDay();
      if (dayOfWeek >= 1 && dayOfWeek <= 5) weekDays.push(new Date(cursor));
      cursor.setDate(cursor.getDate() + 1);
    }
    var dayCount = weekDays.length;

    const grid = ce("div", { class: "pw-cal" });
    // Dynamic column count for 2-week grid
    grid.style.setProperty("--pw-day-count", String(dayCount));

    // Header
    const head = ce("div", { class: "pw-cal-header" });
    head.style.gridTemplateColumns = "50px repeat(" + dayCount + ", 1fr)";
    head.append(ce("div"));
    var DOW_LABELS = ["?","MON","TUE","WED","THU","FRI","SAT","SUN"];
    weekDays.forEach(function (d, i) {
      var headCell = ce("div", { class: "pw-cal-day-head" }, [
        ce("div", { class: "dow" }, DOW_LABELS[d.getDay()] || "?"),
        ce("div", { class: "num" }, String(d.getDate()))
      ]);
      // Visual separator between week 1 and week 2
      if (i === 5) headCell.style.borderLeft = "2px solid var(--line)";
      head.append(headCell);
    });
    grid.append(head);

    // Body
    const body = ce("div", { class: "pw-cal-body" });
    body.style.gridTemplateColumns = "50px repeat(" + dayCount + ", 1fr)";

    const timeCol = ce("div", { class: "pw-cal-timecol", style: "height:" + (HOUR_HEIGHT * HOURS.length) + "px" });
    HOURS.forEach((h, i) => {
      timeCol.append(ce("div", { class: "pw-cal-time", style: "top:" + (i * HOUR_HEIGHT) + "px" }, fmtHour(h)));
    });
    body.append(timeCol);

    weekDays.forEach(function (day, dayIdx) {
      const dayKey = day.toISOString().slice(0, 10);
      const dayCol = ce("div", { class: "pw-cal-day", style: "height:" + (HOUR_HEIGHT * HOURS.length) + "px" + (dayIdx === 5 ? ";border-left:2px solid var(--line)" : "") });
      dayCol.dataset.dayKey = dayKey;

      // v3.4.4e — Drop zone wiring
      dayCol.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        dayCol.classList.add("drop-hover");
      });
      dayCol.addEventListener("dragleave", () => dayCol.classList.remove("drop-hover"));
      dayCol.addEventListener("drop", (e) => {
        e.preventDefault();
        dayCol.classList.remove("drop-hover");
        const taskId = e.dataTransfer.getData("text/plain");
        if (!taskId) return;
        // Find the item in STATE
        const found = (() => {
          for (const pa of (STATE.partners || [])) {
            for (const lane of ["ownerToPartner","partnerToOwner","joint"]) {
              const it = ((pa.commitments || {})[lane] || []).find(x => x.id === taskId);
              if (it) return it;
            }
          }
          for (const co of (STATE.committees || [])) {
            const it = (co.actionItems || []).find(x => x.id === taskId);
            if (it) return it;
          }
          return null;
        })();
        if (!found) return;
        // Calculate slot start from drop offsetY (snap to 15-min increments)
        const rect = dayCol.getBoundingClientRect();
        const offsetY = e.clientY - rect.top;
        const hoursFromStart = Math.max(0, offsetY / HOUR_HEIGHT);
        const totalMinutes = Math.round(hoursFromStart * 60 / 15) * 15; // snap to 15
        const startHour = 9 + Math.floor(totalMinutes / 60);
        const startMin = totalMinutes % 60;
        // Don't allow drop in lunch hour (12-1) — bump to 1pm
        let actualHour = startHour;
        let actualMin = startMin;
        if (actualHour === 12) { actualHour = 13; actualMin = 0; }
        if (actualHour < 9) { actualHour = 9; actualMin = 0; }
        if (actualHour >= 17) { actualHour = 16; actualMin = 0; }
        const dur = estimateMinutes(found);
        const start = new Date(day); start.setHours(actualHour, actualMin, 0, 0);
        const end = new Date(start.getTime() + dur * 60000);
        // Cap end to 5pm
        const dayEnd = new Date(day); dayEnd.setHours(17, 0, 0, 0);
        if (end > dayEnd) end.setTime(dayEnd.getTime());
        found.proposedSlotOverride = { start: start.toISOString(), end: end.toISOString() };
        persistState("Drag-place block");
        renderFridayPlanning();
      });

      // Hour-line markers
      HOURS.forEach((h, i) => {
        dayCol.append(ce("div", { class: "pw-cal-rowline", style: "top:" + (i * HOUR_HEIGHT) + "px" }));
      });
      // Lunch shade
      const lunchTop = (12 - 9) * HOUR_HEIGHT;
      dayCol.append(ce("div", { class: "pw-cal-lunch", style: "top:" + lunchTop + "px;height:" + HOUR_HEIGHT + "px" }, "lunch"));

      // Existing events
      const busyForDay = (cal && cal.busyByDay && cal.busyByDay[dayKey]) || [];
      busyForDay.forEach(b => {
        const startHr = b.start.getHours() + b.start.getMinutes() / 60;
        const endHr = b.end.getHours() + b.end.getMinutes() / 60;
        if (endHr <= 9 || startHr >= 17) return;
        const top = Math.max(0, (startHr - 9) * HOUR_HEIGHT);
        const height = Math.max(18, (Math.min(17, endHr) - Math.max(9, startHr)) * HOUR_HEIGHT);
        dayCol.append(ce("div", { class: "pw-event existing", title: b.summary + "\n" + fmtTimeRange(b.start, b.end), style: "top:" + top + "px;height:" + (height - 2) + "px" }, b.summary));
      });

      // Proposed + accepted blocks
      proposals.forEach(prop => {
        if (prop.unscheduled || !prop.slot) return;
        if (prop.slot.start.toISOString().slice(0, 10) !== dayKey) return;
        const isAccepted = !!prop.rec.item.calendar_block_event_id;
        const isManual = !!prop.manuallyPlaced;
        const startHr = prop.slot.start.getHours() + prop.slot.start.getMinutes() / 60;
        const endHr = prop.slot.end.getHours() + prop.slot.end.getMinutes() / 60;
        const top = Math.max(0, (startHr - 9) * HOUR_HEIGHT);
        const height = Math.max(18, (endHr - startHr) * HOUR_HEIGHT);
        const evEl = ce("div", {
          class: "pw-event " + (isAccepted ? "accepted" : "proposed") + (isManual ? " manual" : ""),
          title: (prop.rec.item.text || "(task)") + "\n" + fmtTimeRange(prop.slot.start, prop.slot.end) + (isAccepted ? "\n✓ on calendar" : (isManual ? "\n(manually placed via drag, click Accept on left)" : "\n(proposed, click Accept on left)")),
          style: "top:" + top + "px;height:" + (height - 2) + "px"
        }, (isAccepted ? "✓ " : (isManual ? "✋ " : "▢ ")) + (prop.rec.item.text || "(task)"));
        dayCol.append(evEl);
      });

      body.append(dayCol);
    });
    grid.append(body);
    return grid;
  }

  function renderPwTwoPane(cal, candidateTasks, proposals) {
    const wrap = ce("div", { class: "pw-twopane" });

    const proposalsByItemId = {};
    proposals.forEach(p => { proposalsByItemId[p.rec.item.id] = p; });

    // Recommended = priority must OR (due in next 7 days)
    const sevenDaysOut = new Date(Date.now() + 7 * 86400000);
    const isRecommended = (rec) => {
      const it = rec.item;
      if (it.priority === "must") return true;
      if (it.dueBy) {
        const due = new Date(it.dueBy + "T23:59");
        if (due <= sevenDaysOut) return true;
      }
      return false;
    };
    const recommended = candidateTasks.filter(isRecommended);
    const allOthers = candidateTasks.filter(rec => !recommended.includes(rec));

    const left = ce("div", { class: "pw-left" });
    left.append(ce("h3", { class: "pw-section-h" }, "★ Recommended (" + recommended.length + ")"));
    if (!recommended.length) left.append(ce("div", { class: "due", style: "padding:8px 4px" }, "Nothing must-priority or due this week."));
    recommended.forEach(rec => left.append(renderPwTaskCard(rec, proposalsByItemId[rec.item.id])));

    left.append(ce("h3", { class: "pw-section-h", style: "margin-top:18px" }, "All tasks (" + allOthers.length + ")"));
    if (!allOthers.length) left.append(ce("div", { class: "due", style: "padding:8px 4px" }, "Nothing else open."));
    allOthers.forEach(rec => left.append(renderPwTaskCard(rec, proposalsByItemId[rec.item.id])));

    wrap.append(left);
    wrap.append(renderPwWeekCalendar(cal, proposals));
    return wrap;
  }

  // ---- TSKMGR-49 — Ritual step helpers ----
  var RITUAL_STEPS_KEY = "tmm.v3.ritualSteps";
  var RITUAL_COLL_KEY = "tmm.v3.ritualStepsColl";
  function _ritualStepsData() { try { return JSON.parse(localStorage.getItem(RITUAL_STEPS_KEY) || "{}"); } catch (e) { return {}; } }
  function _ritualCollData() { try { return JSON.parse(localStorage.getItem(RITUAL_COLL_KEY) || "{}"); } catch (e) { return {}; } }
  function getRitualStepDone(key) { return !!_ritualStepsData()[key]; }
  function setRitualStepDone(key, val) { try { var d = _ritualStepsData(); d[key] = !!val; localStorage.setItem(RITUAL_STEPS_KEY, JSON.stringify(d)); } catch (e) {} }
  function getRitualStepCollapsed(key) { return !!_ritualCollData()[key]; }
  function setRitualStepCollapsed(key, val) { try { var d = _ritualCollData(); d[key] = !!val; localStorage.setItem(RITUAL_COLL_KEY, JSON.stringify(d)); } catch (e) {} }

  function ritualStep(num, title, opts) {
    opts = opts || {};
    var stepKey = "step" + num;
    var done = getRitualStepDone(stepKey);
    var collapsed = getRitualStepCollapsed(stepKey);
    var wrap = ce("div", { class: "ritual-step" + (done ? " done" : "") + (collapsed ? " collapsed" : "") });
    var header = ce("div", { class: "ritual-step-head" });
    var cb = ce("input", { type: "checkbox", title: "Mark step complete" });
    cb.checked = done;
    cb.addEventListener("click", function (e) { e.stopPropagation(); });
    cb.addEventListener("change", function () { setRitualStepDone(stepKey, cb.checked); renderFridayPlanning(); });
    header.addEventListener("click", function () { setRitualStepCollapsed(stepKey, !collapsed); renderFridayPlanning(); });
    header.append(cb);
    header.append(ce("span", { class: "ritual-step-num" }, "Step " + num));
    header.append(ce("span", { class: "ritual-step-title" }, title));
    if (opts.badge) header.append(ce("span", { class: "ritual-step-badge" }, opts.badge));
    header.append(ce("span", { class: "ritual-step-arrow" }, collapsed ? "▸" : "▾"));
    wrap.append(header);
    var body = ce("div", { class: "ritual-step-body" + (collapsed ? " hidden" : "") });
    wrap.append(body);
    return { wrap: wrap, body: body };
  }

  function computeSkippedWeeks() {
    var last = STATE.lastPlanMyWeekRitualAt;
    if (!last) return null; // never completed
    var d = new Date(last);
    if (isNaN(d.getTime())) return null;
    var weeks = Math.floor((Date.now() - d.getTime()) / (7 * 86400000));
    return weeks > 1 ? weeks : 0;
  }

  function collectStuckUat() {
    var entries = collectAllUatEntries();
    return entries.filter(function (e) { return uatDaysCumulative(e.item) >= 5; });
  }

  // TSKMGR-49 Part 2 — Email triage panel (My Tasks → Email tab)
  // ============================================================
  function renderEmailTriagePanel(panel) {
