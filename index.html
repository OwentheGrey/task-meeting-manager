  function renderPwTaskCard(rec, proposal) {
    const item = rec.item;
    // v3.4.4e — draggable card. Drag handle is the visible cue but the entire card is the drag source.
    // Action selects/buttons stop propagation so they remain interactive.
    const card = ce("div", { class: "pw-card", draggable: "true" });
    card.dataset.taskId = item.id;
    card.addEventListener("dragstart", (e) => {
      e.dataTransfer.setData("text/plain", item.id);
      e.dataTransfer.effectAllowed = "move";
      card.classList.add("dragging");
      // Mark all day columns as drop-active for visual hint
      document.querySelectorAll(".pw-cal-day").forEach(d => d.classList.add("drop-active"));
    });
    card.addEventListener("dragend", () => {
      card.classList.remove("dragging");
      document.querySelectorAll(".pw-cal-day").forEach(d => { d.classList.remove("drop-active"); d.classList.remove("drop-hover"); });
    });
    card.append(ce("div", { class: "pw-card-handle", title: "Drag this card onto the calendar to set a custom slot" }, "✥"));

    // Name (with NEW badge if recently created — v3.4.9)
    const nameDiv = ce("div", { class: "pw-card-name" }, item.text || item.title || "(untitled)");
    appendNewBadge(nameDiv, item);
    card.append(nameDiv);

    // Proposed slot meta
    let metaText;
    if (proposal && !proposal.unscheduled && proposal.slot) {
      metaText = fmtDayLabel(proposal.slot.start) + " · " + fmtTimeRange(proposal.slot.start, proposal.slot.end) + " · " + estimateMinutes(item) + " min";
    } else if (proposal && proposal.unscheduled) {
      metaText = "Unscheduled — " + (proposal.reason || "no slot fits") + " · est " + estimateMinutes(item) + " min";
    } else {
      metaText = "Not in proposals · est " + estimateMinutes(item) + " min";
    }
    card.append(ce("div", { class: "pw-card-meta" }, metaText));

    // Description from source_context excerpt or item.detail
    const desc = (item.source_context && item.source_context.excerpt) || item.detail || "";
    if (desc) card.append(ce("div", { class: "pw-card-desc" }, desc.length > 200 ? desc.slice(0, 197) + "…" : desc));

    // Due + source line
    const dueLabel = item.dueBy ? "Due " + fmtDate(item.dueBy) : "No due date";
    const fromLabel = " — from " + rec.source;
    card.append(ce("div", { class: "pw-card-meta" }, dueLabel + fromLabel));

    // Action row: Project picker, Priority cycle, Discuss-with picker, Accept (if scheduled)
    const actions = ce("div", { class: "pw-card-actions" });

    const projects = (STATE.projects || []).filter(p => p.status !== "done");
    const projSel = ce("select", { class: "pw-action project-btn", title: "Assign to project" });
    projSel.append(ce("option", { value: "" }, item.projectId ? "Project: (clear)" : "+ Project"));
    projects.forEach(p => {
      const o = ce("option", { value: p.id }, "→ " + p.name);
      if (item.projectId === p.id) o.selected = true;
      projSel.append(o);
    });
    // Auto-suggest hint label change
    if (!item.projectId) {
      const sugg = suggestProjectForItem(item);
      if (sugg.length) {
        projSel.options[0].textContent = "Suggest: " + sugg[0].project.name;
      }
    } else {
      const cur = projects.find(p => p.id === item.projectId);
      if (cur) projSel.options[0].textContent = cur.name;
    }
    projSel.addEventListener("change", () => {
      item.projectId = projSel.value || null;
      persistState("PW: set project");
      renderFridayPlanning();
    });
    actions.append(projSel);

    const pri = item.priority || "should";
    actions.append(ce("button", { class: "pw-action priority-btn priority-btn-" + pri, title: "Click to cycle priority", onclick: () => {
      const order = ["must", "should", "nice"];
      item.priority = order[(order.indexOf(pri) + 1) % order.length];
      persistState("PW: cycle priority");
      renderFridayPlanning();
    } }, pri.toUpperCase()));

    const discussSel = ce("select", { class: "pw-action discuss-btn", title: "Add this task to a 1:1 or committee agenda" });
    discussSel.append(ce("option", { value: "" }, "Discuss with →"));
    (STATE.partners || []).forEach(p => {
      if (rec.sourceKind === "partner" && rec.sourceId === p.id) return;
      discussSel.append(ce("option", { value: "partner:" + p.id }, "1v1: " + (p.name || p.id)));
    });
    (STATE.committees || []).forEach(c => {
      if (rec.sourceKind === "committee" && rec.sourceId === c.id) return;
      discussSel.append(ce("option", { value: "committee:" + c.id }, "Committee: " + (c.name || c.id)));
    });
    discussSel.addEventListener("change", () => {
      if (!discussSel.value) return;
      const [kind, id] = discussSel.value.split(":");
      if (kind === "partner") addToPartnerDiscussion(item, id, rec);
      else if (kind === "committee") addToCommitteeDiscussion(item, id, rec);
      discussSel.value = "";
    });
    actions.append(discussSel);

    if (proposal && !proposal.unscheduled && proposal.slot) {
      const acceptBtn = ce("button", { class: "pw-action pw-accept", title: "Create this calendar block" }, "✓ Accept");
      acceptBtn.addEventListener("click", () => acceptBlock(proposal, acceptBtn));
      actions.append(acceptBtn);
    }
    // v3.4.4e — Reset slot button when a manual drag override is active
    if (item.proposedSlotOverride) {
      actions.append(ce("button", { class: "pw-action", title: "Clear the manual placement and let the auto-fit proposer suggest a slot again", onclick: () => {
        delete item.proposedSlotOverride;
        persistState("Reset slot override");
        renderFridayPlanning();
      } }, "↺ Reset slot"));
    }

    card.append(actions);
    return card;
  }

  function renderPwWeekCalendar(cal, proposals) {
    const HOUR_HEIGHT = 56;
    const HOURS = [9, 10, 11, 12, 13, 14, 15, 16];
    const range = getNextWeekRange();
    const weekDays = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(range.start); d.setDate(range.start.getDate() + i); weekDays.push(d);
    }

    const grid = ce("div", { class: "pw-cal" });

    // Header
    const head = ce("div", { class: "pw-cal-header" });
    head.append(ce("div"));
    weekDays.forEach(d => {
      head.append(ce("div", { class: "pw-cal-day-head" }, [
        ce("div", { class: "dow" }, ["MON","TUE","WED","THU","FRI"][d.getDay() - 1] || "?"),
        ce("div", { class: "num" }, String(d.getDate()))
      ]));
    });
    grid.append(head);

    // Body
    const body = ce("div", { class: "pw-cal-body" });

    const timeCol = ce("div", { class: "pw-cal-timecol", style: "height:" + (HOUR_HEIGHT * HOURS.length) + "px" });
    HOURS.forEach((h, i) => {
      timeCol.append(ce("div", { class: "pw-cal-time", style: "top:" + (i * HOUR_HEIGHT) + "px" }, fmtHour(h)));
    });
    body.append(timeCol);

    weekDays.forEach(day => {
      const dayKey = day.toISOString().slice(0, 10);
      const dayCol = ce("div", { class: "pw-cal-day", style: "height:" + (HOUR_HEIGHT * HOURS.length) + "px" });
      dayCol.dataset.dayKey = dayKey;

      // v3.4.4e — Drop zone wiring
      dayCol.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        dayCol.classList.add("drop-hover");
      });
      dayCol.addEventListener("dragleave", () => dayCol.classList.remove("drop-hover"));
      dayCol.addEventListener("drop", (e) => {
        e.preventDefault();
        dayCol.classList.remove("drop-hover");
        const taskId = e.dataTransfer.getData("text/plain");
        if (!taskId) return;
        // Find the item in STATE
        const found = (() => {
          for (const pa of (STATE.partners || [])) {
            for (const lane of ["ownerToPartner","partnerToOwner","joint"]) {
              const it = ((pa.commitments || {})[lane] || []).find(x => x.id === taskId);
              if (it) return it;
            }
          }
          for (const co of (STATE.committees || [])) {
            const it = (co.actionItems || []).find(x => x.id === taskId);
            if (it) return it;
          }
          return null;
        })();
        if (!found) return;
        // Calculate slot start from drop offsetY (snap to 15-min increments)
        const rect = dayCol.getBoundingClientRect();
        const offsetY = e.clientY - rect.top;
        const hoursFromStart = Math.max(0, offsetY / HOUR_HEIGHT);
        const totalMinutes = Math.round(hoursFromStart * 60 / 15) * 15; // snap to 15
        const startHour = 9 + Math.floor(totalMinutes / 60);
        const startMin = totalMinutes % 60;
        // Don't allow drop in lunch hour (12-1) — bump to 1pm
        let actualHour = startHour;
        let actualMin = startMin;
        if (actualHour === 12) { actualHour = 13; actualMin = 0; }
        if (actualHour < 9) { actualHour = 9; actualMin = 0; }
        if (actualHour >= 17) { actualHour = 16; actualMin = 0; }
        const dur = estimateMinutes(found);
        const start = new Date(day); start.setHours(actualHour, actualMin, 0, 0);
        const end = new Date(start.getTime() + dur * 60000);
        // Cap end to 5pm
        const dayEnd = new Date(day); dayEnd.setHours(17, 0, 0, 0);
        if (end > dayEnd) end.setTime(dayEnd.getTime());
        found.proposedSlotOverride = { start: start.toISOString(), end: end.toISOString() };
        persistState("Drag-place block");
        renderFridayPlanning();
      });

      // Hour-line markers
      HOURS.forEach((h, i) => {
        dayCol.append(ce("div", { class: "pw-cal-rowline", style: "top:" + (i * HOUR_HEIGHT) + "px" }));
      });
      // Lunch shade
      const lunchTop = (12 - 9) * HOUR_HEIGHT;
      dayCol.append(ce("div", { class: "pw-cal-lunch", style: "top:" + lunchTop + "px;height:" + HOUR_HEIGHT + "px" }, "lunch"));

      // Existing events
      const busyForDay = (cal && cal.busyByDay && cal.busyByDay[dayKey]) || [];
      busyForDay.forEach(b => {
        const startHr = b.start.getHours() + b.start.getMinutes() / 60;
        const endHr = b.end.getHours() + b.end.getMinutes() / 60;
        if (endHr <= 9 || startHr >= 17) return;
        const top = Math.max(0, (startHr - 9) * HOUR_HEIGHT);
        const height = Math.max(18, (Math.min(17, endHr) - Math.max(9, startHr)) * HOUR_HEIGHT);
        dayCol.append(ce("div", { class: "pw-event existing", title: b.summary + "\n" + fmtTimeRange(b.start, b.end), style: "top:" + top + "px;height:" + (height - 2) + "px" }, b.summary));
      });

      // Proposed + accepted blocks
      proposals.forEach(prop => {
        if (prop.unscheduled || !prop.slot) return;
        if (prop.slot.start.toISOString().slice(0, 10) !== dayKey) return;
        const isAccepted = !!prop.rec.item.calendar_block_event_id;
        const isManual = !!prop.manuallyPlaced;
        const startHr = prop.slot.start.getHours() + prop.slot.start.getMinutes() / 60;
        const endHr = prop.slot.end.getHours() + prop.slot.end.getMinutes() / 60;
        const top = Math.max(0, (startHr - 9) * HOUR_HEIGHT);
        const height = Math.max(18, (endHr - startHr) * HOUR_HEIGHT);
        const evEl = ce("div", {
          class: "pw-event " + (isAccepted ? "accepted" : "proposed") + (isManual ? " manual" : ""),
          title: (prop.rec.item.text || "(task)") + "\n" + fmtTimeRange(prop.slot.start, prop.slot.end) + (isAccepted ? "\n✓ on calendar" : (isManual ? "\n(manually placed via drag, click Accept on left)" : "\n(proposed, click Accept on left)")),
          style: "top:" + top + "px;height:" + (height - 2) + "px"
        }, (isAccepted ? "✓ " : (isManual ? "✋ " : "▢ ")) + (prop.rec.item.text || "(task)"));
        dayCol.append(evEl);
      });

      body.append(dayCol);
    });
    grid.append(body);
    return grid;
  }

  function renderPwTwoPane(cal, candidateTasks, proposals) {
    const wrap = ce("div", { class: "pw-twopane" });

    const proposalsByItemId = {};
    proposals.forEach(p => { proposalsByItemId[p.rec.item.id] = p; });

    // Recommended = priority must OR (due in next 7 days)
    const sevenDaysOut = new Date(Date.now() + 7 * 86400000);
    const isRecommended = (rec) => {
      const it = rec.item;
      if (it.priority === "must") return true;
      if (it.dueBy) {
        const due = new Date(it.dueBy + "T23:59");
        if (due <= sevenDaysOut) return true;
      }
      return false;
    };
    const recommended = candidateTasks.filter(isRecommended);
    const allOthers = candidateTasks.filter(rec => !recommended.includes(rec));

    const left = ce("div", { class: "pw-left" });
    left.append(ce("h3", { class: "pw-section-h" }, "★ Recommended (" + recommended.length + ")"));
    if (!recommended.length) left.append(ce("div", { class: "due", style: "padding:8px 4px" }, "Nothing must-priority or due this week."));
    recommended.forEach(rec => left.append(renderPwTaskCard(rec, proposalsByItemId[rec.item.id])));

    left.append(ce("h3", { class: "pw-section-h", style: "margin-top:18px" }, "All tasks (" + allOthers.length + ")"));
    if (!allOthers.length) left.append(ce("div", { class: "due", style: "padding:8px 4px" }, "Nothing else open."));
    allOthers.forEach(rec => left.append(renderPwTaskCard(rec, proposalsByItemId[rec.item.id])));

    wrap.append(left);
    wrap.append(renderPwWeekCalendar(cal, proposals));
    return wrap;
  }

  function renderFridayPlanning() {
    const dos = document.getElementById("dossier"); dos.innerHTML = "";

    // Header
    const header = ce("div", { style: "display:flex;align-items:center;gap:12px;margin-bottom:6px" });
    header.append(ce("h2", { style: "margin:0;flex:1" }, "Plan my week"));
    dos.append(header);
    dos.append(ce("div", { class: "meta" }, "End-of-week ritual. Review wins → confirm project labels → time-block next week."));

    // ---- v3.4.0: Day-selection banner (holiday + OOO awareness) ----
    const today = new Date();
    const dow = today.getDay(); // 0=Sun, 4=Thu, 5=Fri
    const fri = upcomingFriday(today);
    const isFridayHoliday = isHoliday(fri);
    const banner = ce("div", { class: "day-banner" });
    if (dow === 5 && isFridayHoliday) {
      banner.append(ce("strong", {}, "⚠ Today is a holiday. "));
      banner.append(document.createTextNode("Thursday should have run yesterday — if you missed it, do this pass now anyway."));
      banner.classList.add("warn");
    } else if (dow === 4 && isFridayHoliday) {
      banner.append(ce("strong", {}, "★ Friday is a holiday. "));
      banner.append(document.createTextNode("Running today as the Thursday fallback — same ritual, one day earlier."));
      banner.classList.add("info");
    } else if (dow === 5) {
      banner.append(ce("strong", {}, "✓ Today is Friday. "));
      banner.append(document.createTextNode("End-of-week ritual time."));
      banner.classList.add("good");
    } else if (dow === 4) {
      banner.append(ce("strong", {}, "ⓘ Today is Thursday. "));
      banner.append(document.createTextNode("Friday is clear — let tomorrow handle this normally, or run early if you'll be tied up tomorrow."));
      banner.classList.add("info");
    } else {
      banner.append(ce("strong", {}, "Manual run. "));
      banner.append(document.createTextNode("Today is " + ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dow] + ". Doing the ritual outside the normal Thu/Fri schedule is fine — bypassing day check."));
      banner.classList.add("info");
    }
    // Async OOO check; if API supports it, enrich the banner
    if (dow === 4 || dow === 5) {
      getOOOHoursOn(fri).then(h => {
        if (h !== null && h >= 4) {
          const ext = ce("div", { class: "ooo-note" }, "Detected OOO ≥ 4 hrs on upcoming Friday — ritual should run today instead.");
          banner.append(ext);
        }
      });
    }
    dos.append(banner);

    // Date-range filter
    const lookback = fridayLookbackDays();
    const customRange = fridayCustomRange();
    const filter = ce("div", { class: "friday-filter" });
    filter.append(ce("span", { class: "meta" }, "Lookback range: "));
    [[7, "7 days"], [14, "14 days"], [3, "Mon-Wed"], [1, "Today only"]].forEach(([days, label]) => {
      const isActive = !customRange && lookback === days;
      const btn = ce("button", {
        class: "btn tiny" + (isActive ? " primary" : ""),
        onclick: () => { setFridayCustomRange(null, null); setFridayLookback(days); renderFridayPlanning(); }
      }, label);
      filter.append(btn);
    });
    // v3.4.4a — Custom range
    const customBtn = ce("button", {
      class: "btn tiny" + (customRange ? " primary" : ""),
      onclick: () => {
        if (customRange) { setFridayCustomRange(null, null); renderFridayPlanning(); return; }
        // Initialize with reasonable defaults: today minus 7 → today
        const today = new Date(); const start = new Date(today); start.setDate(today.getDate() - 7);
        setFridayCustomRange(start.toISOString().slice(0, 10), today.toISOString().slice(0, 10));
        renderFridayPlanning();
      }
    }, customRange ? "✕ Custom range" : "Custom range…");
    filter.append(customBtn);
    if (customRange) {
      const startInp = ce("input", { type: "date", value: customRange.start, style: "font-size:11px" });
      const endInp = ce("input", { type: "date", value: customRange.end, style: "font-size:11px" });
      const apply = () => { setFridayCustomRange(startInp.value, endInp.value); renderFridayPlanning(); };
      startInp.addEventListener("change", apply);
      endInp.addEventListener("change", apply);
      filter.append(ce("span", { class: "meta" }, "from "));
      filter.append(startInp);
      filter.append(ce("span", { class: "meta" }, "to "));
      filter.append(endInp);
    }
    dos.append(filter);

    // ---- v3.4.0: Wins (top of view) — honors custom range when active (v3.4.4a) ----
    let winsDays = lookback;
    if (customRange && customRange.start && customRange.end) {
      const sD = new Date(customRange.start), eD = new Date(customRange.end);
      winsDays = Math.max(1, Math.round((eD - sD) / 86400000) + 1);
    }
    const wins = recentWins(winsDays);
    const winsLabel = customRange ? ("from " + fmtDate(customRange.start) + " to " + fmtDate(customRange.end)) : ("the last " + winsDays + " days");
    const winsSec = ce("section", { class: "block wins" });
    winsSec.append(ce("h3", {}, "✅ Wins " + (customRange ? "(custom range) " : "this week ") + (wins.length ? "(" + wins.length + ")" : "")));
    if (!wins.length) {
      winsSec.append(ce("div", { class: "due" }, "Nothing closed in " + winsLabel + ". Either it's been a quiet stretch or items aren't getting marked done."));
    } else {
      wins.forEach(w => {
        const row = ce("div", { class: "win-row", onclick: () => {
          if (w.sourceKind === "partner") { STATE.selectedPartnerId = w.sourceId; STATE.selectedKind = "partner"; STATE.selectedView = "partner"; }
          else { STATE.selectedCommitteeId = w.sourceId; STATE.selectedKind = "committee"; STATE.selectedView = "committee"; }
          renderRoster(); renderDossier();
        } }, [
          ce("span", { class: "linked-kind kind-" + w.sourceKind }, w.kind),
          ce("span", { class: "win-text" }, " " + (w.item.text || w.item.title || "(no text)")),
          ce("span", { class: "meta", style: "margin-left:8px" }, "from " + w.sourceName + " · done " + fmtDate(w.item.done_at))
        ]);
        winsSec.append(row);
      });
    }
    dos.append(winsSec);

    // ---- Section 1: Committees without linked projects ----
    const sec1 = ce("section", { class: "block" });
    sec1.append(ce("h3", {}, "Committees without linked projects"));
    const unlinkedCommittees = (STATE.committees || []).filter(c => !Array.isArray(c.projectIds) || !c.projectIds.length);
    if (!unlinkedCommittees.length) {
      sec1.append(ce("div", { class: "due" }, "All committees have at least one project linked. ✓"));
    } else {
      unlinkedCommittees.forEach(c => {
        const card = ce("div", { class: "friday-card" });
        card.append(ce("div", { style: "font-weight:600" }, c.name + " "));
        card.append(ce("div", { class: "meta" }, (c.role || "contributor") + " · " + ((c.members || []).length) + " members"));
        const attEmails = (c.members || []).map(m => m.email);
        const sugg = suggestProjectFor(c.name, attEmails);
        if (sugg.length) {
          const suggBox = ce("div", { class: "friday-suggest" });
          suggBox.append(ce("span", { class: "meta" }, "Suggested: "));
          sugg.forEach(s => {
            suggBox.append(ce("button", { class: "btn tiny primary", onclick: () => {
              // TSKMGR-61 — bidirectional link.
              linkCommitteeToProject(c.id, s.project.id, "Friday plan: link " + c.id + " -> " + s.project.id);
              renderFridayPlanning();
            } }, "✓ " + s.project.name));
          });
          suggBox.append(ce("span", { class: "meta", style: "font-size:10px;margin-left:8px" }, sugg[0].reasons.join(" · ")));
          card.append(suggBox);
        }
        const btnRow = ce("div", { style: "display:flex;gap:6px;margin-top:6px;flex-wrap:wrap" });
        // Pick a different project (dropdown of all active projects)
        const otherProjects = (STATE.projects || []).filter(p => p.status !== "done" && !sugg.find(s => s.project.id === p.id));
        if (otherProjects.length) {
          const pickSel = ce("select", { class: "project-add-select" });
          pickSel.append(ce("option", { value: "" }, "Pick another project…"));
          otherProjects.forEach(p => pickSel.append(ce("option", { value: p.id }, p.name)));
          pickSel.addEventListener("change", () => {
            if (!pickSel.value) return;
            // TSKMGR-61 — bidirectional link.
            linkCommitteeToProject(c.id, pickSel.value, "Friday plan: link " + c.id + " -> " + pickSel.value);
            renderFridayPlanning();
          });
          btnRow.append(pickSel);
        }
        btnRow.append(ce("button", { class: "btn tiny", onclick: () => {
          c.projectIds = c.projectIds || [];
          c.projectIds.push("__noproject__"); // sentinel to indicate "explicitly no project"
          persistState("Friday plan: mark no project for " + c.id);
          renderFridayPlanning();
        } }, "No project"));
        btnRow.append(ce("button", { class: "btn tiny", onclick: () => {
          STATE.selectedCommitteeId = c.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
          renderRoster(); renderDossier();
        } }, "Open committee →"));
        card.append(btnRow);
        sec1.append(card);
      });
    }
    dos.append(sec1);

    // ---- Section 2: Items without projectId (from partners + committees) ----
    const sec2 = ce("section", { class: "block" });
    sec2.append(ce("h3", {}, "Open items without project assignment"));
    const unassignedItems = [];
    (STATE.partners || []).forEach(pa => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        ((pa.commitments && pa.commitments[lane]) || []).forEach(c => {
          if (!c.projectId && (c.status !== "done" && c.status !== "cancelled")) unassignedItems.push({ item: c, kind: "commitment", source: pa.name, sourceId: pa.id, sourceKind: "partner", lane });
        });
      });
      (pa.agenda || []).forEach(a => {
        if (!a.projectId && !a.completed) unassignedItems.push({ item: a, kind: "agenda", source: pa.name, sourceId: pa.id, sourceKind: "partner" });
      });
    });
    (STATE.committees || []).forEach(co => {
      (co.actionItems || []).forEach(a => {
        if (!a.projectId && (a.status !== "done" && a.status !== "cancelled")) unassignedItems.push({ item: a, kind: "action", source: co.name, sourceId: co.id, sourceKind: "committee" });
      });
      (co.agenda || []).forEach(a => {
        if (!a.projectId && !a.completed) unassignedItems.push({ item: a, kind: "agenda", source: co.name, sourceId: co.id, sourceKind: "committee" });
      });
    });

    if (!unassignedItems.length) {
      sec2.append(ce("div", { class: "due" }, "All open items have a project. ✓"));
    } else {
      // v3.4.0 — sort by due-date primary, source-grouping secondary, priority tertiary
      unassignedItems.sort(fridayTaskSort);
      sec2.append(ce("div", { class: "meta" }, unassignedItems.length + " open item" + (unassignedItems.length === 1 ? "" : "s") + " without a project assignment. Sorted by due-date then grouped by source to reduce transition fatigue."));
      unassignedItems.slice(0, 30).forEach(({ item, kind, source, sourceId, sourceKind }) => {
        const card = ce("div", { class: "friday-card" });
        const est = estimateMinutes(item);
        card.append(ce("div", {}, [
          ce("span", { class: "linked-kind kind-" + sourceKind }, kind),
          " " + (item.text || item.title || "(no text)"),
          ce("span", { class: "est-pill", title: "Estimated minutes (strategic 75 / tactical 45 / email 30)" }, " ⏱ " + est + " min")
        ]));
        const dueLabel = item.dueBy ? "due " + fmtDate(item.dueBy) : "no due date";
        card.append(ce("div", { class: "meta" }, "from " + source + " · " + dueLabel + (item.tags && item.tags.length ? " · tags: " + item.tags.join(", ") : "")));

        const sugg = suggestProjectForItem(item);
        if (sugg.length) {
          const suggBox = ce("div", { class: "friday-suggest" });
          suggBox.append(ce("span", { class: "meta" }, "Suggested: "));
          sugg.forEach(s => {
            suggBox.append(ce("button", { class: "btn tiny primary", onclick: () => {
              item.projectId = s.project.id;
              persistState("Friday plan: assign item to project");
              renderFridayPlanning();
            } }, "✓ " + s.project.name));
          });
          card.append(suggBox);
        }
        const otherProjects = (STATE.projects || []).filter(p => p.status !== "done" && !sugg.find(s => s.project.id === p.id));
        if (otherProjects.length) {
          const pickSel = ce("select", { class: "project-add-select", style: "margin-top:4px" });
          pickSel.append(ce("option", { value: "" }, "Pick another project…"));
          otherProjects.forEach(p => pickSel.append(ce("option", { value: p.id }, p.name)));
          pickSel.addEventListener("change", () => {
            if (!pickSel.value) return;
            item.projectId = pickSel.value;
            persistState("Friday plan: assign item to project");
            renderFridayPlanning();
          });
          card.append(pickSel);
        }
        sec2.append(card);
      });
      if (unassignedItems.length > 30) sec2.append(ce("div", { class: "meta", style: "margin-top:8px;font-style:italic" }, "Showing first 30 — work through these and the rest will appear next time."));
    }
    dos.append(sec2);

    // ---- v3.4.2b: Two-pane Plan my week (replaces v3.4.0b list + glance) ----
    const pwSec = ce("section", { class: "block" });
    const pwHead = ce("div", { style: "display:flex;align-items:center;gap:8px;margin-bottom:8px" });
    pwHead.append(ce("h3", { style: "margin:0;flex:1" }, "🗓 Plan next week"));
    pwHead.append(ce("button", { class: "btn tiny", onclick: async () => { await loadNextWeekCalendar(true); renderFridayPlanning(); } }, "↻ Refresh"));
    pwSec.append(pwHead);
    pwSec.append(ce("div", { class: "due" }, "Loading next week's calendar…"));
    dos.append(pwSec);

    loadNextWeekCalendar().then(cal => {
      pwSec.innerHTML = "";
      pwSec.append(pwHead.cloneNode(true));
      // Re-attach refresh handler since cloneNode doesn't carry events
      const refreshBtn = pwSec.querySelector("button");
      if (refreshBtn) refreshBtn.addEventListener("click", async () => { await loadNextWeekCalendar(true); renderFridayPlanning(); });

      if (!cal) {
        pwSec.append(ce("div", { class: "warn-banner" }, "Calendar API unavailable — time-block manually for now."));
        return;
      }
      const candidateTasks = collectOpenTasksForBlocking().filter(rec => !rec.item.skipBlockingForNow);
      if (!candidateTasks.length) {
        pwSec.append(ce("div", { class: "good-banner" }, "✓ Nothing left to schedule — open tasks are either already blocked, snoozed, or none exist."));
        // Still show calendar for visibility
        pwSec.append(renderPwWeekCalendar(cal, []));
        return;
      }
      pwSec.append(ce("div", { class: "meta", style: "margin-bottom:8px" }, "Greedy first-fit proposer · 9am–5pm, lunch 12–1, 15-min buffer · strategic → mornings, email-style → afternoons · grouped by source"));
      const proposals = proposeBlocks(candidateTasks, cal.busyByDay);

      // v3.4.4a — Accept all toolbar
      const scheduledProps = proposals.filter(p => !p.unscheduled && p.slot && !p.rec.item.calendar_block_event_id);
      if (scheduledProps.length > 1) {
        const toolbar = ce("div", { class: "pw-toolbar" });
        const acceptAllBtn = ce("button", { class: "btn primary", onclick: async () => {
          if (!confirm("Accept all " + scheduledProps.length + " proposed blocks? This creates real Calendar events for each. You can still edit/delete them in Calendar afterward.")) return;
          acceptAllBtn.disabled = true;
          acceptAllBtn.textContent = "Creating 0 of " + scheduledProps.length + "…";
          let done = 0;
          for (const prop of scheduledProps) {
            await acceptBlock(prop, null);
            done++;
            acceptAllBtn.textContent = "Creating " + done + " of " + scheduledProps.length + "…";
          }
          // acceptBlock triggers re-render at the end of each call so we'd already be re-rendered.
        } }, "✓ Accept all " + scheduledProps.length + " proposals");
        toolbar.append(acceptAllBtn);
        toolbar.append(ce("span", { class: "meta", style: "margin-left:auto" }, scheduledProps.length + " scheduled · " + proposals.filter(p => p.unscheduled).length + " unscheduled · " + proposals.filter(p => p.rec.item.calendar_block_event_id).length + " already blocked"));
        pwSec.append(toolbar);
      }

      pwSec.append(renderPwTwoPane(cal, candidateTasks, proposals));
    });

    // ---- Section 3: Discovery rename suggestions (from cached discovery) ----
    if (discoveryCache && discoveryCache.candidates) {
      const renameCands = discoveryCache.candidates.filter(c => c.possibleRenameOf);
      if (renameCands.length) {
        const sec3 = ce("section", { class: "block" });
        sec3.append(ce("h3", {}, "Pending rename / restart suggestions from discovery"));
        renameCands.forEach(cand => {
          const samp = cand.sample || {};
          const ex = (STATE.committees || []).find(x => x.id === cand.possibleRenameOf);
          const card = ce("div", { class: "friday-card" });
          card.append(ce("div", { style: "font-weight:600" }, samp.summary || "(unnamed)"));
          card.append(ce("div", { class: "meta" }, "May be a rename of: " + (ex && ex.name) + " (≥80% attendee overlap)"));
          const btnRow = ce("div", { style: "display:flex;gap:6px;margin-top:6px;flex-wrap:wrap" });
          btnRow.append(ce("button", { class: "btn tiny primary", onclick: () => {
            if (ex) { ex.recurringEventId = cand.recurringEventId; persistState("Merge rename"); }
            if (discoveryCache) discoveryCache.candidates = discoveryCache.candidates.filter(x => x.recurringEventId !== cand.recurringEventId);
            renderFridayPlanning();
          } }, "Merge into " + (ex && ex.name)));
          btnRow.append(ce("button", { class: "btn tiny", onclick: () => {
            if (discoveryCache) discoveryCache.candidates = discoveryCache.candidates.filter(x => x.recurringEventId !== cand.recurringEventId);
            renderFridayPlanning();
          } }, "Treat as new (skip merge)"));
          card.append(btnRow);
          sec3.append(card);
        });
        dos.append(sec3);
      }
    }
  }

  // Member visibility per charter §"Member visibility rule":
  // required attendees always shown; optional attendees hidden until they own work
  // (action item assigned to them) OR hasContributed flag set by reconciler.
  function visibleMembers(c) {
    return (c.members || []).filter(m => {
      if (!m.optional) return true;
      const hasTask = (c.actionItems || []).some(a => a.assigneeEmail && a.assigneeEmail.toLowerCase() === (m.email || "").toLowerCase());
      return hasTask || m.hasContributed === true;
    });
  }
  function hiddenMemberCount(c) { return (c.members || []).length - visibleMembers(c).length; }

  function memberChips(c, opts) {
    opts = opts || {};
    const wrap = ce("div", { class: "member-chips" });
    visibleMembers(c).forEach(m => {
      const isOwen = (m.email || "").toLowerCase() === OWNER_EMAIL.toLowerCase();
      const chip = ce("span", { class: "member-chip" + (m.optional ? " optional" : "") + (isOwen ? " is-owen" : "") , title: (m.email || "") + (m.memberRole ? " · " + m.memberRole : "") }, [
        ce("span", { class: "avatar tiny" }, initials(m.name || m.email || "?")),
        ce("span", { class: "member-name" }, (m.name || m.email || "—").split(" ")[0])
      ]);
      wrap.append(chip);
    });
    if (opts.showHidden && hiddenMemberCount(c) > 0) wrap.append(ce("span", { class: "member-hidden" }, "+ " + hiddenMemberCount(c) + " optional hidden"));
    if (!visibleMembers(c).length) wrap.append(ce("span", { style: "color:var(--muted);font-size:12px" }, "No members yet"));
    return wrap;
  }

  // Topic derivation (charter §"Topic derivation rule")
  function topicOf(item) {
    if (item.projectId) {
      const p = (STATE.projects || []).find(x => x.id === item.projectId);
      if (p) return p.name;
    }
    return (item.tags && item.tags[0]) || "Untagged";
  }
  function isFirstClassTopic(item) {
    if (item.projectId) return true;
    const firstTag = item.tags && item.tags[0];
    if (!firstTag) return false;
    return (STATE.projects || []).some(p => p.tagAlias === firstTag);
  }

  // Due-date bucket assignment for action items
  function dueBucket(item) {
    if (!item.dueBy) return "Unscheduled";
    const d = new Date(item.dueBy + "T12:00:00");
    if (isNaN(d.getTime())) return "Unscheduled";
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const weekEnd = new Date(today); weekEnd.setDate(today.getDate() + 7);
    if (d < today) return "Overdue";
    if (d < tomorrow) return "Due today";
    if (d < weekEnd) return "This week";
    return "Later";
  }
  // Metadata-completeness tier per charter §"Within a topic group, sort..."
  function metaTier(item) {
    const hasDue = !!item.dueBy;
    const hasAssignee = !!(item.assigneeEmail && item.assigneeEmail.length);
    if (hasDue && hasAssignee) return 1;
    if (!hasDue && hasAssignee) return 2;
    if (!hasDue && !hasAssignee) return 3;
    return 4; // hasDue + !hasAssignee — pressure without accountability, sinks to bottom
  }
  function priorityRank(item) { return ({ must: 0, should: 1, nice: 2 })[item.priority || "should"] || 1; }

  function renderActionItemsByDueDate(items, c) {
    const wrap = ce("div", { class: "action-items" });
    if (!items.length) { wrap.append(ce("div", { class: "due" }, "No action items yet.")); return wrap; }

    const buckets = ["Overdue", "Due today", "This week", "Later", "Unscheduled"];
    const grouped = {}; buckets.forEach(b => grouped[b] = {});
    items.forEach(it => {
      const b = dueBucket(it);
      const t = topicOf(it);
      grouped[b][t] = grouped[b][t] || [];
      grouped[b][t].push(it);
    });

    buckets.forEach(b => {
      const topics = Object.keys(grouped[b]);
      if (!topics.length) return;
      wrap.append(ce("h4", { class: "ai-bucket" + (b === "Overdue" ? " overdue" : "") }, b));
      topics.sort().forEach(topicName => {
        const list = grouped[b][topicName];
        list.sort((a, b2) => (metaTier(a) - metaTier(b2)) || (priorityRank(a) - priorityRank(b2)) || ((a.dueBy || "").localeCompare(b2.dueBy || "")));
        const sample = list[0];
        const isFC = sample && isFirstClassTopic(sample);
        wrap.append(ce("div", { class: "ai-topic" + (isFC ? " first-class" : "") }, "▸ " + topicName));
        list.forEach(it => wrap.append(renderActionItemRow(it, c)));
      });
    });
    return wrap;
  }
  function renderActionItemRow(it, c) {
    const row = ce("div", { class: "ai-row priority-" + (it.priority || "should") });
    const head = ce("div", { class: "ai-head" });
    head.append(prioritySelect(it));
    appendNewBadge(head, it); // v3.4.9
    const titleSpan = ce("span", { class: "ai-text" }, it.text || "(click to edit)");
    inlineEdit(titleSpan, () => it.text, (v) => it.text = v, { size: "title", multiline: true, persistReason: "Edit action item text" });
    head.append(titleSpan);
    head.append(statusSelectEl(it));
    if (it.status === "blocked" && it.blockedOn) head.append(ce("span", { class: "blocked-on" }, "blocked on: " + it.blockedOn));
    head.append(categorySelect(it));
    row.append(head);

    const meta = ce("div", { class: "due ai-meta" });
    // assignee chip
    const assigneeName = (() => {
      if (!it.assigneeEmail) return "TBD";
      const m = c && (c.members || []).find(x => (x.email || "").toLowerCase() === it.assigneeEmail.toLowerCase());
      return m ? (m.name || m.email) : it.assigneeEmail;
    })();
    meta.append(ce("span", { class: "ai-assignee" + (!it.assigneeEmail ? " tbd" : "") }, assigneeName));
    meta.append(document.createTextNode(" · due "));
    const dueSpan = ce("span", {}, it.dueBy ? fmtDate(it.dueBy) : "TBD");
    inlineEdit(dueSpan, () => it.dueBy, (v) => it.dueBy = v, { size: "date", inputType: "date", persistReason: "Edit due date" });
    meta.append(dueSpan);
    if (it.tags && it.tags.length) meta.append(tagPills(it.tags));
    row.append(meta);
    if (it.verifyStatus && it.verifyStatus !== "pending") {
      const v = ce("div", { class: "ai-verify" }, [ce("span", { class: "verify-icon " + it.verifyStatus }, iconFor(it.verifyStatus)), document.createTextNode(" " + (it.verifyNote || it.verifyStatus))]);
      row.append(v);
    }
    // v3.4.2a — context line if source_context is set
    const ctxEl = renderContextLine(it);
    if (ctxEl) row.append(ctxEl);
    // v3.4.3a — cross-pollination link badge if assignee is a known 1:1 partner
    const cpBadge = crossPolLinkBadge(it);
    if (cpBadge) row.append(cpBadge);
    return row;
  }

  // v3.4.4d — effective role for a committee on a given date (default = c.role; override if matching).
  // Returns { role, override } where override is the matching {instanceDate, role, reason} or null.
  function effectiveRoleOn(c, dateStr) {
    const dflt = c.role || "contributor";
    if (!c.roleOverrides || !c.roleOverrides.length) return { role: dflt, override: null };
    const targetDate = dateStr || new Date().toISOString().slice(0, 10);
    const match = c.roleOverrides.find(o => o.instanceDate === targetDate);
    if (match) return { role: match.role || dflt, override: match };
    return { role: dflt, override: null };
  }

  // Three role shapes + dispatcher
  function renderCommitteeDossier(c) {
    const dos = document.getElementById("dossier"); dos.innerHTML = "";
    dos.append(renderSprintStrip());

    // v3.4.4d — effective role honors per-instance overrides
    const eff = effectiveRoleOn(c, new Date().toISOString().slice(0, 10));
    const effectiveRole = eff.role;

    const head = ce("div", { class: "pheader" }, [
      ce("div", {}, [
        ce("h1", {}, [c.name || "(unnamed committee)", ce("span", { class: "role role-" + effectiveRole }, effectiveRole + (eff.override ? " (override)" : ""))]),
        c.cadence ? ce("div", { class: "cadence" }, c.cadence) : null,
        c.purpose ? ce("div", { class: "purpose meta" }, c.purpose) : null
      ].filter(Boolean))
    ]);
    dos.append(head);

    if (eff.override) {
      const ovrBanner = ce("div", { class: "override-banner" }, [
        ce("strong", {}, "★ Role override active for today. "),
        document.createTextNode("Default role is " + (c.role || "contributor") + "; today running as " + effectiveRole + (eff.override.reason ? " — " + eff.override.reason : "") + ".")
      ]);
      dos.append(ovrBanner);
    }

    dos.append(memberChips(c, { showHidden: true }));

    if (effectiveRole === "owner") renderOwnerShape(c, dos);
    else if (effectiveRole === "optional") renderOptionalShape(c, dos);
    else renderContributorShape(c, dos);

    dos.append(renderCommitteeProfile(c));
    loadSprintStrip();
  }

  function renderOwnerShape(c, dos) {
    // Suggested agenda
    const ag = ce("section", { class: "block" });
    ag.append(ce("h3", {}, "Suggested agenda"));
    if (!c.agenda.length) ag.append(ce("div", { class: "due" }, "No agenda items yet. Add via the + Quick capture FAB or from the post-meeting reconciler."));
    c.agenda.forEach(a => {
      const row = ce("div", { class: "ag-row priority-" + (a.priority || "should") });
      row.append(prioritySelect(a));
      appendNewBadge(row, a); // v3.4.9
      const titleSpan = ce("span", { class: "ag-title" }, a.title || "(untitled)");
      inlineEdit(titleSpan, () => a.title, v => a.title = v, { size: "title", persistReason: "Edit agenda title" });
      row.append(titleSpan);
      row.append(categorySelect(a));
      if (a.tags && a.tags.length) row.append(tagPills(a.tags));
      const detail = ce("div", { class: "meta" }, a.detail || "");
      inlineEdit(detail, () => a.detail, v => a.detail = v, { size: "detail", multiline: true, persistReason: "Edit agenda detail" });
      ag.append(row); ag.append(detail);
    });
    dos.append(ag);

    // Action items
    const ai = ce("section", { class: "block" });
    ai.append(ce("h3", {}, ["Action items", ce("span", { class: "pill synth" }, (c.actionItems || []).length + " open")]));
    ai.append(renderActionItemsByDueDate(c.actionItems || [], c));
    dos.append(ai);

    // Recent decisions
    const dec = ce("section", { class: "block" });
    dec.append(ce("h3", {}, "Recent decisions"));
    if (!c.decisions.length) dec.append(ce("div", { class: "due" }, "No decisions recorded yet."));
    c.decisions.forEach(d => {
      dec.append(ce("div", { class: "decision" }, [
        ce("div", {}, d.text),
        ce("div", { class: "meta" }, fmtDate(d.when) + (d.tags && d.tags.length ? " · " : "")),
        d.tags && d.tags.length ? tagPills(d.tags) : null
      ].filter(Boolean)));
    });
    dos.append(dec);

    // Topic threads
    const tt = ce("section", { class: "block" });
    tt.append(ce("h3", {}, "Topic threads"));
    if (!c.topicThreads.length) tt.append(ce("div", { class: "due" }, "No threads yet."));
    c.topicThreads.forEach(t => tt.append(ce("details", {}, [ce("summary", {}, t.title), ce("div", { class: "body" }, [t.summary, t.tags && t.tags.length ? tagPills(t.tags) : null].filter(Boolean))])));
    dos.append(tt);

    // v3.4.3a — Documents section
    const docsSec = renderDocumentsSection(c);
    if (docsSec) dos.append(docsSec);

    // What to ask the team this week — contextual prompt panel
    dos.append(renderAskTeamPrompt(c));
  }

  function renderContributorShape(c, dos) {
    // Agenda preview from event description (placeholder — real fetch in v3.4)
    const ag = ce("section", { class: "block" });
    ag.append(ce("h3", {}, "Agenda preview"));
    ag.append(ce("div", { class: "meta" }, "Reads from the calendar event description when posted. Live fetch lands with the merged scheduled task in v3.4. For now this section will show 'no agenda posted' until that wiring is in place."));
    ag.append(ce("div", { class: "due" }, "(no agenda posted)"));
    dos.append(ag);

    // Last 3 meetings high points
    const last = ce("section", { class: "block" });
    last.append(ce("h3", {}, "Last 3 meetings — high points"));
    const log = (c.meetingLog || []).slice(-3).reverse();
    if (!log.length) last.append(ce("div", { class: "due" }, "No meetings reconciled yet for this committee. Reconciler populates this once v3.4 ships."));
    log.forEach(m => {
      last.append(ce("div", { class: "decision" }, [
        ce("div", {}, ce("strong", {}, fmtDate(m.date))),
        ce("div", { class: "meta" }, m.summary && m.summary.length > 200 ? m.summary.slice(0, 197) + "…" : (m.summary || ""))
      ]));
    });
    dos.append(last);

    // Owen's due-at-this-meeting list
    const due = ce("section", { class: "block" });
    due.append(ce("h3", {}, "Your due at this meeting"));
    const mine = (c.actionItems || []).filter(a => a.assigneeEmail && a.assigneeEmail.toLowerCase() === OWNER_EMAIL.toLowerCase() && a.status !== "done" && a.status !== "cancelled");
    if (!mine.length) due.append(ce("div", { class: "due" }, "Nothing assigned to you in this committee right now."));
    else due.append(renderActionItemsByDueDate(mine, c));
    dos.append(due);

    // v3.4.3a — Documents
    const docsSec = renderDocumentsSection(c);
    if (docsSec) dos.append(docsSec);
  }

  function renderOptionalShape(c, dos) {
    const last = ce("section", { class: "block" });
    last.append(ce("h3", {}, "Last meeting"));
    const lastMtg = (c.meetingLog || []).slice(-1)[0];
    if (!lastMtg) last.append(ce("div", { class: "due" }, "No meetings reconciled yet."));
    else last.append(ce("div", { class: "meta" }, fmtDate(lastMtg.date) + " — " + (lastMtg.summary || "(no summary)")));
    dos.append(last);

    dos.append(renderDropPrompt(c));
  }

  // Engagement-based drop-this prompt (charter §Optional shape)
  function renderDropPrompt(c) {
    const block = ce("section", { class: "block drop-prompt" });
    block.append(ce("h3", {}, "Should you drop this committee?"));
    const me = (c.members || []).find(m => (m.email || "").toLowerCase() === OWNER_EMAIL.toLowerCase());
    const tasks = (me && me.taskCountIn90d) || 0;
    const inputs = (me && me.inputCountIn90d) || 0;
    const total = tasks + inputs;
    const threshold = c.dropThreshold || 3;
    const lowEngagement = total < threshold;
    block.append(ce("div", { class: "meta" }, [
      "Engagement signal over 90 days: ",
      ce("strong", {}, tasks + " tasks assigned + " + inputs + " decision-input mentions = " + total),
      ". Threshold: ", ce("strong", {}, "< " + threshold)
    ]));
    if (lowEngagement) block.append(ce("div", { class: "warn-banner" }, "Low engagement — consider declining future instances."));
    else block.append(ce("div", { class: "good-banner" }, "Engagement OK."));
    block.append(ce("div", { class: "meta", style: "margin-top:8px" }, "Note: engagement metrics are populated by the merged scheduled task starting in v3.4. Until then this shows 0/0."));
    return block;
  }

  // "What to ask the team this week" prompt for owner-shape committees
  function renderAskTeamPrompt(c) {
    const block = ce("section", { class: "block ask-team" });
    block.append(ce("h3", {}, "What to ask the team this week"));
    const projectBits = (c.projectIds || []).map(pid => (STATE.projects || []).find(p => p.id === pid)).filter(Boolean);
    if (projectBits.length) {
      block.append(ce("div", { class: "meta" }, "Linked projects:"));
      projectBits.forEach(p => block.append(ce("div", { style: "margin-left:12px;font-size:13px" }, [ce("strong", {}, p.name + " — "), ce("span", { class: "meta" }, p.description || "(no description set)")])));
    }
    const blockers = (c.actionItems || []).filter(a => a.status === "blocked");
    if (blockers.length) {
      block.append(ce("div", { style: "margin-top:8px;font-weight:600" }, "Blockers to surface:"));
      blockers.forEach(b => block.append(ce("div", { class: "meta", style: "margin-left:12px" }, "• " + b.text + (b.blockedOn ? " (on: " + b.blockedOn + ")" : ""))));
    }
    const undecidedDecisions = (c.decisions || []).filter(d => d.pendingConfirmation);
    if (undecidedDecisions.length) {
      block.append(ce("div", { style: "margin-top:8px;font-weight:600" }, "Pending decisions to confirm:"));
      undecidedDecisions.forEach(d => block.append(ce("div", { class: "meta", style: "margin-left:12px" }, "• " + d.text)));
    }
    if (!projectBits.length && !blockers.length && !undecidedDecisions.length) {
      block.append(ce("div", { class: "due" }, "No specific prompts derived yet. Will populate once linked projects + active blockers + pending decisions accumulate."));
    }
    return block;
  }

  // TODO TSKMGR-45 Part B — Canvas-driven proposed agenda items.
  // Read the committee's mapped Slack channel canvas, parse headings + bullets,
  // surface as PROPOSED entries on the next-meeting-only render of
  // renderOwnerShape. Held for a separate wave; this is just a placeholder so

  function renderCommitteeProfile(c) {
    const sec = ce("section", { class: "block" });
    sec.append(ce("h3", {}, ["Committee profile", ce("span", { class: "pill synth" }, "editable")]));
    const grid = ce("div", { class: "profile-grid" });
    const fields = [
      { key: "name", label: "Name", tag: "input", type: "text" },
      { key: "shortCode", label: "Short code", tag: "input", type: "text", maxlength: 2, help: "Optional 2-character label shown in the avatar circle when sidebar is collapsed (e.g. 'CR' for Connections Requirements). Falls back to name initials if blank." },
      { key: "purpose", label: "Purpose", tag: "textarea", help: "Why this meeting exists. Feeds the 'what to ask the team' prompt." },
      { key: "cadence", label: "Cadence", tag: "input", type: "text" },
      { key: "manualNotesUrl", label: "Manual notes URL", tag: "input", type: "url", help: "Optional. Paste a Google Doc URL where this committee tracks notes manually (in addition to or instead of Gemini Notes). The scheduled task will read both when reconciling." },
      { key: "notes", label: "Notes", tag: "textarea" }
    ];
    fields.forEach(f => {
      grid.append(ce("label", {}, f.label));
      const inp = ce(f.tag, { type: f.type || undefined });
      if (f.maxlength) inp.maxLength = f.maxlength;
      inp.value = c[f.key] || "";
      inp.addEventListener("input", () => {
        let v = inp.value;
        if (f.maxlength && v.length > f.maxlength) v = v.slice(0, f.maxlength);
        if (f.key === "shortCode") v = v.toUpperCase();
        if (v !== inp.value) inp.value = v;
        c[f.key] = v;
      });
      inp.addEventListener("blur", () => { if (f.key === "shortCode") renderRoster(); persistState("Edit committee." + f.key); });
      const wrap = ce("div", {}, [inp]);
      if (f.help) wrap.append(ce("div", { class: "meta" }, f.help));
      grid.append(wrap);
    });

    // Role select (Owner / Contributor / Optional)
    grid.append(ce("label", {}, "Your role"));
    const roleSel = ce("select", {});
    [["owner","Owner — I drive this meeting"],["contributor","Contributor — I attend and engage"],["optional","Optional — I'm on the invite but rarely engage"]].forEach(([val, lbl]) => {
      const o = ce("option", { value: val }, lbl);
      if ((c.role || "contributor") === val) o.selected = true;

    });
    roleSel.addEventListener("change", () => { c.role = roleSel.value; persistState("Edit committee.role"); renderRoster(); renderDossier(); });
    grid.append(ce("div", {}, [roleSel, ce("div", { class: "meta" }, "Determines the dossier shape: Owner = full surface, Contributor = preview + your due-list, Optional = drop-this prompt.")]));

    // Members editor
    grid.append(ce("label", {}, "Members"));
    const memWrap = ce("div", {});
    if (!c.members) c.members = [];
    c.members.forEach((m, idx) => {
      const row = ce("div", { class: "member-row" });
      const nameInp = ce("input", { type: "text", placeholder: "Name", value: m.name || "" });
      nameInp.addEventListener("input", () => m.name = nameInp.value);
      nameInp.addEventListener("blur", () => persistState("Edit member name"));
      const emailInp = ce("input", { type: "email", placeholder: "email@org", value: m.email || "" });
      emailInp.addEventListener("input", () => m.email = emailInp.value);
      emailInp.addEventListener("blur", () => persistState("Edit member email"));
      const optBox = ce("input", { type: "checkbox" }); optBox.checked = !!m.optional;
      optBox.addEventListener("change", () => { m.optional = optBox.checked; persistState("Toggle member optional"); renderDossier(); });
      const optLbl = ce("label", { class: "inline-lbl" }, [optBox, document.createTextNode(" optional")]);
      const del = ce("button", { class: "btn tiny danger", onclick: () => { c.members.splice(idx, 1); persistState("Remove member"); renderDossier(); } }, "×");
      row.append(nameInp, emailInp, optLbl, del);
      memWrap.append(row);
    });
    memWrap.append(ce("button", { class: "btn tiny", onclick: () => { c.members.push({ email: "", name: "", optional: false, hasContributed: false, taskCountIn90d: 0, inputCountIn90d: 0 }); persistState("Add member"); renderDossier(); } }, "+ Add member"));
    grid.append(memWrap);

    // v3.3.0b — Linked projects: chip + dropdown multi-select (scales with project count, hides archived)
    grid.append(ce("label", {}, "Linked projects"));
    const projWrap = ce("div", { class: "project-multi" });
    const activeProjects = (STATE.projects || []).filter(p => p.status !== "done");
    const selectedIds = c.projectIds || [];
    const selectedProjects = activeProjects.filter(p => selectedIds.includes(p.id));
    const unselectedProjects = activeProjects.filter(p => !selectedIds.includes(p.id));

    if (!selectedProjects.length && !unselectedProjects.length) {
      projWrap.append(ce("div", { class: "meta" }, "No projects yet — click + Projects in the sidebar to add one. Tag-only labels still work via the tags field."));
    } else {

      selectedProjects.forEach(p => {
        const chip = ce("span", { class: "project-chip" }, [
          ce("span", {
            style: "cursor:pointer",
            onclick: () => { STATE.selectedProjectId = p.id; STATE.selectedKind = "project"; STATE.selectedView = "project"; renderRoster(); renderDossier(); }
          }, p.name),
          ce("button", { class: "chip-x", title: "Remove project link", onclick: () => {
            // TSKMGR-61 — bidirectional unlink keeps project.committeeIds in sync.
            unlinkCommitteeFromProject(c.id, p.id, "Edit committee.projectIds");
            renderDossier();
          } }, "×")
        ]);
        projWrap.append(chip);
      });

      if (unselectedProjects.length) {
        const sel = ce("select", { class: "project-add-select" });
        sel.append(ce("option", { value: "" }, "+ Link a project…"));
        unselectedProjects.forEach(p => sel.append(ce("option", { value: p.id }, p.name)));
        sel.addEventListener("change", () => {
          if (!sel.value) return;
          // TSKMGR-61 — bidirectional link keeps project.committeeIds in sync.
          linkCommitteeToProject(c.id, sel.value, "Edit committee.projectIds");
          renderDossier();
        });
        projWrap.append(sel);
      } else if (selectedProjects.length) {
        projWrap.append(ce("span", { class: "meta" }, "All projects linked."));
      }
    }
    grid.append(projWrap);

    grid.append(ce("label", {}, "Detected"));
    grid.append(ce("div", { class: "meta" }, c.recurringEventId ? ["Matched by recurringEventId: ", ce("code", {}, c.recurringEventId)] : "Live match by recurringEventId pending — will populate after first reconciler run on this committee."));

    // v3.4.4d — Per-instance role override (e.g. "this Tuesday I delegated to Patricia")
    grid.append(ce("label", {}, "Role overrides"));
    const overrideWrap = ce("div", {});
    if (!c.roleOverrides) c.roleOverrides = [];
    if (c.roleOverrides.length) {
      c.roleOverrides.forEach((ovr, idx) => {
        const row = ce("div", { class: "override-row" });
        const dateInp = ce("input", { type: "date", value: ovr.instanceDate || "", title: "Date of the meeting instance this override applies to" });
        dateInp.addEventListener("change", () => { ovr.instanceDate = dateInp.value; persistState("Edit role override date"); });
        const roleSel = ce("select", {});
        [["owner","Owner"],["contributor","Contributor"],["optional","Optional"]].forEach(([v, lbl]) => { const o = ce("option", { value: v }, lbl); if ((ovr.role || c.role) === v) o.selected = true; roleSel.append(o); });
        roleSel.addEventListener("change", () => { ovr.role = roleSel.value; persistState("Edit role override"); renderDossier(); });
        const reasonInp = ce("input", { type: "text", placeholder: "Reason (optional, e.g. 'delegated to Patricia')", value: ovr.reason || "" });
        reasonInp.addEventListener("input", () => { ovr.reason = reasonInp.value; });
        reasonInp.addEventListener("blur", () => persistState("Edit role override reason"));
        const del = ce("button", { class: "btn tiny danger", onclick: () => { c.roleOverrides.splice(idx, 1); persistState("Remove role override"); renderDossier(); } }, "×");
        row.append(dateInp, roleSel, reasonInp, del);
        overrideWrap.append(row);
      });
    } else {
      overrideWrap.append(ce("div", { class: "meta" }, "No overrides. Default role for every instance: " + (c.role || "contributor") + "."));
    }
    overrideWrap.append(ce("button", { class: "btn tiny", style: "margin-top:6px", onclick: () => {
      c.roleOverrides = c.roleOverrides || [];
      const today = new Date().toISOString().slice(0, 10);
      c.roleOverrides.push({ instanceDate: today, role: "contributor", reason: "" });
      persistState("Add role override"); renderDossier();
    } }, "+ Add override"));
    grid.append(overrideWrap);

    grid.append(ce("label", {}, "Hidden optional"));
    const hidden = (c.members || []).filter(m => m.optional && !visibleMembers(c).includes(m));
    if (!hidden.length) grid.append(ce("div", { class: "meta" }, "All members visible."));
    else {
      const wrap = ce("div", { class: "meta" });
      wrap.append(document.createTextNode(hidden.length + " optional member" + (hidden.length === 1 ? "" : "s") + " hidden until they own work or contribute: "));
      hidden.forEach((m, i) => { wrap.append(document.createTextNode((i ? ", " : "") + (m.name || m.email))); });
      grid.append(wrap);
    }

    // TSKMGR-70 — Meeting attendees editor (calendar-invitee sourced)
    grid.append(ce("label", {}, "Meeting attendees"));
    grid.append(_renderCommitteeAttendeesEditor(c));

    // TSKMGR-45 — Slack channel mapping editor.
    grid.append(ce("label", {}, "Slack channel"));
    grid.append(_renderSlackChannelEditor(c, "committee"));

    grid.append(ce("label", {}, "Committee ID"));
    grid.append(ce("div", { class: "meta" }, [ce("code", {}, c.id)]));

    sec.append(grid);
    sec.append(ce("div", { class: "profile-actions" }, [ce("button", { class: "btn tiny danger", onclick: () => removeCommittee(c.id) }, "Remove this committee")]));
    return sec;
  }

  // ============================================================
  // TSKMGR-70 — Committee meeting-attendee editor
  // ============================================================
  // Mirror of the (former) Slack member-list UI, sourced from Google Calendar
  // invitees keyed by `committee.recurringEventId`. Refresh hits the Calendar
  // MCP and caches the attendee array; manual add seeds entries with
  // source:"manual" so they persist across refreshes.
  function _renderCommitteeAttendeesEditor(committee) {
    const wrap = ce("div", { class: "committee-attendees-editor" });
    const eid = committee && committee.recurringEventId;
    if (!eid) {
      wrap.append(ce("div", { class: "meta" }, "This committee has no recurringEventId yet — once the reconciler matches a calendar series, attendees will be fetchable here."));
      return wrap;
    }

    // Header row: Refresh button + staleness pill
    const head = ce("div", { style: "display:flex;gap:6px;align-items:center;flex-wrap:wrap" });
    head.append(ce("strong", {}, "Meeting attendees"));
    const cache = getCommitteeAttendees(eid);
    const stale = isCommitteeAttendeesStale(eid);
    if (cache && cache.fetchedAt) {
      head.append(ce("span", { class: "meta", style: "margin-left:6px" },
        "(last refreshed " + daysAgo(cache.fetchedAt) + ")"));
      if (stale) head.append(ce("span", { class: "pill synth warn", style: "margin-left:6px" }, "stale >24h"));
    } else {
      head.append(ce("span", { class: "meta", style: "margin-left:6px" }, "(no attendees cached yet)"));
    }
    const refreshBtn = ce("button", { class: "btn tiny", style: "margin-left:auto", title: "Refresh attendees from Google Calendar" }, "Refresh attendees");
    refreshBtn.addEventListener("click", async () => {
      refreshBtn.disabled = true;
      refreshBtn.textContent = "Refreshing…";
      const res = await fetchCommitteeAttendees(eid);
      refreshBtn.disabled = false;
      refreshBtn.textContent = "Refresh attendees";
      if (res.ok) {
        showSave("saved", "Attendees updated — " + res.calendarCount + " from calendar, " + res.manualKept + " manual kept.");
      } else {
        showSave("error", "Refresh failed: " + (res.error || "unknown error") + " — add attendees manually below.");
      }
      renderDossier();
    });
    head.append(refreshBtn);
    wrap.append(head);

    // Attendee list
    const list = ce("div", { style: "margin-top:6px" });
    const attendees = (cache && Array.isArray(cache.attendees)) ? cache.attendees : [];
    if (!attendees.length) {
      list.append(ce("div", { class: "meta" }, "No attendees yet. Click Refresh to pull invitees from this committee's next calendar event, or add manually below."));
    }
    const responseIcon = (rs) => {
      if (rs === "accepted") return "✓";
      if (rs === "declined") return "✗";
      if (rs === "tentative") return "?";
      if (rs === "needsAction") return "·";
      return "";
    };
    attendees.forEach((a, idx) => {
      const isManual = (a.source === "manual");
      const arow = ce("div", { class: "committee-attendee-row", style: "display:flex;gap:6px;align-items:center;padding:3px 0;border-bottom:1px dashed var(--line)" });
      const label = (a.displayName || a.email || "(unnamed)") + (a.email && a.email !== a.displayName ? " — " + a.email : "");
      arow.append(ce("span", { style: "flex:1" }, label));
      const icon = responseIcon(a.responseStatus);
      if (icon) arow.append(ce("span", { class: "meta", style: "font-size:11px;width:14px;text-align:center", title: a.responseStatus || "" }, icon));
      arow.append(ce("span", { class: "meta", style: "font-size:11px" }, isManual ? "manual" : "calendar"));
      // Only manual entries are removable — calendar entries refresh from the source.
      if (isManual) {
        const del = ce("button", { class: "btn tiny danger", title: "Remove manual attendee", onclick: () => {
          removeAttendee(eid, idx);
          renderDossier();
        } }, "×");
        arow.append(del);
      } else {
        arow.append(ce("span", { style: "width:18px" }));
      }
      list.append(arow);
    });
    wrap.append(list);

    // Manual add row
    const addRow = ce("div", { style: "display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center" });
    const nameAddInp = ce("input", { type: "text", placeholder: "Display name", style: "flex:1;min-width:120px" });
    const emailAddInp = ce("input", { type: "email", placeholder: "email@org (optional)", style: "flex:1;min-width:160px" });
    const addBtn = ce("button", { class: "btn tiny", onclick: () => {
      const nm = nameAddInp.value.trim();
      const em = emailAddInp.value.trim();
      if (!nm && !em) return;
      addAttendeeManually(eid, { displayName: nm || em, email: em || null });
      nameAddInp.value = ""; emailAddInp.value = "";
      renderDossier();
    } }, "+ Add manually");
    addRow.append(nameAddInp, emailAddInp, addBtn);
    wrap.append(addRow);

    return wrap;
  }

  // ============================================================
  // v3.2.1 — Discovery (full + narrow modes + similarity + diagnostics)
  // v3.4.6 — Resumable: string responses from the bridge mark chunk/parent failures
  // and stash a _resumeSnapshot on the result so the user can pick up from the
  // failure point. Yearly extrapolation uses effectiveScanDays from the chunks
  // that actually succeeded — partial scans no longer underestimate frequency.
  // ============================================================
  async function discoverCommittees(mode, resumeFrom) {
    const isResume = !!resumeFrom;
    showSave("saving", isResume ? "Resuming discovery…" : "Discovering committees…");
    const days = mode === "narrow" ? 7 : 365;
    const knownIds = new Set([
      ...(STATE.committees || []).map(c => c.recurringEventId).filter(Boolean),
      ...(STATE.dismissedRecurringEventIds || [])
    ]);
    // Reuse the candidates dict + diag from a paused run when resuming.
    const candidates = (resumeFrom && resumeFrom.candidates) || {};
    const diag = (resumeFrom && resumeFrom.diag) || {
      mode,
      windowDays: days,
      chunksAttempted: 0,
      chunksSucceeded: 0,
      chunksFailed: 0,
      chunkErrors: [],
      eventsScanned: 0,
      eventsWithRid: 0,
      eventsKnownSkipped: 0,
      eventsTooFewAttendees: 0,
      eventsSoloOwen: 0,
      uniqueRids: 0,
      sampleResponseShapes: [],
      attendeesMissing: 0,
      chunkSucceededIndices: []  // v3.4.6 — feeds effectiveScanDays
    };
    // Reset resumable flags — will be set if we hit another bridge interruption this pass.
    diag.resumable = false;
    diag.resumeFromChunk = null;
    diag.resumeFromParent = null;

    // Iterate by month for full mode (12 chunks) so each Owen-filtered window stays well under transport caps.
    // Narrow mode = single 7-day chunk.
    const chunks = mode === "narrow" ? 1 : 12;
    const now = (resumeFrom && resumeFrom.now) ? new Date(resumeFrom.now) : new Date();
    const stepDays = Math.ceil(days / chunks);
    const startChunk = (resumeFrom && typeof resumeFrom.nextChunkIdx === "number") ? resumeFrom.nextChunkIdx : 0;
    let interrupted = false;

    for (let i = startChunk; i < chunks; i++) {
      // chunksAttempted = high-water mark of i+1 across this run + any prior runs
      diag.chunksAttempted = Math.max(diag.chunksAttempted, i + 1);
      const startTime = new Date(now.getTime() - (i + 1) * stepDays * 86400000).toISOString();
      const endTime = new Date(now.getTime() - i * stepDays * 86400000).toISOString();
      let chunkInterrupted = false;
      try {
        // v3.2.5 — paginate via nextPageToken so we capture more than 50 events per chunk
        let pageToken = undefined;
        let pageNum = 0;
        const MAX_PAGES = 5;
        let chunkEvents = [];
        let chunkData = null;
        let chunkShape = "(unset)";
        do {
          const params = { startTime, endTime, fullText: OWNER_EMAIL, pageSize: 50, orderBy: "startTime" };
          if (pageToken) params.pageToken = pageToken;
          const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", params);
          const { data, shape } = unwrapMcp(evRaw);
          chunkData = data; chunkShape = shape;
          if (typeof data === "string") {
            // v3.4.6 — bridge interruption ("Artifact is not currently shown" or similar).
            // Mark this chunk failed (NOT succeeded) and pause so the user can Resume.
            diag.chunkErrors.push({ chunk: i, page: pageNum, msg: "API string response: " + data.slice(0, 100) });
            chunkInterrupted = true;
            break;
          }
          const evs = pickArr(data, "events") || pickArr(data, "items") || (Array.isArray(data) ? data : []);
          chunkEvents = chunkEvents.concat(evs);
          pageToken = data && data.nextPageToken;
          pageNum++;
          diag.pagesFetched = (diag.pagesFetched || 0) + 1;
        } while (pageToken && pageNum < MAX_PAGES);

        if (chunkInterrupted) {
          diag.chunksFailed++;
          diag.resumable = true;
          diag.resumeFromChunk = i;
          interrupted = true;
          break;
        }

        // Sample shape from the first successful chunk we ever record.
        if (!diag.sampleResponseShapes.length) {
          const keys = (chunkData && typeof chunkData === "object") ? Object.keys(chunkData).slice(0, 10) : [typeof chunkData];
          let preview = "";
          if (typeof chunkData === "string") preview = chunkData.slice(0, 400);
          else if (chunkData && typeof chunkData === "object") {
            try { preview = JSON.stringify(chunkData).slice(0, 400); } catch (e) { preview = "(unstringifiable)"; }
          } else preview = String(chunkData);
          diag.sampleResponseShapes.push({ chunk: i, shape: chunkShape, dataKeys: keys, dataIsArray: Array.isArray(chunkData), preview });
        }
        const events = chunkEvents;
        diag.chunksSucceeded++;
        if (!diag.chunkSucceededIndices.includes(i)) diag.chunkSucceededIndices.push(i);
        diag.eventsScanned += events.length;
        if (events.length > 0 && !diag.sampleEventKeys) {
          diag.sampleEventKeys = Object.keys(events[0]).slice(0, 12);
        }
        events.forEach(e => {
          // Path 1 (preferred): event IS the recurring parent, has a recurrence RRULE
          const isParent = Array.isArray(e.recurrence) && e.recurrence.length > 0;
          // Path 2 (fallback): event is an instance of a recurring series
          const rid = e.recurringEventId;
          if (!isParent && !rid) return;
          if (isParent) diag.eventsWithRecurrence = (diag.eventsWithRecurrence || 0) + 1;
          if (rid) diag.eventsWithRid++;
          const canonicalId = isParent ? e.id : rid;
          if (knownIds.has(canonicalId)) { diag.eventsKnownSkipped++; return; }
          const atts = (e.attendees || []).filter(a => !a.resource && a.email);
          if (atts.length < 3) { diag.eventsTooFewAttendees++; return; }
          if (atts.length === 1 && atts[0].email && atts[0].email.toLowerCase() === OWNER_EMAIL.toLowerCase()) { diag.eventsSoloOwen++; return; }
          if (!candidates[canonicalId]) {
            candidates[canonicalId] = {
              recurringEventId: canonicalId,
              sample: e,
              attendees: atts,
              isParent,
              recurrenceRule: isParent ? e.recurrence : null,
              occurrences: 0
            };
          }
          candidates[canonicalId].occurrences++;
        });
      } catch (err) {
        diag.chunksFailed++;
        const msg = err && err.message ? err.message : String(err);
        diag.chunkErrors.push({ chunk: i, msg: msg.slice(0, 200) });
        console.error("[discover] chunk failed", { i, err });
      }
    }
    diag.uniqueRids = Object.keys(candidates).length;
    diag.uniqueCandidates = Object.keys(candidates).length;

    // v3.4.6 — effective scan days: stepDays × (number of chunks that actually succeeded).
    // Used in the year extrapolation below so partial scans don't undershoot.
    const succeededCount = (diag.chunkSucceededIndices && diag.chunkSucceededIndices.length) || 0;
    const effectiveScanDays = Math.max(stepDays, succeededCount * stepDays);
    diag.effectiveScanDays = effectiveScanDays;

    // v3.2.5 — Fetch the recurring parent event for every instance-only candidate so we can read the RRULE
    // and estimate yearly frequency accurately. Cap at 100 fetches to bound runtime; sort by occurrence
    // count desc so the most-active candidates get RRULEs first.
    // v3.4.6 — supports resume via _parentFetched flag on each candidate.
    const needsParent = Object.values(candidates).filter(c => !c.isParent && !c.recurrenceRule);
    needsParent.sort((a, b) => b.occurrences - a.occurrences);
    const parentList = needsParent.slice(0, 100);
    diag.parentFetchAttempts = diag.parentFetchAttempts || 0;
    diag.parentFetchSucceeded = diag.parentFetchSucceeded || 0;
    diag.parentFetchWithRRULE = diag.parentFetchWithRRULE || 0;
    const startParent = (resumeFrom && typeof resumeFrom.nextParentIdx === "number") ? resumeFrom.nextParentIdx : 0;
    if (!interrupted) {
      for (let j = startParent; j < parentList.length; j++) {
        const cand = parentList[j];
        if (cand._parentFetched) continue;
        diag.parentFetchAttempts++;
        try {
          const parentRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__get_event", { eventId: cand.recurringEventId });
          const { data: parent } = unwrapMcp(parentRaw);
          if (typeof parent === "string") {
            // v3.4.6 — same bridge interruption pattern. Pause and offer Resume.
            diag.parentFetchAttempts--;  // it didn't actually run successfully
            diag.resumable = true;
            diag.resumeFromParent = j;
            interrupted = true;
            break;
          }
          cand._parentFetched = true;
          const parentEvent = parent && (parent.event || parent);
          if (!parentEvent) continue;
          diag.parentFetchSucceeded++;
          if (Array.isArray(parentEvent.recurrence) && parentEvent.recurrence.length) {
            cand.recurrenceRule = parentEvent.recurrence;
            diag.parentFetchWithRRULE++;
          }
          if (parentEvent.summary && !cand.sample.summary) cand.sample.summary = parentEvent.summary;
          const atts = (parentEvent.attendees || []).filter(a => !a.resource && a.email);
          if (atts.length > cand.attendees.length) cand.attendees = atts;
        } catch (e) {
          cand._parentFetched = true;  // don't retry on subsequent resumes
        }
      }
    }

    // Estimate occurrences/year from RRULE when available, otherwise extrapolate from the
    // EFFECTIVE scan window (only chunks that succeeded), not the requested window.
    Object.values(candidates).forEach(c => {
      if (c.recurrenceRule) c.estimatedYearlyOccurrences = estimateOccurrencesFromRRULE(c.recurrenceRule);
      else c.estimatedYearlyOccurrences = Math.round((c.occurrences / effectiveScanDays) * 365);
    });

    // Final filter: ≥12 estimated yearly occurrences for full mode; narrow mode is permissive
    const list = Object.values(candidates)
      .filter(c => c.attendees && c.attendees.length >= 3)
      .filter(c => mode === "narrow" || (c.estimatedYearlyOccurrences || 0) >= 12);

    // Similarity check vs existing committees (charter §"Rename / restart detection")
    list.forEach(cand => {
      let bestMatch = null, bestScore = 0;
      (STATE.committees || []).forEach(existing => {
        if (!existing.members || !existing.members.length) return;
        const exEmails = new Set(existing.members.map(m => (m.email || "").toLowerCase()));
        const candEmails = cand.attendees.map(a => (a.email || "").toLowerCase());
        const overlap = candEmails.filter(e => exEmails.has(e)).length;
        const overlapPct = candEmails.length ? overlap / candEmails.length : 0;
        if (overlapPct >= 0.8) { if (overlapPct > bestScore) { bestScore = overlapPct; bestMatch = existing; } }
      });
      if (bestMatch) cand.possibleRenameOf = bestMatch.id;
    });

    diag.candidatesPassingFilter = list.length;
    showSave("saved", list.length + " candidate" + (list.length === 1 ? "" : "s") + " (scanned " + diag.eventsScanned + " events" + (interrupted ? " — paused, click Resume" : "") + ")");

    // v3.4.6 — when interrupted, snapshot the in-progress state so Resume can pick it up.
    const result = {
      candidates: list,
      diag,
      ranAt: new Date().toISOString(),
      _resumeSnapshot: interrupted ? {
        mode,
        candidates,            // dict keyed by canonicalId — preserved across resumes
        diag,
        now: now.toISOString(),
        nextChunkIdx: diag.resumeFromChunk != null ? diag.resumeFromChunk : chunks,
        nextParentIdx: diag.resumeFromParent != null ? diag.resumeFromParent : 0
      } : null
    };
    discoveryCache = result;
    return result;
  }

  // Crude RRULE → estimated yearly occurrence count (good enough for ≥12/year filter)
  function estimateOccurrencesFromRRULE(rules) {
    const rrule = (rules || []).find(r => typeof r === "string" && r.toUpperCase().startsWith("RRULE:")) || "";
    const u = rrule.toUpperCase();
    const intMatch = u.match(/INTERVAL=(\d+)/);
    const interval = intMatch ? parseInt(intMatch[1], 10) : 1;
    const countMatch = u.match(/COUNT=(\d+)/);
    if (countMatch) return parseInt(countMatch[1], 10);
    if (u.includes("FREQ=DAILY")) return Math.floor(260 / interval);
    if (u.includes("FREQ=WEEKLY")) {
      const bydayMatch = u.match(/BYDAY=([A-Z,]+)/);
      const days = bydayMatch ? bydayMatch[1].split(",").length : 1;
      return Math.floor((52 * days) / interval);
    }
    if (u.includes("FREQ=MONTHLY")) return Math.floor(12 / interval);
    if (u.includes("FREQ=YEARLY")) return Math.floor(1 / interval);
    return 12;
  }

      box.append(ce("button", { class: "btn primary", onclick: async () => {
