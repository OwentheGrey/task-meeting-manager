  // TSKMGR-70 — Fetch calendar attendees for a recurring event. Strategy:
  // call list_events with the recurringEventId filter to find the NEXT instance
  // of that series, then read its attendees array. We prefer list_events over
  // get_event because list_events is what the rest of the artifact already
  // uses (proven pattern) and lets us scope to upcoming-only windows.
  // Resource calendars (rooms) are filtered out defensively.
  async function fetchCommitteeAttendees(recurringEventId) {
    if (!recurringEventId) return { ok: false, error: "no recurringEventId" };
    if (!window.cowork || typeof window.cowork.callMcpTool !== "function") {
      const msg = "MCP bridge unavailable (window.cowork.callMcpTool missing) — add attendees manually";
      console.warn("[TSKMGR-70 fetchCommitteeAttendees]", msg);
      try { showSave("error", msg); } catch (e) {}
      return { ok: false, error: msg };
    }
    console.log("[TSKMGR-70 fetchCommitteeAttendees] fetching for", recurringEventId);
    try {
      // Look 90 days forward — covers monthly/quarterly cadences. If the series
      // has no upcoming instance, fall back to get_event on the parent.
      const now = new Date().toISOString();
      const horizon = new Date(Date.now() + 90 * 86400000).toISOString();
      let attendees = null;
      let pickedEvent = null;

      const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", {
        startTime: now,
        endTime: horizon,
        pageSize: 50,
        orderBy: "startTime"
      });
      const { data } = unwrapMcp(evRaw);
      if (typeof data === "string") {
        try { showSave("error", "Calendar MCP bridge interrupted — try again"); } catch (e) {}
        return { ok: false, error: "bridge string response: " + data.slice(0, 100) };
      }
      const events = pickArr(data, "events") || pickArr(data, "items") || (Array.isArray(data) ? data : []);
      // First match wins (orderBy:startTime → earliest upcoming instance)
      pickedEvent = events.find(e => e && (e.recurringEventId === recurringEventId || e.id === recurringEventId));
      if (pickedEvent && Array.isArray(pickedEvent.attendees)) {
        attendees = pickedEvent.attendees;
      }

      // Fallback: try get_event on the parent series ID directly.
      // This tool may not be in the Cowork mcpTools allowlist — handle gracefully.
      if (!attendees) {
        try {
          const parentRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__get_event", { eventId: recurringEventId });
          const { data: parent } = unwrapMcp(parentRaw);
          if (typeof parent === "string" && /not in this artifact/i.test(parent)) {
            console.warn("[TSKMGR-70] get_event not in allowlist; skipping fallback");
          } else if (typeof parent === "string") {
            console.warn("[TSKMGR-70] get_event returned string:", parent.slice(0, 200));
          } else {
            const parentEvent = parent && (parent.event || parent);
            if (parentEvent && Array.isArray(parentEvent.attendees)) {
              attendees = parentEvent.attendees;
              pickedEvent = parentEvent;
            }
          }
        } catch (gErr) {
          console.warn("[TSKMGR-70] get_event fallback failed (may not be in allowlist):", (gErr && gErr.message) || gErr);
        }
      }

      // Second fallback: search past events to find a recent instance with attendees
      if (!attendees) {
        try {
          const pastStart = new Date(Date.now() - 90 * 86400000).toISOString();
          const pastEnd = new Date().toISOString();
          const pastRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", {
            startTime: pastStart, endTime: pastEnd, pageSize: 100, orderBy: "startTime"
          });
          const { data: pastData } = unwrapMcp(pastRaw);
          if (pastData && typeof pastData !== "string") {
            const pastEvents = pickArr(pastData, "events") || pickArr(pastData, "items") || (Array.isArray(pastData) ? pastData : []);
            const pastMatch = pastEvents.find(function (e) { return e && (e.recurringEventId === recurringEventId || e.id === recurringEventId); });
            if (pastMatch && Array.isArray(pastMatch.attendees)) {
              attendees = pastMatch.attendees;
              pickedEvent = pastMatch;
              console.log("[TSKMGR-70] found attendees from past event instance");
            }
          }
        } catch (pErr) {
          console.warn("[TSKMGR-70] past-events fallback failed:", (pErr && pErr.message) || pErr);
        }
      }

      if (!attendees) {
        const msg = "No event instance found with attendees. Ensure the recurring event ID is correct, or add attendees manually.";
        console.warn("[TSKMGR-70 fetchCommitteeAttendees]", msg, recurringEventId);
        try { showSave("error", msg); } catch (e) {}
        return { ok: false, error: msg };
      }

      // Filter out resource bookings (rooms) and bare entries with no identity
      const cleaned = attendees.filter(a => {
        if (!a) return false;
        if (a.resource === true) return false;
        const em = (a.email || "").toLowerCase();
        if (!em && !a.displayName) return false;
        // Defensive: skip resource calendar emails
        if (em.includes(".resource.calendar.google.com")) return false;
        return true;
      }).map(a => ({
        email: a.email || null,
        displayName: a.displayName || a.email || null,
        responseStatus: a.responseStatus || null,
        source: "calendar"
      }));

      // Merge manual entries from prior cache so manual adds survive a refresh.
      const existing = (STATE.committeeAttendees || {})[recurringEventId];
      const seenKeys = new Set(cleaned.map(a => ((a.email || a.displayName) || "").toLowerCase()));
      const manualKept = (existing && Array.isArray(existing.attendees))
        ? existing.attendees.filter(a => a && a.source === "manual" && !seenKeys.has(((a.email || a.displayName) || "").toLowerCase()))
        : [];
      const merged = cleaned.concat(manualKept);
      setCommitteeAttendees(recurringEventId, merged);
      console.log("[TSKMGR-70 fetchCommitteeAttendees] cached", merged.length, "attendees (", cleaned.length, "calendar +", manualKept.length, "manual) for", recurringEventId);
      return { ok: true, count: merged.length, calendarCount: cleaned.length, manualKept: manualKept.length };
    } catch (e) {
      console.warn("[TSKMGR-70 fetchCommitteeAttendees] threw:", e);
      try { showSave("error", "Calendar MCP threw: " + ((e && e.message) || String(e))); } catch (toastErr) {}
      return { ok: false, error: (e && e.message) || String(e) };
    }
  }

  // TSKMGR-45 — Hybrid fetch (option (c) from the implementation brief).
  //
  // There is NO first-class "list channel members" Slack MCP tool available today.
  // The closest workable approach is to call `slack_read_channel` and derive
  // distinct posters from recent messages. This is incomplete (lurkers and recent
  // joiners with no posts won't appear) — the manual-add UI fills that gap.
  //
  // TODO TSKMGR-45 — swap to a true `conversations.members` Slack API when an MCP
  // surface exists. The cache shape and downstream consumers stay the same.

  // Helper: extract text from any Cowork bridge MCP response shape.
  // The bridge can return raw strings, JSON-wrapped strings, MCP content arrays,
  // or { content: [{ type:"text", text:"..." }] } envelopes.
  function _unwrapMcpText(raw) {
    if (raw == null) return { text: "", error: null, pagination: "" };
    var error = null;
    // 1) String — might be JSON or raw text
    if (typeof raw === "string") {
      var p = null;
      try { p = JSON.parse(raw); } catch (_) {}
      if (p) return _unwrapMcpText(p);
      if (/not in this artifact/i.test(raw) || /allowlist/i.test(raw)) error = raw;
      return { text: raw, error: error, pagination: "" };
    }
    // 2) Array — MCP content items: [{ type:"text", text:"..." }]
    if (Array.isArray(raw)) {
      var parts = [];
      for (var i = 0; i < raw.length; i++) {
        if (raw[i] && typeof raw[i].text === "string") parts.push(raw[i].text);
        else if (typeof raw[i] === "string") parts.push(raw[i]);
      }
      var joined = parts.join("\n");
      // Inner text might be JSON wrapping actual result
      try { var inner = JSON.parse(joined); if (inner && typeof inner === "object") return _unwrapMcpText(inner); } catch (_) {}
      return { text: joined, error: null, pagination: "" };
    }
    // 3) Object
    if (typeof raw === "object") {
      // Error objects
      if (raw.isError === true || raw.ok === false) {
        error = raw.error || (raw.content && raw.content[0] && raw.content[0].text) || "MCP error";
        return { text: "", error: String(error), pagination: "" };
      }
      // Direct result: { messages:"...", pagination_info:"..." } or { results:"...", pagination_info:"..." }
      var directText = raw.messages || raw.results || null;
      if (typeof directText === "string") {
        return { text: directText, error: null, pagination: raw.pagination_info || "" };
      }
      // MCP envelope: { content: [{ type:"text", text:"..." }] }
      if (raw.content && Array.isArray(raw.content)) {
        var parts = [];
        for (var i = 0; i < raw.content.length; i++) {
          if (raw.content[i] && typeof raw.content[i].text === "string") parts.push(raw.content[i].text);
        }
        var joined = parts.join("\n");
        // Inner text might be JSON wrapping the actual result
        try {
          var inner = JSON.parse(joined);
          if (inner && typeof inner === "object") return _unwrapMcpText(inner);
        } catch (_) {}
        return { text: joined, error: null, pagination: raw.pagination_info || "" };
      }
    }
    return { text: "", error: null, pagination: "" };
  }

  async function fetchChannelMembers(channelId, options) {
    options = options || {};
    if (!channelId) return { ok: false, error: "no channel id" };
    // Normalize: extract bare channel ID from Slack archive URLs
    var urlMatch = String(channelId).match(/archives\/([A-Z0-9]+)/);
    if (urlMatch) channelId = urlMatch[1];
    if (!window.cowork || typeof window.cowork.callMcpTool !== "function") {
      const msg = "MCP bridge unavailable (window.cowork.callMcpTool missing) — add members manually";
      console.warn("[TSKMGR-45 fetchChannelMembers]", msg);
      try { showSave("error", msg); } catch (e) {}
      return { ok: false, error: msg };
    }
    var lookbackDays = (typeof options.lookbackDays === "number" && options.lookbackDays > 0) ? options.lookbackDays : 90;
    var oldestSec = Math.floor((Date.now() - lookbackDays * 24 * 60 * 60 * 1000) / 1000);
    var allText = "";
    var pageCount = 0;
    var usedSearch = false;

    try {
      // ── Phase 1: try slack_read_channel (preferred — returns full history) ──
      var readOk = false;
      try {
        var cursor = null;
        do {
          var callArgs = { channel_id: channelId, limit: 100, oldest: String(oldestSec), response_format: "detailed" };
          if (cursor) callArgs.cursor = cursor;
          console.log("[TSKMGR-45] read_channel page", pageCount + 1, "for", channelId);
          var raw = await window.cowork.callMcpTool("mcp__41e23f2c-10b6-43fa-ae26-3ec63b9776d0__slack_read_channel", callArgs);
          var unwrapped = _unwrapMcpText(raw);
          console.log("[TSKMGR-45] read_channel unwrapped:", unwrapped.text.substring(0, 200), "error:", unwrapped.error);
          if (unwrapped.error) {
            if (/allowlist|not in this artifact/i.test(unwrapped.error)) throw new Error("ALLOWLIST_BLOCK");
            throw new Error(unwrapped.error);
          }
          if (!unwrapped.text) break;
          allText += "\n" + unwrapped.text;
          cursor = null;
          var pi = unwrapped.pagination;
          if (typeof pi === "string" && /next_cursor/.test(pi)) {
            var cm = pi.match(/next_cursor[:\s]*["']?([^\s"'\n]+)/);
            if (cm) cursor = cm[1];
          } else if (pi && typeof pi === "object" && pi.next_cursor) { cursor = pi.next_cursor; }
          pageCount++;
        } while (cursor && pageCount < 5);
        readOk = true;
      } catch (rcErr) {
        var rcMsg = (rcErr && rcErr.message) || String(rcErr);
        if (rcMsg.indexOf("ALLOWLIST_BLOCK") !== -1 || rcMsg.indexOf("allowlist") !== -1 || rcMsg.indexOf("not in this artifact") !== -1) {
          console.warn("[TSKMGR-45] slack_read_channel blocked by Cowork allowlist cache — falling back to search");
          allText = "";
          pageCount = 0;
        } else {
          throw rcErr;
        }
      }

      // ── Phase 2: fallback — slack_search_public_and_private (always in original allowlist) ──
      if (!readOk) {
        usedSearch = true;
        var chFilter = options.channelName ? ("in:#" + options.channelName) : ("in:<#" + channelId + ">");
        var sCursor = null;
        var sPages = 0;
        do {
          var sArgs = { query: chFilter, sort: "timestamp", sort_dir: "desc", limit: 20, after: String(oldestSec), include_context: false, include_bots: false };
          if (sCursor) sArgs.cursor = sCursor;
          console.log("[TSKMGR-45] search fallback page", sPages + 1, "query:", chFilter);
          var sRaw = await window.cowork.callMcpTool("mcp__41e23f2c-10b6-43fa-ae26-3ec63b9776d0__slack_search_public_and_private", sArgs);
          var sUnwrapped = _unwrapMcpText(sRaw);
          console.log("[TSKMGR-45] search unwrapped:", sUnwrapped.text.substring(0, 200), "error:", sUnwrapped.error);
          if (sUnwrapped.error) {
            console.warn("[TSKMGR-45] search error:", sUnwrapped.error);
            try { showSave("error", "Slack search error: " + sUnwrapped.error); } catch (e) {}
            return { ok: false, error: sUnwrapped.error };
          }
          allText += "\n" + sUnwrapped.text;
          sCursor = null;
          var spi = sUnwrapped.pagination;
          if (typeof spi === "string" && /cursor/.test(spi)) {
            var scm = spi.match(/cursor\s+[`"']?([^\s`"'\n]+)/);
            if (scm) sCursor = scm[1];
          }
          sPages++;
          pageCount = sPages;
          if (!sUnwrapped.text || sUnwrapped.text.indexOf("0 results") !== -1) break;
        } while (sCursor && sPages < 10);
      }

      // ── Phase 3: parse text — handle both response formats ──
      var seen = new Map();
      // read_channel format: "Message from NAME (USERID) at DATE"
      var re1 = /Message from (.+?) \(([A-Z0-9]+)\) at /g;
      var m1;
      while ((m1 = re1.exec(allText)) !== null) {
        if (m1[2] === "USLACKBOT") continue;
        if (!seen.has(m1[2].toLowerCase())) seen.set(m1[2].toLowerCase(), { slackUserId: m1[2], name: m1[1], displayName: m1[1], email: null, source: "slack_read_channel" });
      }
      // search format: "From: NAME (ID: USERID)"
      var re2 = /From: (.+?) \(ID: ([A-Z0-9]+)\)/g;
      var m2;
      while ((m2 = re2.exec(allText)) !== null) {
        if (m2[2] === "USLACKBOT") continue;
        if (!seen.has(m2[2].toLowerCase())) seen.set(m2[2].toLowerCase(), { slackUserId: m2[2], name: m2[1], displayName: m2[1], email: null, source: "slack_search" });
      }
      // read_thread format: "From: NAME (USERID)" (no "ID:" prefix)
      var re3 = /From: (.+?) \(([A-Z0-9]+)\)/g;
      var m3;
      while ((m3 = re3.exec(allText)) !== null) {
        if (m3[2] === "USLACKBOT") continue;
        if (!seen.has(m3[2].toLowerCase())) seen.set(m3[2].toLowerCase(), { slackUserId: m3[2], name: m3[1], displayName: m3[1], email: null, source: "slack_read_thread" });
      }

      // ── Phase 4: thread replies (only for read_channel path — search already includes them) ──
      if (readOk) {
        var threadTsList = [];
        var blocks = allText.split(/(?==== Message from)/);
        for (var bi = 0; bi < blocks.length; bi++) {
          if (/Thread: \d+ repl/.test(blocks[bi])) {
            var tsM = blocks[bi].match(/Message TS: ([\d.]+)/);
            if (tsM) threadTsList.push(tsM[1]);
          }
        }
        if (threadTsList.length > 0) {
          console.log("[TSKMGR-45] fetching", threadTsList.length, "threads for participants");
          for (var ti = 0; ti < threadTsList.length && ti < 10; ti++) {
            try {
              var tRaw = await window.cowork.callMcpTool("mcp__41e23f2c-10b6-43fa-ae26-3ec63b9776d0__slack_read_thread", {
                channel_id: channelId, message_ts: threadTsList[ti]
              });
              var tParsed = tRaw;
              if (typeof tRaw === "string") { try { tParsed = JSON.parse(tRaw); } catch (_) { tParsed = { messages: tRaw }; } }
              var tText = (tParsed && typeof tParsed.messages === "string") ? tParsed.messages : "";
              var tRe = /From: (.+?) \(([A-Z0-9]+)\)/g;
              var tm;
              while ((tm = tRe.exec(tText)) !== null) {
                if (tm[2] === "USLACKBOT") continue;
                if (!seen.has(tm[2].toLowerCase())) seen.set(tm[2].toLowerCase(), { slackUserId: tm[2], name: tm[1], displayName: tm[1], email: null, source: "slack_read_thread" });
              }
            } catch (te) {
              console.warn("[TSKMGR-45] thread fetch failed for ts", threadTsList[ti], "—", (te && te.message) || te);
            }
          }
        }
      }

      console.log("[TSKMGR-45] extracted", seen.size, "unique members via", usedSearch ? "search fallback" : "read_channel", "(" + pageCount + " pages)");
      var existing = (STATE.slackChannelMembers || {})[channelId];
      var manualOnly = (existing && Array.isArray(existing.members))
        ? existing.members.filter(function (m) { return m && m.source === "manual" && !seen.has(((m.slackUserId || m.email || m.name) || "").toLowerCase()); })
        : [];
      var merged = Array.from(seen.values()).concat(manualOnly);
      setChannelMembers(channelId, merged, merged.length === manualOnly.length ? "manual" : "hybrid");
      return { ok: true, count: merged.length, derivedCount: seen.size, manualKept: manualOnly.length, pageCount: pageCount, usedSearch: usedSearch, lookbackDays: lookbackDays };
    } catch (e) {
      console.warn("[TSKMGR-45 fetchChannelMembers] threw:", e);
      try { showSave("error", "Slack MCP threw: " + ((e && e.message) || String(e))); } catch (toastErr) {}
      return { ok: false, error: (e && e.message) || String(e) };
    }
  }

  // TSKMGR-47 — Slack nudge helper. Tries the deep link if we have a slackUserId,
  // falls back to clipboard + toast.
  // TODO TSKMGR-47 future — broken Slack handle warning when slackUserId resolves to a stale ID.
  function _jiraKeyFor(item) {
    if (!item) return null;
    if (item.verifyVia && item.verifyVia.type === "jira_ticket_assignee" && item.verifyVia.key) return item.verifyVia.key;
    // Best-effort: scan tags for project-like keys
    if (Array.isArray(item.tags)) {
      const k = item.tags.find(t => /^[A-Z]{2,8}-\d+$/.test(t));
      if (k) return k;
    }
    return null;
  }
  function _nudgeMessageForItems(items) {
    // Multi-item bundle
    if (items.length === 1) {
      const item = items[0];
      const key = _jiraKeyFor(item);
      const ref = key ? key : (item.text || item.title || "this ticket");
      return "Hey " + ref + " needs to get tested in the next couple of days. Do you have time to run a test today?";
    }
    const lines = items.map(it => "• " + (_jiraKeyFor(it) || it.text || it.title || "(untitled)"));
    return "Hey, these need to get tested in the next couple of days. Do you have time to run a test today?\n" + lines.join("\n");
  }
  function _openSlackForTester(testerValue, message) {
    const entry = _findTesterEntry(testerValue);
    if (entry && entry.slackUserId) {
      // Best-effort deep link. The browser may or may not have Slack installed; we try anyway.
      const url = "slack://user?id=" + encodeURIComponent(entry.slackUserId);
      try { window.open(url, "_blank"); } catch (e) {}
    }
    // Always copy the message text to clipboard as a fallback for paste.
    try {
      if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(message);
      }
    } catch (e) {}
    showSave("saved", "Message copied — open Slack and paste.");
  }
  function nudgeTester(item) {
    if (!item || !item.uatTester) return;
    const msg = _nudgeMessageForItems([item]);
    _openSlackForTester(item.uatTester, msg);
  }
  function nudgeTesterBundle(testerValue, items) {
    if (!testerValue || !items || !items.length) return;
    const msg = _nudgeMessageForItems(items);
    _openSlackForTester(testerValue, msg);
  }

  // TSKMGR-44 — This Week window logic
  // Returns { start: Date, end: Date, label: string, includeAfternoonOnEnd: bool }
  function computeThisWeekWindow(now) {
    now = now || new Date();
    const start = new Date(now);
    start.setHours(0,0,0,0);
    // Roll back to Monday (or stay if already Monday)
    const dayIdx = (start.getDay() + 6) % 7; // Mon=0..Sun=6
    start.setDate(start.getDate() - dayIdx);
    // Default end: next Monday at 12:00 (noon)
    const end = new Date(start);
    end.setDate(end.getDate() + 7);
    end.setHours(12, 0, 0, 0);

    // TODO TSKMGR-44 (future): heavy-morning detector — if 3/4 hours 8am–12pm on next Monday are blocked,
    // extend window to include Monday-afternoon tasks. Requires live Google Calendar access.
    const includeAfternoonOnEnd = false;

    // TODO TSKMGR-44 (future): holiday detector — if next Monday is a holiday by ALL three signals
    // (Google all-day named holiday + AIA master cal + OOO block >5h), shift window to Tuesday.
    // Requires live calendar feed integrations — defaulting to Monday-to-Monday for now.

    const label = "Mon " + fmtDate(start.toISOString()) + " – Mon " + fmtDate(end.toISOString()) + " 12pm";
    return { start, end, label, includeAfternoonOnEnd };
  }

  function inThisWeekWindow(item, win) {
    if (!item || !item.dueBy) return false;
    if (item.status === "done" || item.status === "cancelled" || item.completed) {
      // Done items stay for the day they got done; sweep happens at midnight (TSKMGR-54, Wave 2)
      if (!item.done_at) return false;
      const d = new Date(item.done_at);
      const today = new Date(); today.setHours(0,0,0,0);
      return d.getTime() >= today.getTime();
    }
    const due = new Date(item.dueBy);
    if (isNaN(due.getTime())) return false;
    if (due.getTime() < win.start.getTime()) {
      // Overdue items still pop into This Week — they should be addressed this week
      return true;
    }
    return due.getTime() <= win.end.getTime();
  }

  const PRIORITY_RANK = { must: 0, should: 1, nice: 2 };
  function comparePriorityThenDue(a, b) {
    const pa = PRIORITY_RANK[a.item.priority || "should"] ?? 1;
    const pb = PRIORITY_RANK[b.item.priority || "should"] ?? 1;
    if (pa !== pb) return pa - pb;
    const da = a.item.dueBy ? new Date(a.item.dueBy).getTime() : Infinity;
    const db = b.item.dueBy ? new Date(b.item.dueBy).getTime() : Infinity;
    return da - db;
  }

  // Collect every task across partners + committees + (later) projects
  // For partner commitments we include `lane` on source so renderTaskRow can derive
  // the correct assignee chip (TSKMGR-44 polish — Wave 1 default of "Owen" was wrong
  // for partnerToOwner items; lane carries the direction info).
  function collectMyTasksAll() {
    const out = [];
    (STATE.partners || []).forEach(p => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        ((p.commitments && p.commitments[lane]) || []).forEach(c => {
          out.push({ item: c, source: { kind: "partner", id: p.id, name: p.name || "(partner)", lane }, itemType: "commitment" });
        });
      });
      (p.agenda || []).forEach(a => {
        if (a.dueBy) out.push({ item: a, source: { kind: "partner", id: p.id, name: p.name || "(partner)" }, itemType: "agenda" });
      });
    });
    (STATE.committees || []).forEach(co => {
      (co.actionItems || []).forEach(a => {
        out.push({ item: a, source: { kind: "committee", id: co.id, name: co.name || "(committee)" }, itemType: "action" });
      });
      (co.agenda || []).forEach(a => {
        if (a.dueBy) out.push({ item: a, source: { kind: "committee", id: co.id, name: co.name || "(committee)" }, itemType: "agenda" });
      });
    });
    // TSKMGR-65 — project-rooted action items. Filter to non-done projects (codebase uses
    // "done" as the inactive status; the ticket called this "archived" but no such status exists
    // in the project model). No `lane` field (projects don't have lanes).
    (STATE.projects || []).filter(pr => pr.status !== "done").forEach(pr => {
      (pr.actionItems || []).forEach(a => {
        out.push({ item: a, source: { kind: "project", id: pr.id, name: pr.name || "(project)" }, itemType: "action" });
      });
    });
    return out;
  }

  function gotoTaskSource(entry) {
    const src = entry.source;
    if (!src) return;
    if (src.kind === "committee") {
      STATE.selectedCommitteeId = src.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
    } else if (src.kind === "project") {
      STATE.selectedProjectId = src.id; STATE.selectedKind = "project"; STATE.selectedView = "project";
    } else {
      STATE.selectedPartnerId = src.id; STATE.selectedKind = "partner"; STATE.selectedView = "partner";
    }
    renderRoster(); renderDossier();
  }

  // TSKMGR-44 — This Week panel
  function renderThisWeekPanel(panel) {
    // TSKMGR-54 — sweep moved into renderMyTasksView so every tab benefits
    const win = computeThisWeekWindow();
    panel.append(ce("div", { class: "mytasks-window-label" }, "Window: " + win.label));

    const entries = collectMyTasksAll().filter(e => inThisWeekWindow(e.item, win));
    if (!entries.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "Nothing on the plate this week. Enjoy the breathing room."));
      return;
    }

    // Sort: active items by priority then due; done/cancelled to the bottom
    entries.sort((a, b) => {
      const adone = (a.item.status === "done" || a.item.status === "cancelled" || a.item.completed) ? 1 : 0;
      const bdone = (b.item.status === "done" || b.item.status === "cancelled" || b.item.completed) ? 1 : 0;
      if (adone !== bdone) return adone - bdone;
      return comparePriorityThenDue(a, b);
    });

    const list = ce("div", { class: "mytasks-list" });
    entries.forEach(e => {
      list.append(renderTaskRow(e.item, e.source, { onNavigate: () => gotoTaskSource(e) }, { itemType: e.itemType }));
    });
    panel.append(list);
  }

  // TSKMGR-78 — All Tasks panel: every open task grouped by the week of its due date
  function renderAllTasksPanel(panel) {
    // TSKMGR-87 — filter to Owen's tasks only (unassigned or explicitly assigned to Owen)
    const allEntries = collectMyTasksAll();
    const entries = allEntries.filter(e => {
      const ae = e.item.assigneeEmail;
      return !ae || ae.toLowerCase() === OWNER_EMAIL.toLowerCase();
    });
    if (!entries.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "No tasks found across any partner, committee, or project."));
      return;
    }

    // Separate active vs done/cancelled
    const active = [];
    const done = [];
    entries.forEach(e => {
      var it = e.item;
      if (it.status === "done" || it.status === "cancelled" || it.completed) { done.push(e); }
      else { active.push(e); }
    });

    // Compute the Monday of the week a date falls in (Mon-Sun weeks)
    var NO_DATE_KEY = "no-date";
    function mondayOfWeek(isoDate) {
      var d = new Date(isoDate);
      if (isNaN(d.getTime())) return null;
      d.setHours(0, 0, 0, 0);
      var dayIdx = (d.getDay() + 6) % 7; // Mon=0..Sun=6
      d.setDate(d.getDate() - dayIdx);
      return d.toISOString().slice(0, 10);
    }

    // Group active entries by Monday key
    var groups = {};
    var groupOrder = [];
    active.forEach(e => {
      var key = e.item.dueBy ? (mondayOfWeek(e.item.dueBy) || NO_DATE_KEY) : NO_DATE_KEY;
      if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
      groups[key].push(e);
    });

    // Sort each group internally
    Object.keys(groups).forEach(k => groups[k].sort(comparePriorityThenDue));

    // Sort group keys chronologically; no-date last
    groupOrder.sort(function (a, b) {
      if (a === NO_DATE_KEY) return 1;
      if (b === NO_DATE_KEY) return -1;
      return a < b ? -1 : a > b ? 1 : 0;
    });

    // This week's Monday for labels
    var today = new Date(); today.setHours(0, 0, 0, 0);
    var todayDayIdx = (today.getDay() + 6) % 7;
    var thisMonday = new Date(today);
    thisMonday.setDate(thisMonday.getDate() - todayDayIdx);
    var thisMondayKey = thisMonday.toISOString().slice(0, 10);

    // Render each week group
    groupOrder.forEach(function (key) {
      var items = groups[key];
      var isOverdue = key !== NO_DATE_KEY && key < thisMondayKey;
      var section = ce("div", { class: "all-tasks-week-group" + (isOverdue ? " overdue-group" : "") });

      var headerText;
      if (key === NO_DATE_KEY) {
        headerText = "No due date";
      } else {
        var mon = new Date(key + "T00:00:00");
        var sun = new Date(mon); sun.setDate(sun.getDate() + 6);
        var monLabel = fmtDate(mon.toISOString());
        var sunLabel = fmtDate(sun.toISOString());
        if (key === thisMondayKey) {
          headerText = "This week · " + monLabel + " – " + sunLabel;
        } else if (isOverdue) {
          headerText = "Overdue · " + monLabel + " – " + sunLabel;
        } else {
          headerText = monLabel + " – " + sunLabel;
        }
      }

      section.append(ce("div", { class: "all-tasks-week-header" }, [
        ce("span", {}, headerText),
        ce("span", { class: "count" }, "(" + items.length + ")")
      ]));

      var list = ce("div", { class: "mytasks-list" });

      // TSKMGR-79 — render duplicate clusters first, then non-clustered tasks.
      var clusters = [];
      try { clusters = (typeof dedupDetectClusters === "function") ? dedupDetectClusters() : []; } catch (e) {}
      var clusterEntryRefs = new Set();
      var clustersInThisGroup = [];
      clusters.forEach(function (cluster) {
        var membersInGroup = cluster.entries.filter(function (ce) { return items.indexOf(ce) >= 0; });
        if (membersInGroup.length >= 2) {
          clustersInThisGroup.push({ cluster: cluster, members: membersInGroup });
          membersInGroup.forEach(function (m) { clusterEntryRefs.add(m); });
        }
      });
      clustersInThisGroup.forEach(function (info) {
        var groupBox = ce("div", { class: "dedup-group" });
        var head = ce("div", { class: "dedup-group-head" });
        head.append(ce("span", {}, "Possible duplicates (" + info.members.length + ")"));
        head.append(ce("span", { class: "dedup-conf" }, Math.round(info.cluster.confidence * 100) + "% match"));
        groupBox.append(head);
        info.members.forEach(function (e) {
          groupBox.append(renderTaskRow(e.item, e.source, { onNavigate: function () { gotoTaskSource(e); } }, { itemType: e.itemType, allViewExtras: true }));
        });
        var actions = ce("div", { class: "dedup-group-actions" });
        actions.append(ce("button", { class: "btn btn-primary", onclick: function () { dedupOpenMergeDialog({ entries: info.members, confidence: info.cluster.confidence, methods: info.cluster.methods }); } }, "Merge"));
        actions.append(ce("button", { class: "btn", onclick: function () { dedupRejectCluster(info.members); persistState("Reject duplicate cluster (TSKMGR-79)"); renderRoster(); renderDossier(); } }, "Not a duplicate"));
        groupBox.append(actions);
        list.append(groupBox);
      });
      items.forEach(function (e) {
        if (clusterEntryRefs.has(e)) return; // already rendered inside a cluster
        list.append(renderTaskRow(e.item, e.source, { onNavigate: function () { gotoTaskSource(e); } }, { itemType: e.itemType, allViewExtras: true }));
      });
      section.append(list);
      panel.append(section);
    });

    // Done/cancelled at the bottom (collapsed)
    if (done.length) {
      var doneSection = ce("div", { class: "all-tasks-week-group done-group" });
      doneSection.append(ce("div", { class: "all-tasks-week-header" }, [
        ce("span", {}, "Completed / Cancelled"),
        ce("span", { class: "count" }, "(" + done.length + ")")
      ]));
      var dList = ce("div", { class: "mytasks-list" });
      done.sort(comparePriorityThenDue);
      done.forEach(function (e) {
        dList.append(renderTaskRow(e.item, e.source, { onNavigate: function () { gotoTaskSource(e); } }, { itemType: e.itemType, allViewExtras: true }));
      });
      doneSection.append(dList);
      panel.append(doneSection);
    }
  }

  function renderMyTasksPlaceholder(panel, wave, ticket, title) {
    panel.append(ce("div", { class: "mytasks-panel-empty" }, title + " — coming in " + wave + " (" + ticket + ")."));

  // ============================================================
  // TSKMGR-51 — Needs Attention view (Wave 2)
  // ============================================================
  // Three sub-groups:
  //   1. "Need a date" — claude_low items + user-priority "must" with no dueBy
  //   2. "Recently added Must*" — Claude-assigned musts since last PLAN MY WEEK ritual
  //   3. "Need clarification" — items flagged item.clarificationNeeded (rare for Wave 2)

  function _isReviewed(item) {
    return !!(item && item.reviewedAt);
  }

  function _qualifiesNeedADate(entry) {
    const it = entry.item;
    if (!it) return false;
    if (it.status === "done" || it.status === "cancelled" || it.completed) return false;
    // Claude-suggested with low confidence (yellow band) — needs user confirmation
    if (it.dueBySource === "claude_low") return true;
    // User-confirmed Must with no due date — bubble up so it gets dated
    if (it.priority === "must" && !it.dueBy && it.dueBySource !== "claude_low" && !it.aiSuggested) return true;
    return false;
  }

  function _qualifiesRecentlyAddedMust(entry) {
    const it = entry.item;
    if (!it) return false;
    if (it.status === "done" || it.status === "cancelled" || it.completed) return false;
    if (!it.aiSuggested) return false;
    if (it.priority !== "must") return false;
    if (_isReviewed(it)) return false;
    const ritualAt = STATE.lastPlanMyWeekRitualAt; // may be null — treat as "since forever"
    if (!ritualAt) return true;
    if (!it.created_at) return true; // no created_at means we can't compare; show conservatively
    return new Date(it.created_at).getTime() > new Date(ritualAt).getTime();
  }

  function _qualifiesNeedClarification(entry) {
    const it = entry.item;
    if (!it) return false;
    if (it.status === "done" || it.status === "cancelled" || it.completed) return false;
    return it.clarificationNeeded === true;
  }

  function collectNeedsAttention() {
    const all = collectMyTasksAll();
    const groups = { needDate: [], recentMust: [], needClarify: [] };
    all.forEach(e => {
      if (_qualifiesNeedADate(e)) groups.needDate.push(e);
      else if (_qualifiesRecentlyAddedMust(e)) groups.recentMust.push(e); // mutually exclusive — date issue trumps
      if (_qualifiesNeedClarification(e)) groups.needClarify.push(e);
    });
    const sorter = (a, b) => {
      const pa = PRIORITY_RANK[a.item.priority || "should"] ?? 1;
      const pb = PRIORITY_RANK[b.item.priority || "should"] ?? 1;
      if (pa !== pb) return pa - pb;
      const ca = a.item.created_at ? new Date(a.item.created_at).getTime() : Infinity;
      const cb = b.item.created_at ? new Date(b.item.created_at).getTime() : Infinity;
      return ca - cb; // oldest first
    };
    groups.needDate.sort(sorter);
    groups.recentMust.sort(sorter);
    groups.needClarify.sort(sorter);
    return groups;
  }

  function countNeedsAttention() {
    const g = collectNeedsAttention();
    return g.needDate.length + g.recentMust.length + g.needClarify.length;
  }

  // Triage handlers (TSKMGR-51)
  function naAcceptItem(entry) {
    const it = entry.item;
    // Accept = promote suggested date to confirmed user date AND mark reviewed
    if (it.dueBySource === "claude_low" || it.dueBySource === "claude_high") {
      it.dueBySource = "user";
    } else if (!it.dueBySource && it.dueBy) {
      it.dueBySource = "user";
    }
    it.reviewedAt = nowIso();
    persistState("Accept Needs-Attention item");
    renderDossier();
  }

  function naDismissItem(entry) {
    const it = entry.item;
    it.status = "cancelled";
    if (typeof stampDone === "function") {
      try { stampDone(it); } catch (e) { it.done_at = it.done_at || nowIso(); }
    } else {
      it.done_at = it.done_at || nowIso();
    }
    it.reviewedAt = nowIso();
    persistState("Dismiss Needs-Attention item");
    renderDossier();
  }

  function naMarkReviewedOnEdit(entry) {
    // Called when any inline edit happens on a Needs-Attention row.
    entry.item.reviewedAt = nowIso();

  // ============================================================
  // TSKMGR-48 — Must Tasks view (Wave 2)
  // ============================================================
  function _isUatTagged(item) {
    // TSKMGR-47 — proper UAT detection now lands via uatColumn. Falls back to the legacy
    // tag-based convention for items that haven't been migrated (uatColumn missing/null).
    if (!item) return false;
    if (item.uatColumn === "test1" || item.uatColumn === "test2") return true;
    // Legacy fallback — items that were tagged "UAT" before the column model existed.
    return Array.isArray(item.tags) && item.tags.includes("UAT");
  }

  function collectMustTasks() {
    return collectMyTasksAll().filter(e => {
      const it = e.item;
      if (!it) return false;
      if (it.priority !== "must") return false;
      if (!it.dueBy) return false; // undated Musts route to Needs Attention "Need a date"
      if (_isUatTagged(it)) return false;
      if (it.status === "done" || it.status === "cancelled" || it.completed) {
        // Done/cancelled today: keep visible & faded; older: handled by archive sweep
        if (!it.done_at) return false;
        const d = new Date(it.done_at);
        const today = new Date(); today.setHours(0,0,0,0);
        return d.getTime() >= today.getTime();
      }
      return true;
    });
  }

  function renderMustTasksPanel(panel) {
    const entries = collectMustTasks();
    if (!entries.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "No Musts on the board — good place to be."));
      return;
    }
    // Sort: due date asc, then created_at asc. Done/cancelled sink to bottom.
    entries.sort((a, b) => {
      const adone = (a.item.status === "done" || a.item.status === "cancelled" || a.item.completed) ? 1 : 0;
      const bdone = (b.item.status === "done" || b.item.status === "cancelled" || b.item.completed) ? 1 : 0;
      if (adone !== bdone) return adone - bdone;
      const da = a.item.dueBy ? new Date(a.item.dueBy).getTime() : Infinity;
      const db = b.item.dueBy ? new Date(b.item.dueBy).getTime() : Infinity;
      if (da !== db) return da - db;
      const ca = a.item.created_at ? new Date(a.item.created_at).getTime() : Infinity;
      const cb = b.item.created_at ? new Date(b.item.created_at).getTime() : Infinity;
      return ca - cb;
    });
    const list = ce("div", { class: "mytasks-list" });
    entries.forEach(e => {
      list.append(renderTaskRow(e.item, e.source, { onNavigate: () => gotoTaskSource(e) }, { itemType: e.itemType }));
    });
    panel.append(list);
  }

  // ============================================================
  // TSKMGR-47 — All UAT view (Wave 3)
  // ============================================================
  // Walks all task-bearing collections, filters to uatColumn in {test1, test2},
  // groups by projectId, then by column, sorted by cumulative days desc.
  function collectAllUatEntries() {
    const out = [];
    const all = collectMyTasksAll();
    all.forEach(e => {
      const it = e.item;
      if (!it) return;
      if (it.uatColumn !== "test1" && it.uatColumn !== "test2") return;
      out.push(e);
    });
    return out;
  }
  function countAllUat() {
    return collectAllUatEntries().length + (jiraUatCache.items || []).length;
  }

  // Resolve the project id for a UAT entry per the brief:
  //   1) item.projectId if set and resolves
  //   2) For committee items: if the committee has a single projectIds[0], use it
  //   3) Otherwise null (groups under "Unassigned project")
  function _resolveProjectForUatEntry(entry) {
    const it = entry.item;
    const src = entry.source || {};
    if (it.projectId) {
      const pr = (STATE.projects || []).find(x => x.id === it.projectId);
      if (pr) return pr;
    }
    if (src.kind === "committee") {
      const co = (STATE.committees || []).find(x => x.id === src.id);
      if (co && Array.isArray(co.projectIds) && co.projectIds.length === 1) {
        const pr = (STATE.projects || []).find(x => x.id === co.projectIds[0]);
        if (pr) return pr;
      }
    }
    if (src.kind === "project") {
      const pr = (STATE.projects || []).find(x => x.id === src.id);
      if (pr) return pr;
    }
    return null;
  }

  // Match a tester value to a partner record (so the mirror knows what to surface).
  function _partnerForTesterValue(value) {
    if (!value) return null;
    const v = String(value).toLowerCase();
    return (STATE.partners || []).find(p => {
      if ((p.email || "").toLowerCase() === v) return true;
      if ((p.name || "").toLowerCase() === v) return true;
      return false;
    }) || null;
  }
  function _testerLabelFor(value) {
    if (!value) return "";
    // TSKMGR-70 — scan every committee-attendee cache first so testers stored
    // by email resolve to their human display name regardless of which
    // project/committee the lookup is happening from.
    const attMap = STATE.committeeAttendees || {};
    for (const eid in attMap) {
      const rec = attMap[eid];
      if (!rec || !Array.isArray(rec.attendees)) continue;
      const hit = rec.attendees.find(a => a && (a.email === value || a.displayName === value));
      if (hit) return hit.displayName || hit.email || value;
    }
    // TSKMGR-45 (legacy) — fall back to the older slack channel cache for any
    // testers still keyed by slackUserId. Cache stays inert post-pivot but the
    // label lookup still helps if old data exists.
    const channelMap = STATE.slackChannelMembers || {};
    for (const chId in channelMap) {
      const rec = channelMap[chId];
      if (!rec || !Array.isArray(rec.members)) continue;
      const hit = rec.members.find(m => m && (m.email === value || m.slackUserId === value || m.name === value || m.displayName === value));
      if (hit) return hit.displayName || hit.name || hit.email || value;
    }
    const entry = _findTesterEntry(value);
    if (entry) return entry.label;
    const p = _partnerForTesterValue(value);
    if (p) return p.name || p.email;
    return value;
  }

  function renderAllUatPanel(panel) {
    // --- Scan bar (mirrors email tab pattern) ---
    var scanBar = ce("div", { style: "display:flex;align-items:center;gap:8px;margin-bottom:12px" });
    var uatRefreshBtn = ce("button", {
      class: "refresh-btn",
      title: "Refresh Jira UAT items across all projects",
      onclick: async function () {
        uatRefreshBtn.classList.add("spinning");
        try { await scanJiraUatItems(); } catch (e) { showSave("error", "UAT scan failed: " + (e.message || e)); }
        uatRefreshBtn.classList.remove("spinning");
        renderMyTasksView();
      }
    }, "↻");
    scanBar.append(uatRefreshBtn);
    if (jiraUatCache.lastScanAt) {
      scanBar.append(ce("span", { class: "meta", style: "font-size:11px;color:var(--muted)" }, "Jira scanned " + daysAgo(jiraUatCache.lastScanAt)));
    } else {
      scanBar.append(ce("span", { class: "meta", style: "font-size:11px;color:var(--muted)" }, "Not yet scanned — click ↻ to load Jira UAT items"));
    }
    panel.append(scanBar);

    // --- Collect items from both sources ---
    // 1. Manual STATE items (existing behavior)
    var manualEntries = collectAllUatEntries();
    // 2. Jira live items
    var jiraItems = jiraUatCache.items || [];

    // Build unified buckets grouped by Jira project key
    // Shape: { projectKey: { label, test1: [], test2: [], totalOwner: N } }
    var buckets = {};

    // Insert Jira items
    jiraItems.forEach(function (ji) {
      var bk = ji.project || "OTHER";
      if (!buckets[bk]) buckets[bk] = { label: bk, test1: [], test2: [], totalOwner: 0 };
      var col = ji.uatColumn || "test1";
      var entry = { jira: true, jiraItem: ji, uatColumn: col };
      buckets[bk][col].push(entry);
      if (ji.isOwner) buckets[bk].totalOwner++;
    });

    // Insert manual STATE items (group under project key if resolvable)
    manualEntries.forEach(function (e) {
      var pr = _resolveProjectForUatEntry(e);
      var bk = pr ? (pr.shortCode || pr.name || "MANUAL") : "MANUAL";
      if (!buckets[bk]) buckets[bk] = { label: pr ? pr.name : "Manual items", test1: [], test2: [], totalOwner: 0 };
      var col = e.item.uatColumn || "test1";
      buckets[bk][col].push({ jira: false, entry: e, uatColumn: col });
    });

    var allKeys = Object.keys(buckets);
    if (!allKeys.length && !jiraItems.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "Nothing in UAT right now. Click ↻ above to scan Jira for UAT items."));
      return;
    }

    // --- SLA summary ---
    var totalItems = jiraItems.length + manualEntries.length;
    var ownerItems = jiraItems.filter(function (j) { return j.isOwner; });
    var staleItems = jiraItems.filter(function (j) {
      if (!j.updatedAt) return false;
      return (Date.now() - new Date(j.updatedAt).getTime()) > 7 * 86400000;
    });
    var summaryParts = [totalItems + " UAT items"];
    if (ownerItems.length) summaryParts.push(ownerItems.length + " assigned to you");
    if (staleItems.length) summaryParts.push(staleItems.length + " stale (>7d)");
    panel.append(ce("div", { style: "font-size:12px;margin-bottom:10px;padding:6px 10px;border-radius:4px;background:rgba(90,62,175,.06);border:1px solid var(--line)" },
      summaryParts.join(" · ")));

    // --- Render each project bucket ---
    // Sort: SMFA first, then others alpha, MANUAL last
    var sortOrder = { SMFA: 0, SFAIA: 1, TSKMGR: 2, MANUAL: 99 };
    allKeys.sort(function (a, b) { return (sortOrder[a] != null ? sortOrder[a] : 50) - (sortOrder[b] != null ? sortOrder[b] : 50); });

    allKeys.forEach(function (bk) {
      var bucket = buckets[bk];
      var sec = ce("section", { class: "uat-project-section" });
      var head = ce("div", { class: "uat-project-head" });
      head.append(ce("span", { class: "lbl" }, bucket.label));
      var count = bucket.test1.length + bucket.test2.length;
      head.append(ce("span", { class: "count" }, "(" + count + (bucket.totalOwner ? ", " + bucket.totalOwner + " yours" : "") + ")"));
      sec.append(head);

      [["Test 1", bucket.test1], ["Test 2", bucket.test2]].forEach(function (pair) {
        var label = pair[0]; var list = pair[1];
        if (!list.length) return;
        var sub = ce("div", { class: "uat-subgroup" });
        sub.append(ce("div", { class: "uat-subgroup-head" }, label + " (" + list.length + ")"));

        // Sort: owner items first, then by staleness (oldest updated first)
        list.sort(function (a, b) {
          var aOwner = a.jira ? (a.jiraItem.isOwner ? 0 : 1) : 1;
          var bOwner = b.jira ? (b.jiraItem.isOwner ? 0 : 1) : 1;
          if (aOwner !== bOwner) return aOwner - bOwner;
          var aDate = a.jira ? (a.jiraItem.updatedAt || "") : "";
          var bDate = b.jira ? (b.jiraItem.updatedAt || "") : "";
          return aDate < bDate ? -1 : aDate > bDate ? 1 : 0;
        });

        list.forEach(function (item) {
          if (item.jira) {
            sub.append(_renderJiraUatRow(item.jiraItem));
          } else {
            sub.append(_renderUatRow(item.entry));
          }
        });
        sec.append(sub);
      });
      panel.append(sec);
    });

    // --- Errors from last scan ---
    if (jiraUatCache.errors && jiraUatCache.errors.length) {
      panel.append(ce("div", { style: "font-size:11px;color:var(--bad);margin-top:8px" }, "Scan errors: " + jiraUatCache.errors.join("; ")));
    }
  }

  function _renderUatProjectSection(project, test1Entries, test2Entries) {
    const sec = ce("section", { class: "uat-project-section" });
    const head = ce("div", { class: "uat-project-head" });
    head.append(ce("span", { class: "lbl" }, project ? (project.name || "Project") : "Unassigned project"));
    head.append(ce("span", { class: "count" }, "(" + (test1Entries.length + test2Entries.length) + ")"));
    // Section-header nudge bundle: bucket by tester within this section
    const sectionByTester = new Map();
    [...test1Entries, ...test2Entries].forEach(e => {
      const t = e.item.uatTester;
      if (!t) return;
      const days = uatDaysCumulative(e.item);
      if (days < 5) return;
      const arr = sectionByTester.get(t) || [];
      arr.push(e.item);
      sectionByTester.set(t, arr);
    });
    sectionByTester.forEach((items, testerValue) => {
      if (items.length < 2) return; // per-row nudge handles solo stuck items
      const lbl = _testerLabelFor(testerValue);
      const btn = ce("button", {
        class: "nudge-btn nudge-bundle",
        title: "Draft a single Slack DM with all stuck items for " + lbl,
        onclick: (e) => { e.stopPropagation(); nudgeTesterBundle(testerValue, items); }
      }, "Nudge " + lbl + " (" + items.length + " items)");
      head.append(btn);
    });
    sec.append(head);

    [["Test 1", test1Entries], ["Test 2", test2Entries]].forEach(([label, list]) => {
      if (!list.length) return; // hide empty sub-group entirely
      const sub = ce("div", { class: "uat-subgroup" });
      sub.append(ce("div", { class: "uat-subgroup-head" }, label + " (" + list.length + ")"));
      // Sort by cumulative days desc so the longest-stuck items rise
      list.sort((a, b) => uatDaysCumulative(b.item) - uatDaysCumulative(a.item));
      list.forEach(e => sub.append(_renderUatRow(e)));
      sec.append(sub);
    });
    return sec;
  }

  function _renderUatRow(entry) {
    const item = entry.item;
    const testerLabel = _testerLabelFor(item.uatTester) || "<unassigned>";
    const days = uatDaysCumulative(item);
    return renderTaskRow(item, entry.source,
      { onNavigate: () => gotoTaskSource(entry), onTesterChange: () => {} },
      {
        itemType: entry.itemType,
        locked: true,
        uatEditable: true,
        assigneeLabel: testerLabel,
        uat: { column: item.uatColumn, testerLabel: testerLabel, daysCumulative: days }
      }
    );
  }

  /** Render a Jira-sourced UAT row with assignee, age, SLA badge, and dossier routing. */
  function _renderJiraUatRow(ji) {
    var card = ce("div", { class: "email-card" + (ji.isOwner ? " uat-owner" : ""), style: "padding:8px 10px" });

    // Row 1: Key + Summary
    var row1 = ce("div", { style: "display:flex;align-items:center;gap:8px" });
    row1.append(ce("a", { href: ji.url, target: "_blank", style: "font-weight:700;font-size:12px;color:var(--accent);text-decoration:none;white-space:nowrap" }, ji.key));
    row1.append(ce("span", { style: "font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" }, ji.summary));
    // SLA badge: days since last update
    if (ji.updatedAt) {
      var ageDays = Math.floor((Date.now() - new Date(ji.updatedAt).getTime()) / 86400000);
      var slaColor = ageDays >= 7 ? "var(--bad)" : ageDays >= 5 ? "var(--warn)" : "var(--muted)";
      var slaText = ageDays + "d";
      row1.append(ce("span", { style: "font-size:10px;font-weight:600;color:" + slaColor + ";white-space:nowrap", title: "Last updated " + ageDays + " days ago" }, slaText));
    }
    card.append(row1);

    // Row 2: Assignee + status + actions
    var row2 = ce("div", { style: "display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap" });
    // Assignee
    var assigneeLabel = ji.assigneeName || ji.assigneeEmail || "Unassigned";
    row2.append(ce("span", { style: "font-size:11px;color:var(--muted)" }, assigneeLabel));
    // Status pill
    row2.append(ce("span", { style: "font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(90,62,175,.12);color:var(--accent);white-space:nowrap" }, ji.status));
    // Owner highlight
    if (ji.isOwner) {
      row2.append(ce("span", { style: "font-size:10px;padding:1px 6px;border-radius:10px;background:rgba(232,175,40,.15);color:var(--warn);font-weight:600" }, "You"));
    }

    // Actions
    var acts = ce("div", { style: "margin-left:auto;display:flex;gap:4px" });
    // Add to dossier — find matching partner
    var partner = matchPartnerByEmail(ji.assigneeEmail);
    if (partner) {
      acts.append(ce("button", { class: "btn tiny", title: "Add to " + (partner.name || "partner") + "'s 1:1 agenda", onclick: function () { addJiraUatToDossier(ji, partner.id); renderMyTasksView(); } }, "→ " + (partner.name || "").split(" ")[0]));
    } else if (ji.assigneeEmail && !ji.isOwner) {
      // Assignee isn't a partner — offer to pick one
      acts.append(ce("button", { class: "btn tiny", style: "color:var(--muted)", title: "Assignee not matched to a partner dossier", onclick: function () { _openPartnerPickerForJiraUat(ji); } }, "→ Dossier"));
    }
    if (ji.isOwner) {
      acts.append(ce("span", { style: "font-size:10px;color:var(--muted);padding:4px 0" }, "Test this yourself"));
    }
    row2.append(acts);
    card.append(row2);
    return card;
  }

  /** Open a small picker to assign a Jira UAT item to a partner's dossier. */
  function _openPartnerPickerForJiraUat(ji) {
    var overlay = ce("div", { class: "modal-backdrop", style: "display:flex" });
    overlay.addEventListener("click", function (e) { if (e.target === overlay) overlay.remove(); });
    // TSKMGR-81 fix: block Backspace from closing modal / navigating back
    overlay.addEventListener("keydown", function (e) {
      if (e.key === "Backspace") { e.stopPropagation(); if (!(e.target && /^(input|textarea|select)$/i.test(e.target.tagName))) e.preventDefault(); }
      if (e.key === "Escape") overlay.remove();
    });
    var modal = ce("div", { class: "modal", style: "max-width:360px" });
    modal.append(ce("h2", { style: "margin:0 0 8px" }, "Add to dossier"));
    modal.append(ce("div", { class: "sub" }, ji.key + " — " + ji.summary.slice(0, 60)));
    var list = ce("div", { style: "max-height:300px;overflow:auto" });
    (STATE.partners || []).forEach(function (p) {
      list.append(ce("div", {
        class: "view-row", style: "cursor:pointer;padding:6px 8px",
        onclick: function () { addJiraUatToDossier(ji, p.id); overlay.remove(); renderMyTasksView(); }
      }, [
        ce("span", { style: "font-weight:600;font-size:12px" }, p.name || "(unnamed)"),
        ce("span", { style: "font-size:10px;color:var(--muted);margin-left:8px" }, p.email || "")
      ]));
    });
    modal.append(list);
    modal.append(ce("div", { class: "footer" }, [
      ce("button", { class: "btn", onclick: function () { overlay.remove(); } }, "Cancel")
    ]));
    overlay.append(modal);
    document.body.append(overlay);
  }

  // ============================================================
  // TSKMGR-55 — Collaborators (ad-hoc UAT testers not in STATE.partners)
  // ============================================================
  // Returns [{ value, label, items: [...], days, hasStuck }]
  function collectCollaborators() {
    const out = new Map();
    collectAllUatEntries().forEach(e => {
      const it = e.item;
      if (!it.uatTester) return;
      const partner = _partnerForTesterValue(it.uatTester);
      if (partner) return; // partners get the dossier mirror instead
      const val = it.uatTester;
      const rec = out.get(val) || { value: val, label: _testerLabelFor(val), items: [], days: 0, hasStuck: false };
      rec.items.push(e);
      const d = uatDaysCumulative(it);
      if (d >= 5) rec.hasStuck = true;
      out.set(val, rec);
    });
    return Array.from(out.values()).sort((a, b) => a.label.localeCompare(b.label));
  }

  // Collaborator dossier panel — read-only list of their assigned UAT items,
  // with a bundled nudge button at top.
  function renderCollaboratorPanel(collaboratorId) {
    const dos = document.getElementById("dossier"); if (!dos) return;
    dos.innerHTML = "";
    const collabs = collectCollaborators();
    const collab = collabs.find(c => c.value === collaboratorId);
    if (!collab) {
      dos.append(ce("div", { class: "panel" }, [
        ce("h2", {}, "Collaborator"),
        ce("div", { class: "mytasks-panel-empty" }, "This collaborator no longer has any UAT items assigned.")
      ]));
      return;
    }
    const panel = ce("div", { class: "panel" });
    const head = ce("div", { class: "collab-head" });
    head.append(ce("h2", {}, collab.label));
    head.append(ce("span", { class: "meta" }, collab.items.length + " UAT item" + (collab.items.length === 1 ? "" : "s") + " assigned"));
    // Bundled nudge for the whole collaborator
    const stuckItems = collab.items.filter(e => uatDaysCumulative(e.item) >= 5).map(e => e.item);
    if (stuckItems.length) {
      head.append(ce("button", { class: "nudge-btn nudge-bundle",
        title: "Draft a single Slack DM with all stuck items",
        onclick: (e) => { e.stopPropagation(); nudgeTesterBundle(collab.value, stuckItems); }
      }, "Nudge " + collab.label + " (" + stuckItems.length + " stuck)"));
    }
    panel.append(head);
    panel.append(ce("div", { class: "lead" }, "Ad-hoc UAT collaborator — not a 1:1 partner. UAT items assigned to them surface here."));
    // Sort by cumulative days desc
    collab.items.sort((a, b) => uatDaysCumulative(b.item) - uatDaysCumulative(a.item));
    const list = ce("div", { class: "mytasks-list" });
    collab.items.forEach(e => list.append(_renderUatRow(e)));
    panel.append(list);
    dos.append(panel);
  }

  // Partner dossier mirror — "UAT — assigned to you" section.
  // Returns a DOM section (or null when the partner has no assigned UAT items).
  function renderPartnerUatMirror(partner) {
    if (!partner) return null;
    const entries = collectAllUatEntries().filter(e => {
      const t = e.item.uatTester;
      if (!t) return false;
      const pp = _partnerForTesterValue(t);
      return pp && pp.id === partner.id;
    });
    if (!entries.length) return null;
    const sec = ce("section", { class: "block uat-mirror-block" });
    const h3 = ce("h3", {});
    h3.append(document.createTextNode("UAT — assigned to you "));
    h3.append(ce("span", { class: "count" }, "(" + entries.length + ")"));
    h3.append(ce("span", { class: "pill synth", style: "margin-left:6px" }, "mirror"));
    h3.append(ce("a", {
      class: "uat-mirror-jump",
      title: "Open the All UAT view",
      style: "margin-left:auto;font-size:11px;cursor:pointer",
      onclick: (e) => {
        e.preventDefault();
        setMyTasksFilter("all-uat");
        STATE.selectedView = "mytasks";
        renderRoster(); renderDossier();
      }
    }, "↗ Open in All UAT"));
    sec.append(h3);
    entries.sort((a, b) => uatDaysCumulative(b.item) - uatDaysCumulative(a.item));
    const list = ce("div", { class: "mytasks-list" });
    entries.forEach(e => list.append(_renderUatRow(e)));
    sec.append(list);
    return sec;
  }

  // ============================================================
  // TSKMGR-54 — Archive sweep + Archive view (Wave 2)
  // ============================================================
  function _localMidnightToday() {
    const d = new Date(); d.setHours(0,0,0,0); return d.getTime();
  }

  // Walk every task-bearing collection and yield { arr, removeAt, sourceRef, item }
  function _walkTaskCollections(visit) {
    (STATE.partners || []).forEach(p => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        const arr = (p.commitments && p.commitments[lane]) || [];
        arr.forEach((it, idx) => visit(arr, idx, it, { kind: "partner", id: p.id, lane }));
      });
      // TSKMGR-54 follow-up — partner agenda items also sweep into archive
      const pAgenda = p.agenda || [];
      pAgenda.forEach((it, idx) => visit(pAgenda, idx, it, { kind: "partner", id: p.id, coll: "agenda" }));
    });
    (STATE.committees || []).forEach(co => {
      const arr = co.actionItems || [];
      arr.forEach((it, idx) => visit(arr, idx, it, { kind: "committee", id: co.id }));
      // TSKMGR-54 follow-up — committee agenda items also sweep into archive
      const coAgenda = co.agenda || [];
      coAgenda.forEach((it, idx) => visit(coAgenda, idx, it, { kind: "committee", id: co.id, coll: "agenda" }));
    });
    (STATE.projects || []).forEach(pr => {
      const arr = pr.actionItems || [];
      arr.forEach((it, idx) => visit(arr, idx, it, { kind: "project", id: pr.id }));
    });
  }

  let _archiveSweepInFlight = false;
  function runArchiveSweep() {
    if (_archiveSweepInFlight) return 0;
    _archiveSweepInFlight = true;
    try {
      if (!Array.isArray(STATE.archive)) STATE.archive = [];
      const cutoff = _localMidnightToday();
      const toRemove = [];
      _walkTaskCollections((arr, idx, it, sourceRef) => {
        if (!it) return;
        const isDone = it.status === "done" || it.status === "cancelled" || it.completed;
        if (!isDone) return;
        if (!it.done_at) {
          // TODO TSKMGR-54 — legacy items may not have done_at. Fall back to created_at or now.
          // Using created_at can mis-mark old finished work as "completed today"; flagged for follow-up.
          it.done_at = it.created_at || nowIso();
        }
        const t = new Date(it.done_at).getTime();
        if (isNaN(t)) return;
        if (t < cutoff) {
          toRemove.push({ arr, idx, it, sourceRef });
        }
      });
      if (!toRemove.length) return 0;
      // Sort descending by idx so splices don't shift later indices
      toRemove.sort((a, b) => b.idx - a.idx);
      toRemove.forEach(({ arr, idx, it, sourceRef }) => {
        arr.splice(idx, 1);
        STATE.archive.push(Object.assign({}, it, {
          archivedAt: nowIso(),
          sourceRef: sourceRef
        }));
      });
      return toRemove.length;
    } finally {
      _archiveSweepInFlight = false;
    }
  }

  // ISO-week start (Monday) date string for grouping
  function _isoWeekStart(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return null;
    d.setHours(0,0,0,0);
    const day = (d.getDay() + 6) % 7; // Mon=0..Sun=6
    d.setDate(d.getDate() - day);
    return d.toISOString().slice(0,10);
  }

  function unarchiveItem(archEntry) {
    const ref = archEntry.sourceRef || {};
    let targetArr = null;
    if (ref.kind === "partner") {
      const p = (STATE.partners || []).find(x => x.id === ref.id);
      if (p && ref.coll === "agenda") targetArr = p.agenda = p.agenda || [];
      else if (p && p.commitments && ref.lane) targetArr = p.commitments[ref.lane];
    } else if (ref.kind === "committee") {
      const co = (STATE.committees || []).find(x => x.id === ref.id);
      if (co && ref.coll === "agenda") targetArr = co.agenda = co.agenda || [];
      else if (co) targetArr = co.actionItems = co.actionItems || [];
    } else if (ref.kind === "project") {
      const pr = (STATE.projects || []).find(x => x.id === ref.id);
      if (pr) targetArr = pr.actionItems = pr.actionItems || [];
    }
    if (!targetArr) {
      console.warn("[unarchive] sourceRef missing or stale — leaving item in archive", ref);
      return;
    }
    // Restore: drop archive-only fields, reopen
    const restored = Object.assign({}, archEntry);
    delete restored.archivedAt;
    delete restored.sourceRef;
    restored.status = "open";
    restored.done_at = null;
    if (restored.completed) restored.completed = false;
    targetArr.push(restored);
    // Remove from archive
    const idx = (STATE.archive || []).indexOf(archEntry);
    if (idx >= 0) STATE.archive.splice(idx, 1);
    persistState("Unarchive task");
    renderDossier();
  }

  function renderArchivePanel(parent) {
    const arch = (STATE.archive || []).slice();
    const wrap = ce("div", { class: "archive-surface" });
    const head = ce("div", { class: "archive-surface-head" });
    head.append(ce("h3", {}, "Archive"));
    head.append(ce("span", { class: "archive-count" }, arch.length + " archived task" + (arch.length === 1 ? "" : "s")));
    wrap.append(head);
    if (!arch.length) {
      wrap.append(ce("div", { class: "mytasks-panel-empty" }, "No archived tasks yet. Get something done to see it here."));
      parent.append(wrap);
      return;
    }
    // Group by ISO week (Monday start) of done_at, fallback archivedAt
    const byWeek = {};
    arch.forEach(a => {
      const key = _isoWeekStart(a.done_at || a.archivedAt) || "unknown";
      (byWeek[key] = byWeek[key] || []).push(a);
    });
    const weekKeys = Object.keys(byWeek).sort((a, b) => (a < b ? 1 : -1)); // most recent first
    weekKeys.forEach(wk => {
      const items = byWeek[wk];
      const weekDiv = ce("div", { class: "archive-week" });
      const wkHead = ce("div", { class: "archive-week-head" });
      const lbl = wk === "unknown" ? "Week unknown" : "Week of " + fmtDate(wk);
      wkHead.append(ce("span", { class: "lbl" }, lbl));
      const mustCount = items.filter(i => i.priority === "must").length;
      wkHead.append(ce("span", { class: "meta" }, items.length + " task" + (items.length === 1 ? "" : "s") + " · " + mustCount + " Must"));
      weekDiv.append(wkHead);
      // Secondary group by category
      const cats = { strategic: [], tactical: [], status: [], untagged: [] };
      items.forEach(i => {
        const c = i.category || "untagged";
        (cats[c] || cats.untagged).push(i);
      });
      ["strategic","tactical","status","untagged"].forEach(catKey => {
        const catItems = cats[catKey];
        if (!catItems.length) return;
        catItems.sort((a, b) => new Date(b.archivedAt || 0).getTime() - new Date(a.archivedAt || 0).getTime());
        const cg = ce("div", { class: "archive-cat-group" });
        cg.append(ce("div", { class: "archive-cat-head" }, catKey === "untagged" ? "Uncategorized" : catKey));
        catItems.forEach(a => {
          const source = a.sourceRef
            ? { kind: a.sourceRef.kind, id: a.sourceRef.id, name: _sourceNameForRef(a.sourceRef), lane: a.sourceRef.lane }
            : { kind: "partner", id: null, name: "(unknown)" };
          const row = renderTaskRow(a, source, {}, { locked: true, itemType: a.title ? "agenda" : "action" });
          const rr = row.querySelector(".row-right");
          if (rr) {
            rr.append(ce("button", { class: "unarchive-btn", title: "Restore this item to its source",
              onclick: (e) => { e.stopPropagation(); unarchiveItem(a); } }, "↩ Unarchive"));
          }
          cg.append(row);
        });
        weekDiv.append(cg);
      });
      wrap.append(weekDiv);
    });
    parent.append(wrap);
  }

  function _sourceNameForRef(ref) {
    if (!ref) return "(unknown)";
    if (ref.kind === "partner") {
      const p = (STATE.partners || []).find(x => x.id === ref.id);

  function renderPreReadDigest(p) {
    const live = liveCache[p.id];
    const lastMeet = live && live.lastMeeting;
    const wrap = ce("div", { class: "digest" });
    wrap.append(ce("div", { class: "title" }, "Pre-read digest"));
    if (lastMeet) {
      const lastDate = fmtDT(lastMeet.start);
      const days = Math.floor((Date.now() - new Date(lastMeet.start).getTime()) / 86400000);
      wrap.append(ce("div", { class: "since" }, [document.createTextNode("Since last meeting: "), ce("strong", {}, lastDate), document.createTextNode(" (" + (days <= 0 ? "today" : (days + "d ago")) + ")")]));
    } else { wrap.append(ce("div", { class: "since" }, "No prior 1:1 found in the last 14 days.")); }
    const all = [...(p.commitments.ownerToPartner || []), ...(p.commitments.partnerToOwner || []), ...(p.commitments.joint || [])];
    const open = all.filter(c => !c.status || c.status === "open").length;
    const inprog = all.filter(c => c.status === "in_progress").length;
    const blockedCount = all.filter(c => c.status === "blocked").length;
    const done = all.filter(c => c.status === "done").length;
    const overdueCount = all.filter(c => isOverdue(c)).length;
    const trayCount = (p.agenda || []).filter(a => a.coveredStatus === "needs_review").length + (p.decisions || []).filter(d => d.pendingConfirmation).length;
    const carriedFwd = (p.agenda || []).filter(a => a.carriedForwardFrom).length;
    const recentEmails = (live && live.recentEmails) ? live.recentEmails.length : 0;
    const recentSlack = (live && live.recentSlack) ? live.recentSlack.length : 0;
    const stats = ce("div", { class: "stats" });
    function stat(cls, n, lbl) { const s = ce("span", { class: "stat " + (cls || "") }); s.append(ce("span", { class: "num" }, String(n))); s.append(document.createTextNode(" " + lbl)); return s; }
    stats.append(stat("", open, "open"));
    if (inprog) stats.append(stat("in_progress", inprog, "in progress"));
    if (blockedCount) stats.append(stat("blocked", blockedCount, "blocked"));
    if (overdueCount) stats.append(stat("overdue", overdueCount, "overdue"));
    if (done) stats.append(stat("done", done, "done"));
    if (trayCount) stats.append(stat("", trayCount, "needing your call"));
    stats.append(stat("", recentEmails, "recent emails"));
    if (recentSlack) stats.append(stat("", recentSlack, "Slack messages"));
    wrap.append(stats);
    if (carriedFwd) wrap.append(ce("div", { class: "carried" }, "▲ " + carriedFwd + " agenda item" + (carriedFwd === 1 ? "" : "s") + " carried forward from previous meeting."));
    return wrap;
  }

  function renderBalanceRibbon(p) {
    const all = [...(p.agenda || []), ...(p.commitments.ownerToPartner || []), ...(p.commitments.partnerToOwner || []), ...(p.commitments.joint || [])];
    const cats = { strategic: 0, tactical: 0, status: 0, untagged: 0 };
    all.forEach(item => { const c = item.category || null; if (c === "strategic") cats.strategic++; else if (c === "tactical") cats.tactical++; else if (c === "status") cats.status++; else cats.untagged++; });
    const total = cats.strategic + cats.tactical + cats.status;
    if (!total) return null;
    const pct = { strategic: Math.round(cats.strategic / total * 100), tactical: Math.round(cats.tactical / total * 100), status: Math.round(cats.status / total * 100) };
    const ribbon = ce("div", { class: "balance-ribbon", title: "Phase 2.3 will compute this as a 4-meeting trailing average via the post-meeting reconciler. Today's view is the current snapshot." });
    ribbon.append(ce("span", { class: "lbl" }, "Balance"));
    const bar = ce("div", { class: "balance-bar" });
    if (cats.strategic) bar.append(ce("div", { class: "seg strategic", style: "width:" + pct.strategic + "%" }));
    if (cats.tactical) bar.append(ce("div", { class: "seg tactical", style: "width:" + pct.tactical + "%" }));
    if (cats.status) bar.append(ce("div", { class: "seg status", style: "width:" + pct.status + "%" }));
    ribbon.append(bar);
    const txt = ce("span", { class: "balance-pct" });
    txt.append(ce("span", { class: "strategic" }, pct.strategic + "% strategic"));
    txt.append(document.createTextNode(" · "));
    txt.append(ce("span", { class: "tactical" }, pct.tactical + "% tactical"));
    if (cats.status) { txt.append(document.createTextNode(" · ")); txt.append(ce("span", { class: "status" }, pct.status + "% status")); }
    ribbon.append(txt);
    if (pct.tactical > 85) ribbon.append(ce("span", { class: "balance-warn" }, "⚠ tactical-heavy — consider a strategic topic"));
    if (pct.status > 30) ribbon.append(ce("span", { class: "balance-warn" }, "⚠ lots of status — could async?"));
    return ribbon;
  }

  function renderTray(p) {
    const items = [];
    p.agenda.forEach(a => {
      if (a.coveredStatus === "needs_review") {
        items.push({ kind: "agenda", refId: a.id, title: a.title, why: `Reconciler confidence ${a.coveredConfidence == null ? "?" : a.coveredConfidence + "%"}: ${a.coveredNote || "Topic was not clearly addressed in the meeting notes."}`,
          actions: [
            { label: "Yes — covered", primary: true, run: () => { a.coveredStatus = "covered"; a.completed = true; stampDone(a); persistState("Mark agenda covered"); renderDossier(); } },
            { label: "Roll forward", run: () => { a.coveredStatus = "not_covered"; a.rolledForward = true; persistState("Roll agenda item forward"); renderDossier(); } },
            { label: "Skip", subtle: true, run: () => { a.coveredStatus = "covered"; persistState("Skip agenda review"); renderDossier(); } }
          ] });
      }
    });
    p.decisions.forEach(d => {
      if (d.pendingConfirmation) {
        items.push({ kind: "decision", refId: d.id, title: d.text, why: `Reconciler suggested this as a new decision (confidence ${d.coveredConfidence == null ? "?" : d.coveredConfidence + "%"}). ${d.coveredNote || ""}`,
          actions: [
            { label: "Yes — record decision", primary: true, run: () => { d.pendingConfirmation = false; persistState("Confirm decision"); renderDossier(); } },
            { label: "Not really a decision", run: () => { p.decisions = p.decisions.filter(x => x.id !== d.id); persistState("Drop decision"); renderDossier(); } }
          ] });
      }
    });
    if (!items.length) return null;
    const tray = ce("div", { class: "tray" });
    tray.append(ce("h3", {}, [`⚠ Needs your call`, ce("span", { class: "pill warn" }, `${items.length} item${items.length === 1 ? "" : "s"}`)]));
    items.forEach(it => {
      const acts = ce("div", { class: "acts" });
      it.actions.forEach(act => acts.append(ce("button", { class: "btn" + (act.primary ? " primary" : "") + (act.subtle ? " subtle" : ""), onclick: act.run }, act.label)));
      tray.append(ce("div", { class: "tray-item" }, [ce("div", { class: "what" }, it.title), ce("div", { class: "why" }, it.why), acts]));
    });
    return tray;
  }

  function removePartner(id) {
    const p = STATE.partners.find(x => x.id === id);
    if (!p) return;
    if (!confirm(`Remove ${p.name || p.id}? This drops the partner's dossier from the artifact (cannot be undone here).`)) return;
    STATE.partners = STATE.partners.filter(x => x.id !== id);
    if (STATE.selectedPartnerId === id) STATE.selectedPartnerId = STATE.partners[0] ? STATE.partners[0].id : null;
    delete liveCache[id]; delete jiraCache[id];
    persistState("Remove partner " + id);
    renderRoster(); renderDossier();
  }
  function addPartner() {
    const id = "partner-" + Date.now();
    STATE.partners.push({ id, name: "", email: "", slackUserId: "", role: "", cadence: "", notes: "", relationshipType: "peer", lastReconciledMeetingId: null, relationalDocId: null, jiraQueries: [], agenda: [], commitments: { ownerToPartner: [], partnerToOwner: [], joint: [] }, decisions: [], topicThreads: [], meetingLog: [] });
