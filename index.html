        const next = await discoverCommittees(snap.mode, snap);
        renderDiscoveryView(next);
      } }, "▶ Resume from where it stopped"));
      dos.append(box);
    }

    // Diagnostic panel — surfaces the funnel so we can see why 0 candidates if that happens
    if (diag) {
      // v3.4.1a — diagnostics always collapsed by default; expand on demand
      const dp = ce("details", { class: "discovery-diag" });
      dp.append(ce("summary", {}, "Discovery diagnostics — click to expand"));
      const tbl = ce("div", { style: "font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;padding:8px 12px;background:rgba(0,0,0,.03);border-radius:4px;margin-top:6px" });
      const row = (k, v) => { tbl.append(ce("div", {}, k + ": " + v)); };
      row("Mode", diag.mode + " · window " + diag.windowDays + " days");
      row("Chunks", diag.chunksSucceeded + " ok / " + diag.chunksFailed + " failed of " + diag.chunksAttempted + " attempted");
      // v3.4.6 — surface effective scan window so partial-scan extrapolation makes sense
      if (diag.effectiveScanDays) row("Effective scan window", String(diag.effectiveScanDays) + " days (used for yearly extrapolation)");
      row("Pages fetched (across all chunks)", String(diag.pagesFetched || 0));
      row("Parent-event fetches", (diag.parentFetchSucceeded || 0) + " ok / " + (diag.parentFetchAttempts || 0) + " attempted, " + (diag.parentFetchWithRRULE || 0) + " yielded RRULE");
      row("Events scanned", String(diag.eventsScanned));
      row("Events w/ recurrence (RRULE parents)", String(diag.eventsWithRecurrence || 0));
      row("Events w/ recurringEventId (instances)", String(diag.eventsWithRid));
      row("Events known/dismissed (skipped)", String(diag.eventsKnownSkipped));
      row("Events with <3 attendees", String(diag.eventsTooFewAttendees));
      row("Events solo Owen-only", String(diag.eventsSoloOwen || 0));
      row("Unique candidates collected", String(diag.uniqueCandidates || diag.uniqueRids || 0));
      row("Candidates passing final filter", String(diag.candidatesPassingFilter));
      if (diag.sampleEventKeys) row("Sample event keys", JSON.stringify(diag.sampleEventKeys));
      if (diag.sampleResponseShapes && diag.sampleResponseShapes.length) {
        const s = diag.sampleResponseShapes[0];
        row("First chunk unwrap shape", s.shape || "(unknown)");
        row("First chunk data keys", JSON.stringify(s.dataKeys));
        row("First chunk data is array", String(s.dataIsArray));
        if (s.preview) {
          tbl.append(ce("div", { style: "margin-top:6px;color:var(--muted)" }, "First chunk data preview (first 400 chars):"));
          tbl.append(ce("div", { style: "white-space:pre-wrap;word-break:break-all;background:rgba(0,0,0,.05);padding:6px 8px;border-radius:3px;font-size:11px;max-height:200px;overflow:auto" }, s.preview));
        }
      }
      if (diag.chunkErrors && diag.chunkErrors.length) {
        tbl.append(ce("div", { style: "color:var(--bad);margin-top:6px" }, "Errors:"));
        diag.chunkErrors.forEach(e => tbl.append(ce("div", { style: "color:var(--bad);font-size:11px" }, "  chunk " + e.chunk + ": " + e.msg)));
      }
      dp.append(tbl);
      dos.append(dp);
    }

    if (!candidates.length) {
      dos.append(ce("div", { class: "due", style: "margin-top:12px" }, "No candidates surfaced. If you expected committees, expand the diagnostic panel above to see where the funnel dropped to zero — common causes: zero events scanned (transport / network), 0 events-with-recurringEventId (singleEvents flag may not be expanding instances), or all events filtered as <3 attendees (the API may be returning summary-only events without attendees lists; the parent fetch should have caught those — if attendeesMissing > 0 and uniqueRids stays high, that path may need work)."));
      return;
    }
    // Helper to remove a candidate from the cache + re-render in place
    function removeFromCache(rid) {
      if (!discoveryCache) return;
      discoveryCache.candidates = discoveryCache.candidates.filter(c => c.recurringEventId !== rid);
      expandedAddCardId = null;
      renderDiscoveryView();
    }

    candidates.forEach(cand => {
      const samp = cand.sample || {};
      const card = ce("div", { class: "discovery-card" });
      card.append(ce("h3", {}, samp.summary || "(unnamed)"));
      const freqLabel = cand.recurrenceRule ? ("RRULE: ~" + cand.estimatedYearlyOccurrences + "/yr") : ("est " + cand.estimatedYearlyOccurrences + "/yr from " + cand.occurrences + " seen");
      card.append(ce("div", { class: "meta" }, freqLabel + " · attendees: " + cand.attendees.length));
      if (cand.possibleRenameOf) {
        const ex = (STATE.committees || []).find(x => x.id === cand.possibleRenameOf);
        card.append(ce("div", { class: "warn-banner" }, "Possible rename / restart of: " + (ex && ex.name) + " (≥80% attendee overlap + similar time)"));
      }
      card.append(ce("div", { class: "meta" }, cand.attendees.slice(0, 6).map(a => a.email).join(", ") + (cand.attendees.length > 6 ? ", + " + (cand.attendees.length - 6) + " more" : "")));

      const isExpanded = expandedAddCardId === cand.recurringEventId;
      const acts = ce("div", { class: "discovery-actions" });

      // Primary Add — toggles inline expansion instead of navigating away
      acts.append(ce("button", { class: "btn primary", onclick: () => {
        expandedAddCardId = isExpanded ? null : cand.recurringEventId;
        renderDiscoveryView();
      } }, isExpanded ? "▾ Cancel" : "Add as committee"));

      if (cand.possibleRenameOf) {
        acts.append(ce("button", { class: "btn tiny", onclick: () => {
          const ex = (STATE.committees || []).find(x => x.id === cand.possibleRenameOf);
          if (!ex) return;
          ex.recurringEventId = cand.recurringEventId;
          persistState("Merge candidate into " + ex.id);
          showSave("saved", "Merged into " + ex.name);
          removeFromCache(cand.recurringEventId);
        } }, "Merge into existing"));
      }
      acts.append(ce("button", { class: "btn tiny", onclick: () => removeFromCache(cand.recurringEventId) }, "Skip"));
      acts.append(ce("button", { class: "btn tiny danger", onclick: () => {
        STATE.dismissedRecurringEventIds = STATE.dismissedRecurringEventIds || [];
        STATE.dismissedRecurringEventIds.push(cand.recurringEventId);
        persistState("Dismiss " + cand.recurringEventId);
        removeFromCache(cand.recurringEventId);
      } }, "Always skip"));
      card.append(acts);

      // Inline-expand details panel — shown when this card is the expandedAddCardId
      if (isExpanded) {
        const panel = ce("div", { class: "discovery-expand" });
        // Name (pre-filled from event summary)
        panel.append(ce("label", {}, "Name"));
        const nameInp = ce("input", { type: "text", value: samp.summary || "" });
        panel.append(nameInp);
        // Role
        panel.append(ce("label", {}, "Your role on this committee"));
        const roleSel = ce("select", {});
        [["owner","Owner — I drive this meeting"],["contributor","Contributor — I attend and engage"],["optional","Optional — I rarely engage"]].forEach(([val, lbl]) => {
          const o = ce("option", { value: val }, lbl);

        // Purpose

        const purposeInp = ce("textarea", { placeholder: "Why this meeting exists — feeds the 'what to ask the team' prompt." });
        panel.append(purposeInp);
        // v3.4.1a — Project assignment (with auto-suggestion based on title + attendees)
        panel.append(ce("label", {}, "Linked project (optional)"));
        const activeProjects = (STATE.projects || []).filter(p => p.status !== "done");
        const projSel = ce("select", {});
        projSel.append(ce("option", { value: "" }, "— No project —"));
        activeProjects.forEach(p => projSel.append(ce("option", { value: p.id }, p.name)));
        // Auto-suggest the top-scoring project from suggestProjectFor
        const sugg = suggestProjectFor(samp.summary || "", cand.attendees.map(a => a.email));
        if (sugg.length) {
          projSel.value = sugg[0].project.id;
          panel.append(ce("div", { class: "meta", style: "font-size:10px;margin-top:2px" }, "Auto-suggested: " + sugg[0].project.name + " (" + sugg[0].reasons.join(", ") + ")"));
        }
        panel.append(projSel);
        // Save / Cancel buttons
        const btnRow = ce("div", { style: "display:flex;gap:6px;margin-top:6px" });

          const seed = {
            recurringEventId: cand.recurringEventId,
            name: nameInp.value || samp.summary || "",

            cadence: "",
            role: roleSel.value,
            projectIds: projSel.value ? [projSel.value] : [],
            members: cand.attendees.map(a => ({
              email: a.email,
              name: a.displayName || a.email.split("@")[0],

            }))

          addCommittee(seed, { noNavigate: true });
          showSave("saved", "Added: " + (seed.name || "(unnamed)"));
          removeFromCache(cand.recurringEventId);
        } }, "Save"));
        btnRow.append(ce("button", { class: "btn tiny", onclick: () => {
          expandedAddCardId = null;
          renderDiscoveryView();
        } }, "Cancel"));
        panel.append(btnRow);
        card.append(panel);
      }

      dos.append(card);
    });
  }

    const setSectionState = (key, collapsed) => { try { localStorage.setItem("tmm." + key + ".collapsed", collapsed ? "1" : "0"); } catch (e) {} };

        dos.append(ce("h2", {}, "Committee discovery"));
        dos.append(ce("div", { class: "due" }, "Walking 12 months of calendar (filtered to events involving you) in monthly chunks… this can take ~30s. Keep this artifact in view — switching tabs interrupts lookups."));

    root.append(renderSection("committees", "Committees", (STATE.committees || []).length, "Add committee", () => addCommittee(), commBody));

    // Projects (v3.3.0b — filter archived by default; show via toggle)
    const projBody = ce("div", { class: "roster-section-body", id: "roster-projects" });

    const archivedProjects = allProjects.filter(p => p.status === "done");

    } else {

        const row = ce("div", { title: (pr.name || "(unnamed)") + " · " + (pr.status || "active"), class: "partner-row" + (isActive ? " active" : "") + (pr.status === "done" ? " archived" : ""), onclick: () => {

    // Reference & Settings (v3.5.1 — added settings; dark mode lives here)
    const footer = ce("div", { class: "sidebar-footer", id: "sidebar-footer" });
    footer.append(ce("h2", { class: "views-h" }, "Reference & Settings"));
    footer.append(ce("div", { title: "Definitions", class: "view-row" + (STATE.selectedView === "definitions" ? " active" : ""), onclick: () => { STATE.selectedView = "definitions"; renderRoster(); renderDossier(); } }, [ce("div", { class: "view-icon" }, "📖"), ce("div", {}, "Definitions")]));
    // v3.5.1 — Theme toggle moved here. Render as a view-row so it matches Definitions visually.
    const isDark = document.documentElement.classList.contains("theme-dark");
    footer.append(ce("div", {
      title: isDark ? "Switch to light mode" : "Switch to dark mode",
      class: "view-row",
      onclick: () => {
        const goingDark = !document.documentElement.classList.contains("theme-dark");
        document.documentElement.classList.toggle("theme-dark", goingDark);
        try { localStorage.setItem("tmm.v3.theme", goingDark ? "dark" : "light"); } catch (e) {}
        renderRoster();
      }
    }, [
      ce("div", { class: "view-icon" }, isDark ? "☀" : "☾"),
      ce("div", {}, isDark ? "Light mode" : "Dark mode")
    ]));
    // v3.5.3 — Export state to file. Click to download the localStorage shadow as JSON.
    footer.append(ce("div", {
      title: "Download your data as a JSON file (for travel / backup / cross-PC transfer)",
      class: "view-row",
      onclick: () => exportStateToFile()
    }, [
      ce("div", { class: "view-icon" }, "⬇"),
      ce("div", {}, "Export state")
    ]));
    // v3.5.3 — Import state from file. Click to open a modal where you paste exported JSON.
    footer.append(ce("div", {

      onclick: () => openImportStateModal()

    ]));
    root.append(footer);
  }

  // v3.5.3 — Export/Import state helpers
  function exportStateToFile() {
    try {
      const raw = localStorage.getItem(SHADOW_KEY);
      if (!raw) {
        alert("No saved state found in this browser's storage. Have you used the artifact yet?");
        return;
      }
      // Validate parse before download
      let parsed;
      try { parsed = JSON.parse(raw); } catch (e) {
        alert("Saved state is corrupt — can't parse JSON. See console for details.");
        console.error("[v3.5.3 export] JSON parse failed", e, raw.slice(0, 400));
        return;
      }
      const counts = {
        partners: (parsed.state && parsed.state.partners || []).length,
        committees: (parsed.state && parsed.state.committees || []).length,
        projects: (parsed.state && parsed.state.projects || []).length,
        items: parsed.itemCount || 0,
        savedAt: parsed.savedAt
      };
      const blob = new Blob([raw], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const stamp = new Date().toISOString().replace(/[:.]/g, "-").slice(0, 19);
      a.href = url;
      a.download = "tmm-state-export-" + stamp + ".json";
      a.click();
      URL.revokeObjectURL(url);
      console.log("[v3.5.3 export] Downloaded", a.download, counts);
      showSave("saved",
        "Exported " + counts.partners + " partners + " +
        counts.committees + " committees + " + counts.projects + " projects (" +
        a.download + ")"
      );
    } catch (e) {
      console.error("[v3.5.3 export] failed", e);
      alert("Export failed: " + (e && e.message ? e.message : e));
    }
  }
  function openImportStateModal() {
    // Build modal on-demand so we don't bloat HTML with seldom-used UI
    const backdrop = ce("div", { id: "import-state-backdrop", style: "position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:10000;display:flex;align-items:center;justify-content:center" });
    const modal = ce("div", { style: "background:var(--bg);color:var(--fg);border:1px solid var(--line);border-radius:8px;padding:20px;width:min(640px,92vw);max-height:80vh;overflow:auto;box-shadow:0 12px 40px rgba(0,0,0,0.4)" });
    modal.append(ce("h3", { style: "margin:0 0 8px" }, "Import state"));
    modal.append(ce("div", { class: "meta", style: "font-size:13px;line-height:1.5;margin-bottom:12px" },
      "Paste the entire contents of an exported JSON file below. This REPLACES the current state in this browser. The current state will be backed up to localStorage under tmm.v3.preImportBackup so it's recoverable if needed."));
    const textarea = ce("textarea", {
      id: "import-state-textarea",
      placeholder: "Paste the full JSON content of your exported file here...",
      style: "width:100%;min-height:200px;font-family:ui-monospace,monospace;font-size:11px;padding:8px;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--fg);box-sizing:border-box"
    });
    modal.append(textarea);
    const stats = ce("div", { id: "import-state-stats", class: "meta", style: "font-size:12px;margin-top:8px;min-height:18px" }, "");
    modal.append(stats);
    textarea.addEventListener("input", () => {
      const v = textarea.value.trim();
      if (!v) { stats.textContent = ""; return; }
      try {
        const p = JSON.parse(v);
        const ps = (p.state && p.state.partners || []).length;
        const cs = (p.state && p.state.committees || []).length;
        const prj = (p.state && p.state.projects || []).length;
        stats.textContent = "Looks valid: " + ps + " partners, " + cs + " committees, " + prj + " projects" +
          (p.savedAt ? " (saved " + new Date(p.savedAt).toLocaleString() + ")" : "");
        stats.style.color = "var(--good)";
      } catch (e) {
        stats.textContent = "Not valid JSON yet (" + e.message + ")";
        stats.style.color = "var(--bad)";
      }
    });
    const btnRow = ce("div", { style: "display:flex;gap:8px;justify-content:flex-end;margin-top:14px" });
    const cancelBtn = ce("button", { class: "btn", onclick: () => backdrop.remove() }, "Cancel");
    const importBtn = ce("button", { class: "btn primary", onclick: () => doImportState(textarea.value, backdrop) }, "Import + reload");
    btnRow.append(cancelBtn);
    btnRow.append(importBtn);
    modal.append(btnRow);
    backdrop.append(modal);
    document.body.append(backdrop);
    setTimeout(() => textarea.focus(), 50);
  }
  function doImportState(text, backdropEl) {
    const trimmed = (text || "").trim();
    if (!trimmed) { alert("Paste the JSON contents first."); return; }
    let parsed;
    try { parsed = JSON.parse(trimmed); } catch (e) {
      alert("Not valid JSON: " + e.message);
      return;
    }
    if (!parsed.state || typeof parsed.state !== "object") {
      alert("JSON doesn't have a 'state' field. Are you sure this is an exported tmm-state-export-*.json file?");
      return;
    }
    if (!confirm(
      "Replace current state with imported data?\n\n" +
      "Current: " + ((STATE.partners || []).length) + " partners / " + ((STATE.committees || []).length) + " committees / " + ((STATE.projects || []).length) + " projects\n" +
      "Importing: " + ((parsed.state.partners || []).length) + " partners / " + ((parsed.state.committees || []).length) + " committees / " + ((parsed.state.projects || []).length) + " projects\n\n" +
      "Current state will be backed up to localStorage under tmm.v3.preImportBackup."
    )) return;
    try {
      // Back up current state before replacing
      const cur = localStorage.getItem(SHADOW_KEY);
      if (cur) localStorage.setItem("tmm.v3.preImportBackup", cur);
      // Write the new shadow
      localStorage.setItem(SHADOW_KEY, trimmed);
      console.log("[v3.5.3 import] Replaced shadow. Reloading...");
      if (backdropEl) backdropEl.remove();
      location.reload();
    } catch (e) {
      console.error("[v3.5.3 import] failed", e);
      alert("Import failed: " + (e && e.message ? e.message : e));
    }
  }

  function relshipShort(rt) {
    if (rt === "supervisor_of") return "Supervises";
    if (rt === "reports_to") return "Reports to";
    return "Peer";
  }

  function renderDossier() {
    const dos = document.getElementById("dossier"); dos.innerHTML = "";
    if (STATE.selectedView === "definitions") { renderDefinitions(); return; }
    // "today" view orphaned in Quick Views Overhaul — legacy persisted state redirects to MY TASKS
    if (STATE.selectedView === "today") { STATE.selectedView = "mytasks"; renderMyTasksView(); return; }
    if (STATE.selectedView === "mytasks") { renderMyTasksView(); return; }
    if (STATE.selectedView === "tag" && STATE.activeTagFilter) { renderTagView(STATE.activeTagFilter); return; }
    if (STATE.selectedView === "filter" && STATE.activeFilter) { renderFilterView(STATE.activeFilter); return; }
    if (STATE.selectedView === "discovery") {
      // If we have a cached result, repaint from it; otherwise leave whatever the discovery flow drew
      if (discoveryCache) renderDiscoveryView();
      return;
    }
    if (STATE.selectedView === "friday-planning") { renderFridayPlanning(); return; }
    if (STATE.selectedView === "collaborator") { renderCollaboratorPanel(STATE.selectedCollaboratorId); return; }

    // v3.2 — dispatch on selectedKind
    if (STATE.selectedKind === "committee") {
      const c = (STATE.committees || []).find(x => x.id === STATE.selectedCommitteeId);
      if (c) { renderCommitteeDossier(c); return; }
      // fall through if id missing
    }
    // v3.3 — project dispatch
    if (STATE.selectedKind === "project") {
      const pr = (STATE.projects || []).find(x => x.id === STATE.selectedProjectId);
      if (pr) { renderProjectDossier(pr); return; }
    }

    dos.append(renderSprintStrip());
    const p = STATE.partners.find(x => x.id === STATE.selectedPartnerId);
    if (!p) { dos.append(ce("div", { style: "color:var(--muted);padding:20px 0" }, "No partner selected. Click + Add to create one.")); loadSprintStrip(); return; }

    const head = ce("div", { class: "pheader" }, [ce("div", {}, [ce("h1", {}, [p.name || "(unnamed)", ce("span", { class: "role" }, p.role || "")]), ce("div", { class: "cadence" }, p.cadence || "")])]);
    dos.append(head);

    const balance = renderBalanceRibbon(p); if (balance) dos.append(balance);
    dos.append(renderPreReadDigest(p));
    const tray = renderTray(p); if (tray) dos.append(tray);
    // TSKMGR-55 — UAT mirror: any UAT items assigned to this partner as the tester.
    // Read-only — managed in the All UAT view; this is a derived surface for 1:1 visibility.
    try {
      const uatMirror = renderPartnerUatMirror(p);
      if (uatMirror) dos.append(uatMirror);
    } catch (e) { console.warn("[renderPartnerUatMirror] failed", e); }

    const nm = ce("section", { class: "block" }, [ce("h3", {}, ["Next meeting", ce("span", { class: "pill live" }, "live")]), ce("div", { class: "live-snap", id: `next-${p.id}` }, "Loading…")]);
    dos.append(nm);

    const jiraSec = renderJiraSection(p); if (jiraSec) dos.append(jiraSec);

    const agendaSec = ce("section", { class: "block" });
    agendaSec.append(ce("h3", {}, ["Suggested agenda", ce("span", { class: "pill synth" }, "synth"), ce("div", { class: "actions-row", style: "margin-left:auto" }, [ce("button", { class: "btn", onclick: () => openInviteModal(p) }, "Copy to invite →")])]));
    const bs = budgetStrip(p); if (bs) agendaSec.append(bs);
    const agendaUl = ce("ul", { class: "agenda-list" });
    if (!p.agenda.length) agendaUl.append(ce("li", {}, ce("div", { class: "due" }, "No agenda items yet.")));
    p.agenda.forEach(a => {
      const cb = ce("input", { type: "checkbox" });
      cb.checked = !!a.completed;
      cb.addEventListener("change", () => { a.completed = cb.checked; if (cb.checked) stampDone(a); else a.done_at = null; if (cb.checked && a.coveredStatus === "needs_review") a.coveredStatus = "covered"; persistState("Toggle agenda check"); });
      const body = ce("div", { class: "body" });
      const ttl = ce("div", { class: "ttl", style: "display:flex;flex-wrap:wrap;align-items:center;gap:4px" });
      ttl.append(prioritySelect(a));
      appendNewBadge(ttl, a); // v3.4.9
      const titleSpan = ce("span", {}, a.title || "(click to edit)");
      inlineEdit(titleSpan, () => a.title, (v) => a.title = v, { size: "title", persistReason: "Edit agenda title" });
      ttl.append(titleSpan);
      const minSpan = ce("span", { class: "agenda-min" }, a.minutes ? a.minutes + "m" : "—m");
      inlineEdit(minSpan, () => a.minutes, (v) => a.minutes = v, { size: "min", inputType: "number", persistReason: "Edit agenda minutes", tooltip: "Click to edit minutes estimate" });
      ttl.append(minSpan);
      ttl.append(categorySelect(a));
      if (a.coveredStatus && a.coveredStatus !== "pending") ttl.append(ce("span", { class: "cov-tag " + a.coveredStatus }, a.coveredStatus.replace("_", " ")));
      if (a.rolledForward) ttl.append(ce("span", { class: "cov-tag needs_review" }, "rolled forward"));
      if (a.carriedForwardFrom) ttl.append(ce("span", { class: "carried-badge" }, "▲ carried forward"));
      body.append(ttl);
      const det = ce("div", { class: "det" });
      const detSpan = ce("span", {}, a.detail || "(click to add detail)");
      inlineEdit(detSpan, () => a.detail, (v) => a.detail = v, { size: "detail", multiline: true, persistReason: "Edit agenda detail" });
      det.append(detSpan);
      if (a.relatedDoc) { det.append(document.createTextNode(" ")); det.append(ce("a", { href: a.relatedDoc.url, target: "_blank", rel: "noopener" }, a.relatedDoc.title)); }
      body.append(det);
      const tagsEl = tagPills(a.tags); if (tagsEl) body.append(tagsEl);
      const li = ce("li", { class: priorityClass(a.priority) }, [ce("div", { class: "agenda-line" }, [cb, body])]);
      agendaUl.append(li);
    });
    agendaSec.append(agendaUl);
    dos.append(agendaSec);

    // v3.4.3a — Cross-pollination from committees (action items where this partner is the assignee)
    const cpPanel = renderCrossPollinationPanel(p);
    if (cpPanel) dos.append(cpPanel);

    const com = ce("section", { class: "block" });
    com.append(ce("h3", {}, ["Open commitments", ce("span", { class: "pill synth" }, "synth + verified")]));
    const cols = ce("div", { class: "commit-cols" });
    cols.append(commitCol("Owen → " + (p.name ? p.name.split(" ")[0] : "Partner"), p.commitments.ownerToPartner));
    cols.append(commitCol((p.name ? p.name.split(" ")[0] : "Partner") + " → Owen", p.commitments.partnerToOwner));
    // Joint commitments get a small "joint" pill per row so they're visually
    // distinct as agenda-worthy discussion candidates for the 1:1 (Wave 1 polish).
    cols.append(commitCol("Joint", p.commitments.joint, { lane: "joint" }));
    com.append(cols);
    dos.append(com);

    const decSec = ce("section", { class: "block" });
    decSec.append(ce("h3", {}, ["Recent decisions", ce("span", { class: "pill synth" }, "synth")]));
    const decUl = ce("ul", { class: "decisions" });
    p.decisions.filter(d => !d.pendingConfirmation).forEach(d => {
      const li = ce("li", {});
      li.append(document.createTextNode(d.text + " "));
      li.append(ce("span", { class: "when" }, "(" + fmtDate(d.when) + ")"));
      const tagsEl = tagPills(d.tags); if (tagsEl) li.append(tagsEl);
      decUl.append(li);
    });
    if (!decUl.children.length) decUl.append(ce("li", {}, ce("div", { class: "due" }, "No decisions logged yet.")));
    decSec.append(decUl);
    dos.append(decSec);

    const thr = ce("section", { class: "block threads" });
    thr.append(ce("h3", {}, ["Topic threads", ce("span", { class: "pill synth" }, "synth")]));
    if (!p.topicThreads.length) thr.append(ce("div", { class: "due" }, "No threads logged yet."));
    p.topicThreads.forEach(t => {
      const body = ce("div", { class: "body" });
      body.append(document.createTextNode(t.summary));
      const tagsEl = tagPills(t.tags); if (tagsEl) body.append(tagsEl);
      thr.append(ce("details", {}, [ce("summary", {}, t.title), body]));
    });
    dos.append(thr);

    const lg = ce("section", { class: "block log" });
    lg.append(ce("h3", {}, ["Meeting log", ce("span", { class: "pill synth" }, "synth")]));
    if (!p.meetingLog || !p.meetingLog.length) lg.append(ce("div", { class: "due" }, "Will fill in as the reconciler runs."));
    else p.meetingLog.forEach(m => lg.append(ce("details", {}, [ce("summary", {}, fmtDate(m.date) + " — " + (m.summary.length > 80 ? m.summary.slice(0, 77) + "…" : m.summary)), ce("div", { class: "body" }, m.summary)])));
    dos.append(lg);

    dos.append(renderProfile(p));
    loadSprintStrip();
    loadNext(p);
    if (p.jiraQueries && p.jiraQueries.length) loadJira(p);
  }

  function commitCol(label, list, opts) {
    opts = opts || {};
    const col = ce("div", { class: "commit-col" });
    col.append(ce("h4", {}, label));
    if (!list.length) col.append(ce("div", { class: "due" }, "—"));
    list.forEach(c => {
      const icon = ce("span", { class: "verify-icon " + (c.verifyStatus || "pending") }, iconFor(c.verifyStatus));
      const headLine = ce("div", { style: "display:flex;align-items:center;gap:4px;flex-wrap:wrap" });
      headLine.append(prioritySelect(c));
      appendNewBadge(headLine, c); // v3.4.9
      // Joint-lane visual cue — agenda-discussion candidate for the 1:1.
      if (opts.lane === "joint") headLine.append(ce("span", { class: "lane-pill lane-joint", title: "Shared work — surface in the 1:1 agenda" }, "joint"));
      const commitTextSpan = ce("span", {}, c.text || "(click to edit)");
      inlineEdit(commitTextSpan, () => c.text, (v) => c.text = v, { size: "title", multiline: true, persistReason: "Edit commitment text" });
      headLine.append(commitTextSpan);
      headLine.append(statusSelectEl(c));
      if (c.status === "blocked" && c.blockedOn) headLine.append(ce("span", { class: "blocked-on" }, "blocked on: " + c.blockedOn));
      headLine.append(categorySelect(c));
      const meta = ce("div", { class: "due" });
      meta.append(document.createTextNode("due "));
      const dueSpan = ce("span", {}, c.dueBy ? fmtDate(c.dueBy) : "—");
      inlineEdit(dueSpan, () => c.dueBy, (v) => c.dueBy = v, { size: "date", inputType: "date", persistReason: "Edit due date", tooltip: "Click to set/edit due date" });
      meta.append(dueSpan);
      const body = ce("div", { class: "body", style: "flex:1" }, [headLine, meta]);
      const tagsEl = tagPills(c.tags); if (tagsEl) body.append(tagsEl);
      // v3.4.2a — show source_context if set
      const ctxEl = renderContextLine(c);
      if (ctxEl) body.append(ctxEl);
      col.append(ce("div", { class: "commit-row " + priorityClass(c.priority) }, [icon, body]));
    });
    return col;
  }
  function iconFor(s) { return s === "verified" ? "✓" : s === "missing" ? "✗" : s === "unknown" ? "?" : "●"; }

  async function loadNext(p) {
    const live = await ensureLive(p.id);
    const el = document.getElementById(`next-${p.id}`); if (!el) return;
    el.innerHTML = "";
    if (!live || !live.nextMeeting) {
      el.append(ce("div", { class: "lbl" }, "next meeting"));
      const scanned = (live && live.scannedCount != null) ? live.scannedCount : "?";
      const shape = (live && live.responseShape) || "?";
      el.append(ce("div", {}, "No 1:1 found with " + (p.email || "(no email set)") + " in the next " + SEARCH_DAYS + " days. Scanned " + scanned + " events. Response shape: " + shape + "."));
      if (live && live.errors.length) el.append(ce("div", { class: "err" }, live.errors.join(" · ")));
      return;
    }
    const m = live.nextMeeting;
    el.append(ce("div", { class: "lbl" }, "next meeting"));
    el.append(ce("div", { class: "row" }, [ce("strong", {}, m.summary || "(untitled)")]));
    if (m.start) el.append(ce("div", { class: "row" }, fmtDT(m.start)));
    if (m.moved && m.originalStart) el.append(ce("div", { class: "row moved" }, "moved from " + fmtDT(m.originalStart)));
    if (m.location) el.append(ce("div", { class: "row" }, m.location));
    if (m.link) el.append(ce("div", { class: "row" }, [ce("a", { href: m.link, target: "_blank", rel: "noopener" }, "Open in Google Calendar")]));
  }

  let modalPartnerId = null;
  function openInviteModal(p) {
    modalPartnerId = p.id;
    const live = liveCache[p.id]; const m = live && live.nextMeeting;
    document.getElementById("modal-title").textContent = `Send agenda to invite — ${p.name || p.id}`;
    document.getElementById("modal-sub").textContent = m ? `Will update: ${m.summary} (${fmtDT(m.start)})` : "No upcoming invite found yet — open the partner's view first to load.";
    const body = document.getElementById("modal-body"); body.innerHTML = "";
    p.agenda.forEach((a, idx) => {
      const cb = ce("input", { type: "checkbox", "data-invite-idx": String(idx) });
      cb.checked = !a.completed;
      body.append(ce("label", {}, [cb, ce("strong", {}, a.title), document.createTextNode(" — "), document.createTextNode(a.detail)]));
    });
    document.getElementById("modal-backdrop").classList.add("open");
  }
  function closeModal() { document.getElementById("modal-backdrop").classList.remove("open"); modalPartnerId = null; }
  document.getElementById("modal-cancel").addEventListener("click", closeModal);
  document.querySelectorAll("[data-modal-action]").forEach(btn => btn.addEventListener("click", () => {
    const action = btn.getAttribute("data-modal-action");
    const p = STATE.partners.find(x => x.id === modalPartnerId); if (!p) return;
    document.querySelectorAll("#modal-body input[data-invite-idx]").forEach(el => { const idx = parseInt(el.dataset.inviteIdx, 10); const a = p.agenda[idx]; if (action === "all") el.checked = true; else if (action === "none") el.checked = false; else if (action === "open") el.checked = !a.completed; });
  }));
  document.getElementById("modal-confirm").addEventListener("click", async () => {
    const p = STATE.partners.find(x => x.id === modalPartnerId); if (!p) return closeModal();
    const live = liveCache[p.id]; const m = live && live.nextMeeting;
    if (!m) { showSave("error", "No invite found for this partner."); return closeModal(); }
    const selected = [];
    document.querySelectorAll("#modal-body input[data-invite-idx]").forEach(el => { if (el.checked) selected.push(p.agenda[parseInt(el.dataset.inviteIdx, 10)]); });
    if (!selected.length) { showSave("error", "Pick at least one item."); return; }
    const html = `<b>Pre-meeting agenda from Owen</b><br><br><ul>` + selected.map(a => { const docPart = a.relatedDoc ? `<br><a href="${a.relatedDoc.url}">${a.relatedDoc.title}</a>` : ""; return `<li><b>${escapeHtml(a.title)}</b><br>${escapeHtml(a.detail)}${docPart}</li>`; }).join("") + `</ul><br><i>Sent via Owen's 1:1 Prep tool · ${new Date().toLocaleString()}</i>`;
    showSave("saving", "Updating invite…");
    try { await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__update_event", { eventId: m.id, description: html, notificationLevel: "ALL" }); showSave("saved", "Invite updated"); closeModal(); }
    catch (e) { showSave("error", "Update failed: " + (e && e.message ? e.message : e)); }
  });
  function escapeHtml(s) { return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  // The "+ Add partner" button now lives inside the Partners section header — wired via the renderSection() addHandler param.
  document.getElementById("quick-capture-fab").addEventListener("click", openQuickCapture);
  // v3.4.4c — wire target-kind change to swap partner/committee row visibility
  document.getElementById("qc-target-kind").addEventListener("change", qcUpdateTargetVisibility);
  document.getElementById("qc-cancel").addEventListener("click", closeQuickCapture);
  document.getElementById("qc-save").addEventListener("click", saveQuickCapture);
  document.getElementById("qc-backdrop").addEventListener("click", (e) => { if (e.target.id === "qc-backdrop") closeQuickCapture(); });

  // TSKMGR-67 — Task Detail Modal close affordances: X button, backdrop click, Escape key.
  (function wireTaskDetailModalClose() {
    const back = document.getElementById("task-detail-backdrop");
    const closeBtn = document.getElementById("task-detail-close");
    if (closeBtn) closeBtn.addEventListener("click", closeTaskDetailModal);
    if (back) back.addEventListener("click", (e) => {
      // Only close when clicking the backdrop itself, not the modal panel
      if (e.target === back) closeTaskDetailModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && back && back.classList.contains("open")) {
        closeTaskDetailModal();
      }
    });
  })();

  // v3.4.1a — One-time project seeding for "Connections" + "SCRC Salesforce".
  // Idempotent: guarded by STATE.seedFlags.v341a so it runs at most once. Auto-links existing
  // committees by name pattern. Doesn't create committees that don't exist (those come from
  // calendar discovery).
  STATE.seedFlags = STATE.seedFlags || {};
  // Seed config — re-checked each load so additive fields (e.g. shortCode added in v3.4.1b.1)
  // patch onto previously-seeded projects without re-running the full seed.
  const PROJECT_SEED = [
    { id: "connections", name: "Connections", shortCode: "CN", description: "Connections platform — discipleship tracking, donor system migration, related projects.", tagAlias: "Connections", committeePatterns: [/discipleship\s*tracker/i] },
    { id: "scrc-salesforce", name: "SCRC Salesforce", shortCode: "SF", description: "Salesforce / SCRC migration work — EMS sync, SCRC check-ins.", tagAlias: "SCRC", committeePatterns: [/salesforce\s*scrc/i, /\bscrc\b/i, /ems.*salesforce/i, /salesforce.*ems/i] }
  ];
  let seededAny = false;
  if (!STATE.seedFlags.v341a) {
    PROJECT_SEED.forEach(seed => {
      let proj = (STATE.projects || []).find(p => p.id === seed.id || p.name.toLowerCase() === seed.name.toLowerCase());
      if (!proj) {
        STATE.projects = STATE.projects || [];
        // TSKMGR-61 — normalize seeded projects so they pick up the full canonical shape (committeeIds, slackChannelId, etc.).
        proj = normalizeProject({ id: seed.id, name: seed.name, shortCode: seed.shortCode, description: seed.description, status: "active", tagAlias: seed.tagAlias });
        STATE.projects.push(proj);
        seededAny = true;
      }
      // Link any existing committee whose name matches a pattern
      (STATE.committees || []).forEach(c => {
        if (!c.name) return;
        const matched = seed.committeePatterns.some(re => re.test(c.name));
        if (matched) {
          c.projectIds = c.projectIds || [];
          if (!c.projectIds.includes(proj.id)) {
            // TSKMGR-61 — keep bidirectional mirror consistent during seed migration.
            c.projectIds.push(proj.id);
            if (!Array.isArray(proj.committeeIds)) proj.committeeIds = [];
            if (!proj.committeeIds.includes(c.id)) proj.committeeIds.push(c.id);
            seededAny = true;
          }
        }
      });
    });
    STATE.seedFlags.v341a = true;
  }
  // v3.4.1b.1 — backfill shortCode onto already-seeded projects + Discipleship-Tracker committees if blank
  if (!STATE.seedFlags.v341b1) {
    PROJECT_SEED.forEach(seed => {
      const proj = (STATE.projects || []).find(p => p.id === seed.id);
      if (proj && !proj.shortCode) { proj.shortCode = seed.shortCode; seededAny = true; }
    });
    STATE.seedFlags.v341b1 = true;
  }
  if (seededAny) { try { persistState("Seed projects + shortCodes"); } catch (e) {} }

  // v3.4.8 — Reverse the v3.4.7 migration: Owen wanted Category to STAY as "Status";
  // the lifecycle concept is the one renamed to "Progress" (display only — data field stays as "status").
  // This walk converts any item that was migrated to category="progress" back to category="status".
  // Idempotent: guarded by seedFlags.v348.
  if (!STATE.seedFlags.v348) {
    let reverted = 0;
    function revertCat(item) { if (item && item.category === "progress") { item.category = "status"; reverted++; } }
    (STATE.partners || []).forEach(p => {
      (p.agenda || []).forEach(revertCat);
      ["ownerToPartner", "partnerToOwner", "joint"].forEach(lane => {
        (p.commitments && p.commitments[lane] || []).forEach(revertCat);
      });
    });
    (STATE.committees || []).forEach(c => {
      (c.agenda || []).forEach(revertCat);
      (c.actionItems || []).forEach(revertCat);
    });
    (STATE.projects || []).forEach(pr => {
      (pr.actionItems || []).forEach(revertCat);
    });
    STATE.seedFlags.v348 = true;
    if (reverted) { try { persistState("Revert v3.4.7 — restore category=status (" + reverted + " items)"); } catch (e) {} }
    else { try { persistState("v3.4.8 migration flag (nothing to revert)"); } catch (e) {} }
  }

  // v3.4.10 — Data-hardening hooks at end of init:
  // 1. Compare embedded state against localStorage shadow; if shadow has more
  //    items, the user just lost data and we surface a Restore banner.
  // 2. Always update the shadow with whatever loaded successfully — even if no
  //    Restore is needed, the shadow keeps tracking the user's working set.
  try { checkShadowOnLoad(); } catch (e) { console.error("[v3.4.10] checkShadowOnLoad failed", e); }

  // TSKMGR-61 — self-heal project + committee shape from hydrated state. Adds
  // any new canonical fields with defaults, rebuilds the bidirectional
  // committee↔project mirror, warns to console on required-field gaps.
  // Runs before archive sweep / first render so downstream code can rely on
  // the canonical shape (e.g., assuming project.committeeIds is an array).
  try { migrateProjectsAndCommittees(); } catch (e) { console.error("[TSKMGR-61] migrateProjectsAndCommittees failed", e); }

  // TSKMGR-54 — run archive sweep on app load so any midnight-crossing rolls items out before first paint
  try { runArchiveSweep(); } catch (e) { console.warn("[archive sweep on load] failed", e); }

  // TSKMGR-debug 2026-05-12 — wrap initial render in try so a single throw deep
  // inside one view doesn't abort the rest of boot (esp. _wireArtifactSyncUI and
  // the interval-archive-sweep setup below). Each function still re-runs on
  // every state mutation, so a one-shot failure here is recoverable.
  try { renderRoster(); } catch (e) { console.error("[TSKMGR-debug boot] renderRoster failed", e); }
  try { renderDossier(); } catch (e) { console.error("[TSKMGR-debug boot] renderDossier failed", e); }

  // TSKMGR-69 — wire up the manual "Sync to artifact" button, the relative-time
  // status label, and the visibility/beforeunload best-effort listeners. Does
  // NOT trigger a sync on boot — _lastSyncedSnapshot was seeded at IIFE init
  // from the just-hydrated state, so the first sync only fires after a real
  // user-initiated persistState (which is the desired behavior).
  try { _wireArtifactSyncUI(); } catch (e) { console.warn("[TSKMGR-69] _wireArtifactSyncUI failed", e); }

  // TSKMGR-54 — defensive 60s interval sweep for long-running sessions across midnight
  setInterval(() => {
    try {
      const moved = runArchiveSweep();
      if (moved > 0) {
        try { writeShadowState("Interval archive sweep — " + moved + " item(s)"); } catch (e) {}
        if (STATE.selectedView === "mytasks") {
          try { renderDossier(); } catch (e) { console.warn("[interval sweep render] failed", e); }
        }
      }
    } catch (e) {
      console.warn("[interval archive sweep] failed", e);
    }
  }, 60 * 1000);

  // Write the shadow AFTER first render so any seedFlags migration runs above
  // are baked in. Wrapped in try because localStorage may be unavailable.
  try { writeShadowState("Initial load v3.4.10 (Wave 2)"); } catch (e) {}
})();
</script>

</body>
</html>
