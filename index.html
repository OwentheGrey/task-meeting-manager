    if (ev.result != null) return unwrapMcp(ev.result);
    if (ev.data != null && typeof ev.data === "object") return { data: ev.data, shape: "ev.data" };
    return { data: ev, shape: "object{" + Object.keys(ev).slice(0,6).join(",") + "}" };
  }
  function pickArr(obj, key) { if (!obj) return null; if (key && Array.isArray(obj[key])) return obj[key]; if (Array.isArray(obj)) return obj; return null; }

  // ============================================================
  // TSKMGR-49 Part 2 — Email triage engine
  // ============================================================

  /** Collect every known email address from partners, committee members, and attendees. */
  function buildKnownEmailSet() {
    const s = new Set();
    s.add(OWNER_EMAIL.toLowerCase());
    (STATE.partners || []).forEach(function (p) { if (p.email) s.add(p.email.toLowerCase()); });
    (STATE.committees || []).forEach(function (co) {
      (co.members || []).forEach(function (m) { if (m.email) s.add(m.email.toLowerCase()); });
    });
    Object.values(STATE.committeeAttendees || {}).forEach(function (rec) {
      (rec.attendees || []).forEach(function (a) { if (a.email) s.add(a.email.toLowerCase()); });
    });
    (STATE.projects || []).forEach(function (pr) {
      (pr.members || []).forEach(function (m) { if (m.email) s.add(m.email.toLowerCase()); });
    });
    return s;
  }

  /** Map email → { name, kind, id } for routing email-derived tasks. */
  function buildKnownNameMap() {
    const m = new Map();
    (STATE.partners || []).forEach(function (p) {
      if (p.email) m.set(p.email.toLowerCase(), { name: p.name || "(partner)", kind: "partner", id: p.id });
    });
    (STATE.committees || []).forEach(function (co) {
      (co.members || []).forEach(function mem(mb) {
        if (mb.email && !m.has(mb.email.toLowerCase())) m.set(mb.email.toLowerCase(), { name: mb.displayName || mb.name || mb.email, kind: "committee", id: co.id });
      });
    });
    Object.entries(STATE.committeeAttendees || {}).forEach(function (pair) {
      var recEvId = pair[0], rec = pair[1];
      // Find committee by recurringEventId
      var co = (STATE.committees || []).find(function (c) { return c.recurringEventId === recEvId; });
      if (!co) return;
      (rec.attendees || []).forEach(function (a) {
        if (a.email && !m.has(a.email.toLowerCase())) m.set(a.email.toLowerCase(), { name: a.displayName || a.email, kind: "committee", id: co.id });
      });
    });
    (STATE.projects || []).forEach(function (pr) {
      (pr.members || []).forEach(function (mb) {
        if (mb.email && !m.has(mb.email.toLowerCase())) m.set(mb.email.toLowerCase(), { name: mb.name || mb.email, kind: "project", id: pr.id });
      });
    });
    return m;
  }

  // Phishing heuristics — lightweight client-side checks
  var PHISHING_PHRASES = /\b(verify your account|confirm your identity|suspended|locked out|click here immediately|urgent action required|your account will be|unusual sign-in|reset your password now|wire transfer|bitcoin|gift card)\b/i;
  var SUSPICIOUS_LINK_RE = /https?:\/\/[^\s]*\.(xyz|top|buzz|gq|tk|ml|ga|cf)\b/i;

  /**
   * Classify a single email thread. Returns { classification, confidence, candidateTaskTitle, suggestedAssignee }.
   * @param {object} thread - Full thread from get_thread MCP: { id, messages: [{ sender, to, cc, subject, body, date }] }
   * @param {Set} knownEmails
   * @param {Map} knownNames
   */
  // Gmail MCP field reference (discovered via debug panel):
  //   msg.sender        = plain email string ("user@example.com")
  //   msg.subject       = string
  //   msg.snippet        = HTML-encoded snippet (always present, truncated)
  //   msg.plaintextBody = full plain-text body (only on get_thread FULL_CONTENT, may be absent)
  //   msg.htmlBody      = full HTML body (only on get_thread FULL_CONTENT, may be absent)
  //   msg.toRecipients  = array of email strings  (NOT a comma-separated "to" string)
  //   msg.ccRecipients  = array of email strings  (may be absent)
  //   msg.date          = ISO string
  //   msg.labelIds      = array of label strings
  //   msg.id            = message ID
  // There is NO msg.body, msg.plaintext_body, msg.from, msg.to, or msg.cc field.

  /** Helper: get all recipient emails from a Gmail MCP message. */
  function getMsgRecipients(msg, field) {
    var val = msg[field];
    if (Array.isArray(val)) return val.map(function (e) { return extractEmail(String(e)).toLowerCase(); });
    if (typeof val === "string") return val.split(",").map(function (e) { return extractEmail(e).toLowerCase(); });
    return [];
  }

  function classifyEmailThread(thread, knownEmails, knownNames) {
    var msgs = thread.messages || [];
    if (!msgs.length) return { classification: "fyi", confidence: 0.5, candidateTaskTitle: null, suggestedAssignee: null };

    var lastInbound = null;
    for (var i = msgs.length - 1; i >= 0; i--) {
      var senderEmail = extractEmail(msgs[i].sender || "");
      if (senderEmail && senderEmail.toLowerCase() !== OWNER_EMAIL.toLowerCase()) { lastInbound = msgs[i]; break; }
    }
    if (!lastInbound) return { classification: "fyi", confidence: 0.6, candidateTaskTitle: null, suggestedAssignee: null };

    var sEmail = extractEmail(lastInbound.sender || "").toLowerCase();
    var senderKnown = knownEmails.has(sEmail);
    // Gmail MCP field names: plaintextBody (camelCase) on get_thread FULL_CONTENT,
    // snippet on both search_threads and get_thread. Prefer plaintextBody for classification.
    var rawBody = lastInbound.plaintextBody || lastInbound.snippet || "";
    // Decode HTML entities that may appear in snippet
    var body = rawBody.replace(/&#(\d+);/g, function (m, n) { return String.fromCharCode(n); }).replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').slice(0, 3000);
    var subject = lastInbound.subject || "";

    // === Phishing check ===
    if (!senderKnown) {
      var phishScore = 0;
      if (PHISHING_PHRASES.test(body)) phishScore += 0.4;
      if (SUSPICIOUS_LINK_RE.test(body)) phishScore += 0.3;
      // Display name spoofing: sender looks like a known person's email but is not in knownEmails
      var nameMatch = false;
      knownNames.forEach(function (val) { if (val.name && sEmail && val.name.toLowerCase().replace(/\s+/g, ".") === sEmail.split("@")[0]) nameMatch = true; });
      if (nameMatch) phishScore += 0.3;
      if (phishScore >= 0.5) return { classification: "phishing", confidence: Math.min(phishScore, 1), candidateTaskTitle: null, suggestedAssignee: null };
    }

    // === Check if Owen is only on CC (FYI) ===
    // Gmail MCP uses toRecipients (array) and ccRecipients (array), NOT "to"/"cc" strings
    var toEmails = getMsgRecipients(lastInbound, "toRecipients");
    var ccEmails = getMsgRecipients(lastInbound, "ccRecipients");
    var ownerInTo = toEmails.indexOf(OWNER_EMAIL.toLowerCase()) !== -1;
    var ownerInCc = ccEmails.indexOf(OWNER_EMAIL.toLowerCase()) !== -1;

    // === Newsletter / automated / mass-sender detection ===
    var senderStr = lastInbound.sender || "";
    var isAutomated = /\b(noreply|no-reply|notifications?@|mailer-daemon)\b/i.test(senderStr);
    // Mass-sender patterns: newsletter@, development@, sportscomplex@, marketing@, info@, etc.
    var isMassSender = /^(newsletter|development|marketing|info|events|communications?|announcements?|updates?|digest|bulletin|promotions?|sportscomplex)@/i.test(senderStr);
    // Subdomain mass-senders: @s.domain, @e.domain, @mail.domain, @email.domain
    var isSubdomainSender = /@(s|e|mail|email|send|bounce|notify)\./i.test(senderStr);
    var hasUnsubscribe = /unsubscribe/i.test(body);
    // Check for mass-email indicators in body/snippet
    var hasMassIndicators = /\b(view (this|in your) (email|browser)|click here|email preferences|opt.?out|manage.?subscriptions?|forward to a friend)\b/i.test(body);

    if (isAutomated || isMassSender || isSubdomainSender || hasUnsubscribe || hasMassIndicators) {
      return { classification: "fyi", confidence: 0.85 + (hasUnsubscribe ? 0.1 : 0), candidateTaskTitle: null, suggestedAssignee: null };
    }
    if (!ownerInTo && ownerInCc) {
      // CC-only — likely FYI unless there's a question
      var hasQuestion = /\?/.test(body);
      return { classification: hasQuestion ? "quick_reply" : "fyi", confidence: hasQuestion ? 0.55 : 0.75, candidateTaskTitle: null, suggestedAssignee: null };
    }

    // === Task detection ===
    var taskPatterns = /\b(can you|could you|please|action needed|action required|by (monday|tuesday|wednesday|thursday|friday|end of week|end of day|eod|eow|tomorrow)|need you to|assigned to you|your task|follow up on|take care of|make sure|ensure that|would you mind)\b/i;
    var hasTaskAsk = taskPatterns.test(body);
    var deadlineMatch = body.match(/\b(?:by|before|due|deadline)\s+(monday|tuesday|wednesday|thursday|friday|end of week|end of day|eod|eow|tomorrow|next week|\d{1,2}\/\d{1,2})/i);

    if (hasTaskAsk) {
      // Extract candidate task title from subject or first task-like sentence
      var taskTitle = subject.replace(/^(re:|fwd?:)\s*/gi, "").trim();
      if (!taskTitle) taskTitle = body.split(/[.!?\n]/).find(function (s) { return taskPatterns.test(s); }) || "(email task)";
      if (taskTitle.length > 80) taskTitle = taskTitle.slice(0, 77) + "…";

      // Suggest assignee from other thread participants
      var suggestedAssignee = null;
      var participants = [];
      msgs.forEach(function (m) {
        var e = extractEmail(m.sender || "");
        if (e && e.toLowerCase() !== OWNER_EMAIL.toLowerCase()) participants.push(e.toLowerCase());
        // Gmail MCP: toRecipients is an array of email strings
        getMsgRecipients(m, "toRecipients").forEach(function (addr) {
          if (addr && addr !== OWNER_EMAIL.toLowerCase()) participants.push(addr);
        });
      });
      // Pick the first known participant
      for (var pi = 0; pi < participants.length; pi++) {
        if (knownNames.has(participants[pi])) { suggestedAssignee = knownNames.get(participants[pi]); break; }
      }

      // Compute dueBy from deadline match
      var dueBy = null;
      if (deadlineMatch) {
        var dl = deadlineMatch[1].toLowerCase();
        var now = new Date();
        if (dl === "tomorrow") { dueBy = new Date(now); dueBy.setDate(dueBy.getDate() + 1); }
        else if (dl === "eod" || dl === "end of day") { dueBy = new Date(now); }
        else if (dl === "eow" || dl === "end of week") { dueBy = new Date(now); dueBy.setDate(dueBy.getDate() + (5 - dueBy.getDay())); }
        else if (dl === "next week") { dueBy = new Date(now); dueBy.setDate(dueBy.getDate() + (8 - dueBy.getDay())); }
        else if (/monday|tuesday|wednesday|thursday|friday/i.test(dl)) {
          var dayMap = { monday: 1, tuesday: 2, wednesday: 3, thursday: 4, friday: 5 };
          var target = dayMap[dl];
          dueBy = new Date(now);
          var diff = target - dueBy.getDay();
          if (diff <= 0) diff += 7;
          dueBy.setDate(dueBy.getDate() + diff);
        }
        if (dueBy) dueBy = dueBy.toISOString().slice(0, 10);
      }

      return {
        classification: "task", confidence: 0.7 + (deadlineMatch ? 0.15 : 0) + (senderKnown ? 0.1 : 0),
        candidateTaskTitle: taskTitle, suggestedAssignee: suggestedAssignee,
        dueBy: dueBy, dueBySource: dueBy ? "claude_low" : null,
        participants: participants
      };
    }

    // === Quick vs long reply ===
    var questionMarks = (body.match(/\?/g) || []).length;
    var wordCount = body.split(/\s+/).length;
    var threadLen = msgs.length;

    if (threadLen <= 2 && wordCount < 120 && questionMarks <= 1) {
      return { classification: "quick_reply", confidence: 0.7 + (wordCount < 50 ? 0.15 : 0), candidateTaskTitle: null, suggestedAssignee: null };
    }
    if (threadLen > 3 || wordCount > 300 || questionMarks >= 3) {
      return { classification: "long_response", confidence: 0.7 + (wordCount > 500 ? 0.1 : 0), candidateTaskTitle: null, suggestedAssignee: null };
    }
    // Default: quick for short, long for longer
    return { classification: wordCount < 200 ? "quick_reply" : "long_response", confidence: 0.55, candidateTaskTitle: null, suggestedAssignee: null };
  }

  /** Extract bare email from "Name <email>" or plain "email" format. */
  function extractEmail(s) {
    if (!s) return "";
    var m = s.match(/<([^>]+)>/);
    return m ? m[1].trim() : s.trim();
  }

  /**
   * Scan Gmail inbox: unread + starred + unreplied in last 14 days.
   * Populates STATE.emailTriage.threads. Returns { scanned, classified, errors }.
   */
  async function scanEmailInbox() {
    if (STATE.emailTriage.scanInProgress) return { scanned: 0, classified: 0, errors: ["Scan already in progress"] };
    STATE.emailTriage.scanInProgress = true;

    var knownEmails = buildKnownEmailSet();
    var knownNames = buildKnownNameMap();
    var errors = [];
    var allThreadIds = new Set();
    var repliedThreadIds = new Set();

    // Helper: run a Gmail search
    async function gmailSearch(query, label) {
      try {
        var raw = await window.cowork.callMcpTool("mcp__3e9e43fa-6d3f-47ba-973a-a36587b88e7e__search_threads", { query: query, pageSize: 50 });
        var d = unwrapMcp(raw).data;
        return pickArr(d, "threads") || [];
      } catch (e) {
        errors.push(label + ": " + (e.message || e));
        return [];
      }
    }

    // 1. Unread threads (last 14 days, skip promos/social/Jira)
    var unreadThreads = await gmailSearch("is:unread newer_than:14d -category:promotions -category:social -from:jira@cru.org -from:noreply", "unread");
    // 2. Starred threads (last 14 days)
    var starredThreads = await gmailSearch("is:starred newer_than:14d", "starred");
    // Note: reply detection moved to per-thread check in get_thread loop below.
    // The old "from:me" blanket filter was too aggressive (excluded threads Owen started).

    // Dedup unread + starred
    var candidateThreads = [];
    var seen = new Set();
    [].concat(unreadThreads, starredThreads).forEach(function (t) {
      if (!t.id || seen.has(t.id)) return;
      seen.add(t.id);
      candidateThreads.push(t);
    });

    // Skip threads the user already acted on (dismissed / task-created) — never reclassify these.
    // Also skip threads classified within the last 24h (allow stale reclassification).
    var now = Date.now();
    var staleMs = 24 * 60 * 60 * 1000;
    candidateThreads = candidateThreads.filter(function (t) {
      var existing = STATE.emailTriage.threads[t.id];
      if (!existing) return true;
      if (existing.dismissed || existing.taskCreated) return false;
      if (existing.classifiedAt && (now - new Date(existing.classifiedAt).getTime()) < staleMs) return false;
      return true;
    });

    var classified = 0;
    var autoIgnored = 0;
    // Fetch full thread details and classify (limit to 30 per scan for perf)
    var batch = candidateThreads.slice(0, 30);
    for (var i = 0; i < batch.length; i++) {
      var t = batch[i];
      try {
        var fullRaw = await window.cowork.callMcpTool("mcp__3e9e43fa-6d3f-47ba-973a-a36587b88e7e__get_thread", { threadId: t.id, messageFormat: "FULL_CONTENT" });
        var fullData = unwrapMcp(fullRaw).data;
        if (!fullData) { errors.push("get_thread returned null for " + t.id); continue; }

        // Reply detection: if the LAST message in the thread is from Owen, he already replied — skip
        var threadMsgs = fullData.messages || [];
        if (threadMsgs.length > 0) {
          var lastMsg = threadMsgs[threadMsgs.length - 1];
          var lastSender = extractEmail(lastMsg.sender || "").toLowerCase();
          if (lastSender === OWNER_EMAIL.toLowerCase()) continue; // Owen already replied
        }

        var firstMsg = (fullData.messages || [])[0] || {};
        // Skip threads with no usable data (empty messages, no sender/subject)
        if (!firstMsg.sender && !firstMsg.subject && !firstMsg.snippet) continue;
        // Skip threads from ignored senders (learned from previous dismissals)
        if (isIgnoredSender(firstMsg.sender)) { autoIgnored++; continue; }
        // Skip threads matching filter rules (calendar invites, subject patterns, etc.)
        var lastInboundForRule = null;
        for (var ri = threadMsgs.length - 1; ri >= 0; ri--) {
          var riSender = extractEmail(threadMsgs[ri].sender || "").toLowerCase();
          if (riSender && riSender !== OWNER_EMAIL.toLowerCase()) { lastInboundForRule = threadMsgs[ri]; break; }
        }
        var matchedRule = matchesFilterRule(fullData, firstMsg, lastInboundForRule);
        if (matchedRule) { autoIgnored++; continue; }

        var result = classifyEmailThread(fullData, knownEmails, knownNames);
        // Gmail MCP: snippet contains HTML entities — decode for display
        var decodedSnippet = (firstMsg.snippet || "").replace(/&#(\d+);/g, function (m, n) { return String.fromCharCode(n); }).replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"');

        // Extract actionable links from all messages in the thread
        var allPlaintext = ""; var allHtml = "";
        threadMsgs.forEach(function (m) {
          if (m.plaintextBody) allPlaintext += m.plaintextBody + "\n";
          if (m.htmlBody) allHtml += m.htmlBody + "\n";
        });
        var actionableLinks = extractActionableLinks(allPlaintext, allHtml);

        var oldEntry = STATE.emailTriage.threads[t.id] || {};
        STATE.emailTriage.threads[t.id] = {
          id: t.id,
          subject: firstMsg.subject || "(no subject)",
          snippet: decodedSnippet,
          sender: firstMsg.sender || "",
          senderEmail: extractEmail(firstMsg.sender || ""),
          date: firstMsg.date || "",
          classification: result.classification,
          classifiedAt: new Date().toISOString(),
          confidence: result.confidence,
          candidateTaskTitle: result.candidateTaskTitle || null,
          suggestedAssignee: result.suggestedAssignee || null,
          dueBy: result.dueBy || null,
          dueBySource: result.dueBySource || null,
          participants: result.participants || [],
          actionableLinks: actionableLinks,
          dismissed: oldEntry.dismissed || false,
          taskCreated: oldEntry.taskCreated || false,
          draftCreated: oldEntry.draftCreated || false
        };
        classified++;
        allThreadIds.add(t.id);
      } catch (e) {
        errors.push("classify " + t.id + ": " + (e.message || e));
      }
    }

    STATE.emailTriage.lastScanAt = new Date().toISOString();
    STATE.emailTriage.scanInProgress = false;
    persistState("Email triage scan");
    console.log("[TSKMGR] Email scan complete:", { scanned: candidateThreads.length, classified: classified, autoIgnored: autoIgnored, errors: errors });
    return { scanned: candidateThreads.length, classified: classified, autoIgnored: autoIgnored, errors: errors };
  }

  // ---- Actionable link extraction ----
  // Domain patterns that are recognized as actionable (ordered by specificity)
  var ACTIONABLE_LINK_PATTERNS = [
    { re: /cru\.atlassian\.net\/browse\//i,        label: "Jira ticket" },
    { re: /cru\.atlassian\.net\/jira\//i,           label: "Jira" },
    { re: /docs\.google\.com\/document\//i,         label: "Google Doc" },
    { re: /docs\.google\.com\/spreadsheets\//i,     label: "Google Sheet" },
    { re: /docs\.google\.com\/presentation\//i,     label: "Google Slides" },
    { re: /docs\.google\.com\/forms\//i,            label: "Google Form" },
    { re: /drive\.google\.com\/file\//i,            label: "Google Drive file" },
    { re: /drive\.google\.com\/drive\/folders\//i,  label: "Google Drive folder" },
    { re: /concursolutions\.com/i,                  label: "Concur" },
    { re: /cru\.sharepoint\.com/i,                  label: "SharePoint" },
    { re: /cru\.service-now\.com/i,                 label: "ServiceNow" },
    { re: /app\.powerbi\.com/i,                     label: "Power BI report" },
    { re: /github\.com\/[^/]+\/[^/]+\/pull\//i,     label: "GitHub PR" },
    { re: /github\.com\/[^/]+\/[^/]+\/issues\//i,   label: "GitHub issue" },
    { re: /zoom\.us\/j\//i,                         label: "Zoom meeting" },
    { re: /teams\.microsoft\.com\/l\/meetup-join/i, label: "Teams meeting" },
    // Internal Cru apps: any *.cru.org subdomain with a real path
    { re: /https?:\/\/[a-z0-9\-]+\.cru\.org\/[^\s"'<>]+/i, label: "Cru app" }
  ];
  // Noise patterns to reject
  var NOISE_LINK_RE = /\/(unsubscribe|opt[\-_]?out|preferences|privacy|manage[\-_]?subscription|email[\-_]?settings|terms|legal|about[\-_]?us|contact[\-_]?us)\b/i;
  var NOISE_DOMAIN_RE = /^(facebook\.com|twitter\.com|x\.com|linkedin\.com|instagram\.com|youtube\.com|click\.|links\.|email\.|track\.|trk\.|t\.co|bit\.ly|mailchimp\.com|list-manage\.com|sendgrid\.net|mailgun\.net|constantcontact\.com|campaign-archive\.com|hs-analytics\.net|hubspot\.com|cru\.org)\/?$/i;

  /**
   * Extract actionable links from an email body.
   * @param {string} plaintextBody - Plain text body (from get_thread FULL_CONTENT)
   * @param {string} htmlBody - HTML body (from get_thread FULL_CONTENT), used for href extraction
   * @returns {Array<{url:string, label:string}>} De-duped actionable links
   */
  function extractActionableLinks(plaintextBody, htmlBody) {
    var seen = {};
    var results = [];

    // Collect all URLs from both sources
    var urls = [];
    // From plaintext: match http/https URLs
    if (plaintextBody) {
      var ptMatches = plaintextBody.match(/https?:\/\/[^\s<>"')\]},]+/gi) || [];
      ptMatches.forEach(function (u) { urls.push(u.replace(/[.,;:!?)]+$/, "")); });
    }
    // From HTML: extract href values
    if (htmlBody) {
      var hrefMatches = htmlBody.match(/href\s*=\s*["'](https?:\/\/[^"']+)["']/gi) || [];
      hrefMatches.forEach(function (m) {
        var url = m.match(/href\s*=\s*["'](https?:\/\/[^"']+)["']/i);
        if (url) urls.push(url[1].replace(/[.,;:!?)]+$/, ""));
      });
    }

    urls.forEach(function (rawUrl) {
      // Clean tracking wrappers: Google redirect, Outlook safelinks
      var url = rawUrl;
      var safelink = url.match(/safelinks\.protection\.outlook\.com.*?url=([^&]+)/i);
      if (safelink) { try { url = decodeURIComponent(safelink[1]); } catch (e) {} }
      var googleRedir = url.match(/google\.com\/url\?.*?[&?]q=([^&]+)/i);
      if (googleRedir) { try { url = decodeURIComponent(googleRedir[1]); } catch (e) {} }

      // Skip noise
      if (NOISE_LINK_RE.test(url)) return;
      // Extract domain+path for noise domain check
      var domainMatch = url.match(/^https?:\/\/([^/]+)(\/[^\s]*)?/i);
      if (!domainMatch) return;
      var domainAndPath = domainMatch[1] + (domainMatch[2] || "");
      // Reject social/tracking domains or bare homepages (no meaningful path)
      if (NOISE_DOMAIN_RE.test(domainMatch[1] + (domainMatch[2] || "/").replace(/\/+$/, "/"))) return;
      // Reject bare root domains with no path
      if (!domainMatch[2] || domainMatch[2] === "/" || domainMatch[2] === "") return;

      // De-dup by normalized URL (strip trailing slash and fragment)
      var norm = url.replace(/#.*$/, "").replace(/\/+$/, "").toLowerCase();
      if (seen[norm]) return;
      seen[norm] = true;

      // Match against actionable patterns
      var label = null;
      for (var i = 0; i < ACTIONABLE_LINK_PATTERNS.length; i++) {
        if (ACTIONABLE_LINK_PATTERNS[i].re.test(url)) { label = ACTIONABLE_LINK_PATTERNS[i].label; break; }
      }

      // If no pattern matched but it survived noise filtering, include as generic if it has a real path
      if (!label) {
        // Only include if the URL has a meaningful path (more than just /)
        var pathDepth = (domainMatch[2] || "").split("/").filter(Boolean).length;
        if (pathDepth >= 1) label = domainMatch[1].replace(/^www\./, "");
      }

      if (label) results.push({ url: url, label: label });
    });

    return results;
  }

  // ============================================================

  /**
   * Strip quoted reply text from an email body, returning only the fresh content.
   * Removes everything from the first reply-chain marker onwards.
   */
  function _stripQuotedReply(body) {
    if (!body) return "";
    // Patterns that mark the start of a quoted block
    var patterns = [
      /^On .{5,80}wrote:/im,
      /^-{3,}\s*Original Message\s*-{3,}/im,
      /^From:.*\nSent:/im,
      /^From:.*\nDate:/im
    ];
    var cutAt = body.length;
    patterns.forEach(function (re) {
      var m = re.exec(body);
      if (m && m.index < cutAt) cutAt = m.index;
    });
    // Also cut at first line starting with ">"
    var lines = body.split("\n");
    var quoteLineIdx = -1;
    for (var i = 0; i < lines.length; i++) {
      if (/^\s*>/.test(lines[i])) { quoteLineIdx = i; break; }
    }
    if (quoteLineIdx >= 0) {
      var linesCutAt = lines.slice(0, quoteLineIdx).join("\n").length;
      if (linesCutAt < cutAt) cutAt = linesCutAt;
    }
    return body.slice(0, cutAt).trim();
  }

  /**
   * Analyze a Gmail thread and return task candidate signals.
   * @param {object} thread - Full thread from STATE.emailTriage.threads (already classified)
   * @returns {{ isCandidate, confidence, signalType, signalLabel, suggestedTitle, freshBody }}
   */
  function _emailAnalyze(thread) {
    var DEFAULT = { isCandidate: false, confidence: 0, signalType: null, signalLabel: null, suggestedTitle: null, freshBody: "" };
    if (!thread) return DEFAULT;

    var subject = thread.subject || "";
    var rawBody = thread.snippet || "";
    var freshBody = _stripQuotedReply(rawBody);
    var bodyLow = freshBody.toLowerCase();
    var subjectLow = subject.toLowerCase();

    var isCandidate = false;
    var confidence = 0;
    var signalType = null;
    var signalLabel = null;

    // ----- Step 2: Ownership domain match -----
    var domains = STATE.emailOwnershipDomains || [];
    var matchedDomain = null;
    for (var di = 0; di < domains.length; di++) {
      var dom = domains[di];
      var kws = dom.keywords || [];
      for (var ki = 0; ki < kws.length; ki++) {
        if (subjectLow.indexOf(kws[ki].toLowerCase()) !== -1 || bodyLow.indexOf(kws[ki].toLowerCase()) !== -1) {
          matchedDomain = dom;
          break;
        }
      }
      if (matchedDomain) break;
    }
    if (matchedDomain) {
      isCandidate = true;
      confidence = 0.6;
      signalType = "ownership_domain";
      signalLabel = "Relates to " + matchedDomain.label;
    }

    // ----- Step 3: Body signal detection (higher confidence wins) -----
    var ACCESS_RE = /can't access|don't have access|cannot access|getting an error|can't open|no permission|not authorized|access denied/i;
    var STALE_RE = /\b(january|february|march|april|may|june|july|august|september|october|november|december)\b|\b\d{1,2}\/\d{1,2}\/\d{2,4}\b|\b\d{4}-\d{2}-\d{2}\b/i;
    var FEATURE_RE = /would it be possible|can we add|is there a way|wondering if|could you update|any chance|feature request|enhancement|can you add/i;
    var BROKEN_RE = /not working|broken|not loading|not showing|seems wrong|incorrect data|wrong data|not displaying|\berror\b/i;

    if (ACCESS_RE.test(freshBody)) {
      if (0.85 > confidence) { isCandidate = true; confidence = 0.85; signalType = "access_issue"; signalLabel = "Access issue reported"; }
    }
    if (BROKEN_RE.test(freshBody)) {
      if (0.80 > confidence) { isCandidate = true; confidence = 0.80; signalType = "broken"; signalLabel = "Something broken or incorrect"; }
      else if (signalType !== "access_issue" && 0.80 >= confidence) { isCandidate = true; confidence = 0.80; signalType = "broken"; signalLabel = "Something broken or incorrect"; }
    }
    // Stale data: look for date mentions and check gap
    if (STALE_RE.test(freshBody)) {
      var emailDate = thread.date ? new Date(thread.date) : new Date();
      var dateMatches = freshBody.match(/\b(january|february|march|april|may|june|july|august|september|october|november|december)\s+\d{4}\b|\b\d{1,2}\/\d{1,2}\/\d{2,4}\b|\b\d{4}-\d{2}-\d{2}\b/gi) || [];
      var staleFound = false;
      for (var dmi = 0; dmi < dateMatches.length; dmi++) {
        try {
          var parsed = new Date(dateMatches[dmi]);
          if (!isNaN(parsed.getTime())) {
            var gapDays = (emailDate - parsed) / 86400000;
            if (gapDays > 21) { staleFound = true; break; }
          }
        } catch (e) {}
      }
      if (staleFound && 0.75 > confidence) { isCandidate = true; confidence = 0.75; signalType = "stale_data"; signalLabel = "Stale data complaint"; }
    }
    if (FEATURE_RE.test(freshBody)) {
      if (0.65 > confidence) { isCandidate = true; confidence = 0.65; signalType = "feature_request"; signalLabel = "Feature or change request"; }
    }

    if (!isCandidate) return DEFAULT;

    // ----- Step 4: Title suggestion -----
    var senderFirst = (function () {
      var dn = extractDisplayName(thread.sender || "");
      return (dn || "").split(/\s+/)[0] || "them";
    })();
    var cleanSubject = subject.replace(/^(re:|fwd?:)\s*/gi, "").trim() || "(no subject)";
    var suggestedTitle = "";
    if (signalType === "access_issue")     suggestedTitle = "Fix access for " + senderFirst + " — " + cleanSubject;
    else if (signalType === "stale_data")  suggestedTitle = "Update stale data — " + cleanSubject;
    else if (signalType === "feature_request") suggestedTitle = "Review feature request from " + senderFirst + " — " + cleanSubject;
    else if (signalType === "broken")      suggestedTitle = "Investigate issue reported by " + senderFirst + " — " + cleanSubject;
    else                                   suggestedTitle = "Follow up with " + senderFirst + " — " + cleanSubject;

    // ----- Step 6: Pattern learning suppression -----
    var feedback = STATE.emailFeedback || [];
    var senderLow = (thread.senderEmail || "").toLowerCase();
    // Count prior dismissals from this sender with this signal type
    var senderSignalDismissals = feedback.filter(function (f) {
      return f.senderEmail && f.senderEmail.toLowerCase() === senderLow && f.signalType === signalType && f.decision === "dismissed";
    }).length;
    if (senderSignalDismissals >= 3) return DEFAULT; // learned to suppress
    // Count global dismissals of this signal type
    var globalSignalDismissals = feedback.filter(function (f) {
      return f.signalType === signalType && f.decision === "dismissed";
    }).length;
    if (globalSignalDismissals >= 5) confidence = Math.max(0, confidence - 0.2);

    return { isCandidate: true, confidence: confidence, signalType: signalType, signalLabel: signalLabel, suggestedTitle: suggestedTitle, freshBody: freshBody };
  }

  /**
   * Scan STATE.emailFeedback for the last 30 days and return cluster summaries
   * where 3+ entries share the same signalType.
   */
  function _emailPatternSummaries() {
    var cutoff = new Date(Date.now() - 30 * 86400000).toISOString();
    var feedback = (STATE.emailFeedback || []).filter(function (f) { return f.timestamp >= cutoff; });
    // Group by signalType
    var groups = {};
    feedback.forEach(function (f) {
      if (!groups[f.signalType]) groups[f.signalType] = { signalType: f.signalType, count: 0, createdCount: 0, dismissedCount: 0, senders: [] };
      var g = groups[f.signalType];
      g.count++;
      if (f.decision === "created") g.createdCount++;
      if (f.decision === "dismissed") g.dismissedCount++;
      if (f.senderEmail && g.senders.indexOf(f.senderEmail) === -1) g.senders.push(f.senderEmail);
    });
    var LABELS = { access_issue: "access issue", stale_data: "stale data report", feature_request: "feature request", broken: "broken/incorrect report", ownership_domain: "domain-related email" };
    return Object.values(groups).filter(function (g) { return g.count >= 3; }).map(function (g) {
      return { signalType: g.signalType, signalLabel: LABELS[g.signalType] || g.signalType, count: g.count, createdCount: g.createdCount, dismissedCount: g.dismissedCount, senders: g.senders };
    });
  }

  /**
   * Create a task from an email thread entry. Routes to the best matching partner/committee/project.
   * @param {object} entry - An entry from STATE.emailTriage.threads
   */
  function createTaskFromEmail(entry) {
    if (!entry || entry.taskCreated) return;
    var knownNames = buildKnownNameMap();
    var target = entry.suggestedAssignee;
    // If no suggested assignee, try to find one from participants
    if (!target && entry.participants) {
      for (var i = 0; i < entry.participants.length; i++) {
        if (knownNames.has(entry.participants[i])) { target = knownNames.get(entry.participants[i]); break; }
      }
    }

    var stamp = Date.now();
    var taskItem = {
      id: "email-" + stamp,
      text: entry.candidateTaskTitle || entry.subject || "(email task)",
      dueBy: entry.dueBy || null,
      dueBySource: entry.dueBySource || null,
      assigneeEmail: OWNER_EMAIL,
      verifyVia: { type: "email_sent", threadId: entry.id, subject: entry.subject },
      verifyStatus: "pending", verifyCheckedAt: null, verifyNote: null,
      completed: false, tags: [], priority: "should", category: "tactical", status: "open", blockedOn: null,
      projectId: null, pendingAssigneeConfirmation: false,
      source_link: "https://mail.google.com/mail/u/0/#inbox/" + entry.id,
      source_type: "email", source_title: entry.subject, source_timestamp: entry.date,
      description: "From: " + entry.sender + "\n" + (entry.snippet || "").slice(0, 200) +
        ((entry.actionableLinks && entry.actionableLinks.length) ? "\n\nLinks:\n" + entry.actionableLinks.map(function (l) { return "• " + l.label + ": " + l.url; }).join("\n") : ""),
      attachedDocuments: [],
      created_at: nowIso()
    };

    // Route to the best container
    if (target && target.kind === "partner") {
      var p = STATE.partners.find(function (x) { return x.id === target.id; });
      if (p) {
        p.commitments = p.commitments || {};
        p.commitments.partnerToOwner = p.commitments.partnerToOwner || [];
        p.commitments.partnerToOwner.push(taskItem);
        entry.taskCreated = true;
        persistState("Email → partner task");
        showSave("saved", "Task created → " + (p.name || target.id));
        return;
      }
    }
    if (target && target.kind === "committee") {
      var co = (STATE.committees || []).find(function (x) { return x.id === target.id; });
      if (co) {
        co.actionItems = co.actionItems || [];
        co.actionItems.push(taskItem);
        entry.taskCreated = true;
        persistState("Email → committee task");
        showSave("saved", "Task created → " + (co.name || target.id));
        return;
      }
    }
    if (target && target.kind === "project") {
      var pr = (STATE.projects || []).find(function (x) { return x.id === target.id; });
      if (pr) {
        pr.actionItems = pr.actionItems || [];
        pr.actionItems.push(taskItem);
        entry.taskCreated = true;
        persistState("Email → project task");
        showSave("saved", "Task created → " + (pr.name || target.id));
        return;
      }
    }

    // Fallback: add to first partner's partnerToOwner lane (Owen as the catch-all)
    if (STATE.partners && STATE.partners.length) {
      var fallback = STATE.partners[0];
      fallback.commitments = fallback.commitments || {};
      fallback.commitments.partnerToOwner = fallback.commitments.partnerToOwner || [];
      fallback.commitments.partnerToOwner.push(taskItem);
      entry.taskCreated = true;
      persistState("Email → fallback task");
      showSave("saved", "Task created (unrouted) → " + (fallback.name || "first partner"));
      return;
    }

    showSave("error", "No container found to route task");
  }

  /**
   * TSKMGR-95 — Create a task from a candidate card using the suggested title from _emailAnalyze.
   * Writes feedback, marks thread dismissed, and re-renders.
   */
  function createTaskFromEmailCandidate(entry, analysis, reRender) {
    // Override candidateTaskTitle with the analysis suggestedTitle, then delegate
    var prev = entry.candidateTaskTitle;
    if (analysis && analysis.suggestedTitle) entry.candidateTaskTitle = analysis.suggestedTitle;
    createTaskFromEmail(entry);
    if (analysis && analysis.suggestedTitle) entry.candidateTaskTitle = prev; // restore

    // Write feedback
    STATE.emailFeedback = STATE.emailFeedback || [];
    STATE.emailFeedback.push({ threadId: entry.id, senderEmail: entry.senderEmail || "", signalType: analysis ? analysis.signalType : null, decision: "created", timestamp: nowIso() });
    persistState("Create task from email candidate (TSKMGR-95)");
    if (typeof reRender === "function") reRender();
  }

  /**
   * TSKMGR-95 — Dismiss a candidate card, writing feedback.
   */
  function dismissEmailCandidate(entry, analysis, reRender) {
    entry.dismissed = true;
    STATE.emailFeedback = STATE.emailFeedback || [];
    STATE.emailFeedback.push({ threadId: entry.id, senderEmail: entry.senderEmail || "", signalType: analysis ? analysis.signalType : null, decision: "dismissed", timestamp: nowIso() });
    persistState("Dismiss email candidate (TSKMGR-95)");
    if (typeof reRender === "function") reRender();
  }

  /** Check if a sender email is in the ignored list. */
  function isIgnoredSender(email) {
    if (!email) return false;
    var lower = email.toLowerCase();
    return (STATE.emailTriage.ignoredSenders || []).some(function (entry) {
      return entry.email && entry.email.toLowerCase() === lower;
    });
  }

  /** Add a sender to the ignore list. Also dismisses all existing threads from that sender. */
  function ignoreSender(senderEmail, lastSubject) {
    if (!senderEmail || isIgnoredSender(senderEmail)) return;
    STATE.emailTriage.ignoredSenders.push({
      email: senderEmail.toLowerCase(),
      addedAt: new Date().toISOString(),
      lastSubject: lastSubject || ""
    });
    // Auto-dismiss all existing threads from this sender
    var dismissed = 0;
    Object.values(STATE.emailTriage.threads).forEach(function (t) {
      if (t.senderEmail && t.senderEmail.toLowerCase() === senderEmail.toLowerCase() && !t.dismissed) {
        t.dismissed = true;
        dismissed++;
      }
    });
    persistState("Ignore sender: " + senderEmail);
    showSave("saved", "Ignored " + senderEmail + (dismissed > 1 ? " (" + dismissed + " threads dismissed)" : ""));
  }

  /** Remove a sender from the ignore list. */
  function unignoreSender(senderEmail) {
    STATE.emailTriage.ignoredSenders = (STATE.emailTriage.ignoredSenders || []).filter(function (entry) {
      return entry.email.toLowerCase() !== senderEmail.toLowerCase();
    });
    persistState("Unignore sender: " + senderEmail);
    showSave("saved", "Removed " + senderEmail + " from ignore list");
  }

  // ---- TSKMGR-49 — Filter rules engine ----

  /** Check if a thread matches any enabled filter rule. Returns the matching rule or null. */
  function matchesFilterRule(threadData, firstMsg, lastInbound) {
    var rules = STATE.emailTriage.filterRules || [];
    if (!rules.length) return null;
    var subject = (firstMsg.subject || "").toLowerCase();
    var senderStr = (firstMsg.sender || "").toLowerCase();
    var senderEmail = extractEmail(firstMsg.sender || "").toLowerCase();

    for (var ri = 0; ri < rules.length; ri++) {
      var rule = rules[ri];
      if (!rule.enabled) continue;

      if (rule.type === "calendar_update") {
        // Calendar invitations: detect by sender (calendar-notification@google.com)
        // or by subject patterns (Invitation:, Updated invitation:, Accepted:, Declined:, etc.)
        var isCalendarSender = senderEmail === "calendar-notification@google.com" ||
            senderStr.indexOf("calendar-notification") !== -1;
        var calSubjectRe = /^(invitation|updated invitation|accepted|declined|tentative|canceled|cancelled|proposed new time):/i;
        var isCalendarSubject = calSubjectRe.test(firstMsg.subject || "");
        if (!isCalendarSender && !isCalendarSubject) continue; // not a calendar email, skip

        // Exception: if description was updated by someone other than Owen, don't filter
        if (rule.exceptDescriptionUpdateByOthers && lastInbound) {
          var bodyText = (lastInbound.plaintextBody || lastInbound.snippet || "").toLowerCase();
          var isDescUpdate = /description( has been| was)? (changed|updated|modified)/i.test(bodyText) ||
              /changed the description/i.test(bodyText);
          if (isDescUpdate) {
            // Check if the updater is NOT Owen
            var updaterEmail = extractEmail(lastInbound.sender || "").toLowerCase();
            if (updaterEmail !== OWNER_EMAIL.toLowerCase()) continue; // don't filter — someone else changed desc
          }
        }
        return rule; // calendar email matched, filter it
      }

      if (rule.type === "subject_contains") {
        // Subject pattern match (case-insensitive contains)
        var subjectMatch = rule.subjectContains ? subject.indexOf(rule.subjectContains.toLowerCase()) !== -1 : true;
        // Optional sender filter
        var senderMatch = true;
        if (rule.senderContains) {
          var ruleS = rule.senderContains.toLowerCase();
          senderMatch = senderStr.indexOf(ruleS) !== -1 || senderEmail.indexOf(ruleS) !== -1;
        }
        if (subjectMatch && senderMatch) return rule;
      }
    }
    return null;
  }

  /** Add a new filter rule. */
  function addFilterRule(rule) {
    if (!rule.id) rule.id = "fr_" + Date.now();
    if (typeof rule.enabled === "undefined") rule.enabled = true;
    rule.createdAt = rule.createdAt || new Date().toISOString();
    STATE.emailTriage.filterRules.push(rule);

    // Auto-dismiss existing matching threads
    var dismissed = 0;
    Object.values(STATE.emailTriage.threads).forEach(function (t) {
      if (t.dismissed) return;
      // Quick match: for subject_contains rules check subject+sender; for calendar rules check subject patterns
      if (rule.type === "subject_contains") {
        var sMatch = rule.subjectContains ? (t.subject || "").toLowerCase().indexOf(rule.subjectContains.toLowerCase()) !== -1 : true;
        var senMatch = rule.senderContains ? ((t.sender || "") + " " + (t.senderEmail || "")).toLowerCase().indexOf(rule.senderContains.toLowerCase()) !== -1 : true;
        if (sMatch && senMatch) { t.dismissed = true; t.dismissedByRule = rule.id; dismissed++; }
      } else if (rule.type === "calendar_update") {
        var calRe = /^(invitation|updated invitation|accepted|declined|tentative|canceled|cancelled|proposed new time):/i;
        if (calRe.test(t.subject || "")) { t.dismissed = true; t.dismissedByRule = rule.id; dismissed++; }
      }
    });

    persistState("Add filter rule: " + (rule.label || rule.type));
    showSave("saved", "Rule created" + (dismissed ? " (" + dismissed + " existing threads filtered)" : ""));
    return rule;
  }

  /** Remove a filter rule by id. */
  function removeFilterRule(ruleId) {
    STATE.emailTriage.filterRules = (STATE.emailTriage.filterRules || []).filter(function (r) { return r.id !== ruleId; });
    persistState("Remove filter rule: " + ruleId);
    showSave("saved", "Filter rule removed");
  }

  /** Toggle a filter rule on/off. */
  function toggleFilterRule(ruleId) {
    var rule = (STATE.emailTriage.filterRules || []).find(function (r) { return r.id === ruleId; });
    if (rule) { rule.enabled = !rule.enabled; persistState("Toggle filter rule"); }
  }

  // Status → uatColumn mapping per project. Each project may use different
  // status names for its UAT columns. The board column the user sees may
  // differ from the Jira status name; this map normalises them.
  var JIRA_UAT_PROJECTS = [
    { key: "SMFA",   statuses: { "Ready for UAT": "test1", "To UAT": "test1", "Ready for UAT 2": "test2" } },
    { key: "SFAIA",  statuses: { "Ready for UAT": "test1", "In UAT": "test2" } },
    { key: "TSKMGR", statuses: { "Ready for UAT": "test1", "In UAT": "test2", "Ready for UAT 2": "test2" } }
  ];
  var JIRA_BASE_URL = "https://jira.cru.org/browse/";

  /**
   * Scan Jira for all UAT-status items across active projects.
   * Populates jiraUatCache.items with normalised entries.
   */
  async function scanJiraUatItems() {
    if (jiraUatCache.scanInProgress) return jiraUatCache;
    jiraUatCache.scanInProgress = true;
    var allItems = [];
    var errors = [];

    for (var pi = 0; pi < JIRA_UAT_PROJECTS.length; pi++) {
      var proj = JIRA_UAT_PROJECTS[pi];
      var statusNames = Object.keys(proj.statuses);
      if (!statusNames.length) continue;
      var statusJql = statusNames.map(function (s) { return '"' + s + '"'; }).join(", ");
      var jql = 'project = ' + proj.key + ' AND status in (' + statusJql + ') ORDER BY updated DESC';
      try {
        var raw = await window.cowork.callMcpTool(
          "mcp__eb97a91a-5235-4393-bfd6-e5da0b436f69__jira_search",
          { jql: jql, fields: "summary,status,assignee,updated,issuetype,priority", limit: 50 }
        );
        var data = unwrapMcp(raw).data;
        var issues = [];
        // Handle both { issues: [...] } and raw array shapes
        if (data && data.issues) issues = data.issues;
        else if (Array.isArray(data)) issues = data;
        else if (typeof data === "string") { try { var parsed = JSON.parse(data); issues = parsed.issues || []; } catch (e) {} }

        issues.forEach(function (iss) {
          var statusName = (iss.status && iss.status.name) || "";
          var uatCol = proj.statuses[statusName] || "test1";
          var assigneeEmail = (iss.assignee && iss.assignee.email) ? iss.assignee.email.toLowerCase() : "";
          var assigneeName = (iss.assignee && iss.assignee.display_name) || "";
          allItems.push({
            key: iss.key,
            jiraId: iss.id,
            summary: iss.summary || "",
            status: statusName,
            project: proj.key,
            assigneeEmail: assigneeEmail,
            assigneeName: assigneeName,
            updatedAt: iss.updated || null,
            uatColumn: uatCol,
            priority: (iss.priority && iss.priority.name) || "",
            issueType: (iss.issuetype && iss.issuetype.name) || "",
            url: JIRA_BASE_URL + iss.key,
            isOwner: assigneeEmail === OWNER_EMAIL.toLowerCase()
          });
        });
      } catch (e) {
        errors.push(proj.key + ": " + (e.message || e));
      }
    }

    jiraUatCache.items = allItems;
    jiraUatCache.lastScanAt = new Date().toISOString();
    jiraUatCache.scanInProgress = false;
    jiraUatCache.errors = errors;
    console.log("[TSKMGR] Jira UAT scan:", allItems.length, "items across", JIRA_UAT_PROJECTS.length, "projects", errors.length ? "errors: " + errors.join("; ") : "");
    return jiraUatCache;
  }

  /**
   * Refresh all data sources in parallel. Called by global ↻ button.
   * - Email: re-scan inbox (clearing stale classifications)
   * - Partner live caches: clear liveCache so next render fetches fresh calendar/Gmail/Slack
   * - Jira: clear jiraCache so next render re-runs queries
   * - Jira UAT: re-scan all UAT items across projects
   * - Sprint: clear sprintCache
   */
  async function refreshAllDataSources() {
    var results = [];
    // 1. Clear partner live caches (calendar, Gmail threads, Slack)
    Object.keys(liveCache).forEach(function (k) { delete liveCache[k]; });
    results.push("partner caches cleared");

    // 2. Clear Jira caches
    Object.keys(jiraCache).forEach(function (k) { delete jiraCache[k]; });
    sprintCache = null;
    results.push("jira/sprint caches cleared");

    // 3. Clear stale email classifications (older than 1 hour) and re-scan
    var now = Date.now();
    var staleMs = 60 * 60 * 1000; // 1 hour
    Object.keys(STATE.emailTriage.threads).forEach(function (tid) {
      var t = STATE.emailTriage.threads[tid];
      if (t.classifiedAt && (now - new Date(t.classifiedAt).getTime()) > staleMs && !t.taskCreated) {
        delete STATE.emailTriage.threads[tid];
      }
    });

    // 4. Run email scan + persist
    try {
      var emailResult = await scanEmailInbox();
      results.push("email: " + emailResult.classified + " classified" + (emailResult.autoIgnored ? ", " + emailResult.autoIgnored + " ignored" : ""));
    } catch (e) {
      results.push("email error: " + (e.message || e));
    }

    // 5. Scan Jira UAT items across all projects
    try {
      var uatResult = await scanJiraUatItems();
      results.push("jira UAT: " + uatResult.items.length + " items");
    } catch (e) {
      results.push("jira UAT error: " + (e.message || e));
    }

    // 6. TSKMGR-80 — Basecamp ingest: todos, message board, campfire for active projects
    try {
      var bcResult = await scanBasecampSources();
      results.push("basecamp: " + bcResult.todos + " todos, " + bcResult.attention + " attention items");
    } catch (e) {
      results.push("basecamp error: " + (e.message || e));
    }

    showSave("saved", "Refreshed: " + results.join(" · "));
    return results;
  }

  const BASECAMP_ACCOUNT_ID = 3105655;
  const BASECAMP_OWNER_ID = 37720002;

  async function scanBasecampSources() {
    if (!window.cowork || typeof window.cowork.callMcpTool !== "function") {
      console.warn("[basecamp] window.cowork.callMcpTool unavailable — skipping Basecamp ingest");
      return { todos: 0, attention: 0 };
    }

    var activeProjects = (STATE.basecampProjects || []).filter(function (p) { return p.active; });
    var newTodos = 0;
    var newAttention = 0;
    var now = Date.now();
    var fortyEightHours = 48 * 60 * 60 * 1000;
    var fourteenDays = 14 * 24 * 60 * 60 * 1000;

    for (var pi = 0; pi < activeProjects.length; pi++) {
      var proj = activeProjects[pi];

      // ---- 1. Todos assigned to Owen ----
      try {
        var listsRaw = await window.cowork.callMcpTool("mcp__basecamp__get_todolists", { project_id: proj.id });
        var listsData = unwrapMcp(listsRaw).data;
        var lists = Array.isArray(listsData) ? listsData : (pickArr(listsData, "todolists") || pickArr(listsData, "todo_lists") || []);
        for (var li = 0; li < lists.length; li++) {
          var list = lists[li];
          try {
            var todosRaw = await window.cowork.callMcpTool("mcp__basecamp__get_todos", { project_id: proj.id, todolist_id: list.id });
            var todosData = unwrapMcp(todosRaw).data;
            var todos = Array.isArray(todosData) ? todosData : (pickArr(todosData, "todos") || []);
            for (var ti = 0; ti < todos.length; ti++) {
              var todo = todos[ti];
              // Filter: assigned to Owen
              var assignees = todo.assignees || [];
              var isAssignedToOwen = assignees.some(function (a) { return a && (a.id === BASECAMP_OWNER_ID || String(a.id) === String(BASECAMP_OWNER_ID)); });
              if (!isAssignedToOwen) continue;
              // Deduplicate by source_url
              var sourceUrl = todo.app_url || ("https://app.basecamp.com/" + BASECAMP_ACCOUNT_ID + "/buckets/" + proj.id + "/todos/" + todo.id);
              var alreadyExists = (STATE.basecampTasks || []).some(function (t) { return t.source_url === sourceUrl; });
              if (alreadyExists) continue;
              STATE.basecampTasks = STATE.basecampTasks || [];
              STATE.basecampTasks.push({
                id: "bc-" + todo.id,
                text: todo.content || todo.title || "(untitled)",
                detail: todo.description || null,
                dueBy: todo.due_on || null,
                status: todo.completed ? "done" : "open",
                priority: "medium",
                source_url: sourceUrl,
                source_context: {
                  source_type: "basecamp_todo",
                  project_name: proj.name,
                  project_id: proj.id,
                  todolist_name: list.title || list.name || ""
                },
                created_at: todo.created_at || new Date().toISOString(),
                assigneeEmail: OWNER_EMAIL
              });
              newTodos++;
            }
          } catch (e) {
            console.warn("[basecamp] get_todos error for list", list.id, "in project", proj.id, e);
          }
        }
      } catch (e) {
        console.warn("[basecamp] get_todolists error for project", proj.id, e);
      }

      // ---- 2. Message board posts needing attention ----
      try {
        var searchRaw = await window.cowork.callMcpTool("mcp__basecamp__search_basecamp", { project_id: proj.id, query: "Owen" });
        var searchData = unwrapMcp(searchRaw).data;
        var searchResults = Array.isArray(searchData) ? searchData : (pickArr(searchData, "results") || pickArr(searchData, "items") || []);
        for (var si = 0; si < searchResults.length; si++) {
          var item = searchResults[si];
          // Only surface message board posts (recent, last 14 days)
          var itemType = (item.type || item.recordable_type || "").toLowerCase();
          if (itemType !== "message" && !itemType.includes("message")) continue;
          if (!item.created_at) continue;
          var itemAge = now - new Date(item.created_at).getTime();
          if (itemAge > fourteenDays) continue;
          var itemUrl = item.app_url || "";
          var alreadyAttention = (STATE.basecampAttention || []).some(function (a) { return a.url === itemUrl; });
          if (alreadyAttention) continue;
          STATE.basecampAttention = STATE.basecampAttention || [];
          STATE.basecampAttention.push({
            id: "bc-msg-" + item.id,
            title: item.title || item.subject || "(no title)",
            url: itemUrl,
            projectName: proj.name,
            type: "message_board",
            created_at: item.created_at
          });
          newAttention++;
        }
      } catch (e) {
        console.warn("[basecamp] search_basecamp error for project", proj.id, e);
      }

      // ---- 3. Campfire recent messages from others ----
      try {
        var campRaw = await window.cowork.callMcpTool("mcp__basecamp__get_campfire_lines", { project_id: proj.id, chat_id: proj.chatId });
        var campData = unwrapMcp(campRaw).data;
        var lines = Array.isArray(campData) ? campData : (pickArr(campData, "lines") || []);
        for (var ci = 0; ci < lines.length; ci++) {
          var line = lines[ci];
          if (!line.created_at) continue;
          var lineAge = now - new Date(line.created_at).getTime();
          if (lineAge > fortyEightHours) continue;
          // Skip lines from Owen himself
          var creator = line.creator || line.author || {};
          var creatorId = creator.id || creator.personId;
          if (creatorId && (creatorId === BASECAMP_OWNER_ID || String(creatorId) === String(BASECAMP_OWNER_ID))) continue;
          var lineUrl = "https://app.basecamp.com/" + BASECAMP_ACCOUNT_ID + "/projects/" + proj.id;
          var lineId = "bc-camp-" + line.id;
          var alreadyCamp = (STATE.basecampAttention || []).some(function (a) { return a.id === lineId; });
          if (alreadyCamp) continue;
          STATE.basecampAttention = STATE.basecampAttention || [];
          STATE.basecampAttention.push({
            id: lineId,
            title: (line.content || "").substring(0, 80),
            author: creator.name || "Unknown",
            url: lineUrl,
            projectName: proj.name,
            type: "campfire",
            created_at: line.created_at
          });
          newAttention++;
        }
      } catch (e) {
        console.warn("[basecamp] get_campfire_lines error for project", proj.id, e);
      }
    }

    persistState("Basecamp ingest (TSKMGR-80)");
    return { todos: newTodos, attention: newAttention };
  }

  async function ensureLive(partnerId) {

    const out = { nextMeeting: null, lastMeeting: null, recentEmails: [], recentSlack: [], errors: [] };
    if (!p.email) { out.errors.push("No email set on partner profile."); liveCache[partnerId] = out; return out; }
    const now = new Date().toISOString();
    const inN = new Date(Date.now() + SEARCH_DAYS * 86400000).toISOString();
    try {
      const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", { startTime: now, endTime: inN, fullText: p.email, pageSize: 50, orderBy: "startTime" });
      const { data, shape } = unwrapMcp(evRaw);
      out.responseShape = shape;
      const events = pickArr(data, "events") || [];
      out.scannedCount = events.length;
      const matches = events.filter(e => {
        if (e.status === "cancelled") return false;
        const a = (e.attendees || []).filter(x => !x.resource);

        if (!a.some(x => x.email === OWNER_EMAIL)) return false;
        if (!a.some(x => x.email && x.email.toLowerCase() === p.email.toLowerCase())) return false;
        if (a.find(x => x.responseStatus === "declined")) return false;
        return true;
      });
      const candidate = matches[0] || null;
      if (candidate) {
        const moved = candidate.originalStartTime && candidate.start && (candidate.originalStartTime.dateTime || candidate.originalStartTime.date) !== (candidate.start.dateTime || candidate.start.date);
        out.nextMeeting = { id: candidate.id, summary: candidate.summary, start: (candidate.start && (candidate.start.dateTime || candidate.start.date)) || "", end: (candidate.end && (candidate.end.dateTime || candidate.end.date)) || "", link: candidate.htmlLink, location: candidate.location || "", moved: !!moved, originalStart: moved ? (candidate.originalStartTime.dateTime || candidate.originalStartTime.date) : null, recurring: !!candidate.recurringEventId };
      }
    } catch (e) { out.errors.push("calendar: " + (e.message || e)); }
    try {
      const past = new Date(Date.now() - 14 * 86400000).toISOString();

      });
      if (pastMatch) out.lastMeeting = { id: pastMatch.id, summary: pastMatch.summary, start: (pastMatch.start && (pastMatch.start.dateTime || pastMatch.start.date)) || "" };
    } catch (e) { /* best-effort */ }
    try {
      const gmRaw = await window.cowork.callMcpTool("mcp__3e9e43fa-6d3f-47ba-973a-a36587b88e7e__search_threads", { query: `(from:${p.email} OR to:${p.email}) -from:jira@cru.org newer_than:14d`, pageSize: 5 });
      const gm = unwrapMcp(gmRaw).data;

  // from the Status category axis. Underlying data field on commitments is still

  const PROGRESS_DEFS = {

  // ============================================================
  // TSKMGR-61 — Canonical Project + Committee data model schema
  // ============================================================
  // Why this lives here: project/committee shapes were previously implicit
  // (defined by where they're read). This formalizes them so:
  //   - Future agents have a single canonical reference for fields/defaults
  //   - Hydrated state from older versions self-heals via normalize* helpers
  //   - TSKMGR-45 (project ↔ Slack channel mapping) has a stable foundation
  // To add a new field: append to the schema below, then call
  // migrateProjectsAndCommittees() — already wired into the load path so it
  // runs automatically on next boot. Default function values run lazily per
  // entity on first migration.
  const PROJECT_SCHEMA = {
    id:                  { type: "string",  required: true },
    name:                { type: "string",  required: true },
    shortCode:           { type: "string",  default: "" },
    description:         { type: "string",  default: "" },          // project-level notes / textarea on profile
    status:              { type: "string",  enum: ["active", "dormant", "done"], default: "active" },
    startDate:           { type: "string",  default: null },
    endDate:             { type: "string",  default: null },
    color:               { type: "string",  default: null },
    tagAlias:            { type: "string",  default: "" },
    jiraQueries:         { type: "array",   default: [] },
    actionItems:         { type: "array",   default: [] },          // TSKMGR-65 — project-rooted action items
    attachedDocuments:   { type: "array",   default: [] },          // v3.4.3a — committee invite attachments rolled up onto project
    committeeIds:        { type: "array",   default: [] },          // TSKMGR-61 — mirror of committee.projectIds (bidirectional link)
    slackChannelId:      { type: "string",  default: null },        // TSKMGR-45 will populate
    slackChannelName:    { type: "string",  default: null },        // TSKMGR-45 human-readable channel name
    created_at:          { type: "string",  default: () => nowIso() }
    // Future fields land here.
  };

  const COMMITTEE_SCHEMA = {
    id:                      { type: "string",  required: true },
    name:                    { type: "string",  required: true },
    shortCode:               { type: "string",  default: "" },
    recurringEventId:        { type: "string",  default: null },
    purpose:                 { type: "string",  default: "" },
    cadence:                 { type: "string",  default: "" },
    role:                    { type: "string",  enum: ["owner", "contributor", "optional"], default: "contributor" },
    roleOverrides:           { type: "array",   default: [] },
    projectIds:              { type: "array",   default: [] },
    notes:                   { type: "string",  default: "" },
    manualNotesUrl:          { type: "string",  default: "" },      // v3.4.3a — optional Drive doc
    attachedDocuments:       { type: "array",   default: [] },      // v3.4.3a — reconciler-populated invite attachments
    lastReconciledMeetingId: { type: "string",  default: null },
    members:                 { type: "array",   default: [] },
    jiraQueries:             { type: "array",   default: [] },
    agenda:                  { type: "array",   default: [] },
    actionItems:             { type: "array",   default: [] },
    decisions:               { type: "array",   default: [] },
    topicThreads:            { type: "array",   default: [] },
    meetingLog:              { type: "array",   default: [] },
    slackChannelId:          { type: "string",  default: null },    // TSKMGR-45
    slackChannelName:        { type: "string",  default: null },    // TSKMGR-45
    canvasId:                { type: "string",  default: null },    // TSKMGR-45 Part B
    canvasItemDecisions:     { type: "object",  default: () => ({}) }, // TSKMGR-45 Part B
    created_at:              { type: "string",  default: () => nowIso() }
  };

  // Schema-driven defaulter. ADDS missing fields only; never renames or removes.
  // Existing code that reads `project.X` or `committee.X` keeps working unchanged.
  function _applySchemaDefaults(obj, schema) {
    if (!obj || typeof obj !== "object") return obj;
    const out = obj; // mutate in place so existing references keep their identity
    for (const field in schema) {
      if (!Object.prototype.hasOwnProperty.call(schema, field)) continue;
      const spec = schema[field];
      if (out[field] == null) {
        const def = spec.default;
        // required fields without a default stay null/undefined — surfaced via migration warnings.
        if (typeof def === "function") out[field] = def();
        else if (typeof def !== "undefined") out[field] = def;
      }
    }
    return out;
  }

  // TSKMGR-61 — public normalize helpers. Use these at every creation and load
  // path so STATE.projects[i] / STATE.committees[i] always have the canonical
  // shape post-boot.
  function normalizeProject(p)   { return _applySchemaDefaults(p, PROJECT_SCHEMA); }
  function normalizeCommittee(c) { return _applySchemaDefaults(c, COMMITTEE_SCHEMA); }

  // TSKMGR-61 — bidirectional link helpers. Existing UI used to mutate
  // committee.projectIds only; project.committeeIds was a no-op. These keep
  // both sides consistent and call persistState once with a single reason.
  function linkCommitteeToProject(committeeId, projectId, persistReason) {
    if (!committeeId || !projectId) return false;
    const c = (STATE.committees || []).find(x => x.id === committeeId);
    const p = (STATE.projects   || []).find(x => x.id === projectId);
    if (!c || !p) return false;
    if (!Array.isArray(c.projectIds))   c.projectIds   = [];
    if (!Array.isArray(p.committeeIds)) p.committeeIds = [];
    let changed = false;
    if (!c.projectIds.includes(projectId))     { c.projectIds.push(projectId);     changed = true; }
    if (!p.committeeIds.includes(committeeId)) { p.committeeIds.push(committeeId); changed = true; }
    if (changed) persistState(persistReason || ("link committee " + committeeId + " <-> project " + projectId));
    return changed;
  }
  function unlinkCommitteeFromProject(committeeId, projectId, persistReason) {
    if (!committeeId || !projectId) return false;
    const c = (STATE.committees || []).find(x => x.id === committeeId);
    const p = (STATE.projects   || []).find(x => x.id === projectId);
    let changed = false;
    if (c && Array.isArray(c.projectIds) && c.projectIds.includes(projectId)) {
      c.projectIds = c.projectIds.filter(id => id !== projectId);
      changed = true;
    }
    if (p && Array.isArray(p.committeeIds) && p.committeeIds.includes(committeeId)) {
      p.committeeIds = p.committeeIds.filter(id => id !== committeeId);
      changed = true;
    }
    if (changed) persistState(persistReason || ("unlink committee " + committeeId + " <-> project " + projectId));
    return changed;
  }

  // TSKMGR-61 — migration walker. Normalizes every project/committee on STATE,
  // rebuilds the bidirectional committee↔project mirror (project.committeeIds
  // derived from existing committee.projectIds), and warns to console if any
  // entity was missing a required field. Called automatically at app load.
  function migrateProjectsAndCommittees() {
    if (!STATE) return;
    STATE.projects   = Array.isArray(STATE.projects)   ? STATE.projects   : [];
    STATE.committees = Array.isArray(STATE.committees) ? STATE.committees : [];
    const warnings = [];
    STATE.projects.forEach(p => {
      normalizeProject(p);
      for (const f in PROJECT_SCHEMA) {
        if (PROJECT_SCHEMA[f].required && (p[f] == null || p[f] === "")) {
          warnings.push("[TSKMGR-61] Project missing required field '" + f + "': " + JSON.stringify({ id: p.id, name: p.name }));
        }
      }
    });
    STATE.committees.forEach(c => {
      normalizeCommittee(c);
      for (const f in COMMITTEE_SCHEMA) {
        if (COMMITTEE_SCHEMA[f].required && (c[f] == null || c[f] === "")) {
          warnings.push("[TSKMGR-61] Committee missing required field '" + f + "': " + JSON.stringify({ id: c.id, name: c.name }));
        }
      }
    });
    // Rebuild project.committeeIds mirror from committee.projectIds. The
    // committee side has historically been authoritative; this keeps both in
    // sync at boot without losing data. Drops the sentinel "__noproject__"
    // value (used by Friday plan UX to mark "explicitly no project").
    const mirror = {};
    STATE.committees.forEach(c => {
      (c.projectIds || []).forEach(pid => {
        if (!pid || pid === "__noproject__") return;
        (mirror[pid] = mirror[pid] || []).push(c.id);
      });
    });
    STATE.projects.forEach(p => {
      const fromCommittees = mirror[p.id] || [];
      const existing = Array.isArray(p.committeeIds) ? p.committeeIds : [];
      // Union (preserve any project-side links that aren't yet mirrored on
      // the committee — though today there's no path that creates those).
      const merged = Array.from(new Set([...existing, ...fromCommittees]));
      p.committeeIds = merged;
    });
    if (warnings.length) {

  // TSKMGR-47 — UAT column tracking. Items can sit in "Test 1" or "Test 2" UAT columns.
  // The "none" sentinel (empty string) means the item is not in UAT.
  // TODO TSKMGR-47 future — real Jira sprint sync to auto-detect column moves.
  const UAT_DEFS = {
    "":      "Not in UAT.",
    test1:   "Test 1 — first-pass UAT column.",
    test2:   "Test 2 — second-pass UAT column. Test 2 items surface a UAT2 chip on This Week."
  };
  const UAT_LABELS = { "": "—", test1: "Test 1", test2: "Test 2" };
  // Stamp transition timestamps when uatColumn changes.
  // Wave 3 rule: clock is cumulative across Test 1 → Test 2 (don't reset uatEnteredAt).
  // Clearing back to "none" wipes uatEnteredAt + uatTester.
  function stampUatTransition(item, nextColumn) {
    if (!item) return;
    const prev = item.uatColumn || null;
    const next = nextColumn || null;
    if (prev === next) return;
    if (!Array.isArray(item.uatColumnHistory)) item.uatColumnHistory = [];
    // Close prior history entry (if any)
    const last = item.uatColumnHistory.length ? item.uatColumnHistory[item.uatColumnHistory.length - 1] : null;
    if (last && !last.leftAt) last.leftAt = nowIso();
    if (next === null) {
      // Leaving UAT entirely
      item.uatColumn = null;
      item.uatEnteredAt = null;
      item.uatTester = null;
    } else {
      item.uatColumn = next;
      if (!item.uatEnteredAt) item.uatEnteredAt = nowIso(); // first entry; subsequent column moves keep the original clock
      item.uatColumnHistory.push({ column: next, enteredAt: nowIso(), leftAt: null });
    }
  }
  // Custom select for UAT (uses pillSelect convention but routes through stampUatTransition)
  function uatSelect(item) {
    const current = item.uatColumn || "";
    const opts = ["", "test1", "test2"];
    const sel = ce("select", { class: "pill-select uat-col-" + (current || "none"), title: UAT_DEFS[current] || "" });
    opts.forEach(v => {
      const o = document.createElement("option");
      o.value = v;
      o.textContent = UAT_LABELS[v];
      if (current === v) o.selected = true;
      sel.append(o);
    });
    sel.addEventListener("change", () => {
      const next = sel.value || null;
      stampUatTransition(item, next);
      sel.className = "pill-select uat-col-" + (sel.value || "none");
      sel.title = UAT_DEFS[sel.value] || "";
      persistState("Set UAT column");
      // Re-render so cumulative clock + cross-view counts update everywhere
      try { renderRoster(); } catch (e) {}
      try { renderDossier(); } catch (e) {}
    });
    return sel;
  }

  // Cumulative day count helper
  function uatDaysCumulative(item) {
    if (!item || !item.uatEnteredAt) return 0;

    return Math.max(0, Math.floor((Date.now() - t) / 86400000));

  function pillSelect(item, field, options, defs, classPrefix, defaultVal, persistReason) {

  // v3.4.9 — NEW-badge support. Items get `created_at` stamped at every creation site; the badge
  // is purely time-derived (now − created_at < 120 hours), so no cleanup is needed — it falls off
  // by itself once the threshold is crossed. Items without created_at (legacy) get no badge.
  const NEW_TAG_WINDOW_MS = 120 * 60 * 60 * 1000; // 5 days
  function isRecentlyCreated(item) {
    if (!item || !item.created_at) return false;
    const t = Date.parse(item.created_at);
    if (isNaN(t)) return false;
    const age = Date.now() - t;
    return age >= 0 && age < NEW_TAG_WINDOW_MS;
  }
  function newBadge(item) {
    if (!isRecentlyCreated(item)) return null;
    const t = Date.parse(item.created_at);
    const ageHours = Math.floor((Date.now() - t) / (60 * 60 * 1000));
    return ce("span", { class: "new-badge", title: "Created " + ageHours + "h ago — badge disappears at 120h" }, "NEW");
  }

  function appendNewBadge(parent, item) { const b = newBadge(item); if (b) parent.append(b); }

  function tagPills(tags) {

    const wrap = ce("div", { class: "tag-row" });
    tags.forEach(t => {
      // v3.3 — bold + thicker outline if this tag corresponds to a first-class project (matches a project.tagAlias)
      const matchedProject = (STATE.projects || []).find(p => p.tagAlias === t);
      const cls = "tag-pill" + (matchedProject ? " first-class-project" : "");
      const title = matchedProject ? ("Project: " + matchedProject.name + " — click to open project dossier") : ("Click to see all items tagged: " + t);
      wrap.append(ce("span", {
        class: cls, title: title,
        onclick: (e) => {
          e.stopPropagation();
          if (matchedProject) {
            STATE.selectedProjectId = matchedProject.id; STATE.selectedKind = "project"; STATE.selectedView = "project";

  function priorityClass(p) { if (!p || p === "pending") return "with-priority"; return "with-priority priority-" + p; }
  function meetingMinutes(p) { const live = liveCache[p.id]; if (!live || !live.nextMeeting || !live.nextMeeting.start || !live.nextMeeting.end) return null; return Math.round((new Date(live.nextMeeting.end) - new Date(live.nextMeeting.start)) / 60000); }
  function budgetStrip(p) {
    const items = p.agenda || [];
    if (!items.length) return null;
    const budgeted = items.reduce((s, a) => s + (a.minutes || 0), 0);
    const unbudgeted = items.filter(a => !a.minutes).length;
    const meetMin = meetingMinutes(p);
    const strip = ce("div", { class: "budget-strip" });
    strip.append(ce("span", {}, items.length + " item" + (items.length === 1 ? "" : "s")));
    if (budgeted) strip.append(ce("span", {}, budgeted + " min budgeted"));
    if (unbudgeted) strip.append(ce("span", {}, unbudgeted + " unbudgeted"));
    if (meetMin) {
      const headroom = meetMin - budgeted;
      let cls = "ok", txt = headroom + " min headroom in " + meetMin + "-min meeting";
      if (headroom < 0) { cls = "over"; txt = (-headroom) + " min over the " + meetMin + "-min meeting"; }
      else if (headroom < 5) { cls = "warn"; txt = headroom + " min headroom (tight) in " + meetMin + "-min meeting"; }
      strip.append(ce("span", { class: cls }, txt));
    }
    return strip;
  }

  // ----- v2.5: inlineEdit, SAVED_FILTERS, quick capture -----
  function inlineEdit(span, getter, setter, opts) {
    opts = opts || {};
    const sizeClass = opts.size || "title";
    const useTextarea = !!opts.multiline;
    const inputType = opts.inputType || "text";
    span.classList.add("editable");
    span.title = opts.tooltip || "Click to edit";
    span.addEventListener("click", (e) => {
      if (e.target !== span && (e.target.tagName === "SELECT" || e.target.tagName === "INPUT" || e.target.tagName === "BUTTON" || e.target.tagName === "A")) return;
      e.stopPropagation();
      const inp = document.createElement(useTextarea ? "textarea" : "input");
      if (!useTextarea) inp.type = inputType;
      inp.className = "edit-input size-" + sizeClass;
      if (useTextarea || inputType === "text") inp.spellcheck = true;
      inp.value = getter() != null ? String(getter()) : (inputType === "date" ? new Date().toISOString().slice(0, 10) : "");
      span.replaceWith(inp);
      inp.focus();
      if (!useTextarea && inputType !== "date" && inputType !== "number") inp.select();
      let cancelled = false;
      function commit() {
        if (cancelled) return;
        const val = inp.value;
        let parsed = val;
        if (inputType === "number") parsed = val === "" ? null : parseInt(val, 10);
        if (inputType === "date") parsed = val || null;
        setter(parsed);
        persistState(opts.persistReason || "Inline edit");
        renderDossier();
      }
      inp.addEventListener("blur", commit);
      inp.addEventListener("keydown", (k) => {
        if (k.key === "Enter" && !useTextarea) inp.blur();
        if (k.key === "Escape") { cancelled = true; renderDossier(); }
      });
    });
    return span;
  }

  // ----- aggregation helpers -----

  function isDueSoon(c, days) { if (!c.dueBy) return false; if (c.status === "done" || c.status === "cancelled") return false; const due = new Date(c.dueBy); const now = Date.now(); return due.getTime() >= now && due.getTime() <= now + days * 86400000; }
  function isToday(iso) { if (!iso) return false; const d = new Date(iso); const now = new Date(); return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth() && d.getDate() === now.getDate(); }

  // ============================================================
  // Wave 1 — Quick Views Overhaul (TSKMGR-44 / 53 / 56)
  // ============================================================

  // TSKMGR-56 / TSKMGR-67 — source-link icon glyphs by source_type.
  // Enum: gemini_notes | slack | gmail | jira | cowork_chat | gdrive | manual | other
  // (TSKMGR-67 added `gdrive` and `manual`.) `manual` has no glyph rendered inline because
  // user-created tasks don't have a URL — the label "Manual" is surfaced only in the detail modal.
  const SOURCE_LINK_GLYPHS = {
    gemini_notes: { glyph: "📄", label: "Gemini notes" },     // 📄
    slack:        { glyph: "💬", label: "Slack" },             // 💬
    gmail:        { glyph: "✉️", label: "Email" },             // ✉️
    jira:         { glyph: "🎫", label: "Jira" },              // 🎫
    cowork_chat:  { glyph: "🤖", label: "Cowork" },            // 🤖
    gdrive:       { glyph: "📁", label: "Drive" },             // 📁  TSKMGR-67
    manual:       { glyph: "✍️", label: "Manual" },            // ✍️  TSKMGR-67 (no link, label only)
    other:        { glyph: "🔗", label: "Source" }             // 🔗
  };
  function relTime(iso) {
    if (!iso) return "";
    const d = (Date.now() - new Date(iso).getTime()) / 1000;
    if (isNaN(d)) return "";
    if (d < 60) return "just now";
    if (d < 3600) return Math.floor(d / 60) + "m ago";
    if (d < 86400) return Math.floor(d / 3600) + "h ago";
    const days = Math.floor(d / 86400);
    if (days < 30) return days + "d ago";
    if (days < 365) return Math.floor(days / 30) + "mo ago";
    return Math.floor(days / 365) + "y ago";
  }

  // TSKMGR-44 — due-date color class from dueBySource + due timing
  function dueColorClass(item) {
    if (!item || !item.dueBy) return "";
    if (item.status === "done" || item.status === "cancelled" || item.completed) return "";
    const due = new Date(item.dueBy);
    if (isNaN(due.getTime())) return "";
    const today = new Date(); today.setHours(0,0,0,0);
    if (due.getTime() < today.getTime()) return "due-color-overdue";
    if (isToday(item.dueBy)) return "due-color-today";
    const src = item.dueBySource || null;
    if (src === "user") return "due-color-user";
    if (src === "claude_high") return "due-color-aiHigh";
    if (src === "claude_low") return "due-color-aiLow";
    // Legacy items without dueBySource: render neutral (no color class)
    return "";
  }

  // Source-link slot renderer (TSKMGR-56)
  function renderSourceLinkSlot(item) {
    const slot = ce("span", { class: "source-link-slot" });
    if (!item || !item.source_link) return slot; // hidden / empty
    const type = item.source_type || "other";
    const meta = SOURCE_LINK_GLYPHS[type] || SOURCE_LINK_GLYPHS.other;
    const title = (item.source_title ? (meta.label + " — " + item.source_title) : meta.label)
      + (item.source_timestamp ? " · " + relTime(item.source_timestamp) : "");
    // TODO TSKMGR-56 (future wave): broken-link detection — set .source-link-slot.broken when target unreachable
    const a = ce("a", {
      href: item.source_link,
      target: "_blank",
      rel: "noopener noreferrer",
      title: title,
      onclick: (e) => { e.stopPropagation(); }
    }, meta.glyph);
    slot.append(a);
