  .profile-grid .meta { font-size: 12px; color: var(--muted); padding-top: 6px; }
  .profile-grid .meta code { font-size: 11px; background: rgba(0,0,0,.06); padding: 1px 4px; border-radius: 3px; }
  .profile-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

  .jira-section { background: var(--jira-bg); border: 1px solid var(--jira-line); border-radius: 8px; padding: 10px 12px; }
  .jira-panel { padding: 8px 0; border-top: 1px dashed var(--jira-line); }
  .jira-panel:first-of-type { border-top: 0; }
  .jira-panel-head { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; }
  .jira-panel-head .label { font-weight: 600; font-size: 13px; }
  .jira-panel-head .count { font-size: 11px; color: var(--muted); }
  .jira-panel-head .err { color: var(--bad); font-size: 11px; margin-left: auto; }
  .jira-issue { display: grid; grid-template-columns: 110px 1fr auto; gap: 8px; padding: 4px 0; font-size: 13px; align-items: baseline; }
  .jira-issue a.key { font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; font-size: 12px; color: var(--jira-accent); text-decoration: none; }
  .jira-issue a.key:hover { text-decoration: underline; }
  .jira-issue .summary { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .jira-issue .meta-r { font-size: 11px; color: var(--muted); }
  .jira-empty { font-size: 12px; color: var(--muted); padding: 4px 0; }

  .sprint-strip { background: var(--jira-bg); border: 1px solid var(--jira-line); border-radius: 8px; padding: 8px 12px; margin-bottom: 14px; font-size: 12px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .sprint-strip .lbl { color: var(--jira-accent); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; font-size: 10px; }
  .sprint-strip .item { color: var(--fg); }
  .sprint-strip .item strong { font-weight: 600; }
  .sprint-strip .item .ago { color: var(--muted); }
  .sprint-strip .err { color: var(--bad); font-size: 11px; }
  .sprint-strip .refresh { margin-left: auto; }

  /* v2.1 — priority left-edge stripe */
  .with-priority { position: relative; padding-left: 12px; }
  .with-priority::before { content: ''; position: absolute; left: 0; top: 4px; bottom: 4px; width: 3px; border-radius: 2px; background: transparent; }
  .with-priority.priority-must::before { background: var(--bad); }
  .with-priority.priority-should::before { background: var(--warn); }
  .with-priority.priority-nice::before { background: var(--muted); opacity: 0.4; }

  /* v2.1 — status pill on commitments */
  .status-pill { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; letter-spacing: .03em; text-transform: uppercase; }
  .status-pill.open { background: rgba(0,0,0,.06); color: var(--muted); }
  .status-pill.in_progress { background: #fdecd3; color: var(--warn); }
  .status-pill.blocked { background: #fbe9eb; color: var(--bad); }
  .status-pill.done { background: #eaf4ea; color: var(--good); }
  .status-pill.cancelled { background: rgba(0,0,0,.06); color: var(--muted); text-decoration: line-through; }
  .blocked-on { font-size: 11px; color: var(--bad); margin-left: 6px; }

  /* v2.1 — tag pills */
  .tag-pill { font-size: 10px; padding: 1px 6px; border-radius: 8px; background: rgba(90,62,175,.10); color: var(--accent); font-weight: 500; margin-right: 4px; cursor: pointer; display: inline-block; }
  .tag-pill:hover { filter: brightness(1.1); }
  .tag-row { margin-top: 3px; display: flex; flex-wrap: wrap; gap: 3px; align-items: center; }

  /* v2.1 — category badge */
  .cat-badge { font-size: 10px; padding: 1px 4px; border-radius: 4px; opacity: 0.7; text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
  .cat-badge.strategic { color: var(--accent); }
  .cat-badge.tactical { color: var(--warn); }
  .cat-badge.status { color: var(--muted); }
  /* v3.4.9 — NEW badge for tasks created within the last 120 hours (5 days). Auto-disappears. */
  .new-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: linear-gradient(135deg, #2563eb 0%, #06b6d4 100%);
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-left: 4px;
    vertical-align: middle;
    box-shadow: 0 1px 2px rgba(37, 99, 235, 0.25);
  }
  .pw-card .new-badge { margin-left: 6px; }

  /* v2.1 — agenda time + minutes */
  .agenda-min { font-size: 11px; color: var(--muted); margin-left: 6px; font-variant-numeric: tabular-nums; }
  .budget-strip { font-size: 11px; color: var(--muted); padding: 4px 10px; background: rgba(0,0,0,.02); border-radius: 4px; margin-bottom: 8px; display: flex; flex-wrap: wrap; gap: 12px; }
  .budget-strip .ok { color: var(--good); font-weight: 600; }
  .budget-strip .warn { color: var(--warn); font-weight: 600; }
  .budget-strip .over { color: var(--bad); font-weight: 600; }

  /* v2.1 — carried forward badge */
  .carried-badge { font-size: 10px; padding: 1px 5px; border-radius: 4px; background: #fdecd3; color: var(--warn); margin-left: 6px; font-weight: 500; }

  /* Wave 1 polish — small "joint" lane pill on partner commitments (Joint column).
     Visual cue that this is a shared item — surfaced for 1:1 agenda discussion. */
  .lane-pill { font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; vertical-align: middle; }
  .lane-pill.lane-joint { background: rgba(90,62,175,.12); color: var(--accent); border: 1px solid rgba(90,62,175,.25); }
  :root.theme-dark .lane-pill.lane-joint { background: rgba(167,139,250,.18); color: #c4b5fd; border-color: rgba(167,139,250,.35); }

  /* v2.1.1 — editable pill selects (priority, category, status) */
  .pill-select { font: inherit; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; border: 0; cursor: pointer; text-transform: uppercase; letter-spacing: .03em; appearance: none; -webkit-appearance: none; -moz-appearance: none; outline: none; margin-right: 6px; }
  .pill-select:focus { box-shadow: 0 0 0 2px rgba(90,62,175,.35); }
  /* Dropdown options inherit color from the closed-pill state, which kills contrast on the system-rendered option list. Force readable text on a neutral background regardless of the pill's current class. */
  .pill-select option { color: #1a1a1a; background: #fff; font-weight: 600; text-transform: none; letter-spacing: 0; }
  :root.theme-dark .pill-select option { color: #f1f5f9; background: #1f2937; }
  .pill-select.priority-must { background: var(--bad); color: #fff; }
  .pill-select.priority-should { background: var(--warn); color: #fff; }
  .pill-select.priority-nice { background: var(--muted); color: #fff; opacity: 0.65; }
  .pill-select.cat-strategic { background: rgba(90,62,175,.12); color: var(--accent); }
  .pill-select.cat-tactical { background: rgba(185,101,26,.12); color: var(--warn); }
  .pill-select.cat-status { background: rgba(0,0,0,.06); color: var(--muted); }
  .pill-select.status-open { background: rgba(0,0,0,.06); color: var(--muted); }
  .pill-select.status-in_progress { background: #fdecd3; color: var(--warn); }
  .pill-select.status-blocked { background: #fbe9eb; color: var(--bad); }
  .pill-select.status-done { background: #eaf4ea; color: var(--good); }
  .pill-select.status-cancelled { background: rgba(0,0,0,.06); color: var(--muted); text-decoration: line-through; }

  /* v2.1.1 — sidebar footer (Views section) */
  .sidebar-footer { margin-top: 14px; padding-top: 10px; border-top: 1px solid var(--line); }
  .sidebar-footer .views-h { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 0 6px 6px; }
  .view-row { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  .view-row:hover { background: rgba(0,0,0,.04); }
  .view-row.active { background: rgba(90,62,175,.10); font-weight: 600; }
  .view-row .view-icon { width: 26px; height: 26px; border-radius: 6px; background: rgba(0,0,0,.05); display: flex; align-items: center; justify-content: center; font-size: 12px; }

  /* v2.2 — Today view + Tag view + Pre-read digest + Balance ribbon */
  .quickviews { padding: 0 6px; margin-bottom: 14px; }
  .quickviews .views-h { font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin: 0 0 6px; }
  .panel { max-width: 880px; }
  .panel h2 { margin: 0 0 6px; font-size: 20px; }
  .panel .lead { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .panel section { margin-bottom: 22px; }
  .panel section h3 { margin: 0 0 8px; font-size: 12px; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .panel section h3 .count { font-size: 11px; color: var(--muted); font-weight: 400; }
  .agg-item { display: grid; grid-template-columns: 130px 1fr auto; gap: 10px; padding: 6px 8px; border-radius: 4px; align-items: baseline; cursor: pointer; }
  .agg-item:hover { background: rgba(0,0,0,.03); }
  .agg-item .who { font-size: 11px; color: var(--muted); font-weight: 600; }
  .agg-item .what { font-size: 13px; }
  .agg-item .meta-r { font-size: 11px; color: var(--muted); }
  .agg-item.overdue .meta-r { color: var(--bad); font-weight: 600; }
  .agg-item.due-soon .meta-r { color: var(--warn); }
  .agg-empty { font-size: 12px; color: var(--muted); padding: 4px 8px; }

  /* Pre-read digest */
  .digest { background: rgba(0,0,0,.025); border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; margin-bottom: 14px; }
  .digest .title { font-size: 11px; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .digest .since { font-size: 13px; }
  .digest .since strong { font-weight: 600; }
  .digest .stats { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 6px; font-size: 12px; }
  .digest .stat { color: var(--fg); }
  .digest .stat .num { font-weight: 700; font-size: 14px; }
  .digest .stat.overdue .num { color: var(--bad); }
  .digest .stat.blocked .num { color: var(--bad); }
  .digest .stat.in_progress .num { color: var(--warn); }
  .digest .stat.done .num { color: var(--good); }
  .digest .carried { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* Balance ribbon */
  .balance-ribbon { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: rgba(0,0,0,.025); border-radius: 6px; margin-bottom: 12px; font-size: 11px; }
  .balance-ribbon .lbl { color: var(--muted); text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .balance-bar { display: flex; height: 8px; border-radius: 4px; overflow: hidden; flex: 1; max-width: 280px; background: rgba(0,0,0,.05); }
  .balance-bar .seg { height: 100%; }
  .balance-bar .seg.strategic { background: var(--accent); }
  .balance-bar .seg.tactical { background: var(--warn); }
  .balance-bar .seg.status { background: var(--muted); opacity: 0.5; }
  .balance-pct { font-size: 11px; }
  .balance-pct .strategic { color: var(--accent); font-weight: 600; }
  .balance-pct .tactical { color: var(--warn); font-weight: 600; }
  .balance-pct .status { color: var(--muted); font-weight: 600; }
  .balance-warn { color: var(--bad); font-weight: 600; font-size: 11px; }

  /* v2.1.1 — definitions panel */
  .defs-panel { max-width: 760px; }
  .defs-panel h2 { margin: 0 0 6px; font-size: 20px; }
  .defs-panel .lead { color: var(--muted); font-size: 13px; margin-bottom: 18px; }
  .defs-panel section { margin-bottom: 22px; }
  .defs-panel section h3 { margin: 0 0 4px; font-size: 13px; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
  .defs-panel section .axis-q { font-size: 13px; color: var(--muted); margin-bottom: 10px; font-style: italic; }
  .defs-panel .def-row { display: grid; grid-template-columns: 110px 1fr; gap: 10px; padding: 6px 0; border-bottom: 1px dashed var(--line); align-items: baseline; }
  .defs-panel .def-row:last-child { border-bottom: 0; }
  .defs-panel .def-key { font-weight: 700; font-size: 12px; }
  .defs-panel .def-text { font-size: 13px; line-height: 1.5; }
  .defs-panel .def-text em { color: var(--muted); font-style: normal; font-size: 12px; display: block; margin-top: 2px; }

  /* v2.5 — Quick capture FAB + saved filters + inline edit */
  .fab { position: fixed; bottom: 18px; right: 18px; width: 44px; height: 44px; border-radius: 50%; background: var(--accent); color: #fff; border: 0; font-size: 22px; cursor: pointer; box-shadow: 0 4px 12px rgba(0,0,0,.18); z-index: 998; display: flex; align-items: center; justify-content: center; line-height: 1; }
  .fab:hover { filter: brightness(1.08); transform: translateY(-1px); transition: transform .12s; }
  .fab:focus { outline: 2px solid var(--accent); outline-offset: 2px; }
  .qc-modal { background: var(--bg); color: var(--fg); border-radius: 8px; padding: 18px 20px; max-width: 480px; width: 90vw; }
  .qc-modal h2 { margin: 0 0 4px; font-size: 16px; }
  .qc-modal .qc-row { display: flex; align-items: flex-start; gap: 10px; margin: 10px 0; }
  .qc-modal label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); width: 80px; flex: 0 0 80px; padding-top: 8px; }
  .qc-modal select, .qc-modal input, .qc-modal textarea { font: inherit; font-size: 13px; padding: 6px 8px; border: 1px solid var(--line); border-radius: 4px; background: var(--bg); color: var(--fg); flex: 1; }
  .qc-modal textarea { min-height: 60px; resize: vertical; font-family: inherit; }
  .qc-modal .footer { display: flex; justify-content: flex-end; gap: 6px; margin-top: 14px; }
  .editable { cursor: text; padding: 1px 3px; border-radius: 3px; border: 1px solid transparent; }
  .editable:hover { background: rgba(90,62,175,.06); border-color: var(--line); }
  .edit-input { font: inherit; padding: 1px 3px; border: 1px solid var(--accent); border-radius: 3px; background: var(--bg); color: var(--fg); outline: none; }
  .edit-input.size-title { font-weight: 600; min-width: 200px; }
  .edit-input.size-detail { width: 100%; min-height: 38px; resize: vertical; font-family: inherit; }
  .edit-input.size-min { width: 50px; text-align: right; font-variant-numeric: tabular-nums; }
  .edit-input.size-date { width: 130px; }

  /* v3.1 — three collapsible roster sections */
  .roster-section { margin: 8px 0; }
  .roster-section-head { display: flex; align-items: center; gap: 4px; padding: 4px 6px; user-select: none; }
  .roster-section-head .caret { cursor: pointer; color: var(--muted); font-size: 10px; width: 14px; text-align: center; }
  .roster-section-title { flex: 1; cursor: pointer; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); font-weight: 600; }
  .roster-section-add { font: inherit; font-size: 13px; line-height: 1; padding: 0 6px; height: 20px; border: 1px solid var(--line); background: var(--bg); border-radius: 4px; cursor: pointer; color: var(--muted); }
  .roster-section-add:hover { color: var(--fg); border-color: var(--muted); }
  .roster-section-body { padding: 0 0 4px; }
  .roster-section.collapsed .roster-section-body { display: none; }
  .roster-empty { color: var(--muted); font-size: 12px; padding: 6px 8px; font-style: italic; }

  /* v3.1 — relationship pill on partner rows */
  .rel-pill { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-right: 4px; vertical-align: 1px; }
  .rel-supervisor_of { background: rgba(34,139,34,.12); color: #2d7a2d; border: 1px solid rgba(34,139,34,.3); }
  .rel-reports_to    { background: rgba(31,119,180,.12); color: #1f5b8c; border: 1px solid rgba(31,119,180,.3); }
  .rel-peer          { background: rgba(120,120,120,.10); color: #555; border: 1px solid rgba(120,120,120,.25); }

  /* v3.2 — committees, role badges, member chips, action items, discovery */
  .role-badge { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-right: 4px; vertical-align: 1px; }
  .role-owner       { background: rgba(180,72,166,.14); color: #813b73; border: 1px solid rgba(180,72,166,.35); }
  .role-contributor { background: rgba(217,127,40,.13); color: #8a5118; border: 1px solid rgba(217,127,40,.32); }
  .role-optional    { background: rgba(120,120,120,.10); color: #555; border: 1px solid rgba(120,120,120,.25); }

  .role.role-owner       { color: #813b73; }
  .role.role-contributor { color: #8a5118; }
  .role.role-optional    { color: #555; }

  .pheader .purpose { margin-top: 2px; font-style: italic; }

  .member-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 0 12px; }
  .member-chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px 2px 2px; border: 1px solid var(--line); border-radius: 12px; background: var(--bg); font-size: 12px; }
  .member-chip.optional { border-style: dashed; color: var(--muted); }
  .member-chip.is-owen { background: rgba(90,62,175,.10); border-color: rgba(90,62,175,.4); font-weight: 600; }
  .member-chip .avatar.tiny { width: 18px; height: 18px; font-size: 9px; }
  .member-hidden { font-size: 11px; color: var(--muted); align-self: center; padding-left: 4px; font-style: italic; }
  .member-row { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 6px; align-items: center; margin-bottom: 4px; }
  .inline-lbl { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }

  .action-items { margin: 4px 0; }
  .ai-bucket { margin: 12px 0 4px; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--line); padding-bottom: 2px; }
  .ai-bucket.overdue { color: var(--bad); border-bottom-color: rgba(220,30,30,.3); }
  .ai-topic { margin: 6px 0 2px 4px; font-size: 12px; color: var(--muted); }
  .ai-topic.first-class { font-weight: 700; color: var(--fg); }
  .ai-row { padding: 4px 6px 4px 10px; border-left: 3px solid var(--line); margin-bottom: 4px; background: rgba(0,0,0,.015); border-radius: 0 4px 4px 0; }
  .ai-row.priority-must   { border-left-color: var(--bad); }
  .ai-row.priority-should { border-left-color: var(--warn); }
  .ai-row.priority-nice   { border-left-color: var(--muted); }
  .ai-head { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ai-text { flex: 1; font-size: 13px; }
  .ai-meta { font-size: 11px; color: var(--muted); margin-top: 2px; padding-left: 0; }
  .ai-assignee { display: inline-block; padding: 1px 6px; border: 1px solid var(--line); border-radius: 10px; font-size: 10px; color: var(--fg); }
  .ai-assignee.tbd { color: var(--muted); font-style: italic; border-style: dashed; }
  .ai-verify { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .blocked-on { font-size: 10px; color: var(--bad); font-style: italic; }

  .discovery-card { padding: 12px; border: 1px solid var(--line); border-radius: 6px; margin-bottom: 12px; }
  .discovery-card h3 { margin: 0 0 4px; }
  .discovery-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .discovery-expand { margin-top: 12px; padding: 10px 12px; background: rgba(90,62,175,.06); border: 1px solid rgba(90,62,175,.25); border-radius: 4px; }
  .discovery-expand label { display: block; font-size: 11px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); margin: 6px 0 2px; }
  .discovery-expand input, .discovery-expand select, .discovery-expand textarea { width: 100%; box-sizing: border-box; padding: 4px 6px; border: 1px solid var(--line); border-radius: 3px; font: inherit; font-size: 13px; }
  .discovery-expand textarea { min-height: 50px; resize: vertical; }

  /* v3.3 — projects */
  .project-status { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px; letter-spacing: .04em; text-transform: uppercase; font-weight: 600; }
  .status-active  { background: rgba(34,139,34,.13); color: #2d7a2d; border: 1px solid rgba(34,139,34,.3); }
  .status-dormant { background: rgba(217,127,40,.10); color: #8a5118; border: 1px solid rgba(217,127,40,.25); }
  .status-done    { background: rgba(120,120,120,.10); color: #555; border: 1px solid rgba(120,120,120,.25); }

  .linked-meeting { padding: 6px 8px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 13px; }
  .linked-meeting:hover { background: rgba(0,0,0,.03); }
  .linked-kind { display: inline-block; padding: 1px 5px; border-radius: 3px; font-size: 9px; letter-spacing: .04em; text-transform: uppercase; font-weight: 600; margin-right: 6px; vertical-align: 1px; }
  .kind-partner  { background: rgba(90,62,175,.10); color: #5a3eaf; border: 1px solid rgba(90,62,175,.3); }
  .kind-committee { background: rgba(180,72,166,.12); color: #813b73; border: 1px solid rgba(180,72,166,.32); }

  .balance-ribbon { display: flex; gap: 2px; margin: 8px 0 14px; height: 22px; border-radius: 4px; overflow: hidden; font-size: 11px; }
  .ribbon-segment { display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; padding: 0 6px; }
  .seg-strategic { background: #6a4dad; }
  .seg-tactical  { background: #cc8838; }
  .seg-status    { background: #888; }

  /* v3.3 — first-class project tag pill (per charter §"Tag visual treatment") */
  .tag-pill.first-class-project { font-weight: 700; border-width: 2px; padding: 1px 6px; }

  /* v3.3.0b — project chip + dropdown multi-select (used on committee profile) */
  .project-multi { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .project-chip { display: inline-flex; align-items: center; gap: 4px; padding: 3px 4px 3px 8px; background: rgba(90,62,175,.10); border: 1px solid rgba(90,62,175,.3); border-radius: 12px; font-size: 12px; font-weight: 600; }
  .project-chip .chip-x { font: inherit; font-size: 14px; line-height: 1; padding: 0 4px; border: 0; background: transparent; cursor: pointer; color: var(--muted); border-radius: 50%; }
  .project-chip .chip-x:hover { background: rgba(220,30,30,.15); color: var(--bad); }
  .project-add-select { padding: 3px 8px; font-size: 12px; border: 1px dashed var(--line); border-radius: 12px; background: var(--bg); color: var(--muted); }

  /* v3.3.0b — archived project rows dimmed in sidebar */
  .partner-row.archived { opacity: .55; }
  .partner-row.archived:hover { opacity: 1; }

  /* TSKMGR-94 — Slack profile photo avatars */
  .partner-avatar-photo {
    border-radius: 50%;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
  }
  .partner-avatar-loading {
    background: linear-gradient(90deg, var(--line) 25%, var(--bg-card, var(--bg)) 50%, var(--line) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* v3.3.1 — Friday planning + tag promotion */
  .friday-filter { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin: 10px 0 14px; padding: 8px 10px; background: rgba(0,0,0,.025); border-radius: 4px; }
  .friday-card { padding: 10px 12px; border: 1px solid var(--line); border-radius: 4px; margin-bottom: 8px; }
  .friday-suggest { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .promote-row { padding: 10px 12px; background: rgba(90,62,175,.06); border: 1px solid rgba(90,62,175,.25); border-radius: 4px; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* v3.4.4e — drag-and-drop visuals */
  .pw-card.dragging { opacity: .5; }
  .pw-card-handle { cursor: grab; }
  .pw-card-handle:active { cursor: grabbing; }
  .pw-cal-day.drop-active { background: rgba(34,139,34,.04); border-left-color: rgba(34,139,34,.35); }
  .pw-cal-day.drop-hover { background: rgba(34,139,34,.10); border-left-color: rgba(34,139,34,.55); outline: 2px dashed rgba(34,139,34,.55); outline-offset: -2px; }
  .pw-event.proposed.manual { border-style: solid; border-width: 2px; border-color: rgba(217,127,40,.7); }

  /* v3.4.4d — committee role-override row + banner */
  .override-row { display: grid; grid-template-columns: 130px 110px 1fr auto; gap: 6px; margin-bottom: 4px; }
  .override-row input, .override-row select { font: inherit; font-size: 12px; padding: 3px 6px; border: 1px solid var(--line); border-radius: 3px; }
  .override-banner { padding: 8px 12px; background: rgba(180,72,166,.08); border: 1px solid rgba(180,72,166,.35); color: #813b73; border-radius: 4px; margin: 6px 0 12px; font-size: 13px; }

  /* v3.4.4a — Plan my week toolbar */
  .pw-toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 10px; background: rgba(34,139,34,.05); border: 1px solid rgba(34,139,34,.25); border-radius: 4px; }

  /* v3.4.2b — Two-pane Plan my week */
  .pw-twopane { display: grid; grid-template-columns: 320px 1fr; gap: 14px; min-height: 480px; align-items: start; }
  .pw-left { overflow-y: auto; max-height: 720px; padding-right: 4px; }
  .pw-section-h { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 8px 0 6px; font-weight: 700; }
  .pw-card { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; position: relative; }
  .pw-card:hover { border-color: var(--muted); }
  .pw-card-handle { position: absolute; top: 8px; right: 10px; color: var(--muted); cursor: grab; font-size: 14px; }
  .pw-card-name { font-weight: 600; font-size: 13px; line-height: 1.3; padding-right: 24px; }
  .pw-card-priority { display: inline-block; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 1px 6px; border-radius: 3px; vertical-align: middle; margin-left: 6px; }
  .pw-card-priority.pri-must   { background: rgba(193,17,17,.12); color: #c11; }
  .pw-card-priority.pri-should { background: rgba(200,136,0,.12); color: #a87400; }
  .pw-card-priority.pri-nice   { background: rgba(108,142,191,.12); color: #5a7aa8; }
  /* TSKMGR-49 Part 2 — Email triage cards */
  .email-card { border:1px solid var(--line); border-radius:6px; padding:10px 12px; margin-bottom:8px; }
  .email-card .email-subject { font-weight:600; font-size:13px; margin-top:2px; }
  .email-card .email-sender { font-size:11px; color:var(--muted); }
  .email-card .email-snippet { font-size:11px; color:var(--muted); margin-top:4px; max-height:2.6em; overflow:hidden; text-overflow:ellipsis; }
  .email-card .email-actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .email-card.phishing { border-color:#c11; background:rgba(193,17,17,.06); }
  .email-group { margin-bottom:14px; }
  .email-group-header { font-weight:600; font-size:13px; margin:14px 0 8px; display:flex; align-items:center; gap:8px; }
  .email-group-badge { font-size:10px; background:var(--accent); color:#fff; padding:1px 6px; border-radius:10px; }
  .email-scan-bar .btn.primary { font-size:12px; padding:5px 14px; }
  /* Refresh icon button */
  .refresh-btn { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border:1px solid var(--line); border-radius:4px; background:transparent; color:var(--muted); cursor:pointer; font-size:16px; padding:0; transition:all .15s; vertical-align:middle; margin-left:8px; }
  .refresh-btn:hover { color:var(--accent); border-color:var(--accent); background:rgba(90,62,175,.06); }
  .refresh-btn.spinning { animation: spin .8s linear infinite; pointer-events:none; opacity:.6; }
  @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  /* TSKMGR-47 — Jira UAT owner highlight */
  .email-card.uat-owner { border-left:3px solid var(--warn); background:rgba(232,175,40,.04); }
  /* TSKMGR-95 — Email candidate signal badges + pattern summary bar */
  .email-signal-badge { display:inline-flex; align-items:center; gap:4px; font-size:10px; font-weight:700; padding:2px 7px; border-radius:10px; letter-spacing:.03em; text-transform:uppercase; }
  .email-signal-badge.access_issue    { background:rgba(176,0,32,.12); color:#b00020; border:1px solid rgba(176,0,32,.25); }
  .email-signal-badge.stale_data      { background:rgba(185,101,26,.12); color:#b9651a; border:1px solid rgba(185,101,26,.25); }
  .email-signal-badge.feature_request { background:rgba(0,82,204,.10); color:#0052cc; border:1px solid rgba(0,82,204,.20); }
  .email-signal-badge.broken          { background:rgba(213,102,25,.12); color:#d56619; border:1px solid rgba(213,102,25,.25); }
  .email-signal-badge.ownership_domain{ background:rgba(90,62,175,.12); color:var(--accent); border:1px solid rgba(90,62,175,.25); }
  :root.theme-dark .email-signal-badge.access_issue    { background:rgba(248,113,113,.18); color:#fca5a5; border-color:rgba(248,113,113,.30); }
  :root.theme-dark .email-signal-badge.stale_data      { background:rgba(245,158,11,.18); color:#fbbf24; border-color:rgba(245,158,11,.30); }
  :root.theme-dark .email-signal-badge.feature_request { background:rgba(96,165,250,.18); color:#93c5fd; border-color:rgba(96,165,250,.30); }
  :root.theme-dark .email-signal-badge.broken          { background:rgba(251,146,60,.18); color:#fdba74; border-color:rgba(251,146,60,.30); }
  :root.theme-dark .email-signal-badge.ownership_domain{ background:rgba(167,139,250,.18); color:#c4b5fd; border-color:rgba(167,139,250,.30); }
  .email-candidate-card { border:1px solid var(--line); border-radius:6px; padding:10px 12px; margin-bottom:8px; border-left:3px solid var(--accent); }
  .email-candidate-card .suggested-title { font-size:12px; color:var(--accent); margin-top:5px; }
  .email-pattern-bar { background:rgba(0,0,0,.025); border:1px solid var(--line); border-radius:6px; padding:8px 12px; margin-bottom:12px; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .email-pattern-bar .pb-icon { font-size:14px; }
  .email-pattern-bar .pb-text { flex:1; }
  .domain-editor-row { display:flex; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid var(--line); font-size:12px; }
  .domain-editor-row:last-of-type { border-bottom:0; }
  /* TSKMGR-49 — Ritual step structure */
  .ritual-step { border: 1px solid var(--line); border-radius: 6px; margin-bottom: 10px; overflow: hidden; }
  .ritual-step.done { opacity: .7; }
  .ritual-step-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; cursor: pointer; background: rgba(0,0,0,.02); border-bottom: 1px solid var(--line); user-select: none; }
  .ritual-step.collapsed .ritual-step-head { border-bottom: none; }
  .ritual-step-head:hover { background: rgba(0,0,0,.04); }
  .ritual-step-num { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .ritual-step-title { font-weight: 600; font-size: 14px; flex: 1; }
  .ritual-step-badge { font-size: 11px; color: var(--muted); }
  .ritual-step-arrow { color: var(--muted); font-size: 12px; }
  .ritual-step-body { padding: 12px 14px; }
  .ritual-step-body.hidden { display: none; }
  .ritual-skip-banner { padding: 8px 14px; background: rgba(200,100,0,.08); border: 1px solid rgba(200,100,0,.3); border-radius: 4px; margin-bottom: 10px; font-size: 13px; color: #a05000; }
  .ritual-complete-bar { display: flex; align-items: center; gap: 12px; padding: 14px; margin-top: 14px; background: rgba(34,139,34,.06); border: 1px solid rgba(34,139,34,.25); border-radius: 6px; }
  /* TSKMGR-49 — Meeting-project association cards */
  .mtg-card { background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; margin-bottom: 6px; }
  .mtg-card:hover { border-color: var(--muted); }
  .mtg-card-name { font-weight: 600; font-size: 13px; }
  .mtg-card-time { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .mtg-card-actions { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
  .mtg-linked { font-size: 11px; color: #5a3eaf; font-weight: 600; }
  .pw-card-meta { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .pw-card-desc { font-size: 12px; margin-top: 6px; line-height: 1.4; color: var(--fg); }
  .pw-card-actions { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
  .pw-action { font: inherit; font-size: 10px; padding: 3px 8px; border-radius: 12px; border: 1px solid var(--line); background: var(--bg); cursor: pointer; line-height: 1.2; }
  .pw-action:hover { background: rgba(0,0,0,.04); }
  select.pw-action { padding-right: 18px; }
  .pw-action.project-btn { color: #5a3eaf; border-color: rgba(90,62,175,.4); }
  .pw-action.priority-btn-must   { color: #c11; border-color: rgba(220,30,30,.4); font-weight: 600; }
  .pw-action.priority-btn-should { color: #c80; border-color: rgba(217,127,40,.4); }
  .pw-action.priority-btn-nice   { color: #888; }
  .pw-action.discuss-btn { color: #813b73; border-color: rgba(180,72,166,.4); }
  .pw-action.pw-accept   { background: rgba(34,139,34,.1); color: #2d7a2d; border-color: rgba(34,139,34,.4); font-weight: 600; }
  .pw-action.pw-accept:hover { background: rgba(34,139,34,.2); }

  .pw-cal { background: rgba(0,0,0,.02); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; }
  .pw-cal-header { display: grid; grid-template-columns: 50px repeat(5, 1fr); border-bottom: 1px solid var(--line); }
  .pw-cal-day-head { padding: 8px 4px; text-align: center; }
  .pw-cal-day-head .dow { color: var(--muted); text-transform: uppercase; font-size: 9px; letter-spacing: .08em; }
  .pw-cal-day-head .num { font-size: 20px; font-weight: 600; line-height: 1; margin-top: 2px; }
  .pw-cal-body { display: grid; grid-template-columns: 50px repeat(5, 1fr); }
  .pw-cal-timecol { position: relative; }
  .pw-cal-time { position: absolute; left: 0; right: 0; font-size: 10px; color: var(--muted); padding: 0 4px; transform: translateY(-50%); text-align: right; }
  .pw-cal-day { position: relative; border-left: 1px solid var(--line); }
  .pw-cal-rowline { position: absolute; left: 0; right: 0; border-top: 1px dashed rgba(0,0,0,.06); height: 1px; }
  .pw-cal-lunch { position: absolute; left: 0; right: 0; background: repeating-linear-gradient(45deg, rgba(0,0,0,.025), rgba(0,0,0,.025) 4px, transparent 4px, transparent 8px); color: var(--muted); font-size: 10px; text-align: center; padding-top: 18px; pointer-events: none; }
  .pw-event { position: absolute; left: 2px; right: 2px; padding: 2px 6px; border-radius: 4px; font-size: 11px; line-height: 1.15; overflow: hidden; cursor: default; box-sizing: border-box; }
  .pw-event.existing { background: rgba(90,62,175,.14); border: 1px solid rgba(90,62,175,.35); color: #5a3eaf; }
  .pw-event.proposed { background: rgba(217,127,40,.12); border: 1px dashed rgba(217,127,40,.6); color: #8a5118; }
  /* v3.4.5 — accepted blocks render as Tangerine to match the Calendar event color */
  .pw-event.accepted { background: rgba(244,123,32,.20); border: 1px solid rgba(244,123,32,.55); color: #8a4a18; font-weight: 600; }

  /* v3.4.3a — Documents + cross-pollination */
  .doc-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .doc-row a { color: #5a3eaf; text-decoration: none; }
  .doc-row a:hover { text-decoration: underline; }
  .doc-row .meta { font-size: 11px; }
  .doc-kind { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: .04em; min-width: 50px; text-align: center; }
  .doc-kind.invite { background: rgba(31,119,180,.10); color: #1f5b8c; border: 1px solid rgba(31,119,180,.3); }
  .doc-row-manual { background: rgba(217,127,40,.06); color: #8a5118; border: 1px solid rgba(217,127,40,.3); }

  .crosspoll-panel { background: rgba(180,72,166,.04); border-color: rgba(180,72,166,.2); }
  .crosspoll-panel h3 { color: #813b73; }
  .cp-group { padding: 8px 4px; border-bottom: 1px dashed var(--line); }
  .cp-group:last-child { border-bottom: 0; }
  .cp-group-head { display: flex; align-items: center; gap: 6px; padding: 4px 6px; cursor: pointer; border-radius: 4px; }
  .cp-group-head:hover { background: rgba(0,0,0,.04); }
  .cp-item { padding: 6px 8px 6px 14px; border-left: 2px solid rgba(180,72,166,.2); margin: 4px 0 4px 12px; }
  .cp-text { font-size: 13px; }
  .cp-meta { font-size: 11px; margin-top: 2px; }
  .cp-status { display: inline-block; padding: 0 5px; border-radius: 3px; font-size: 9px; font-weight: 600; letter-spacing: .04em; }
  .cp-status.status-open { background: rgba(120,120,120,.10); color: #555; }
  .cp-status.status-in_progress { background: rgba(31,119,180,.12); color: #1f5b8c; }
  .cp-status.status-blocked { background: rgba(220,30,30,.12); color: #a02020; }

  .cp-link-badge { display: inline-block; margin-top: 4px; font-size: 10px; color: #813b73; font-style: italic; }
  .cp-link-badge a { color: #813b73; text-decoration: underline; cursor: pointer; }
  .cp-link-badge a:hover { color: #5a2a52; }

  /* TSKMGR-93 Phase 1 — Relational profiles panel */
  .relational-panel { margin-top: 16px; }
  .relational-touchpoints-label { font-size: 10px; font-weight: 700; letter-spacing: .08em; color: var(--accent); margin-bottom: 6px; }
  .relational-brief { background: var(--bg-card, rgba(0,0,0,.02)); border: 1px solid var(--line); border-radius: 8px; padding: 12px; margin: 12px 0; font-size: 13px; }
  .relational-brief h4 { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin: 8px 0 4px; }
  .relational-brief h4:first-child { margin-top: 0; }
  .relational-note-form { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
  .relational-note-form select, .relational-note-form textarea { font-size: 13px; font: inherit; font-size: 13px; padding: 6px 8px; border: 1px solid var(--line); border-radius: 4px; background: var(--bg); color: var(--fg); }
  .relational-note-form textarea { min-height: 64px; resize: vertical; }
  .relational-doc-link { font-size: 12px; color: var(--accent); text-decoration: none; }
  .relational-doc-link:hover { text-decoration: underline; }
  .relational-no-doc { color: var(--muted); font-size: 13px; padding: 8px 0; }
  .settings-section { margin-bottom: 24px; padding: 14px 16px; background: rgba(0,0,0,.02); border: 1px solid var(--line); border-radius: 8px; }
  .settings-section h3 { margin: 0 0 6px; font-size: 13px; font-weight: 700; }
  .settings-section .settings-desc { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .settings-partner-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
  .settings-partner-status { font-size: 12px; min-width: 18px; text-align: center; }

  /* v3.4.2a — context line shown under tasks (manual capture context, notes excerpts) */
  .context-line { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; padding-left: 4px; border-left: 2px solid rgba(90,62,175,.25); padding-block: 2px; padding-inline-start: 6px; }
  .context-line { font-style: italic; }

  /* v3.4.0 — Friday day-selection banner + wins section + estimate pill */
  .day-banner { padding: 8px 12px; border-radius: 4px; margin: 10px 0; border: 1px solid var(--line); font-size: 13px; }
  .day-banner.good { background: rgba(34,139,34,.08); border-color: rgba(34,139,34,.3); color: #2d7a2d; }
  .day-banner.warn { background: rgba(220,30,30,.08); border-color: rgba(220,30,30,.3); color: #a02020; }
  .day-banner.info { background: rgba(31,119,180,.08); border-color: rgba(31,119,180,.3); color: #1f5b8c; }
  .day-banner .ooo-note { margin-top: 4px; font-size: 12px; font-style: italic; opacity: .85; }

  .wins .win-row { padding: 6px 8px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 13px; }
  .wins .win-row:hover { background: rgba(0,0,0,.03); }
  .win-row.win-must { font-weight: 600; }
  .win-must-text { color: #c1392b; }
  .wins .win-text { font-weight: 500; }

  .est-pill { display: inline-block; margin-left: 8px; padding: 1px 6px; font-size: 10px; background: rgba(0,0,0,.06); border-radius: 3px; color: var(--muted); font-variant-numeric: tabular-nums; }

  /* v3.4.0b — proposal cards + busy/free map */
  .friday-card.unscheduled { opacity: .7; border-style: dashed; }
  .proposal-slot { margin-top: 6px; padding: 4px 8px; background: rgba(34,139,34,.07); border-left: 3px solid rgba(34,139,34,.5); border-radius: 0 4px 4px 0; font-size: 13px; }

  .busy-free-map { display: flex; flex-direction: column; gap: 6px; }
  .bf-row { display: grid; grid-template-columns: 140px 1fr; gap: 12px; align-items: center; padding: 6px 8px; border-bottom: 1px solid var(--line); }
  .bf-row:last-child { border-bottom: 0; }
  .bf-day { font-weight: 600; font-size: 13px; }
  .bf-summary { font-size: 13px; color: var(--fg); }
  .bf-detail { grid-column: 2; font-size: 11px; margin-top: 2px; }

  /* v3.4.1a — highlighted Done-discovery CTA */
  .btn.done-discovery { padding: 6px 14px; font-weight: 600; box-shadow: 0 1px 3px rgba(34,139,34,.25); animation: pulse-soft 2.4s ease-in-out infinite; }
  @keyframes pulse-soft { 0%, 100% { box-shadow: 0 1px 3px rgba(34,139,34,.25); } 50% { box-shadow: 0 1px 8px rgba(34,139,34,.5); } }

  .warn-banner { padding: 6px 10px; background: rgba(230,170,30,.10); border: 1px solid rgba(230,170,30,.4); border-radius: 4px; font-size: 12px; color: #8a5e0d; margin: 6px 0; }
  .good-banner { padding: 6px 10px; background: rgba(34,139,34,.08); border: 1px solid rgba(34,139,34,.3); border-radius: 4px; font-size: 12px; color: #2d7a2d; margin: 6px 0; }
  .drop-prompt h3 { color: #8a5e0d; }
  .ask-team h3 { color: #813b73; }

  /* ============================================================
     Wave 1 — Quick Views Overhaul (TSKMGR-44 / 53 / 56)
     ============================================================ */

  /* MY TASKS sidebar section */
  .mytasks-section { margin: 8px 0 12px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .mytasks-head { display: flex; align-items: center; gap: 6px; padding: 4px 8px; }
  .mytasks-head h2 { margin: 0; font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); font-weight: 600; flex: 1; }
  .mytasks-archive-toggle { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); cursor: pointer; user-select: none; }
  .mytasks-archive-toggle input { margin: 0; cursor: pointer; }
  .mytasks-tabs { display: flex; flex-wrap: wrap; gap: 2px; padding: 0 4px; }

<script>
(function () {
  const ARTIFACT_ID = "task-meeting-manager";
  const OWNER_EMAIL = "owen.grey@athletesinaction.org";
  const SEARCH_DAYS = 31;
  const JIRA_BASE = "https://jira.cru.org";
  // v3.4.11 — localStorage is now the PRIMARY store. The MCP `update_artifact`
  // bridge has been silently no-oping persistState() calls (schema requires
  // html_path, browser sends html). Until that's fixed, every interaction is
  // saved to localStorage["tmm.v3.lastState"], and on every load we prefer
  // that shadow over the embedded state. The embedded state remains as the
  // seed/fallback for fresh browsers + as the artifact's HTML payload that
  // gets re-pushed by Claude.
  const SHADOW_KEY = "tmm.v3.lastState";

  // v3.4.12 — Field-level merge from embedded HTML state (where scheduled tasks write)
  // into the shadow state (where user edits write). Idempotent. Per-field timestamp-driven.
  // User-managed fields (title, completed, status, priority, category, tags, text, dueBy,
  // blockedOn, detail, minutes, notes, members, etc.) ALWAYS keep shadow's value.
  // Sched-task-managed fields (verify*, covered*, lastReconciledMeetingId,
  // attachedDocuments[calendar_invite], member engagement metrics) take embedded if newer.
  function _mergeEmbeddedIntoShadow(shadowState, embedded) {
    if (!embedded || typeof embedded !== "object") return shadowState;
    if (!shadowState || typeof shadowState !== "object") return embedded;
    let stats = { verifyBundles: 0, coveredBundles: 0, autoItemsAdded: 0, lastReconciledUpdated: 0, inviteDocsRefreshed: 0, memberMetricsUpdated: 0 };

    function mergeVerifyBundle(s, e) {
      // verifyStatus + verifyCheckedAt + verifyNote travel together — use checkedAt to decide.
      if (!e || !e.verifyCheckedAt) return;
      if (!s.verifyCheckedAt || e.verifyCheckedAt > s.verifyCheckedAt) {
        s.verifyStatus = e.verifyStatus;
        s.verifyCheckedAt = e.verifyCheckedAt;
        s.verifyNote = e.verifyNote;
        stats.verifyBundles++;
      }
    }
    function mergeCoveredBundle(s, e) {
      // coveredStatus + coveredConfidence + coveredNote + coveredCheckedAt travel together.
      // rolledForward is user-driven (tray button), so we DON'T overwrite that.
      if (!e || !e.coveredCheckedAt) return;
      if (!s.coveredCheckedAt || e.coveredCheckedAt > s.coveredCheckedAt) {
        s.coveredStatus = e.coveredStatus;
        s.coveredConfidence = e.coveredConfidence;
        s.coveredNote = e.coveredNote;
        s.coveredCheckedAt = e.coveredCheckedAt;
        stats.coveredBundles++;
      }
    }
    function mergeListByVerify(shadowList, embeddedList) {
      if (!Array.isArray(shadowList) || !Array.isArray(embeddedList)) return;
      const idx = {};
      shadowList.forEach((it, i) => { if (it && it.id) idx[it.id] = i; });
      embeddedList.forEach(e => {
        if (!e || !e.id) return;
        if (idx[e.id] != null) {
          mergeVerifyBundle(shadowList[idx[e.id]], e);
        } else if (typeof e.id === "string" && e.id.startsWith("auto-")) {
          shadowList.push(e); stats.autoItemsAdded++;
        }
      });
    }
    function mergeListByCovered(shadowList, embeddedList) {
      if (!Array.isArray(shadowList) || !Array.isArray(embeddedList)) return;
      const idx = {};
      shadowList.forEach((it, i) => { if (it && it.id) idx[it.id] = i; });
      embeddedList.forEach(e => {
        if (!e || !e.id) return;
        if (idx[e.id] != null) {
          mergeCoveredBundle(shadowList[idx[e.id]], e);
        } else if (typeof e.id === "string" && e.id.startsWith("auto-")) {
          shadowList.push(e); stats.autoItemsAdded++;
        }
      });
    }
    function mergeAutoDecisions(shadowList, embeddedList) {
      if (!Array.isArray(shadowList) || !Array.isArray(embeddedList)) return;
      const ids = new Set(shadowList.filter(d => d && d.id).map(d => d.id));
      embeddedList.forEach(e => {
        if (!e || !e.id) return;
        if (!ids.has(e.id) && typeof e.id === "string" && e.id.startsWith("auto-")) {
          shadowList.push(e); stats.autoItemsAdded++;
        }
      });
    }

    // ---- Partners ----
    if (Array.isArray(embedded.partners) && Array.isArray(shadowState.partners)) {
      const sById = {};
      shadowState.partners.forEach(p => { if (p && p.id) sById[p.id] = p; });
      embedded.partners.forEach(ep => {
        const sp = sById[ep.id];
        if (!sp) return;
        if (ep.lastReconciledMeetingId && ep.lastReconciledMeetingId !== sp.lastReconciledMeetingId) {
          sp.lastReconciledMeetingId = ep.lastReconciledMeetingId;
          stats.lastReconciledUpdated++;
        }
        if (Array.isArray(ep.agenda)) mergeListByCovered(sp.agenda || (sp.agenda = []), ep.agenda);
        if (ep.commitments) {
          sp.commitments = sp.commitments || { ownerToPartner: [], partnerToOwner: [], joint: [] };
          ["ownerToPartner", "partnerToOwner", "joint"].forEach(lane => {
            mergeListByVerify(sp.commitments[lane] || (sp.commitments[lane] = []), ep.commitments[lane] || []);
          });
        }
        if (Array.isArray(ep.decisions)) mergeAutoDecisions(sp.decisions || (sp.decisions = []), ep.decisions);
      });
    }

    // ---- Committees ----
    if (Array.isArray(embedded.committees) && Array.isArray(shadowState.committees)) {
      const sById = {};
      shadowState.committees.forEach(c => { if (c && c.id) sById[c.id] = c; });
      embedded.committees.forEach(ec => {
        const sc = sById[ec.id];
        if (!sc) return;
        if (ec.lastReconciledMeetingId && ec.lastReconciledMeetingId !== sc.lastReconciledMeetingId) {
          sc.lastReconciledMeetingId = ec.lastReconciledMeetingId;
          stats.lastReconciledUpdated++;
        }
        // attachedDocuments — replace calendar_invite-sourced docs from embedded; keep
        // user/manually added ones from shadow.
        if (Array.isArray(ec.attachedDocuments)) {
          const shadowDocs = Array.isArray(sc.attachedDocuments) ? sc.attachedDocuments : [];
          const userOrManualDocs = shadowDocs.filter(d => d && d.source !== "calendar_invite");
          const inviteDocs = ec.attachedDocuments.filter(d => d && d.source === "calendar_invite");
          if (inviteDocs.length || userOrManualDocs.length !== shadowDocs.length) {
            sc.attachedDocuments = userOrManualDocs.concat(inviteDocs);
            stats.inviteDocsRefreshed++;
          }
        }
        if (Array.isArray(ec.agenda)) mergeListByCovered(sc.agenda || (sc.agenda = []), ec.agenda);
        if (Array.isArray(ec.actionItems)) mergeListByVerify(sc.actionItems || (sc.actionItems = []), ec.actionItems);
        // Engagement metrics on committee.members[] (sched-task-managed)
        if (Array.isArray(ec.members) && Array.isArray(sc.members)) {
          const embByEmail = {};
          ec.members.forEach(m => { if (m && m.email) embByEmail[m.email.toLowerCase()] = m; });
          sc.members.forEach(sm => {
            const em = embByEmail[(sm.email || "").toLowerCase()];
            if (!em) return;
            let touched = false;
            if (em.taskCountIn90d != null && em.taskCountIn90d !== sm.taskCountIn90d) { sm.taskCountIn90d = em.taskCountIn90d; touched = true; }
            if (em.inputCountIn90d != null && em.inputCountIn90d !== sm.inputCountIn90d) { sm.inputCountIn90d = em.inputCountIn90d; touched = true; }
            if (em.hasContributed != null && em.hasContributed !== sm.hasContributed) { sm.hasContributed = em.hasContributed; touched = true; }
            if (touched) stats.memberMetricsUpdated++;
          });
        }
        if (Array.isArray(ec.decisions)) mergeAutoDecisions(sc.decisions || (sc.decisions = []), ec.decisions);
      });
    }

    console.log("[v3.4.12] Merged scheduled-task field updates from embedded into shadow", stats);
    return shadowState;
  }

  function _loadInitialState() {
    const embedded = JSON.parse(document.getElementById("state").textContent);
    try {
      if (typeof localStorage === "undefined") return embedded;
      const raw = localStorage.getItem(SHADOW_KEY);
      if (!raw) return embedded;
      const shadow = JSON.parse(raw);
      if (!shadow || !shadow.state) return embedded;
      console.log("[v3.4.11] Loading state from localStorage shadow", {
        savedAt: shadow.savedAt,
        items: shadow.itemCount,
        partners: shadow.partnerCount,
        committees: shadow.committeeCount,
        projects: shadow.projectCount
      });
      // v3.4.12 — pull sched-task field updates from embedded into shadow before render
      return _mergeEmbeddedIntoShadow(shadow.state, embedded);
    } catch (e) {
      console.warn("[v3.4.11] Could not load shadow, falling back to embedded:", e);
      return embedded;
    }
  }
  const STATE = _loadInitialState();
  // Wave 2 — default-null hydration for new state keys. Existing persisted data may not have these.
  if (!Array.isArray(STATE.archive)) STATE.archive = []; // TSKMGR-54
  if (typeof STATE.lastPlanMyWeekRitualAt === "undefined") STATE.lastPlanMyWeekRitualAt = null; // TSKMGR-51
  // TSKMGR-49 — maps one-off calendar eventId → projectId so meeting notes land in the right project.
  if (!STATE.meetingProjectMap || typeof STATE.meetingProjectMap !== "object") STATE.meetingProjectMap = {};
  // Wave 3 — UAT tester directory (TSKMGR-47). Seeds free-text testers added via
  // the "+ Add tester…" affordance. TSKMGR-45 now extends this with Slack channel
  // members when a project/committee has slackChannelId set; this directory remains
  // the fallback for free-text and partner-derived testers.
  if (!Array.isArray(STATE.uatTesterDirectory)) STATE.uatTesterDirectory = [];
  // TSKMGR-45 — per-channel member cache. Keyed by Slack channel ID.
  //   { [channelId]: { fetchedAt: ISO, source: "manual"|"slack_read_channel"|"hybrid", members: [{slackUserId, name, email?, displayName?}] } }
  // Fetch is best-effort from `slack_read_channel` (derives posters) — there's no
  // first-class "list channel members" Slack MCP tool today. Members can also be
  // added manually as a fallback for lurkers.
  if (!STATE.slackChannelMembers || typeof STATE.slackChannelMembers !== "object") STATE.slackChannelMembers = {};
  // TSKMGR-45 Part B — per-canvas proposal cache. Keyed by Slack canvas file ID (F...).
  if (!STATE.canvasProposals || typeof STATE.canvasProposals !== "object") STATE.canvasProposals = {};
  // TSKMGR-70 — per-committee calendar-invitee cache. Keyed by recurringEventId.
  //   { [recurringEventId]: { fetchedAt: ISO, attendees: [{email, displayName, responseStatus, source: "calendar"|"manual"}] } }
  // Pivot from STATE.slackChannelMembers (TSKMGR-45 Part A): Slack MCP has no
  // first-class "list channel members" API and `slack_read_channel` poster
  // derivation missed lurkers. Calendar invitee lists are persistent, already
  // wired (the artifact uses list_events extensively), and reflect committee
  // membership reality. STATE.slackChannelMembers is left inert (no migration).
  if (!STATE.committeeAttendees || typeof STATE.committeeAttendees !== "object") STATE.committeeAttendees = {};
  // TSKMGR-69 — ISO timestamp of last successful write-through to the embedded
  // state seed block. Stays null until the first successful sync.
  if (typeof STATE._lastArtifactSync === "undefined") STATE._lastArtifactSync = null;
  // TSKMGR-49 Part 2 — Email triage cache
  if (!STATE.emailTriage || typeof STATE.emailTriage !== "object") STATE.emailTriage = {};
  // Shape: { threads: { [threadId]: { id, subject, snippet, sender, senderEmail, date,
  //   classification: "quick_reply"|"long_response"|"task"|"phishing"|"fyi",
  //   classifiedAt: ISO, confidence: 0-1, dueBySource: "claude_low"|"claude_high"|"user",
  //   dueBy: ISO|null, dismissed: bool, taskCreated: bool, draftCreated: bool,
  //   participants: [email], candidateTaskTitle: string|null } },
  //   lastScanAt: ISO|null, scanInProgress: bool }
  if (!STATE.emailTriage.threads || typeof STATE.emailTriage.threads !== "object") STATE.emailTriage.threads = {};
  if (typeof STATE.emailTriage.lastScanAt === "undefined") STATE.emailTriage.lastScanAt = null;
  // Ignored senders list — learned from dismiss actions. Shape: [{ email, addedAt, lastSubject }]
  if (!Array.isArray(STATE.emailTriage.ignoredSenders)) STATE.emailTriage.ignoredSenders = [];
  // TSKMGR-49 — Filter rules: granular ignore rules beyond full-sender blocks.
  // Shape: [{ id, type: "calendar_update"|"subject_contains", enabled: bool,
  //   senderContains: string|null, subjectContains: string|null,
  //   exceptDescriptionUpdateByOthers: bool (calendar_update only),
  //   label: string, createdAt: ISO }]
  if (!Array.isArray(STATE.emailTriage.filterRules)) STATE.emailTriage.filterRules = [];
  // TSKMGR-95 — Domain ownership config. emailOwnershipDomains defines Owen's responsibility areas.
  // Shape: [{ id, label, keywords: [string], description }]
  if (!Array.isArray(STATE.emailOwnershipDomains)) STATE.emailOwnershipDomains = [];
  // Seed defaults once via flag v395domains
  if (!STATE._seeds || !STATE._seeds.v395domains) {
    if (!STATE._seeds || typeof STATE._seeds !== "object") STATE._seeds = {};
    STATE._seeds.v395domains = true;
    if (!STATE.emailOwnershipDomains.length) {
      STATE.emailOwnershipDomains = [
        { id: "powerbi", label: "Power BI", keywords: ["power bi", "powerbi", "pbi", "report", "dashboard", "data", "tableau"], description: "Power BI reports and data" },
        { id: "connections", label: "Connections", keywords: ["connections", "discipleship", "engagement level", "cru connections"], description: "AIA Connections requests from athletesinaction.org" },
        { id: "square", label: "Square", keywords: ["square", "payment", "transaction", "pos", "point of sale"], description: "Square payment requests" }
      ];
    }
  }
  // TSKMGR-95 — Pattern learning feedback. Shape: [{ threadId, senderEmail, signalType, decision: "created"|"dismissed"|"ignored_sender", timestamp }]
  if (!Array.isArray(STATE.emailFeedback)) STATE.emailFeedback = [];
  // TSKMGR-80 — Basecamp project registry + ingest state
  // basecampProjects: [{ id, name, active, todosetId, chatId }]
  if (!Array.isArray(STATE.basecampProjects)) STATE.basecampProjects = [];
  // Seed defaults once via flag v396basecamp
  if (!STATE._seeds || !STATE._seeds.v396basecamp) {
    if (!STATE._seeds || typeof STATE._seeds !== "object") STATE._seeds = {};
    STATE._seeds.v396basecamp = true;
    STATE.basecampProjects = [
      { id: 39598744, name: "Owen & Jerry",    active: true,  todosetId: 7938048605, chatId: 7938048608 },
      { id: 25762386, name: "Central Arkansas", active: false, todosetId: 4527984734, chatId: 4527984740 },
      { id: 25309499, name: "ELC",              active: true,  todosetId: 4428547350, chatId: 4428547353 }
    ];
  }
  // basecampTasks: flat array of todo items assigned to Owen, keyed by source_url
  if (!Array.isArray(STATE.basecampTasks)) STATE.basecampTasks = [];
  // basecampAttention: message board posts + campfire lines needing Owen's attention
  if (!Array.isArray(STATE.basecampAttention)) STATE.basecampAttention = [];
  // TSKMGR-93 Phase 1 — Relational profiles (Google Drive docs per partner)
  if (typeof STATE.relationalFolderId === "undefined") STATE.relationalFolderId = null;
  if (!STATE.relationalCache || typeof STATE.relationalCache !== "object") STATE.relationalCache = {};
  // Seed relationalDocId on any existing partners that don't have it
  (STATE.partners || []).forEach(function(p) { if (typeof p.relationalDocId === "undefined") p.relationalDocId = null; });
  // TSKMGR-47 — Jira UAT live cache (not persisted — refreshed on each scan)
  // Shape: { items: [{ key, summary, status, project, assigneeEmail, assigneeName,
  //   updatedAt, uatColumn, jiraId, url }], lastScanAt, scanInProgress }
  var jiraUatCache = { items: [], lastScanAt: null, scanInProgress: false };
  const liveCache = {};
  const jiraCache = {};
  let sprintCache = null;
  let pendingSave = null;
  let lastSaveOutcome = null;
  // v3.2.6 — discovery result cache. Survives navigation so adding committees doesn't lose the list.
  // Shape: { candidates: [...], diag: {...}, ranAt: ISO } | null
  let discoveryCache = null;
  // Tracks which candidate card has its inline-add form expanded (by recurringEventId)
  let expandedAddCardId = null;

  const $ = (sel, root) => (root || document).querySelector(sel);
  const ce = (tag, attrs, kids) => {
    const el = document.createElement(tag);
    if (attrs) for (const k in attrs) {

    return el;
  };
  const initials = (n) => (n || "?").split(/\s+/).map(s => s[0]).slice(0, 2).join("").toUpperCase() || "?";

  // TSKMGR-94 — Slack avatar cache helpers
  function _slackAvatarCache() {
    try { return JSON.parse(localStorage.getItem("tmm.v3.slackAvatars") || "{}"); } catch (e) { return {}; }
  }
  function _slackAvatarSet(slackUserId, url) {
    const cache = _slackAvatarCache();
    cache[slackUserId] = url;
    localStorage.setItem("tmm.v3.slackAvatars", JSON.stringify(cache));
  }

  // TSKMGR-94 — Fetch Slack avatar for a partner if not already cached.
  // Returns a Promise that resolves to the avatar URL or null.
  async function fetchSlackAvatarIfNeeded(partner) {
    if (!partner.slackUserId) return null;
    const cache = _slackAvatarCache();
    if (cache[partner.slackUserId]) return cache[partner.slackUserId];
    try {
      const raw = await window.cowork.callMcpTool("mcp__41e23f2c-10b6-43fa-ae26-3ec63b9776d0__slack_read_user_profile", {
        user_id: partner.slackUserId
      });
      // callMcpTool inside artifacts returns {content, structuredContent, isError}
      let profile = null;
      try {
        profile = raw.structuredContent ?? JSON.parse(raw.content[0].text);
      } catch (e) {
        profile = typeof raw === "string" ? JSON.parse(raw) : raw;
      }
      const url = (profile && profile.profile && (profile.profile.image_192 || profile.profile.image_72 || profile.profile.image_48)) || null;
      if (url) _slackAvatarSet(partner.slackUserId, url);
      return url;
    } catch (e) {
      return null;
    }
  }

  // TSKMGR-94 — Build an avatar DOM element for a partner.
  // Returns an <img> if a cached photo URL exists, otherwise the initials bubble.
  // Fires an async fetch to update the element if no cache entry yet.
  function makePartnerAvatar(partner, sizePx) {

    const cachedUrl = partner.slackUserId ? cache[partner.slackUserId] : null;

    el.textContent = derivePartnerShortCode(STATE.partners, partner);
    // Fire async fetch — update element if we get a URL back
    if (partner.slackUserId) {
      el.classList.add("partner-avatar-loading");
      fetchSlackAvatarIfNeeded(partner).then(function(url) {
        if (!url) { el.classList.remove("partner-avatar-loading"); return; }
        // Convert bubble to photo
        el.classList.remove("partner-avatar-loading");
        const img = document.createElement("img");
        img.className = "partner-avatar-photo";
        img.src = url;
        img.style.width = sizePx + "px";
        img.style.height = sizePx + "px";
        img.alt = partner.name || "";
        if (el.parentNode) el.parentNode.replaceChild(img, el);
      });
    }
    return el;
  }

  // TSKMGR-88 — return display label for a project, prefixed with emoji if set.
  function projectLabel(p, useShortCode) {
    const emoji = p.emoji ? p.emoji + " " : "";
    if (useShortCode) return emoji + (p.shortCode || p.name || p.id || "").toUpperCase();
