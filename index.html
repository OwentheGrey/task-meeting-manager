  // Project documents are rolled up from linked committees + the project's own attachedDocuments.
  function renderProjectDocumentsSection(project) {
    const ownDocs = (project.attachedDocuments || []).map(d => ({ ...d, source: "project" }));
    const linkedCommittees = (STATE.committees || []).filter(c => Array.isArray(c.projectIds) && c.projectIds.includes(project.id));
    const linkedDocs = [];
    linkedCommittees.forEach(c => {
      (c.attachedDocuments || []).forEach(d => {
        if (d && d.url) linkedDocs.push({ ...d, source: "committee", sourceName: c.name, sourceId: c.id });
      });
      if (c.manualNotesUrl) linkedDocs.push({ url: c.manualNotesUrl, title: "Manual notes — " + c.name, kind: "manual", source: "committee", sourceName: c.name, sourceId: c.id });
    });
    const all = ownDocs.concat(linkedDocs);
    // Dedupe by URL
    const seen = new Set();
    const unique = [];
    all.forEach(d => { if (d.url && !seen.has(d.url)) { seen.add(d.url); unique.push(d); } });

    if (!unique.length) return null;
    const sec = ce("section", { class: "block" });
    sec.append(ce("h3", {}, "📎 Documents"));
    sec.append(ce("div", { class: "meta" }, unique.length + " document" + (unique.length === 1 ? "" : "s") + " linked across committees + project."));
    unique.forEach(d => {
      const tag = d.kind === "manual" ? "MANUAL" : (d.source === "committee" ? "INVITE" : "PROJECT");
      const row = ce("div", { class: "doc-row" }, [
        ce("span", { class: "doc-kind " + (d.kind === "manual" ? "doc-row-manual" : "invite") }, tag),
        ce("a", { href: d.url, target: "_blank", rel: "noopener" }, d.title || "(unnamed)"),
        d.sourceName ? ce("span", { class: "meta" }, " · from " + d.sourceName) : null
      ].filter(Boolean));
      sec.append(row);
    });
    return sec;
  }

  // Cross-pollination panel: committee action items where assigneeEmail matches this partner.
  // Items remain owned by the committee; this panel is a read-through view onto the canonical record.
  function renderCrossPollinationPanel(partner) {
    if (!partner || !partner.email) return null;
    const matches = [];
    (STATE.committees || []).forEach(c => {
      (c.actionItems || []).forEach(a => {
        if (!a.assigneeEmail) return;
        if (a.assigneeEmail.toLowerCase() !== partner.email.toLowerCase()) return;
        if (a.status === "done" || a.status === "cancelled") return;
        matches.push({ committee: c, item: a });
      });
    });
    if (!matches.length) return null;

    const sec = ce("section", { class: "block crosspoll-panel" });
    sec.append(ce("h3", {}, ["From committees", ce("span", { class: "pill synth" }, matches.length + " open")]));
    sec.append(ce("div", { class: "meta" }, "Action items assigned to " + (partner.name || partner.email) + " in committees Owen attends. Items remain owned by their committees — edit them there to reflect changes everywhere."));

    // Group by committee for readability
    const byCommittee = {};
    matches.forEach(m => { (byCommittee[m.committee.id] = byCommittee[m.committee.id] || { committee: m.committee, items: [] }).items.push(m.item); });

    Object.values(byCommittee).forEach(grp => {
      const grpDiv = ce("div", { class: "cp-group" });
      grpDiv.append(ce("div", { class: "cp-group-head", onclick: () => {
        STATE.selectedCommitteeId = grp.committee.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
        renderRoster(); renderDossier();
      } }, [
        ce("span", { class: "linked-kind kind-committee" }, "committee"),
        ce("strong", {}, " " + (grp.committee.name || grp.committee.id)),
        ce("span", { class: "meta" }, " · " + grp.items.length + " open"),
        ce("span", { class: "meta", style: "margin-left:auto" }, "open →")
      ]));
      grp.items.forEach(it => {
        const row = ce("div", { class: "cp-item" });
        row.append(ce("div", { class: "cp-text" }, [
          ce("span", { class: "ai-text" }, it.text || "(no text)"),
          ce("span", { class: "est-pill" }, " ⏱ " + estimateMinutes(it) + " min")
        ]));
        const meta = ce("div", { class: "meta cp-meta" });
        meta.append(ce("span", { class: "cp-status status-" + (it.status || "open") }, (it.status || "open").toUpperCase()));
        meta.append(document.createTextNode(" · " + (it.dueBy ? "due " + fmtDate(it.dueBy) : "no due date")));
        if (it.priority) meta.append(document.createTextNode(" · priority " + it.priority));
        row.append(meta);
        const ctxEl = renderContextLine(it);
        if (ctxEl) row.append(ctxEl);
        grpDiv.append(row);
      });
      sec.append(grpDiv);
    });
    return sec;
  }

  // Returns a small badge listing partner names this item is cross-visible to.
  // Item is a committee action item; we check assigneeEmail against partner.email list.
  function crossPolLinkBadge(item) {
    if (!item || !item.assigneeEmail) return null;
    const matches = (STATE.partners || []).filter(p => (p.email || "").toLowerCase() === item.assigneeEmail.toLowerCase());
    if (!matches.length) return null;
    const wrap = ce("span", { class: "cp-link-badge", title: "Also surfaces on this partner's 1:1 dossier" });
    wrap.append(document.createTextNode("→ also on "));
    matches.forEach((p, i) => {
      const a = ce("a", { onclick: (e) => { e.preventDefault(); STATE.selectedPartnerId = p.id; STATE.selectedKind = "partner"; STATE.selectedView = "partner"; renderRoster(); renderDossier(); } }, p.name || p.email);
      if (i > 0) wrap.append(document.createTextNode(", "));
      wrap.append(a);
    });
    wrap.append(document.createTextNode("'s 1:1"));
    return wrap;
  }

  // ============================================================
  // v3.2 — Committees: data model, CRUD, render dispatcher
  // ============================================================
  function addCommittee(seed, opts) {
    opts = opts || {};
    const id = (seed && seed.id) || ("committee-" + Date.now());
    // TSKMGR-61 — base shape comes from seed; canonical defaults are filled
    // in by normalizeCommittee() below so we only have to maintain field
    // defaults in one place (COMMITTEE_SCHEMA).
    const c = Object.assign({ id, name: "" }, seed || {});
    normalizeCommittee(c);
    STATE.committees = STATE.committees || [];
    STATE.committees.push(c);
    if (!opts.noNavigate) {
      STATE.selectedCommitteeId = id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
    }
    persistState("Add committee");
    if (!opts.noNavigate) { renderRoster(); renderDossier(); }
    return c;
  }
  function removeCommittee(id) {
    const c = (STATE.committees || []).find(x => x.id === id); if (!c) return;
    if (!confirm(`Remove ${c.name || c.id}? This drops the committee's dossier from the artifact.`)) return;
    STATE.committees = STATE.committees.filter(x => x.id !== id);
    if (STATE.selectedCommitteeId === id) {
      STATE.selectedCommitteeId = null;
      STATE.selectedKind = "partner";
      STATE.selectedView = "partner";
    }
    persistState("Remove committee " + id);
    renderRoster(); renderDossier();
  }

  // ============================================================
  // v3.3 — Projects: CRUD + aggregate dossier
  // ============================================================
  function slugify(s) { return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "").slice(0, 50) || ("project-" + Date.now()); }
  function addProject(seed) {
    seed = seed || {};
    const id = seed.id || slugify(seed.name || "project");
    // TSKMGR-61 — base shape comes from seed; canonical defaults are filled
    // in by normalizeProject() below so we only have to maintain field
    // defaults in one place (PROJECT_SCHEMA).
    const p = Object.assign({ id, name: seed.name || "" }, seed);
    normalizeProject(p);
    STATE.projects = STATE.projects || [];
    STATE.projects.push(p);
    STATE.selectedProjectId = id;
    STATE.selectedKind = "project";
    STATE.selectedView = "project";
    persistState("Add project");
    renderRoster(); renderDossier();
    return p;
  }
  function removeProject(id) {
    const p = (STATE.projects || []).find(x => x.id === id); if (!p) return;
    if (!confirm(`Remove project ${p.name || p.id}? Items tagged with this project keep their projectId reference but the aggregate view goes away.`)) return;
    STATE.projects = STATE.projects.filter(x => x.id !== id);
    if (STATE.selectedProjectId === id) {
      STATE.selectedProjectId = null;
      STATE.selectedKind = "partner";
      STATE.selectedView = "partner";
    }
    persistState("Remove project " + id);
    renderRoster(); renderDossier();
  }

  // Aggregate items across partners + committees that belong to a project
  // (either via projectId === project.id, or via a tag matching project.tagAlias)
  function projectItems(p) {
    const matches = it => {
      if (it.projectId && it.projectId === p.id) return true;
      if (p.tagAlias && Array.isArray(it.tags) && it.tags.includes(p.tagAlias)) return true;
      return false;
    };
    const out = { actionItems: [], commitments: [], decisions: [], topicThreads: [], agenda: [] };
    (STATE.partners || []).forEach(pa => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        ((pa.commitments && pa.commitments[lane]) || []).forEach(c => { if (matches(c)) out.commitments.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: c, lane }); });
      });
      (pa.agenda || []).forEach(a => { if (matches(a)) out.agenda.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: a }); });
      (pa.decisions || []).forEach(d => { if (matches(d)) out.decisions.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: d }); });
      (pa.topicThreads || []).forEach(t => { if (matches(t)) out.topicThreads.push({ source: pa.name, sourceId: pa.id, sourceKind: "partner", item: t }); });
    });
    (STATE.committees || []).forEach(co => {
      (co.actionItems || []).forEach(a => { if (matches(a)) out.actionItems.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: a }); });
      (co.agenda || []).forEach(a => { if (matches(a)) out.agenda.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: a }); });
      (co.decisions || []).forEach(d => { if (matches(d)) out.decisions.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: d }); });
      (co.topicThreads || []).forEach(t => { if (matches(t)) out.topicThreads.push({ source: co.name, sourceId: co.id, sourceKind: "committee", item: t }); });
    });
    return out;
  }

  // Find every meeting (partner 1:1 or committee) linked to this project
  function projectMeetings(p) {
    const out = [];
    (STATE.partners || []).forEach(pa => {
      const items = (pa.agenda || []).concat(...["ownerToPartner","partnerToOwner","joint"].map(l => (pa.commitments && pa.commitments[l]) || []));
      const hasProject = items.some(it => (it.projectId === p.id) || (p.tagAlias && Array.isArray(it.tags) && it.tags.includes(p.tagAlias)));
      if (hasProject) out.push({ kind: "partner", id: pa.id, name: pa.name, cadence: pa.cadence });
    });
    (STATE.committees || []).forEach(co => {
      const inProjectIds = Array.isArray(co.projectIds) && co.projectIds.includes(p.id);
      const items = (co.agenda || []).concat(co.actionItems || []);
      const hasItems = items.some(it => (it.projectId === p.id) || (p.tagAlias && Array.isArray(it.tags) && it.tags.includes(p.tagAlias)));
      if (inProjectIds || hasItems) out.push({ kind: "committee", id: co.id, name: co.name, cadence: co.cadence, role: co.role });
    });
    return out;
  }

  function renderProjectDossier(p) {
    const dos = document.getElementById("dossier"); dos.innerHTML = "";
    dos.append(renderSprintStrip());

    // Header
    const head = ce("div", { class: "pheader" }, [
      ce("div", {}, [
        ce("h1", {}, [
          p.name || "(unnamed project)",
          ce("span", { class: "role" }, [
            ce("span", { class: "project-status status-" + (p.status || "active") }, p.status || "active")
          ])
        ]),
        (p.startDate || p.endDate) ? ce("div", { class: "cadence" }, (p.startDate ? fmtDate(p.startDate) : "?") + " → " + (p.endDate ? fmtDate(p.endDate) : "ongoing")) : null,
        p.description ? ce("div", { class: "purpose meta" }, p.description) : null
      ].filter(Boolean))
    ]);
    dos.append(head);

    const items = projectItems(p);
    const meetings = projectMeetings(p);

    // Members union
    const memberMap = {};
    meetings.forEach(m => {
      if (m.kind === "committee") {
        const co = STATE.committees.find(x => x.id === m.id);
        if (co) (co.members || []).forEach(mem => { if (mem.email) memberMap[mem.email] = mem; });
      } else if (m.kind === "partner") {
        const pa = STATE.partners.find(x => x.id === m.id);
        if (pa && pa.email) memberMap[pa.email] = { email: pa.email, name: pa.name };
      }
    });
    const members = Object.values(memberMap);

    // Members chip strip (uses committee member-chip styling)
    if (members.length) {
      const chipWrap = ce("div", { class: "member-chips" });
      members.forEach(m => {
        const isOwen = (m.email || "").toLowerCase() === OWNER_EMAIL.toLowerCase();
        chipWrap.append(ce("span", { class: "member-chip" + (isOwen ? " is-owen" : ""), title: m.email }, [
          ce("span", { class: "avatar tiny" }, initials(m.name || m.email)),
          ce("span", { class: "member-name" }, (m.name || m.email).split(" ")[0])
        ]));
      });
      dos.append(chipWrap);
    } else {
      dos.append(ce("div", { class: "due", style: "margin-bottom:10px" }, "Solo project — no other members linked yet."));
    }

    // Balance ribbon — strategic vs tactical across all items in the project
    const aggregatedItems = [].concat(
      items.actionItems.map(x => x.item),
      items.commitments.map(x => x.item),
      items.agenda.map(x => x.item)
    );
    // TSKMGR-65 — include project-rooted actionItems in the ribbon count so the percentages
    // reflect every category-bearing item under the project. They're rendered separately in
    // the dedicated "Action items" section below, so keep them out of the "Open work" list
    // to avoid duplication.
    const ribbonItems = aggregatedItems.concat(p.actionItems || []);
    if (ribbonItems.length) {
      const cats = { strategic: 0, tactical: 0, status: 0 };
      ribbonItems.forEach(it => { const c = it.category || "tactical"; cats[c] = (cats[c] || 0) + 1; });
      const total = cats.strategic + cats.tactical + cats.status;
      const pct = (n) => total ? Math.round((n / total) * 100) : 0;
      // v3.4.8 — fix: pass numeric counts (not category names) to pct()
      const ribbon = ce("div", { class: "balance-ribbon" }, [
        ce("div", { class: "ribbon-segment seg-strategic", style: "flex:" + pct(cats.strategic) }, pct(cats.strategic) + "% strategic"),
        ce("div", { class: "ribbon-segment seg-tactical",  style: "flex:" + pct(cats.tactical)  }, pct(cats.tactical)  + "% tactical"),
        ce("div", { class: "ribbon-segment seg-status",    style: "flex:" + pct(cats.status)    }, pct(cats.status)    + "% status")
      ]);
      dos.append(ribbon);
    }

    // Action items + commitments combined, rendered with the by-due-date helper
    const allOpen = aggregatedItems.filter(it => it.status !== "done" && it.status !== "cancelled");
    if (allOpen.length) {
      const sec = ce("section", { class: "block" });
      sec.append(ce("h3", {}, ["Open work", ce("span", { class: "pill synth" }, allOpen.length + "")]));
      sec.append(renderActionItemsByDueDate(allOpen, null));
      dos.append(sec);
    }

    // Recent decisions across the project
    if (items.decisions.length) {
      const dec = ce("section", { class: "block" });
      dec.append(ce("h3", {}, "Recent decisions across the project"));
      items.decisions
        .slice()
        .sort((a, b) => (b.item.when || "").localeCompare(a.item.when || ""))
        .slice(0, 20)
        .forEach(({ item: d, source }) => dec.append(ce("div", { class: "decision" }, [
          ce("div", {}, d.text),
          ce("div", { class: "meta" }, fmtDate(d.when) + " · from " + source),
          d.tags && d.tags.length ? tagPills(d.tags) : null
        ].filter(Boolean))));
      dos.append(dec);
    }

    // Topic threads
    if (items.topicThreads.length) {
      const tt = ce("section", { class: "block" });
      tt.append(ce("h3", {}, "Topic threads"));
      items.topicThreads.forEach(({ item: t, source }) => tt.append(ce("details", {}, [
        ce("summary", {}, t.title + "  ·  " + source),
        ce("div", { class: "body" }, [t.summary, t.tags && t.tags.length ? tagPills(t.tags) : null].filter(Boolean))
      ])));
      dos.append(tt);
    }

    // Linked meetings
    const lm = ce("section", { class: "block" });
    lm.append(ce("h3", {}, "Linked meetings"));
    if (!meetings.length) lm.append(ce("div", { class: "due" }, "No linked meetings yet. Tag a committee with this project (in its profile) or tag any item with " + (p.tagAlias ? "tag '" + p.tagAlias + "'" : "this project") + " to surface it here."));
    meetings.forEach(m => {
      const row = ce("div", { class: "linked-meeting", onclick: () => {
        if (m.kind === "partner") { STATE.selectedPartnerId = m.id; STATE.selectedKind = "partner"; STATE.selectedView = "partner"; }
        else { STATE.selectedCommitteeId = m.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee"; }
        renderRoster(); renderDossier();
      } }, [
        ce("span", { class: "linked-kind kind-" + m.kind }, m.kind),
        ce("span", {}, " " + m.name + (m.role ? " (" + m.role + ")" : "") + (m.cadence ? " · " + m.cadence.split("•")[0].trim() : ""))
      ]);
      lm.append(row);
    });
    dos.append(lm);

    // TSKMGR-65 — Project-rooted action items (parallel to committee actionItems).
    // Rendered above attachedDocuments and mirrors the committee dossier "Action items" pattern.
    // `renderActionItemRow` looks up assigneeEmail against the second arg's `.members`; we pass
    // a synthetic shim built from the project's rolled-up members so the assignee chip resolves
    // to the member's display name when possible.
    p.actionItems = p.actionItems || [];
    const paiSec = ce("section", { class: "block" });
    const openCount = p.actionItems.filter(a => a.status !== "done" && a.status !== "cancelled" && !a.completed).length;
    paiSec.append(ce("h3", {}, ["Action items", ce("span", { class: "pill synth" }, openCount + " open")]));
    const projectShim = { members: members };
    paiSec.append(renderActionItemsByDueDate(p.actionItems, projectShim));
    dos.append(paiSec);

    // v3.4.3a — Project documents rolled up from linked committees
    const projDocsSec = renderProjectDocumentsSection(p);
    if (projDocsSec) dos.append(projDocsSec);

    // v3.3.0b — Jira section on projects (reuses partner/committee pattern)
    if (p.jiraQueries && p.jiraQueries.length) {
      const jiraSec = renderJiraSection(p);
      if (jiraSec) dos.append(jiraSec);
    }

    dos.append(renderProjectProfile(p));
    loadSprintStrip();
    if (p.jiraQueries && p.jiraQueries.length) loadJira(p);
  }

  function renderProjectProfile(p) {
    const sec = ce("section", { class: "block" });
    sec.append(ce("h3", {}, ["Project profile", ce("span", { class: "pill synth" }, "editable")]));
    const grid = ce("div", { class: "profile-grid" });
    const fields = [
      { key: "name", label: "Name", tag: "input", type: "text" },
      { key: "shortCode", label: "Short code", tag: "input", type: "text", maxlength: 2, help: "Optional 2-character label shown in the avatar circle when sidebar is collapsed (e.g. 'CN' for Connections). Falls back to name initials if blank." },
      { key: "description", label: "Description", tag: "textarea", help: "What is this project, what's the goal, what phase is it in. Feeds owner-shape committees' 'what to ask the team' prompt." },
      { key: "tagAlias", label: "Tag alias", tag: "input", type: "text", help: "Tag string this project subsumes. Items with this tag are aggregated under the project automatically. e.g., 'Connections-V1.0'." },
      { key: "startDate", label: "Start date", tag: "input", type: "date" },
      { key: "endDate", label: "End date", tag: "input", type: "date", help: "Leave blank for ongoing." }
    ];
    fields.forEach(f => {
      grid.append(ce("label", {}, f.label));
      const inp = ce(f.tag, { type: f.type || undefined });
      if (f.maxlength) inp.maxLength = f.maxlength;
      inp.value = p[f.key] || "";
      inp.addEventListener("input", () => {
        let v = inp.value;
        if (f.maxlength && v.length > f.maxlength) v = v.slice(0, f.maxlength);
        if (f.key === "shortCode") v = v.toUpperCase();
        if (v !== inp.value) inp.value = v;
        p[f.key] = v || (f.type === "date" ? null : "");
      });
      inp.addEventListener("blur", () => { if (f.key === "shortCode") renderRoster(); persistState("Edit project." + f.key); });
      const wrap = ce("div", {}, [inp]);
      if (f.help) wrap.append(ce("div", { class: "meta" }, f.help));
      grid.append(wrap);
    });

    // Status select
    grid.append(ce("label", {}, "Status"));
    const statusSel = ce("select", {});
    [["active","Active"],["dormant","Dormant"],["done","Done"]].forEach(([val, lbl]) => {
      const o = ce("option", { value: val }, lbl);
      if ((p.status || "active") === val) o.selected = true;
      statusSel.append(o);
    });
    statusSel.addEventListener("change", () => { p.status = statusSel.value; persistState("Edit project.status"); renderRoster(); renderDossier(); });
    grid.append(statusSel);

    // v3.3.0b — Jira queries editor (mirrors partner / committee profile pattern)
    grid.append(ce("label", {}, "Jira queries"));
    const jqWrap = ce("div", {});
    if (!p.jiraQueries) p.jiraQueries = [];
    p.jiraQueries.forEach((q, idx) => {
      const row = ce("div", { style: "border:1px dashed var(--line);border-radius:4px;padding:8px;margin-bottom:6px" });
      const labInp = ce("input", { type: "text", value: q.label || "", placeholder: "Label" });
      const jqlInp = ce("textarea", { placeholder: "JQL", style: "min-height:50px;font-family:ui-monospace,monospace;font-size:12px" });
      jqlInp.value = q.jql || "";
      labInp.addEventListener("input", () => q.label = labInp.value);
      labInp.addEventListener("blur", () => { jiraCache[p.id] = null; persistState("Edit project Jira query label"); });
      jqlInp.addEventListener("input", () => q.jql = jqlInp.value);
      jqlInp.addEventListener("blur", () => { jiraCache[p.id] = null; persistState("Edit project Jira query JQL"); });
      const del = ce("button", { class: "btn tiny danger", style: "margin-top:4px", onclick: () => { p.jiraQueries.splice(idx, 1); jiraCache[p.id] = null; persistState("Remove project Jira query"); renderDossier(); } }, "Remove");
      row.append(labInp, jqlInp, del);
      jqWrap.append(row);
    });
    jqWrap.append(ce("button", { class: "btn tiny", onclick: () => { p.jiraQueries.push({ id: "q-" + Date.now(), label: "New query", jql: "", limit: 15 }); jiraCache[p.id] = null; persistState("Add project Jira query"); renderDossier(); } }, "+ Add Jira query"));
    grid.append(jqWrap);

    // TSKMGR-45 — Slack channel mapping editor
    grid.append(ce("label", {}, "Slack channel"));
    grid.append(_renderSlackChannelEditor(p, "project"));

    grid.append(ce("label", {}, "Project ID"));
    grid.append(ce("div", { class: "meta" }, [ce("code", {}, p.id)]));

    sec.append(grid);

    // v3.3.0b — Archive instead of remove. Active/dormant projects show Archive; archived show Restore.
    const acts = ce("div", { class: "profile-actions" });
    if (p.status === "done") {
      acts.append(ce("button", { class: "btn tiny", onclick: () => {
        p.status = "active"; persistState("Restore project " + p.id); renderRoster(); renderDossier();
      } }, "↺ Restore project"));
      acts.append(ce("button", { class: "btn tiny danger", style: "margin-left:auto", onclick: () => removeProject(p.id) }, "Delete forever"));
    } else {
      acts.append(ce("button", { class: "btn tiny", onclick: () => {
        p.status = "done"; persistState("Archive project " + p.id); renderRoster(); renderDossier();
      } }, "Archive (move to Done)"));
      acts.append(ce("button", { class: "btn tiny danger", style: "margin-left:auto", onclick: () => removeProject(p.id) }, "Delete forever"));
    }
    sec.append(acts);
    return sec;
  }

  // ============================================================
  // v3.3.1 — Tag promotion + suggestion engine + Friday planning
  // ============================================================

  // Promote a tag string to a first-class project. Creates the project with tagAlias = tag.
  // Items keep their tags array, so the existing tag continues to work — but they now also
  // aggregate under the new project automatically (via tagAlias matching in projectItems).
  function promoteTagToProject(tag) {
    if (!tag) return;
    // Don't double-promote
    const existing = (STATE.projects || []).find(p => p.tagAlias === tag);
    if (existing) {
      STATE.selectedProjectId = existing.id; STATE.selectedKind = "project"; STATE.selectedView = "project";
      renderRoster(); renderDossier();
      showSave("saved", "Already promoted: " + existing.name);
      return existing;
    }
    return addProject({ id: "project-" + Date.now(), name: tag, tagAlias: tag });
  }

  // Score existing active projects for likelihood of being the right project for a committee/meeting.
  // Inputs: committee name (or meeting title) + attendee emails.
  // Algorithm:
  //   +3 title contains project.tagAlias (case-insensitive)
  //   +3 title contains project.name (case-insensitive)
  //   +2 ≥1 attendee email matches a member of a meeting already linked to that project
  //   +1 any committee linked to the project shares ≥1 attendee
  function suggestProjectFor(meetingTitle, attendeeEmails) {
    const projects = (STATE.projects || []).filter(p => p.status !== "done");
    if (!projects.length) return [];
    const title = (meetingTitle || "").toLowerCase();
    const atts = (attendeeEmails || []).map(e => (e || "").toLowerCase()).filter(Boolean);
    const scored = projects.map(p => {
      let score = 0;
      const reasons = [];
      if (p.tagAlias && title.includes(p.tagAlias.toLowerCase())) { score += 3; reasons.push("title contains tag"); }
      if (p.name && title.includes(p.name.toLowerCase())) { score += 3; reasons.push("title contains project name"); }
      // Attendee overlap with linked committees
      const linkedCommittees = (STATE.committees || []).filter(c => Array.isArray(c.projectIds) && c.projectIds.includes(p.id));
      if (linkedCommittees.length) {
        const linkedEmails = new Set();
        linkedCommittees.forEach(c => (c.members || []).forEach(m => { if (m.email) linkedEmails.add(m.email.toLowerCase()); }));
        const overlap = atts.filter(e => linkedEmails.has(e)).length;
        if (overlap > 0) { score += 2; reasons.push(overlap + " attendee overlap with linked committees"); }
      }
      return { project: p, score, reasons };
    }).filter(s => s.score > 0);
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, 3);
  }

  // Suggest projects for an item (agenda/action item/commitment) by looking at its tags
  function suggestProjectForItem(item) {
    if (!item.tags || !item.tags.length) return [];
    const projects = (STATE.projects || []).filter(p => p.status !== "done");
    const matches = [];
    item.tags.forEach(tag => {
      const p = projects.find(x => x.tagAlias === tag);
      if (p && !matches.find(m => m.project.id === p.id)) matches.push({ project: p, score: 3, reasons: ["tag matches alias"] });
    });
    return matches.slice(0, 3);
  }

  function isHoliday(date) {

  // Returns a Date for the next Friday on or after the given date (today if today is Friday)
  function upcomingFriday(from) {
    const d = new Date(from); d.setHours(0, 0, 0, 0);
    const diff = (5 - d.getDay() + 7) % 7;
    d.setDate(d.getDate() + diff);

  async function getOOOHoursOn(date) {
    try {
      const start = new Date(date); start.setHours(0, 0, 0, 0);
      const end = new Date(date); end.setHours(23, 59, 59, 999);
      const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", {
        startTime: start.toISOString(),

        eventTypeFilter: ["outOfOffice"],

      });
      const { data } = unwrapMcp(evRaw);

      const events = pickArr(data, "events") || pickArr(data, "items") || [];
      let hours = 0;
      events.forEach(e => {
        if (!e.start || !e.end) return;
        const s = new Date(e.start.dateTime || e.start.date);
        const ed = new Date(e.end.dateTime || e.end.date);
        if (!isNaN(s) && !isNaN(ed)) hours += (ed - s) / 3600000;
      });

  // v3.4.0 — Time estimation defaults. Strategic 75 / tactical 45 / email-style 30.
  // Caches result back into the item so future calls are stable.
  function estimateMinutes(item) {
    if (item.estimated_minutes && typeof item.estimated_minutes === "number") return item.estimated_minutes;
    let est;
    const text = (item.text || item.title || "").toLowerCase();
    const isEmail = (item.verifyVia && item.verifyVia.type === "email_sent") || /^(reply|send|respond|email)\b/.test(text);
    if (isEmail) est = 30;
    else if (item.category === "strategic") est = 75;
    else if (item.category === "status") est = 30;
    else est = 45; // tactical (and unset) default
    item.estimated_minutes = est;
    return est;
  }

  // v3.4.0 — Stamp done_at when an item flips to a terminal state. Used by Wins-this-week.
  function stampDone(item) {
    if (!item.done_at) item.done_at = new Date().toISOString();
  }

  // v3.4.0 — Owen-mention attribution rule.
  // Default: any "Owen" token attributes to Owen Grey.
  // Exception: if any namesake (someone with first or last name "Owen" other than Owen Grey himself)
  // is in the contextMembers list, only count strict matches (full email, @owen.grey handle, "Owen Grey").
  function hasNamesakeOwen(contextMembers) {
    return (contextMembers || []).some(m => {
      if (!m) return false;
      if (m.email && m.email.toLowerCase() === OWNER_EMAIL.toLowerCase()) return false;
      const parts = ((m.name || "").trim()).split(/\s+/);
      return parts.some(p => p.toLowerCase() === "owen");
    });
  }
  function isOwenAttribution(text, contextMembers) {
    const t = String(text || "");
    // Strict matches always attribute to Owen Grey, regardless of namesakes
    if (/owen\.grey@athletesinaction\.org/i.test(t)) return true;
    if (/@owen\.grey\b/i.test(t)) return true;
    if (/\bOwen Grey\b/.test(t)) return true;
    // Loose match — only if no namesake risk
    if (!/\bOwen\b/.test(t)) return false;
    return !hasNamesakeOwen(contextMembers);
  }

  // v3.4.0 — Walk all sources, return items with done_at within last N days.
  function recentWins(days) {
    days = days || 7;
    const cutoff = Date.now() - days * 86400000;
    const out = [];
    const recent = (it) => it && it.done_at && (new Date(it.done_at)).getTime() >= cutoff;
    (STATE.partners || []).forEach(p => {
      (p.agenda || []).forEach(a => { if (a.completed && recent(a)) out.push({ kind: "agenda", item: a, sourceName: p.name, sourceId: p.id, sourceKind: "partner" }); });
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        ((p.commitments && p.commitments[lane]) || []).forEach(c => { if ((c.status === "done" || c.completed) && recent(c)) out.push({ kind: "commitment", item: c, sourceName: p.name, sourceId: p.id, sourceKind: "partner" }); });
      });
    });
    (STATE.committees || []).forEach(co => {
      (co.agenda || []).forEach(a => { if (a.completed && recent(a)) out.push({ kind: "agenda", item: a, sourceName: co.name, sourceId: co.id, sourceKind: "committee" }); });
      (co.actionItems || []).forEach(a => { if ((a.status === "done" || a.completed) && recent(a)) out.push({ kind: "action", item: a, sourceName: co.name, sourceId: co.id, sourceKind: "committee" }); });
    });
    out.sort((a, b) => (b.item.done_at || "").localeCompare(a.item.done_at || ""));
    return out;
  }

  // ============================================================
  // v3.4.0b — Time-block proposer + Calendar create_event
  // ============================================================

  // Module cache so navigating in/out of the Friday view doesn't refetch on every render.
  // Invalidated on accept (since we just added a new event) and after 5 min staleness.
  let fridayCalCache = null; // { ts: number, cal: { start, end, busyByDay, events } | null }

  function getNextWeekRange() {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const dow = today.getDay();
    const daysToMon = ((1 - dow + 7) % 7) || 7; // upcoming Monday, never today
    const monday = new Date(today); monday.setDate(today.getDate() + daysToMon); monday.setHours(0, 0, 0, 0);
    const friday = new Date(monday); friday.setDate(monday.getDate() + 4); friday.setHours(23, 59, 59, 999);
    return { start: monday, end: friday };
  }

  async function loadNextWeekCalendar(forceRefresh) {
    if (!forceRefresh && fridayCalCache && Date.now() - fridayCalCache.ts < 300000) return fridayCalCache.cal;
    const { start, end } = getNextWeekRange();
    try {
      const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__list_events", {
        startTime: start.toISOString(),
        endTime: end.toISOString(),
        fullText: OWNER_EMAIL,
        pageSize: 50,
        orderBy: "startTime"
      });
      const { data } = unwrapMcp(evRaw);
      if (typeof data === "string") { fridayCalCache = { ts: Date.now(), cal: null }; return null; }
      const events = (pickArr(data, "events") || pickArr(data, "items") || []).filter(e => e.status !== "cancelled" && e.eventType !== "birthday");
      const busyByDay = {};
      events.forEach(e => {
        const sIso = e.start && (e.start.dateTime || e.start.date);
        const eIso = e.end && (e.end.dateTime || e.end.date);
        if (!sIso || !eIso) return;
        const eStart = new Date(sIso); const eEnd = new Date(eIso);
        if (isNaN(eStart) || isNaN(eEnd)) return;
        let cursor = new Date(eStart); cursor.setHours(0, 0, 0, 0);
        const lastDay = new Date(eEnd);
        while (cursor <= lastDay) {
          const dayKey = cursor.toISOString().slice(0, 10);
          const dayStart = new Date(cursor);
          const dayEnd = new Date(cursor); dayEnd.setHours(23, 59, 59, 999);
          const intervalStart = eStart > dayStart ? eStart : dayStart;
          const intervalEnd = eEnd < dayEnd ? eEnd : dayEnd;
          if (intervalEnd > intervalStart) {
            (busyByDay[dayKey] = busyByDay[dayKey] || []).push({ start: intervalStart, end: intervalEnd, summary: e.summary || "(busy)" });
          }
          cursor.setDate(cursor.getDate() + 1);
        }
      });
      Object.keys(busyByDay).forEach(d => busyByDay[d].sort((a, b) => a.start - b.start));
      const cal = { start, end, busyByDay, events };
      fridayCalCache = { ts: Date.now(), cal };
      return cal;
    } catch (err) {
      console.error("[friday] loadNextWeekCalendar failed", err);
      fridayCalCache = { ts: Date.now(), cal: null };
      return null;
    }
  }

  // Build per-day open slots: 8:30am-12pm + 1pm-5pm minus busy intervals.
  // Returns map dayKey → [{ start, end, slot: "morning"|"afternoon" }] sorted by start.
  function buildDailySlots(weekDays, busyByDay) {
    const slotsByDay = {};
    weekDays.forEach(d => {
      const dayKey = d.toISOString().slice(0, 10);
      // v3.4.1a — working hours 9am-5pm (was 8:30am-5pm). Lunch 12-1.
      const morningStart = new Date(d); morningStart.setHours(9, 0, 0, 0);
      const morningEnd = new Date(d); morningEnd.setHours(12, 0, 0, 0);
      const afternoonStart = new Date(d); afternoonStart.setHours(13, 0, 0, 0);
      const afternoonEnd = new Date(d); afternoonEnd.setHours(17, 0, 0, 0);
      let free = [
        { start: morningStart, end: morningEnd, slot: "morning" },
        { start: afternoonStart, end: afternoonEnd, slot: "afternoon" }
      ];
      (busyByDay[dayKey] || []).forEach(b => {
        const next = [];
        free.forEach(f => {
          if (b.end <= f.start || b.start >= f.end) { next.push(f); return; }
          if (b.start <= f.start && b.end >= f.end) return; // covered
          if (b.start <= f.start) { next.push({ start: b.end, end: f.end, slot: f.slot }); return; }
          if (b.end >= f.end) { next.push({ start: f.start, end: b.start, slot: f.slot }); return; }
          next.push({ start: f.start, end: b.start, slot: f.slot });
          next.push({ start: b.end, end: f.end, slot: f.slot });
        });
        free = next.filter(f => f.end > f.start);
      });
      slotsByDay[dayKey] = free;
    });
    return slotsByDay;
  }

  function isEmailLikeTask(item) {
    const text = (item.text || item.title || "").toLowerCase();
    return (item.verifyVia && item.verifyVia.type === "email_sent") || /^(reply|send|respond|email)\b/.test(text);
  }

  function proposeBlocks(taskRecords, busyByDay) {
    if (!busyByDay) return [];
    const proposals = [];
    const range = getNextWeekRange();
    const weekDays = [];
    for (let i = 0; i < 5; i++) {
      const d = new Date(range.start); d.setDate(range.start.getDate() + i); weekDays.push(d);
    }
    const slotsByDay = buildDailySlots(weekDays, busyByDay);
    const sorted = taskRecords.slice().sort(fridayTaskSort);

    // v3.4.4e — honor manual drag-drop overrides first (skip the auto-fit pass for those)
    const overrideRecs = sorted.filter(rec => rec.item.proposedSlotOverride && rec.item.proposedSlotOverride.start && rec.item.proposedSlotOverride.end);
    overrideRecs.forEach(rec => {
      const ovr = rec.item.proposedSlotOverride;
      const start = new Date(ovr.start);
      const end = new Date(ovr.end);
      proposals.push({ rec, slot: { start, end }, manuallyPlaced: true });
      // Mark this slot as "consumed" in slotsByDay so auto-fit doesn't double-book
      const dayKey = start.toISOString().slice(0, 10);
      const daySlots = slotsByDay[dayKey] || [];
      // Don't bother surgically splitting — just push a fake busy interval for accuracy
      slotsByDay[dayKey] = daySlots.map(s => {
        if (end <= s.start || start >= s.end) return s;
        if (start <= s.start && end >= s.end) return null; // covered
        if (start <= s.start) return { start: end, end: s.end, slot: s.slot };
        if (end >= s.end) return { start: s.start, end: start, slot: s.slot };
        return { start: s.start, end: start, slot: s.slot, _split: { start: end, end: s.end, slot: s.slot } };
      }).filter(Boolean).flatMap(s => s._split ? [{ start: s.start, end: s.end, slot: s.slot }, s._split] : [s]);
    });

    const remaining = sorted.filter(rec => !overrideRecs.includes(rec));

    remaining.forEach(rec => {
      const item = rec.item;
      const minutes = estimateMinutes(item);
      const isMorningTask = item.category === "strategic";
      const isAfternoonTask = isEmailLikeTask(item);
      const dueLimit = item.dueBy ? new Date(item.dueBy + "T23:59:59") : null;
      let placed = false;

      for (let di = 0; di < weekDays.length && !placed; di++) {
        const day = weekDays[di];
        if (dueLimit && day > dueLimit) break;
        const dayKey = day.toISOString().slice(0, 10);
        const daySlots = slotsByDay[dayKey] || [];
        // Try preferred slot type first, then fall back
        const ordered = isMorningTask
          ? daySlots.slice().sort((a, b) => (a.slot === "morning" ? -1 : 1) - (b.slot === "morning" ? -1 : 1))
          : isAfternoonTask
          ? daySlots.slice().sort((a, b) => (a.slot === "afternoon" ? -1 : 1) - (b.slot === "afternoon" ? -1 : 1))
          : daySlots.slice();

        for (let i = 0; i < ordered.length && !placed; i++) {
          const s = ordered[i];
          const slotMins = (s.end - s.start) / 60000;
          if (slotMins < minutes) continue;
          const blockStart = new Date(s.start);
          const blockEnd = new Date(blockStart.getTime() + minutes * 60000);
          // Update slot list: replace s with whatever's left after block + 15min buffer
          const idx = daySlots.indexOf(s);
          const replacements = [];
          const bufferEnd = new Date(blockEnd.getTime() + 15 * 60000);
          if (bufferEnd < s.end) replacements.push({ start: bufferEnd, end: s.end, slot: s.slot });
          daySlots.splice(idx, 1, ...replacements);
          proposals.push({ rec, slot: { start: blockStart, end: blockEnd } });
          placed = true;
        }
      }
      if (!placed) proposals.push({ rec, unscheduled: true, reason: dueLimit && weekDays[0] > dueLimit ? "Due before next week starts" : "No slot fits this week" });
    });
    return proposals;
  }

  function collectOpenTasksForBlocking() {
    const out = [];
    (STATE.partners || []).forEach(pa => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        ((pa.commitments && pa.commitments[lane]) || []).forEach(c => {
          if (c.calendar_block_event_id) return; // already blocked
          if (c.status === "done" || c.status === "cancelled") return;
          out.push({ item: c, kind: "commitment", source: pa.name, sourceId: pa.id, sourceKind: "partner" });
        });
      });
    });
    (STATE.committees || []).forEach(co => {
      (co.actionItems || []).forEach(a => {
        if (a.calendar_block_event_id) return;
        if (a.status === "done" || a.status === "cancelled") return;
        // Only Owen's own assignments — committee tasks assigned to others go on their plate, not Owen's
        if (a.assigneeEmail && a.assigneeEmail.toLowerCase() !== OWNER_EMAIL.toLowerCase()) return;
        out.push({ item: a, kind: "action", source: co.name, sourceId: co.id, sourceKind: "committee" });
      });
    });
    return out;
  }

  function fmtTimeRange(start, end) {
    const fmt = (d) => d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    return fmt(start) + "–" + fmt(end);
  }
  function fmtDayLabel(d) {
    return d.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
  }

  async function acceptBlock(prop, btn) {
    const { rec, slot } = prop;
    if (btn) { btn.disabled = true; btn.textContent = "Creating…"; }
    showSave("saving", "Creating focus-time block…");
    // v3.4.5 — Calendar blocks created from Plan my week are Focus Time events with Tangerine color.
    const summary = "🟧 " + (rec.item.text || rec.item.title || "(task block)");
    const description = "Focus Time block from Task/Meeting Manager.\n\nSource: " + rec.source + " (" + rec.sourceKind + ")\nKind: " + rec.kind + (rec.item.dueBy ? "\nDue: " + rec.item.dueBy : "") + (rec.item.tags && rec.item.tags.length ? "\nTags: " + rec.item.tags.join(", ") : "");
    const baseParams = {
      summary,
      startTime: slot.start.toISOString(),
      endTime: slot.end.toISOString(),
      description,
      colorId: "6", // Tangerine
      timeZone: "America/New_York"
    };
    let data;
    try {
      // First attempt: include eventType: "focusTime" — Google Calendar's official Focus Time type
      const evRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__create_event",
        Object.assign({ eventType: "focusTime" }, baseParams));
      const unwrapped = unwrapMcp(evRaw);
      data = unwrapped.data;
      if (typeof data === "string") {
        // MCP wrapper rejected eventType — retry as a regular event with Tangerine color (still does the right job visually)
        showSave("saving", "Falling back to regular event (eventType not supported)…");
        const retryRaw = await window.cowork.callMcpTool("mcp__1bf97388-dfb1-43d1-84eb-68ad6116208d__create_event", baseParams);
        const retryUnwrapped = unwrapMcp(retryRaw);
        data = retryUnwrapped.data;
        if (typeof data === "string") {
          showSave("error", "Calendar create failed: " + data.slice(0, 80));
          if (btn) { btn.disabled = false; btn.textContent = "Accept"; }
          return;
        }
      }
      const eventId = (data && (data.id || (data.event && data.event.id))) || true;
      rec.item.calendar_block_event_id = eventId;
      // v3.4.4e — clear any drag-drop slot override now that the block is committed
      delete rec.item.proposedSlotOverride;
      fridayCalCache = null; // invalidate so next-week-at-a-glance reflects the new block
      showSave("saved", "Block created");
      persistState("Time-block accepted");
      renderFridayPlanning();
    } catch (e) {
      showSave("error", "Calendar create failed: " + (e && e.message ? e.message : e));
      if (btn) { btn.disabled = false; btn.textContent = "Accept"; }
    }
  }

  function renderBusyFreeMap(busyByDay) {
    const wrap = ce("div", { class: "busy-free-map" });
    const range = getNextWeekRange();
    for (let i = 0; i < 5; i++) {
      const day = new Date(range.start); day.setDate(range.start.getDate() + i);
      const dayKey = day.toISOString().slice(0, 10);
      const busy = busyByDay[dayKey] || [];
      const row = ce("div", { class: "bf-row" });
      row.append(ce("div", { class: "bf-day" }, fmtDayLabel(day)));
      const busyMins = busy.reduce((sum, b) => {
        // v3.4.1a — workday window 9:00-17:00 (Owen's working hours)
        const ds = new Date(day); ds.setHours(9, 0, 0, 0);
        const de = new Date(day); de.setHours(17, 0, 0, 0);
        const s = b.start > ds ? b.start : ds;
        const e = b.end < de ? b.end : de;
        return sum + Math.max(0, (e - s) / 60000);
      }, 0);
      const totalWork = 8 * 60; // 8 hours = 480 min from 9:00 to 5:00
      const freeMins = Math.max(0, totalWork - busyMins - 60); // minus 1hr lunch
      row.append(ce("div", { class: "bf-summary" }, busy.length === 0 ? "Wide open · ~" + Math.round(freeMins / 60) + "h free" : busy.length + " event" + (busy.length === 1 ? "" : "s") + " · ~" + Math.round(freeMins / 60) + "h free"));
      if (busy.length) {
        const detailDiv = ce("div", { class: "bf-detail meta" });
        const labels = busy.slice(0, 4).map(b => fmtTimeRange(b.start, b.end) + " " + (b.summary.length > 30 ? b.summary.slice(0, 27) + "…" : b.summary));
        detailDiv.textContent = labels.join("  ·  ") + (busy.length > 4 ? " · +" + (busy.length - 4) + " more" : "");
        row.append(detailDiv);
      }
      wrap.append(row);
    }
    return wrap;
  }

  // v3.4.0 — Friday-planning task ordering.
  // Primary: dueBy ascending (overdue first → earliest → undated last).
  // Secondary: source key (partner-X / committee-Y) — groups same-source tasks adjacent to reduce transition fatigue.
  // Tertiary: priority (must > should > nice).
  function fridayTaskSort(a, b) {
    const aDue = a.item.dueBy || "9999-12-31";
    const bDue = b.item.dueBy || "9999-12-31";
    const dueDiff = aDue.localeCompare(bDue);
    if (dueDiff !== 0) return dueDiff;
    const aKey = a.sourceKind + "-" + a.sourceId;
    const bKey = b.sourceKind + "-" + b.sourceId;
    if (aKey !== bKey) return aKey.localeCompare(bKey);
    return priorityRank(a.item) - priorityRank(b.item);
  }

  function fridayLookbackDays() {
    try { return parseInt(localStorage.getItem("tmm.friday.lookback") || "7", 10); } catch (e) { return 7; }
  }
  function setFridayLookback(days) {
    try { localStorage.setItem("tmm.friday.lookback", String(days)); } catch (e) {}
  }
  // v3.4.4a — custom date range for Friday view
  function fridayCustomRange() {
    try {
      const raw = localStorage.getItem("tmm.friday.customRange");
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }
  function setFridayCustomRange(start, end) {
    try {
      if (!start || !end) localStorage.removeItem("tmm.friday.customRange");
      else localStorage.setItem("tmm.friday.customRange", JSON.stringify({ start, end }));
    } catch (e) {}
  }

  // ============================================================
  // v3.4.2b — Two-pane Plan my week: cards + week calendar grid
  // ============================================================
  function fmtHour(h) {
    if (h === 12) return "12pm";
    if (h > 12) return (h - 12) + "pm";
    if (h === 0) return "12am";
    return h + "am";
  }

  function addToPartnerDiscussion(item, partnerId, sourceRec) {
    const p = STATE.partners.find(x => x.id === partnerId); if (!p) return;
    p.agenda = p.agenda || [];
    p.agenda.push({
      id: "from-pw-" + Date.now(),
      title: item.text || item.title || "(no title)",
      detail: (item.source_context && item.source_context.excerpt) || item.detail || "",
      completed: false, relatedDoc: null,
      coveredStatus: "pending", coveredConfidence: null, coveredNote: null, coveredCheckedAt: null, rolledForward: false,
      tags: (item.tags || []).slice(), priority: item.priority || "should",
      minutes: estimateMinutes(item), category: item.category || "tactical",
      projectId: item.projectId || null, carriedForwardFrom: null,
      created_at: new Date().toISOString(), // v3.4.9
      source_context: {
        kind: "from_plan_my_week",
        created_at: new Date().toISOString(),
        meeting_id: null,
        meeting_label: "Added from Plan my week — discuss with " + (p.name || partnerId),
        excerpt: "Original from " + sourceRec.source + ": " + (item.text || item.title || "")
      }

    persistState("PW: add to partner agenda");
    showSave("saved", "Added to " + (p.name || partnerId) + "'s agenda");
