  function relTime(iso) {
    if (!iso) return "";
    const d = (Date.now() - new Date(iso).getTime()) / 1000;
    if (isNaN(d)) return "";
    if (d < 60) return "just now";
    if (d < 3600) return Math.floor(d / 60) + "m ago";
    if (d < 86400) return Math.floor(d / 3600) + "h ago";
    const days = Math.floor(d / 86400);
    if (days < 30) return days + "d ago";
    if (days < 365) return Math.floor(days / 30) + "mo ago";
    return Math.floor(days / 365) + "y ago";
  }

  // TSKMGR-44 — due-date color class from dueBySource + due timing
  function dueColorClass(item) {
    if (!item || !item.dueBy) return "";
    if (item.status === "done" || item.status === "cancelled" || item.completed) return "";
    const due = new Date(item.dueBy);
    if (isNaN(due.getTime())) return "";
    const today = new Date(); today.setHours(0,0,0,0);
    if (due.getTime() < today.getTime()) return "due-color-overdue";
    if (isToday(item.dueBy)) return "due-color-today";
    const src = item.dueBySource || null;
    if (src === "user") return "due-color-user";
    if (src === "claude_high") return "due-color-aiHigh";
    if (src === "claude_low") return "due-color-aiLow";
    // Legacy items without dueBySource: render neutral (no color class)
    return "";
  }

  // Source-link slot renderer (TSKMGR-56)
  function renderSourceLinkSlot(item) {
    const slot = ce("span", { class: "source-link-slot" });
    if (!item || !item.source_link) return slot; // hidden / empty
    const type = item.source_type || "other";
    const meta = SOURCE_LINK_GLYPHS[type] || SOURCE_LINK_GLYPHS.other;
    const title = (item.source_title ? (meta.label + " — " + item.source_title) : meta.label)
      + (item.source_timestamp ? " · " + relTime(item.source_timestamp) : "");
    // TODO TSKMGR-56 (future wave): broken-link detection — set .source-link-slot.broken when target unreachable
    const a = ce("a", {
      href: item.source_link,
      target: "_blank",
      rel: "noopener noreferrer",
      title: title,
      onclick: (e) => { e.stopPropagation(); }
    }, meta.glyph);
    slot.append(a);
    return slot;
  }

  // TSKMGR-67 — Source label for the detail modal's provenance row.
  // The internal source_type enum drives the display label per Owen's spec.
  // Returns "" / null when there's no source line worth rendering — caller decides whether
  // to show the section. The row's inline source-link icon (renderSourceLinkSlot) is a
  // separate surface and remains unchanged.
  function sourceLabelFor(item) {
    if (!item) return null;
    const type = item.source_type;
    if (!type) return null; // legacy items without source_type — don't render a source line at all
    if (type === "gemini_notes") {
      return item.source_title ? "Call Notes - " + item.source_title : "Call Notes";
    }
    if (type === "gmail") return "Email";
    if (type === "slack") return "Slack";
    if (type === "gdrive") return "Drive";
    if (type === "jira") {
      // For UAT/Jira-sourced items, just the ticket key (no "Source:" prefix).
      // _jiraKeyFor walks verifyVia + tag heuristics; fall back to source_title.
      try {
        const key = (typeof _jiraKeyFor === "function") ? _jiraKeyFor(item) : null;
        if (key) return key;
      } catch (e) {}
      return item.source_title || "Jira";
    }
    if (type === "manual") return "Manual";
    if (type === "cowork_chat") return "Cowork";
    if (type === "other") return "Other";
    return type; // unknown future enum value — show raw so it's debuggable
  }

  // TSKMGR-67 — Tiny markdown renderer for the description field.
  // Supports: ## headings, **bold-line headings**, - bullets, > blockquotes, blank-line paragraphs.
  // Intentionally minimal — no inline emphasis, no links, no nested lists. Owen's spec is short.
  function renderDescriptionMarkdown(text) {
    const wrap = ce("div");
    if (!text) return wrap;
    const lines = String(text).replace(/\r\n/g, "\n").split("\n");
    let i = 0;
    function esc(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    while (i < lines.length) {
      const line = lines[i];
      const trimmed = line.trim();
      if (!trimmed) { i++; continue; }
      // ## heading
      const hMatch = trimmed.match(/^#{1,6}\s+(.*)$/);
      if (hMatch) {
        const h = ce("h3"); h.textContent = hMatch[1].trim();
        wrap.append(h); i++; continue;
      }
      // **Bold-only line** -> heading (per spec, sub-section heads are **What I committed to** etc.)
      const boldOnly = trimmed.match(/^\*\*(.+?)\*\*:?$/);
      if (boldOnly) {
        const h = ce("h3"); h.textContent = boldOnly[1].trim();
        wrap.append(h); i++; continue;
      }
      // Bullet list block
      if (/^[-*]\s+/.test(trimmed)) {
        const ul = ce("ul");
        while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
          const li = ce("li");
          li.textContent = lines[i].trim().replace(/^[-*]\s+/, "");
          ul.append(li);
          i++;
        }
        wrap.append(ul); continue;
      }
      // Blockquote block
      if (/^>\s?/.test(trimmed)) {
        const bq = ce("blockquote");
        const chunks = [];
        while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
          chunks.push(lines[i].trim().replace(/^>\s?/, ""));
          i++;
        }
        bq.textContent = chunks.join(" ");
        wrap.append(bq); continue;
      }
      // Paragraph block (collect contiguous non-special lines)
      const para = ce("p");
      const buf = [];
      while (i < lines.length) {
        const cur = lines[i];
        const tcur = cur.trim();
        if (!tcur) break;
        if (/^#{1,6}\s+/.test(tcur)) break;
        if (/^\*\*(.+?)\*\*:?$/.test(tcur)) break;
        if (/^[-*]\s+/.test(tcur)) break;
        if (/^>\s?/.test(tcur)) break;
        buf.push(tcur);
        i++;
      }
      para.textContent = buf.join(" ");
      wrap.append(para);
    }
    return wrap;
  }

  // TSKMGR-67 — Format a source_context.location object as a concise citation string.
  // Examples: "p. 3, lines 12–18" / "p. 3–4" / "lines 12–18" / "p. 3" / ""
  function _formatSourceLocation(loc) {
    if (!loc || typeof loc !== "object") return "";
    const ps = loc.page_start, pe = loc.page_end;
    const ls = loc.line_start, le = loc.line_end;
    let pagePart = "";
    if (ps != null && pe != null && ps !== pe) pagePart = "p. " + ps + "–" + pe;
    else if (ps != null) pagePart = "p. " + ps;
    else if (pe != null) pagePart = "p. " + pe;
    let linePart = "";
    if (ls != null && le != null && ls !== le) linePart = "lines " + ls + "–" + le;
    else if (ls != null) linePart = "line " + ls;
    else if (le != null) linePart = "line " + le;
    if (pagePart && linePart) return pagePart + ", " + linePart;
    return pagePart || linePart || "";
  }

  // TSKMGR-67 — Task Detail Modal open/close + body builder.
  // The modal is a separate surface from the row's inline affordances; clicking the row outside
  // an editable affordance opens it. Title + due-date + description are editable inline here too.
  let _taskDetailCurrent = null; // { item, source } — populated while modal is open
  function openTaskDetailModal(item, source) {
    if (!item) return;
    _taskDetailCurrent = { item, source: source || null };
    const body = document.getElementById("task-detail-body");
    if (!body) return;
    body.innerHTML = "";
    body.append(renderTaskDetailModal(item, source || null));
    const back = document.getElementById("task-detail-backdrop");
    back.classList.add("open");
    // Focus the modal panel for screen-reader / Escape pickup
    const modal = document.getElementById("task-detail-modal");
    if (modal) { try { modal.focus({ preventScroll: true }); } catch (e) {} }
  }
  function closeTaskDetailModal() {
    const back = document.getElementById("task-detail-backdrop");
    if (back) back.classList.remove("open");
    _taskDetailCurrent = null;
  }
  function _refreshTaskDetailModalIfOpen(item) {
    if (!_taskDetailCurrent || _taskDetailCurrent.item !== item) return;
    const body = document.getElementById("task-detail-body");
    if (!body) return;
    body.innerHTML = "";
    body.append(renderTaskDetailModal(item, _taskDetailCurrent.source));
  }

  // TSKMGR-67 — Build the detail modal body.
  // Reuses inlineEdit() for title + due date; pillSelect family for status/priority/category/UAT;
  // sourceLabelFor() for the provenance label.
  function renderTaskDetailModal(item, source) {
    const wrap = ce("div");
    const itemType = item.title ? "agenda" : (item.text != null ? "commitment" : "agenda");

    // --- Title row ---
    const titleRow = ce("div", { class: "td-title-row" });
    const titleSpan = ce("span", { class: "td-title", id: "task-detail-title-text" }, item.title || item.text || "(click to edit)");
    inlineEdit(titleSpan,
      () => (itemType === "agenda" ? item.title : item.text),
      (v) => { if (itemType === "agenda") item.title = v; else item.text = v; },
      { size: "title", multiline: true, persistReason: "Edit task title (detail modal)" });
    titleRow.append(titleSpan);
    wrap.append(titleRow);

    // --- Pills row (priority / category / status / UAT / due) ---
    const pills = ce("div", { class: "td-pills" });
    // Priority
    pills.append(ce("span", { class: "td-pill-label" }, "Priority"));
    pills.append(prioritySelect(item));
    // Category
    pills.append(ce("span", { class: "td-pill-label" }, "Category"));
    pills.append(categorySelect(item));
    // Status (only meaningful for non-agenda items)
    if (itemType !== "agenda") {
      pills.append(ce("span", { class: "td-pill-label" }, "Status"));
      pills.append(statusSelectEl(item));
    }
    // UAT column (when item is in UAT)
    if (item.uatColumn || typeof uatSelect === "function") {
      pills.append(ce("span", { class: "td-pill-label" }, "UAT"));
      try { pills.append(uatSelect(item)); } catch (e) {}
    }
    wrap.append(pills);

    // --- Due date row (editable) ---
    const dueRow = ce("div", { class: "td-pills" });
    dueRow.append(ce("span", { class: "td-pill-label" }, "Due"));
    const dueSpan = ce("span", { class: "due-date " + (dueColorClass(item) || "") }, item.dueBy ? fmtDate(item.dueBy) : "TBD");
    inlineEdit(dueSpan, () => item.dueBy, (v) => {
      item.dueBy = v;
      if (v) item.dueBySource = "user";
    }, { size: "date", inputType: "date", persistReason: "Edit due date (detail modal)" });
    dueRow.append(dueSpan);
    // Tester (UAT only)
    if (item.uatColumn) {
      dueRow.append(ce("span", { class: "td-pill-label" }, "Tester"));
      dueRow.append(renderTesterDropdown(item, null, source));
    }
    wrap.append(dueRow);

    // --- Description section ---
    // TODO TSKMGR-67 — ingestion classifier needs to populate item.description on Claude-generated
    // tasks using the template from the ticket spec ("What I committed to" / "Expectations" /
    // "Source excerpt"). For now the field defaults to null on manual capture; this surface just
    // renders + edits whatever's there.
    const descSection = ce("div", { class: "td-section" });
    descSection.append(ce("div", { class: "td-section-head" }, "Description"));
    const descBlock = ce("div", { class: "td-description" + (item.description ? "" : " placeholder") },
      item.description ? "" : "Add description…");
    if (item.description) descBlock.append(renderDescriptionMarkdown(item.description));
    descBlock.title = "Click to edit description (Markdown — supports ## headings, - bullets, > blockquotes)";
    descBlock.addEventListener("click", (e) => {
      // Don't intercept clicks on rendered links inside the description
      if (e.target && (e.target.tagName === "A" || e.target.tagName === "BUTTON")) return;
      e.stopPropagation();
      const ta = document.createElement("textarea");
      ta.className = "td-description-edit";
      ta.value = item.description || "";
      ta.placeholder = "**What I committed to:**\n- bullet\n\n**Expectations:**\nprose\n\n**Source excerpt:**\n> quote";
      descBlock.replaceWith(ta);
      ta.focus();
      let cancelled = false;
      function commit() {
        if (cancelled) return;
        const next = ta.value;
        item.description = next ? next : null;
        persistState("Edit description (detail modal)");
        // Re-render the modal body so the new markdown shows
        _refreshTaskDetailModalIfOpen(item);
        // Also refresh dossier behind the modal in case other surfaces care
        try { renderDossier(); } catch (e) {}
      }
      ta.addEventListener("blur", commit);
      ta.addEventListener("keydown", (k) => {
        if (k.key === "Escape") { cancelled = true; _refreshTaskDetailModalIfOpen(item); }
      });
    });
    descSection.append(descBlock);
    wrap.append(descSection);

    // --- Source provenance section ---
    const srcLabel = sourceLabelFor(item);
    if (srcLabel || item.source_link || (item.source_context && (item.source_context.excerpt || item.source_context.location))) {
      const provSection = ce("div", { class: "td-section" });
      provSection.append(ce("div", { class: "td-section-head" }, "Source"));
      if (srcLabel) {
        const row = ce("div", { class: "td-prov-row" });
        row.append(ce("span", { class: "lbl" }, "Label"));
        row.append(ce("span", {}, srcLabel));
        provSection.append(row);
      }
      if (item.source_link) {
        const row = ce("div", { class: "td-prov-row" });
        row.append(ce("span", { class: "lbl" }, "Link"));
        const a = ce("a", { href: item.source_link, target: "_blank", rel: "noopener noreferrer" },
          item.source_title || item.source_link);
        row.append(a);
        if (item.source_timestamp) row.append(ce("span", { class: "td-prov-citation" }, " (" + relTime(item.source_timestamp) + ")"));
        provSection.append(row);
      }
      // Citation (page/line range)
      const ctx = item.source_context || null;
      if (ctx && ctx.location) {
        const citation = _formatSourceLocation(ctx.location);
        if (citation) {
          const row = ce("div", { class: "td-prov-row" });
          row.append(ce("span", { class: "lbl" }, "Citation"));
          row.append(ce("span", { class: "td-prov-citation" }, citation));
          provSection.append(row);
        }
      }
      if (ctx && ctx.excerpt) {
        const bq = ce("blockquote", { class: "td-prov-excerpt" }, ctx.excerpt);
        provSection.append(bq);
      }
      if (ctx && ctx.meeting_label && !item.source_link) {
        provSection.append(ce("div", { class: "td-meta-line" }, ctx.meeting_label));
      }
      wrap.append(provSection);
    }

    // --- Attached documents section ---
    const docs = Array.isArray(item.attachedDocuments) ? item.attachedDocuments : [];
    if (docs.length > 0) {
      const docSection = ce("div", { class: "td-section" });
      docSection.append(ce("div", { class: "td-section-head" }, "Associated documents"));
      const ul = ce("ul", { class: "td-attached-list" });
      docs.forEach(d => {
        if (!d) return;
        const li = ce("li");
        if (d.url) {
          li.append(ce("a", { href: d.url, target: "_blank", rel: "noopener noreferrer" }, d.title || d.url));
        } else {
          li.textContent = d.title || "(untitled)";
        }
        ul.append(li);
      });
      docSection.append(ul);
      wrap.append(docSection);
    }

    // --- Footer ---
    const footer = ce("div", { class: "td-footer" });
    const closeBtn = ce("button", { class: "btn", onclick: closeTaskDetailModal }, "Close");
    footer.append(closeBtn);
    wrap.append(footer);

    return wrap;
  }

  // TSKMGR-44 — Unified row factory
  // itemData: the task object (agenda / commitment / action item)
  // source: { kind: "partner"|"committee"|"project", id, name }
  // handlers: { onNavigate?: fn, onTesterChange?: fn(item, nextTester) }
  // options: {
  //   uat?: { column, testerLabel, daysCumulative } (Wave 3 — All UAT view passes this for highlight + clock + tester display),
  //   locked?: bool, uatEditable?: bool (Wave 3 — when locked but UAT column should still be editable),
  //   showTester?: bool, showUatPill?: bool ("test2" auto on This Week),
  //   showSourceLink?: bool,
  //   itemType?: "agenda"|"commitment"|"action",
  //   assigneeLabel?: string
  // }
  function renderTaskRow(itemData, source, handlers, options) {
    options = options || {};
    handlers = handlers || {};
    const itemType = options.itemType || (itemData.title ? "agenda" : "commitment");
    const priority = itemData.priority || "should";
    const status = itemData.status || (itemData.completed ? "done" : "open");
    const isDone = status === "done" || status === "cancelled" || itemData.completed;
    const isOverdueFlag = isOverdue(itemData);
    const isTodayFlag = itemData.dueBy && isToday(itemData.dueBy);

    // Wave 3 — UAT cumulative clock + highlight
    const uatDays = options.uat ? (options.uat.daysCumulative != null ? options.uat.daysCumulative : uatDaysCumulative(itemData)) : 0;
    const uatHighlight = options.uat
      ? (uatDays >= 7 ? "uat-breached" : (uatDays >= 5 ? "uat-watch" : ""))
      : "";

    const classes = [
      "row", "row-item", itemType,
      "priority-" + priority,
      "status-" + status,
      isOverdueFlag ? "is-overdue" : "",
      isTodayFlag ? "is-today" : "",
      isDone ? (status === "cancelled" ? "is-cancelled" : "is-done") : "",
      itemData.aiSuggested ? "ai-suggested" : "",
      options.locked ? "uat-locked" : "",
      uatHighlight
    ].filter(Boolean).join(" ");

    const row = ce("div", { class: classes, "data-item-id": itemData.id || "" });

    // ----- Left zone -----
    const left = ce("div", { class: "row-left" });
    const sourceIconGlyph = source && source.kind === "committee" ? "👥"
                          : source && source.kind === "project" ? "📋"
                          : "👤"; // 👤 partner default
    const sourceIcon = ce("div", { class: "source-icon", title: (source && source.kind ? source.kind + ": " : "") + (source && source.name ? source.name : "") }, sourceIconGlyph);
    if (handlers.onNavigate) {
      sourceIcon.style.cursor = "pointer";
      sourceIcon.addEventListener("click", (e) => { e.stopPropagation(); handlers.onNavigate(); });
    }
    left.append(sourceIcon);
    left.append(ce("div", { class: "priority-bar priority-" + priority }));
    row.append(left);

    // ----- Center zone -----
    const center = ce("div", { class: "row-center" });
    const head = ce("div", { class: "row-head" });
    appendNewBadge(head, itemData);
    if (isTodayFlag) head.append(ce("span", { class: "today-chip" }, "TODAY"));
    const titleSpan = ce("span", { class: "row-title" }, itemData.title || itemData.text || "(click to edit)");
    if (!options.locked) {
      inlineEdit(titleSpan,
        () => (itemType === "agenda" ? itemData.title : itemData.text),
        (v) => { if (itemType === "agenda") itemData.title = v; else itemData.text = v; },
        { size: "title", multiline: true, persistReason: "Edit task title" });
    }
    head.append(titleSpan);
    if (!options.locked && itemType !== "agenda") head.append(statusSelectEl(itemData));
    if (itemData.status === "blocked" && itemData.blockedOn) head.append(ce("span", { class: "blocked-on" }, "blocked on: " + itemData.blockedOn));
    if (!options.locked) head.append(categorySelect(itemData));
    // TSKMGR-47 — inline UAT pill (after category, before source-link slot).
    // Editable in normal contexts; in locked contexts (e.g. All UAT view) only renders editable
    // when options.uatEditable === true (the row-contract carve-out for column moves within UAT).
    if (!options.locked || options.uatEditable) head.append(uatSelect(itemData));
    // Read-only UAT2 chip on This Week (when row is in test2 and pill isn't editable here).
    // Skip when uatSelect was already appended (above) — the editable pill already shows the state.
    if (options.locked && !options.uatEditable && itemData.uatColumn === "test2") {
      const chip = uatPillReadonly("test2");
      if (chip) head.append(chip);
    }
    center.append(head);

    const body = ce("div", { class: "row-body" });
    const dueWrap = ce("span", { class: "meta due" });
    // Assignee chip
    // - For committee/project rows with an assigneeEmail, look up the member name.
    // - For partner-rooted commitments, derive from source.lane:
    //     ownerToPartner -> "Owen"   (Owen owes the partner)
    //     partnerToOwner -> partner.name  (partner owes Owen)
    //     joint          -> "Owen"   (single-owner rule per Owen; shared work still has one owner)
    //   Falls back to "Owen" if lane is missing (legacy / agenda items).
    // - Caller passes options.assigneeLabel to override entirely.
    let assigneeName = "TBD";
    if (options.assigneeLabel) {
      assigneeName = options.assigneeLabel;
    } else if (itemData.assigneeEmail) {
      const co = source && source.kind === "committee" ? (STATE.committees || []).find(x => x.id === source.id) : null;
      if (co) {
        const m = (co.members || []).find(x => (x.email || "").toLowerCase() === itemData.assigneeEmail.toLowerCase());
        assigneeName = m ? (m.name || m.email) : itemData.assigneeEmail;
      } else {
        assigneeName = itemData.assigneeEmail;
      }
    } else if (source && source.kind === "partner") {
      if (source.lane === "partnerToOwner") {
        assigneeName = source.name || "Partner";
      } else {
        // ownerToPartner, joint, or lane-less (e.g. partner agenda) -> Owen owns it
        assigneeName = "Owen";
      }
    }
    dueWrap.append(ce("span", { class: "assignee" + (assigneeName === "TBD" ? " tbd" : "") }, assigneeName));
    dueWrap.append(document.createTextNode(" · due "));
    const dueClass = "due-date " + dueColorClass(itemData);
    const dueSpan = ce("span", { class: dueClass.trim() }, itemData.dueBy ? fmtDate(itemData.dueBy) : "TBD");
    if (!options.locked) {
      inlineEdit(dueSpan, () => itemData.dueBy, (v) => {
        itemData.dueBy = v;
        // TSKMGR-44 — user-set dates mark dueBySource user
        if (v) itemData.dueBySource = "user";
      }, { size: "date", inputType: "date", persistReason: "Edit due date" });
    }
    dueWrap.append(dueSpan);
    body.append(dueWrap);
    if (itemData.tags && itemData.tags.length) body.append(tagPills(itemData.tags));
    center.append(body);

    // Context line
    const ctxEl = renderContextLine(itemData);
    if (ctxEl) center.append(ctxEl);

    row.append(center);

    // ----- Right zone -----
    const right = ce("div", { class: "row-right" });
    // Source-link slot (TSKMGR-56) — only render when present
    if (options.showSourceLink !== false && itemData.source_link) {
      right.append(renderSourceLinkSlot(itemData));
    }
    // Priority pill (sort affordance)
    if (!options.locked) {
      const pSel = prioritySelect(itemData);
      // Decorate ai-suggested as "Must*" via tooltip; the asterisk render-time decoration is handled via row class
      if (itemData.aiSuggested) pSel.title = (pSel.title || "") + " (Claude-suggested)";
      right.append(pSel);
    }
    // TSKMGR-47 — UAT extras (tester dropdown + cumulative day clock + per-row nudge).
    // Only rendered when options.uat is set (All UAT view path).
    if (options.uat) {
      const days = uatDays;
      const dayChip = ce("span", { class: "uat-days " + uatHighlight, title: "Cumulative days in UAT (Test 1 + Test 2)" }, days + "d in UAT");
      right.append(dayChip);
      const testerSel = renderTesterDropdown(itemData, handlers.onTesterChange, source);
      right.append(testerSel);
      // Nudge button per row — only when stuck (>=5 days) AND tester assigned.
      if (days >= 5 && itemData.uatTester) {
        const nudgeBtn = ce("button", { class: "nudge-btn", title: "Draft a Slack DM to nudge the tester",
          onclick: (e) => { e.stopPropagation(); nudgeTester(itemData); } }, "Nudge " + (itemData.uatTester || "tester"));
        right.append(nudgeBtn);
      }
    }
    row.append(right);

  // TSKMGR-47 — Tester directory lookup. Returns a sorted list of { value, label, slackUserId, source }

  // TSKMGR-70 — resolve the meeting (calendar) context for a task row.

  function renderTesterDropdown(item, onChange, source) {

    // TSKMGR-45 bugfix — wrap the <select> in a container so we can mount an

    const wrap = ce("span", { class: "tester-select-wrap", style: "display:inline-flex;gap:4px;align-items:center" });
    const sel = ce("select", { class: "tester-select", title: "Assigned UAT tester" });

    noOpt.value = "";
    noOpt.textContent = "<no tester assigned>";
    if (!item.uatTester) noOpt.selected = true;
    sel.append(noOpt);
    // TSKMGR-70 — Group: meeting attendees (calendar + manual) vs everyone else.
    const attendeeMembers = dir.filter(t => t.source === "attendee-calendar" || t.source === "attendee-manual");
    const otherMembers    = dir.filter(t => t.source !== "attendee-calendar" && t.source !== "attendee-manual");
    const appendOpt = (parent, t) => {
      const o = document.createElement("option");
      o.value = t.value;
      o.textContent = t.label;
      if (item.uatTester === t.value || item.uatTester === t.label) o.selected = true;
      parent.append(o);
    };
    if (attendeeMembers.length) {
      const atGroup = document.createElement("optgroup");

    addOpt.textContent = "+ Add tester…";

    function commitNewTester(rawName) {

      const eventIds = (ctx && Array.isArray(ctx.recurringEventIds)) ? ctx.recurringEventIds : [];

        const exists = STATE.uatTesterDirectory.find(t => t.value === trimmed || t.label === trimmed);
        if (!exists) STATE.uatTesterDirectory.push({ value: trimmed, label: trimmed, slackUserId: null });

      persistState("Add UAT tester (free text)");

    function mountInlineAddInput() {

        type: "text",
        placeholder: "Tester name or email…",
        style: "min-width:180px;padding:2px 6px;font-size:12px;border:1px solid var(--accent);border-radius:3px"
      });
      const okBtn = ce("button", { class: "btn tiny", style: "padding:2px 6px" }, "Add");
      const cancelBtn = ce("button", { class: "btn tiny", style: "padding:2px 6px" }, "×");
      function cleanup() {
        try { input.remove(); } catch (e) {}
        try { okBtn.remove(); } catch (e) {}
        try { cancelBtn.remove(); } catch (e) {}
        sel.style.display = "";
        sel.value = item.uatTester || "";
      }
      function commit() {
        const ok = commitNewTester(input.value);
        cleanup();
        if (!ok) {
          // nothing entered — just restore
          return;
        }
      }
      okBtn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); commit(); });
      cancelBtn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); cleanup(); });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); commit(); }
        else if (e.key === "Escape") { e.preventDefault(); cleanup(); }
      });

      // give the Add button a chance to fire first (relatedTarget guard).
      input.addEventListener("blur", (e) => {
        setTimeout(() => {
          if (document.activeElement === okBtn || document.activeElement === cancelBtn || document.activeElement === input) return;

      input.focus();
    }
    sel.addEventListener("change", () => {
      if (sel.value === "__add__") {
        mountInlineAddInput();
        return;
      }
      item.uatTester = sel.value || null;
      persistState("Set UAT tester");

  }

  // ============================================================
  // TSKMGR-45 — Slack channel member cache + fetch helpers
  // ============================================================
  // Cache TTL: 24h. Stale entries are still served (never auto-purged), but the UI
  // surfaces a stale-ness pill so the user knows to click Refresh.
  const SLACK_MEMBER_TTL_MS = 24 * 60 * 60 * 1000;

    if (!channelId) return null;
    return (STATE.slackChannelMembers || {})[channelId] || null;
  }
  function isChannelMembersStale(channelId) {
    const rec = getChannelMembers(channelId);
    if (!rec || !rec.fetchedAt) return true;
    return (Date.now() - new Date(rec.fetchedAt).getTime()) > SLACK_MEMBER_TTL_MS;
  }

  // identity so manual entries survive an auto-fetch.

    if (!channelId) return;
    if (!STATE.slackChannelMembers || typeof STATE.slackChannelMembers !== "object") STATE.slackChannelMembers = {};
    const arr = Array.isArray(members) ? members.slice() : [];
    STATE.slackChannelMembers[channelId] = {

      members: arr

      slackUserId: member.slackUserId || null,
      name: member.name || member.displayName || null,
      displayName: member.displayName || member.name || null,

  // TSKMGR-70 — Fetch calendar attendees for a recurring event. Strategy:
  // call list_events with the recurringEventId filter to find the NEXT instance
  // of that series, then read its attendees array. We prefer list_events over
  // get_event because list_events is what the rest of the artifact already
  // uses (proven pattern) and lets us scope to upcoming-only windows.
  // Resource calendars (rooms) are filtered out defensively.
  async function fetchCommitteeAttendees(recurringEventId) {
    if (!recurringEventId) return { ok: false, error: "no recurringEventId" };
    if (!window.cowork || typeof window.cowork.callMcpTool !== "function") {
      const msg = "MCP bridge unavailable (window.cowork.callMcpTool missing) — add attendees manually";
      console.warn("[TSKMGR-70 fetchCommitteeAttendees]", msg);
      try { showSave("error", msg); } catch (e) {}
      return { ok: false, error: msg };
    }
    console.log("[TSKMGR-70 fetchCommitteeAttendees] fetching for", recurringEventId);
    try {
      // Look 90 days forward — covers monthly/quarterly cadences. If the series
      // has no upcoming instance, fall back to get_event on the parent.

      const horizon = new Date(Date.now() + 90 * 86400000).toISOString();

      let pickedEvent = null;

        endTime: horizon,
        pageSize: 50,
        orderBy: "startTime"

          return { ok: false, error: "bridge string response (parent): " + parent.slice(0, 100) };
        }
        const parentEvent = parent && (parent.event || parent);

          attendees = parentEvent.attendees;
          pickedEvent = parentEvent;
        }
      }

      if (!attendees) {
        const msg = "No upcoming instance found and parent fetch yielded no attendees";
        console.warn("[TSKMGR-70 fetchCommitteeAttendees]", msg, recurringEventId);
        try { showSave("error", "No attendees found for this event."); } catch (e) {}
        return { ok: false, error: msg };
      }

      // Filter out resource bookings (rooms) and bare entries with no identity
      const cleaned = attendees.filter(a => {
        if (!a) return false;
        if (a.resource === true) return false;
        const em = (a.email || "").toLowerCase();
        if (!em && !a.displayName) return false;
        // Defensive: skip resource calendar emails
        if (em.includes(".resource.calendar.google.com")) return false;
        return true;

        email: a.email || null,
        displayName: a.displayName || a.email || null,
        responseStatus: a.responseStatus || null,
        source: "calendar"

        : [];

      console.warn("[TSKMGR-70 fetchCommitteeAttendees] threw:", e);

  // TSKMGR-45 — Hybrid fetch (option (c) from the implementation brief).
  //
  // There is NO first-class "list channel members" Slack MCP tool available today.
  // The closest workable approach is to call `slack_read_channel` and derive

  async function fetchChannelMembers(channelId, options) {
    options = options || {};

      const msg = "MCP bridge unavailable (window.cowork.callMcpTool missing) — add members manually";
      console.warn("[TSKMGR-45 fetchChannelMembers]", msg);
      try { showSave("error", msg); } catch (e) {}

      channel_id: channelId,
      limit: options.limit || 1000,
      oldest: String(oldestSec),
      response_format: "detailed"

    console.log("[TSKMGR-45 fetchChannelMembers] calling slack_read_channel for", channelId, "with", args);
    try {
      const raw = await window.cowork.callMcpTool("mcp__41e23f2c-10b6-43fa-ae26-3ec63b9776d0__slack_read_channel", args);
      console.log("[TSKMGR-45 fetchChannelMembers] raw response type:", typeof raw, raw);
      // Bridge returns JSON-string or object; normalize.
      const parsed = (typeof raw === "string") ? (function () { try { return JSON.parse(raw); } catch (e) { return null; } })() : raw;

      const seen = new Map();
      (Array.isArray(messages) ? messages : []).forEach(m => {

        const name = (m.user_profile && (m.user_profile.real_name || m.user_profile.display_name)) || m.username || null;

        const key = (uid || email || name || "").toLowerCase();

        if (seen.has(key)) return;
        seen.set(key, {
          slackUserId: uid || null,
          name: name || null,
          displayName: (m.user_profile && m.user_profile.display_name) || name || null,
          email: email || null,
          source: "slack_read_channel"
        });
      });
      console.log("[TSKMGR-45 fetchChannelMembers] got", (Array.isArray(messages) ? messages.length : 0), "messages, deduped to", seen.size, "unique posters");
      // Preserve any manually-added entries already in the cache so the user
      // doesn't lose them across refreshes.
      const existing = (STATE.slackChannelMembers || {})[channelId];
      const manualOnly = (existing && Array.isArray(existing.members))
        ? existing.members.filter(m => m && m.source === "manual" && !seen.has(((m.slackUserId || m.email || m.name) || "").toLowerCase()))
        : [];
      const merged = Array.from(seen.values()).concat(manualOnly);
      setChannelMembers(channelId, merged, merged.length === manualOnly.length ? "manual" : "hybrid");
      return { ok: true, count: merged.length, derivedCount: seen.size, manualKept: manualOnly.length, messageCount: Array.isArray(messages) ? messages.length : 0, lookbackDays };
    } catch (e) {
      console.warn("[TSKMGR-45 fetchChannelMembers] threw:", e);
      try { showSave("error", "Slack MCP threw: " + ((e && e.message) || String(e))); } catch (toastErr) {}
      return { ok: false, error: (e && e.message) || String(e) };
    }
  }

  // TSKMGR-47 — Slack nudge helper. Tries the deep link if we have a slackUserId,
  // falls back to clipboard + toast.
  // TODO TSKMGR-47 future — broken Slack handle warning when slackUserId resolves to a stale ID.
  function _jiraKeyFor(item) {
    if (!item) return null;
    if (item.verifyVia && item.verifyVia.type === "jira_ticket_assignee" && item.verifyVia.key) return item.verifyVia.key;
    // Best-effort: scan tags for project-like keys
    if (Array.isArray(item.tags)) {
      const k = item.tags.find(t => /^[A-Z]{2,8}-\d+$/.test(t));
      if (k) return k;
    }
    return null;
  }
  function _nudgeMessageForItems(items) {
    // Multi-item bundle
    if (items.length === 1) {
      const item = items[0];
      const key = _jiraKeyFor(item);
      const ref = key ? key : (item.text || item.title || "this ticket");
      return "Hey " + ref + " needs to get tested in the next couple of days. Do you have time to run a test today?";
    }
    const lines = items.map(it => "• " + (_jiraKeyFor(it) || it.text || it.title || "(untitled)"));
    return "Hey, these need to get tested in the next couple of days. Do you have time to run a test today?\n" + lines.join("\n");
  }
  function _openSlackForTester(testerValue, message) {
    const entry = _findTesterEntry(testerValue);
    if (entry && entry.slackUserId) {
      // Best-effort deep link. The browser may or may not have Slack installed; we try anyway.
      const url = "slack://user?id=" + encodeURIComponent(entry.slackUserId);
      try { window.open(url, "_blank"); } catch (e) {}
    }
    // Always copy the message text to clipboard as a fallback for paste.
    try {
      if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(message);
      }
    } catch (e) {}
    showSave("saved", "Message copied — open Slack and paste.");
  }
  function nudgeTester(item) {
    if (!item || !item.uatTester) return;
    const msg = _nudgeMessageForItems([item]);
    _openSlackForTester(item.uatTester, msg);
  }
  function nudgeTesterBundle(testerValue, items) {
    if (!testerValue || !items || !items.length) return;
    const msg = _nudgeMessageForItems(items);
    _openSlackForTester(testerValue, msg);
  }

  // TSKMGR-44 — This Week window logic
  // Returns { start: Date, end: Date, label: string, includeAfternoonOnEnd: bool }
  function computeThisWeekWindow(now) {
    now = now || new Date();
    const start = new Date(now);
    start.setHours(0,0,0,0);
    // Roll back to Monday (or stay if already Monday)
    const dayIdx = (start.getDay() + 6) % 7; // Mon=0..Sun=6
    start.setDate(start.getDate() - dayIdx);
    // Default end: next Monday at 12:00 (noon)
    const end = new Date(start);
    end.setDate(end.getDate() + 7);
    end.setHours(12, 0, 0, 0);

    // TODO TSKMGR-44 (future): heavy-morning detector — if 3/4 hours 8am–12pm on next Monday are blocked,
    // extend window to include Monday-afternoon tasks. Requires live Google Calendar access.
    const includeAfternoonOnEnd = false;

    // TODO TSKMGR-44 (future): holiday detector — if next Monday is a holiday by ALL three signals
    // (Google all-day named holiday + AIA master cal + OOO block >5h), shift window to Tuesday.
    // Requires live calendar feed integrations — defaulting to Monday-to-Monday for now.

    const label = "Mon " + fmtDate(start.toISOString()) + " – Mon " + fmtDate(end.toISOString()) + " 12pm";
    return { start, end, label, includeAfternoonOnEnd };
  }

  function inThisWeekWindow(item, win) {
    if (!item || !item.dueBy) return false;
    if (item.status === "done" || item.status === "cancelled" || item.completed) {
      // Done items stay for the day they got done; sweep happens at midnight (TSKMGR-54, Wave 2)
      if (!item.done_at) return false;
      const d = new Date(item.done_at);
      const today = new Date(); today.setHours(0,0,0,0);
      return d.getTime() >= today.getTime();
    }
    const due = new Date(item.dueBy);
    if (isNaN(due.getTime())) return false;
    if (due.getTime() < win.start.getTime()) {
      // Overdue items still pop into This Week — they should be addressed this week
      return true;
    }
    return due.getTime() <= win.end.getTime();
  }

  const PRIORITY_RANK = { must: 0, should: 1, nice: 2 };
  function comparePriorityThenDue(a, b) {
    const pa = PRIORITY_RANK[a.item.priority || "should"] ?? 1;
    const pb = PRIORITY_RANK[b.item.priority || "should"] ?? 1;
    if (pa !== pb) return pa - pb;
    const da = a.item.dueBy ? new Date(a.item.dueBy).getTime() : Infinity;
    const db = b.item.dueBy ? new Date(b.item.dueBy).getTime() : Infinity;
    return da - db;
  }

  // Collect every task across partners + committees + (later) projects
  // For partner commitments we include `lane` on source so renderTaskRow can derive
  // the correct assignee chip (TSKMGR-44 polish — Wave 1 default of "Owen" was wrong
  // for partnerToOwner items; lane carries the direction info).
  function collectMyTasksAll() {
    const out = [];
    (STATE.partners || []).forEach(p => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        ((p.commitments && p.commitments[lane]) || []).forEach(c => {
          out.push({ item: c, source: { kind: "partner", id: p.id, name: p.name || "(partner)", lane }, itemType: "commitment" });
        });
      });
      (p.agenda || []).forEach(a => {
        if (a.dueBy) out.push({ item: a, source: { kind: "partner", id: p.id, name: p.name || "(partner)" }, itemType: "agenda" });
      });
    });
    (STATE.committees || []).forEach(co => {
      (co.actionItems || []).forEach(a => {
        out.push({ item: a, source: { kind: "committee", id: co.id, name: co.name || "(committee)" }, itemType: "action" });
      });
      (co.agenda || []).forEach(a => {
        if (a.dueBy) out.push({ item: a, source: { kind: "committee", id: co.id, name: co.name || "(committee)" }, itemType: "agenda" });
      });
    });
    // TSKMGR-65 — project-rooted action items. Filter to non-done projects (codebase uses
    // "done" as the inactive status; the ticket called this "archived" but no such status exists
    // in the project model). No `lane` field (projects don't have lanes).
    (STATE.projects || []).filter(pr => pr.status !== "done").forEach(pr => {
      (pr.actionItems || []).forEach(a => {
        out.push({ item: a, source: { kind: "project", id: pr.id, name: pr.name || "(project)" }, itemType: "action" });
      });
    });
    return out;
  }

  function gotoTaskSource(entry) {
    const src = entry.source;
    if (!src) return;
    if (src.kind === "committee") {
      STATE.selectedCommitteeId = src.id; STATE.selectedKind = "committee"; STATE.selectedView = "committee";
    } else if (src.kind === "project") {
      STATE.selectedProjectId = src.id; STATE.selectedKind = "project"; STATE.selectedView = "project";
    } else {
      STATE.selectedPartnerId = src.id; STATE.selectedKind = "partner"; STATE.selectedView = "partner";
    }
    renderRoster(); renderDossier();
  }

  // TSKMGR-44 — This Week panel
  function renderThisWeekPanel(panel) {
    // TSKMGR-54 — sweep moved into renderMyTasksView so every tab benefits
    const win = computeThisWeekWindow();
    panel.append(ce("div", { class: "mytasks-window-label" }, "Window: " + win.label));

    const entries = collectMyTasksAll().filter(e => inThisWeekWindow(e.item, win));
    if (!entries.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "Nothing on the plate this week. Enjoy the breathing room."));
      return;
    }

    // Sort: active items by priority then due; done/cancelled to the bottom
    entries.sort((a, b) => {
      const adone = (a.item.status === "done" || a.item.status === "cancelled" || a.item.completed) ? 1 : 0;
      const bdone = (b.item.status === "done" || b.item.status === "cancelled" || b.item.completed) ? 1 : 0;
      if (adone !== bdone) return adone - bdone;
      return comparePriorityThenDue(a, b);
    });

    const list = ce("div", { class: "mytasks-list" });
    entries.forEach(e => {
      list.append(renderTaskRow(e.item, e.source, { onNavigate: () => gotoTaskSource(e) }, { itemType: e.itemType }));
    });
    panel.append(list);
  }

  function renderMyTasksPlaceholder(panel, wave, ticket, title) {
    panel.append(ce("div", { class: "mytasks-panel-empty" }, title + " — coming in " + wave + " (" + ticket + ")."));
  }

  // ============================================================
  // TSKMGR-51 — Needs Attention view (Wave 2)
  // ============================================================
  // Three sub-groups:
  //   1. "Need a date" — claude_low items + user-priority "must" with no dueBy
  //   2. "Recently added Must*" — Claude-assigned musts since last PLAN MY WEEK ritual
  //   3. "Need clarification" — items flagged item.clarificationNeeded (rare for Wave 2)

  function _isReviewed(item) {
    return !!(item && item.reviewedAt);
  }

  function _qualifiesNeedADate(entry) {
    const it = entry.item;
    if (!it) return false;
    if (it.status === "done" || it.status === "cancelled" || it.completed) return false;
    // Claude-suggested with low confidence (yellow band) — needs user confirmation
    if (it.dueBySource === "claude_low") return true;
    // User-confirmed Must with no due date — bubble up so it gets dated
    if (it.priority === "must" && !it.dueBy && it.dueBySource !== "claude_low" && !it.aiSuggested) return true;
    return false;
  }

  function _qualifiesRecentlyAddedMust(entry) {
    const it = entry.item;
    if (!it) return false;
    if (it.status === "done" || it.status === "cancelled" || it.completed) return false;
    if (!it.aiSuggested) return false;
    if (it.priority !== "must") return false;
    if (_isReviewed(it)) return false;
    const ritualAt = STATE.lastPlanMyWeekRitualAt; // may be null — treat as "since forever"
    if (!ritualAt) return true;
    if (!it.created_at) return true; // no created_at means we can't compare; show conservatively
    return new Date(it.created_at).getTime() > new Date(ritualAt).getTime();
  }

  function _qualifiesNeedClarification(entry) {
    const it = entry.item;
    if (!it) return false;
    if (it.status === "done" || it.status === "cancelled" || it.completed) return false;
    return it.clarificationNeeded === true;
  }

  function collectNeedsAttention() {
    const all = collectMyTasksAll();
    const groups = { needDate: [], recentMust: [], needClarify: [] };
    all.forEach(e => {
      if (_qualifiesNeedADate(e)) groups.needDate.push(e);
      else if (_qualifiesRecentlyAddedMust(e)) groups.recentMust.push(e); // mutually exclusive — date issue trumps
      if (_qualifiesNeedClarification(e)) groups.needClarify.push(e);
    });
    const sorter = (a, b) => {
      const pa = PRIORITY_RANK[a.item.priority || "should"] ?? 1;
      const pb = PRIORITY_RANK[b.item.priority || "should"] ?? 1;
      if (pa !== pb) return pa - pb;
      const ca = a.item.created_at ? new Date(a.item.created_at).getTime() : Infinity;
      const cb = b.item.created_at ? new Date(b.item.created_at).getTime() : Infinity;
      return ca - cb; // oldest first
    };
    groups.needDate.sort(sorter);
    groups.recentMust.sort(sorter);
    groups.needClarify.sort(sorter);
    return groups;
  }

  function countNeedsAttention() {
    const g = collectNeedsAttention();
    return g.needDate.length + g.recentMust.length + g.needClarify.length;
  }

  // Triage handlers (TSKMGR-51)
  function naAcceptItem(entry) {
    const it = entry.item;
    // Accept = promote suggested date to confirmed user date AND mark reviewed
    if (it.dueBySource === "claude_low" || it.dueBySource === "claude_high") {
      it.dueBySource = "user";
    } else if (!it.dueBySource && it.dueBy) {
      it.dueBySource = "user";
    }
    it.reviewedAt = nowIso();
    persistState("Accept Needs-Attention item");
    renderDossier();
  }

  function naDismissItem(entry) {
    const it = entry.item;
    it.status = "cancelled";
    if (typeof stampDone === "function") {
      try { stampDone(it); } catch (e) { it.done_at = it.done_at || nowIso(); }
    } else {
      it.done_at = it.done_at || nowIso();
    }
    it.reviewedAt = nowIso();
    persistState("Dismiss Needs-Attention item");
    renderDossier();
  }

  function naMarkReviewedOnEdit(entry) {
    // Called when any inline edit happens on a Needs-Attention row.
    entry.item.reviewedAt = nowIso();
  }

  function renderTriageButtons(entry) {
    const wrap = ce("div", { class: "triage-actions" });
    wrap.append(ce("button", { class: "triage-btn primary", title: "Accept Claude's values — keep the date and move on",
      onclick: (e) => { e.stopPropagation(); naAcceptItem(entry); } }, "Accept"));
    wrap.append(ce("button", { class: "triage-btn", title: "Click any field on the row to edit it",
      onclick: (e) => { e.stopPropagation(); /* Edit is just a hint — inline editors are already wired on each field */ } }, "Edit"));
    wrap.append(ce("button", { class: "triage-btn danger", title: "Cancel this item — fades and archives at midnight",
      onclick: (e) => { e.stopPropagation(); naDismissItem(entry); } }, "Dismiss"));
    return wrap;
  }

  function renderNeedsAttentionSubgroup(panel, label, entries) {
    if (!entries.length) return; // hide header entirely when empty (per spec)
    const wrap = ce("div", { class: "mytasks-subgroup" });
    const head = ce("div", { class: "mytasks-subgroup-head" });
    head.append(ce("span", { class: "lbl" }, label));
    head.append(ce("span", { class: "count" }, "(" + entries.length + ")"));
    wrap.append(head);
    const list = ce("div", { class: "mytasks-list" });
    entries.forEach(e => {
      const row = renderTaskRow(e.item, e.source, { onNavigate: () => { naMarkReviewedOnEdit(e); gotoTaskSource(e); } }, { itemType: e.itemType });
      // Append triage button group to the row-right zone (after existing slots)
      const rr = row.querySelector(".row-right");
      if (rr) rr.append(renderTriageButtons(e));
      // Hook a one-shot review-stamping listener: any input/change inside the row marks the entry reviewed.
      // This relies on inlineEdit/pillSelect dispatching change/input events on save.
      const stamp = () => naMarkReviewedOnEdit(e);
      row.addEventListener("change", stamp, true);
      list.append(row);
    });
    wrap.append(list);
    panel.append(wrap);
  }

  function renderNeedsAttentionPanel(panel) {
    const groups = collectNeedsAttention();
    const total = groups.needDate.length + groups.recentMust.length + groups.needClarify.length;
    if (!total) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "Nothing needs your attention. Nice."));
      return;
    }
    renderNeedsAttentionSubgroup(panel, "Need a date", groups.needDate);
    renderNeedsAttentionSubgroup(panel, "Recently added Must*", groups.recentMust);
    // TODO TSKMGR-51 — clarificationNeeded flag has no ingestion source yet; render path is ready
    renderNeedsAttentionSubgroup(panel, "Need clarification", groups.needClarify);
  }

  // ============================================================
  // TSKMGR-48 — Must Tasks view (Wave 2)
  // ============================================================
  function _isUatTagged(item) {
    // TSKMGR-47 — proper UAT detection now lands via uatColumn. Falls back to the legacy
    // tag-based convention for items that haven't been migrated (uatColumn missing/null).
    if (!item) return false;
    if (item.uatColumn === "test1" || item.uatColumn === "test2") return true;
    // Legacy fallback — items that were tagged "UAT" before the column model existed.
    return Array.isArray(item.tags) && item.tags.includes("UAT");
  }

  function collectMustTasks() {
    return collectMyTasksAll().filter(e => {
      const it = e.item;
      if (!it) return false;
      if (it.priority !== "must") return false;
      if (!it.dueBy) return false; // undated Musts route to Needs Attention "Need a date"
      if (_isUatTagged(it)) return false;
      if (it.status === "done" || it.status === "cancelled" || it.completed) {
        // Done/cancelled today: keep visible & faded; older: handled by archive sweep
        if (!it.done_at) return false;
        const d = new Date(it.done_at);
        const today = new Date(); today.setHours(0,0,0,0);
        return d.getTime() >= today.getTime();
      }
      return true;
    });
  }

  function renderMustTasksPanel(panel) {
    const entries = collectMustTasks();
    if (!entries.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "No Musts on the board — good place to be."));
      return;
    }
    // Sort: due date asc, then created_at asc. Done/cancelled sink to bottom.
    entries.sort((a, b) => {
      const adone = (a.item.status === "done" || a.item.status === "cancelled" || a.item.completed) ? 1 : 0;
      const bdone = (b.item.status === "done" || b.item.status === "cancelled" || b.item.completed) ? 1 : 0;
      if (adone !== bdone) return adone - bdone;
      const da = a.item.dueBy ? new Date(a.item.dueBy).getTime() : Infinity;
      const db = b.item.dueBy ? new Date(b.item.dueBy).getTime() : Infinity;
      if (da !== db) return da - db;
      const ca = a.item.created_at ? new Date(a.item.created_at).getTime() : Infinity;
      const cb = b.item.created_at ? new Date(b.item.created_at).getTime() : Infinity;
      return ca - cb;
    });
    const list = ce("div", { class: "mytasks-list" });
    entries.forEach(e => {
      list.append(renderTaskRow(e.item, e.source, { onNavigate: () => gotoTaskSource(e) }, { itemType: e.itemType }));
    });
    panel.append(list);
  }

  // ============================================================
  // TSKMGR-47 — All UAT view (Wave 3)
  // ============================================================
  // Walks all task-bearing collections, filters to uatColumn in {test1, test2},
  // groups by projectId, then by column, sorted by cumulative days desc.
  function collectAllUatEntries() {
    const out = [];
    const all = collectMyTasksAll();
    all.forEach(e => {
      const it = e.item;
      if (!it) return;
      if (it.uatColumn !== "test1" && it.uatColumn !== "test2") return;
      out.push(e);
    });
    return out;
  }
  function countAllUat() {
    return collectAllUatEntries().length;
  }

  // Resolve the project id for a UAT entry per the brief:
  //   1) item.projectId if set and resolves
  //   2) For committee items: if the committee has a single projectIds[0], use it
  //   3) Otherwise null (groups under "Unassigned project")
  function _resolveProjectForUatEntry(entry) {
    const it = entry.item;
    const src = entry.source || {};
    if (it.projectId) {
      const pr = (STATE.projects || []).find(x => x.id === it.projectId);
      if (pr) return pr;
    }
    if (src.kind === "committee") {
      const co = (STATE.committees || []).find(x => x.id === src.id);
      if (co && Array.isArray(co.projectIds) && co.projectIds.length === 1) {
        const pr = (STATE.projects || []).find(x => x.id === co.projectIds[0]);
        if (pr) return pr;
      }
    }
    if (src.kind === "project") {
      const pr = (STATE.projects || []).find(x => x.id === src.id);
      if (pr) return pr;
    }
    return null;
  }

  // Match a tester value to a partner record (so the mirror knows what to surface).
  function _partnerForTesterValue(value) {
    if (!value) return null;
    const v = String(value).toLowerCase();
    return (STATE.partners || []).find(p => {
      if ((p.email || "").toLowerCase() === v) return true;
      if ((p.name || "").toLowerCase() === v) return true;
      return false;
    }) || null;
  }
  function _testerLabelFor(value) {
    if (!value) return "";
    // TSKMGR-70 — scan every committee-attendee cache first so testers stored
    // by email resolve to their human display name regardless of which
    // project/committee the lookup is happening from.
    const attMap = STATE.committeeAttendees || {};
    for (const eid in attMap) {
      const rec = attMap[eid];
      if (!rec || !Array.isArray(rec.attendees)) continue;
      const hit = rec.attendees.find(a => a && (a.email === value || a.displayName === value));
      if (hit) return hit.displayName || hit.email || value;
    }
    // TSKMGR-45 (legacy) — fall back to the older slack channel cache for any
    // testers still keyed by slackUserId. Cache stays inert post-pivot but the
    // label lookup still helps if old data exists.
    const channelMap = STATE.slackChannelMembers || {};
    for (const chId in channelMap) {
      const rec = channelMap[chId];
      if (!rec || !Array.isArray(rec.members)) continue;
      const hit = rec.members.find(m => m && (m.email === value || m.slackUserId === value || m.name === value || m.displayName === value));
      if (hit) return hit.displayName || hit.name || hit.email || value;
    }
    const entry = _findTesterEntry(value);
    if (entry) return entry.label;
    const p = _partnerForTesterValue(value);
    if (p) return p.name || p.email;
    return value;
  }

  function renderAllUatPanel(panel) {
    const entries = collectAllUatEntries();
    if (!entries.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, "Nothing in UAT right now. (Set an item's UAT pill to Test 1 or Test 2 to surface it here.)"));
      return;
    }

    // Group: projectId -> { project, test1: [], test2: [] }
    const buckets = new Map();
    const unassigned = { project: null, test1: [], test2: [] };
    entries.forEach(e => {
      const pr = _resolveProjectForUatEntry(e);
      if (!pr) {
        unassigned[e.item.uatColumn].push(e);
        return;
      }
      let b = buckets.get(pr.id);
      if (!b) { b = { project: pr, test1: [], test2: [] }; buckets.set(pr.id, b); }
      b[e.item.uatColumn].push(e);
    });

    // Render in project order (active projects only). Sort by name; "Unassigned" at the bottom.
    const sections = Array.from(buckets.values())
      .filter(b => b.project && b.project.status !== "done")
      .sort((a, b) => (a.project.name || "").localeCompare(b.project.name || ""));
    sections.forEach(b => panel.append(_renderUatProjectSection(b.project, b.test1, b.test2)));
    if (unassigned.test1.length || unassigned.test2.length) {
      panel.append(_renderUatProjectSection({ id: null, name: "Unassigned project" }, unassigned.test1, unassigned.test2));
    }
  }

  function _renderUatProjectSection(project, test1Entries, test2Entries) {
    const sec = ce("section", { class: "uat-project-section" });
    const head = ce("div", { class: "uat-project-head" });
    head.append(ce("span", { class: "lbl" }, project ? (project.name || "Project") : "Unassigned project"));
    head.append(ce("span", { class: "count" }, "(" + (test1Entries.length + test2Entries.length) + ")"));
    // Section-header nudge bundle: bucket by tester within this section
    const sectionByTester = new Map();
    [...test1Entries, ...test2Entries].forEach(e => {
      const t = e.item.uatTester;
      if (!t) return;
      const days = uatDaysCumulative(e.item);
      if (days < 5) return;
      const arr = sectionByTester.get(t) || [];
      arr.push(e.item);
      sectionByTester.set(t, arr);
    });
    sectionByTester.forEach((items, testerValue) => {
      if (items.length < 2) return; // per-row nudge handles solo stuck items
      const lbl = _testerLabelFor(testerValue);
      const btn = ce("button", {
        class: "nudge-btn nudge-bundle",
        title: "Draft a single Slack DM with all stuck items for " + lbl,
        onclick: (e) => { e.stopPropagation(); nudgeTesterBundle(testerValue, items); }
      }, "Nudge " + lbl + " (" + items.length + " items)");
      head.append(btn);
    });
    sec.append(head);

    [["Test 1", test1Entries], ["Test 2", test2Entries]].forEach(([label, list]) => {
      if (!list.length) return; // hide empty sub-group entirely
      const sub = ce("div", { class: "uat-subgroup" });
      sub.append(ce("div", { class: "uat-subgroup-head" }, label + " (" + list.length + ")"));
      // Sort by cumulative days desc so the longest-stuck items rise
      list.sort((a, b) => uatDaysCumulative(b.item) - uatDaysCumulative(a.item));
      list.forEach(e => sub.append(_renderUatRow(e)));
      sec.append(sub);
    });
    return sec;
  }

  function _renderUatRow(entry) {
    const item = entry.item;
    const testerLabel = _testerLabelFor(item.uatTester) || "<unassigned>";
    const days = uatDaysCumulative(item);
    return renderTaskRow(item, entry.source,
      { onNavigate: () => gotoTaskSource(entry), onTesterChange: () => {} },
      {
        itemType: entry.itemType,
        locked: true,
        uatEditable: true,
        assigneeLabel: testerLabel,
        uat: { column: item.uatColumn, testerLabel: testerLabel, daysCumulative: days }
      }
    );
  }

  // ============================================================
  // TSKMGR-55 — Collaborators (ad-hoc UAT testers not in STATE.partners)
  // ============================================================
  // Returns [{ value, label, items: [...], days, hasStuck }]
  function collectCollaborators() {
    const out = new Map();
    collectAllUatEntries().forEach(e => {
      const it = e.item;
      if (!it.uatTester) return;
      const partner = _partnerForTesterValue(it.uatTester);
      if (partner) return; // partners get the dossier mirror instead
      const val = it.uatTester;
      const rec = out.get(val) || { value: val, label: _testerLabelFor(val), items: [], days: 0, hasStuck: false };
      rec.items.push(e);
      const d = uatDaysCumulative(it);
      if (d >= 5) rec.hasStuck = true;
      out.set(val, rec);
    });
    return Array.from(out.values()).sort((a, b) => a.label.localeCompare(b.label));
  }

  // with a bundled nudge button at top.
  function renderCollaboratorPanel(collaboratorId) {

    head.append(ce("span", { class: "meta" }, collab.items.length + " UAT item" + (collab.items.length === 1 ? "" : "s") + " assigned"));
    // Bundled nudge for the whole collaborator

  // ============================================================
  // TSKMGR-54 — Archive sweep + Archive view (Wave 2)
  // ============================================================
  function _localMidnightToday() {
    const d = new Date(); d.setHours(0,0,0,0); return d.getTime();
  }

  // Walk every task-bearing collection and yield { arr, removeAt, sourceRef, item }
  function _walkTaskCollections(visit) {
    (STATE.partners || []).forEach(p => {
      ["ownerToPartner","partnerToOwner","joint"].forEach(lane => {
        const arr = (p.commitments && p.commitments[lane]) || [];
        arr.forEach((it, idx) => visit(arr, idx, it, { kind: "partner", id: p.id, lane }));
      });
      // TSKMGR-54 follow-up — partner agenda items also sweep into archive
      const pAgenda = p.agenda || [];
      pAgenda.forEach((it, idx) => visit(pAgenda, idx, it, { kind: "partner", id: p.id, coll: "agenda" }));
    });
    (STATE.committees || []).forEach(co => {
      const arr = co.actionItems || [];
      arr.forEach((it, idx) => visit(arr, idx, it, { kind: "committee", id: co.id }));
      // TSKMGR-54 follow-up — committee agenda items also sweep into archive
      const coAgenda = co.agenda || [];
      coAgenda.forEach((it, idx) => visit(coAgenda, idx, it, { kind: "committee", id: co.id, coll: "agenda" }));
    });
    (STATE.projects || []).forEach(pr => {
      const arr = pr.actionItems || [];
      arr.forEach((it, idx) => visit(arr, idx, it, { kind: "project", id: pr.id }));
    });
  }

  let _archiveSweepInFlight = false;
  function runArchiveSweep() {
    if (_archiveSweepInFlight) return 0;
    _archiveSweepInFlight = true;
    try {
      if (!Array.isArray(STATE.archive)) STATE.archive = [];
      const cutoff = _localMidnightToday();
      const toRemove = [];
      _walkTaskCollections((arr, idx, it, sourceRef) => {
        if (!it) return;
        const isDone = it.status === "done" || it.status === "cancelled" || it.completed;
        if (!isDone) return;
        if (!it.done_at) {
          // TODO TSKMGR-54 — legacy items may not have done_at. Fall back to created_at or now.
          // Using created_at can mis-mark old finished work as "completed today"; flagged for follow-up.
          it.done_at = it.created_at || nowIso();
        }
        const t = new Date(it.done_at).getTime();
        if (isNaN(t)) return;
        if (t < cutoff) {
          toRemove.push({ arr, idx, it, sourceRef });
        }
      });
      if (!toRemove.length) return 0;
      // Sort descending by idx so splices don't shift later indices
      toRemove.sort((a, b) => b.idx - a.idx);
      toRemove.forEach(({ arr, idx, it, sourceRef }) => {
        arr.splice(idx, 1);
        STATE.archive.push(Object.assign({}, it, {
          archivedAt: nowIso(),
          sourceRef: sourceRef
        }));
      });
      return toRemove.length;
    } finally {
      _archiveSweepInFlight = false;
    }
  }

  // ISO-week start (Monday) date string for grouping
  function _isoWeekStart(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return null;
    d.setHours(0,0,0,0);
    const day = (d.getDay() + 6) % 7; // Mon=0..Sun=6
    d.setDate(d.getDate() - day);
    return d.toISOString().slice(0,10);
  }

  function unarchiveItem(archEntry) {
    const ref = archEntry.sourceRef || {};
    let targetArr = null;
    if (ref.kind === "partner") {
      const p = (STATE.partners || []).find(x => x.id === ref.id);
      if (p && ref.coll === "agenda") targetArr = p.agenda = p.agenda || [];
      else if (p && p.commitments && ref.lane) targetArr = p.commitments[ref.lane];
    } else if (ref.kind === "committee") {
      const co = (STATE.committees || []).find(x => x.id === ref.id);
      if (co && ref.coll === "agenda") targetArr = co.agenda = co.agenda || [];
      else if (co) targetArr = co.actionItems = co.actionItems || [];
    } else if (ref.kind === "project") {
      const pr = (STATE.projects || []).find(x => x.id === ref.id);
      if (pr) targetArr = pr.actionItems = pr.actionItems || [];
    }
    if (!targetArr) {
      console.warn("[unarchive] sourceRef missing or stale — leaving item in archive", ref);
      return;
    }
    // Restore: drop archive-only fields, reopen
    const restored = Object.assign({}, archEntry);
    delete restored.archivedAt;
    delete restored.sourceRef;
    restored.status = "open";
    restored.done_at = null;
    if (restored.completed) restored.completed = false;
    targetArr.push(restored);
    // Remove from archive
    const idx = (STATE.archive || []).indexOf(archEntry);
    if (idx >= 0) STATE.archive.splice(idx, 1);
    persistState("Unarchive task");
    renderDossier();
  }

  function renderArchivePanel(parent) {
    const arch = (STATE.archive || []).slice();
    const wrap = ce("div", { class: "archive-surface" });
    const head = ce("div", { class: "archive-surface-head" });
    head.append(ce("h3", {}, "Archive"));
    head.append(ce("span", { class: "archive-count" }, arch.length + " archived task" + (arch.length === 1 ? "" : "s")));
    wrap.append(head);
    if (!arch.length) {
      wrap.append(ce("div", { class: "mytasks-panel-empty" }, "No archived tasks yet. Get something done to see it here."));
      parent.append(wrap);
      return;
    }
    // Group by ISO week (Monday start) of done_at, fallback archivedAt
    const byWeek = {};
    arch.forEach(a => {
      const key = _isoWeekStart(a.done_at || a.archivedAt) || "unknown";
      (byWeek[key] = byWeek[key] || []).push(a);
    });
    const weekKeys = Object.keys(byWeek).sort((a, b) => (a < b ? 1 : -1)); // most recent first
    weekKeys.forEach(wk => {
      const items = byWeek[wk];
      const weekDiv = ce("div", { class: "archive-week" });
      const wkHead = ce("div", { class: "archive-week-head" });
      const lbl = wk === "unknown" ? "Week unknown" : "Week of " + fmtDate(wk);
      wkHead.append(ce("span", { class: "lbl" }, lbl));
      const mustCount = items.filter(i => i.priority === "must").length;
      wkHead.append(ce("span", { class: "meta" }, items.length + " task" + (items.length === 1 ? "" : "s") + " · " + mustCount + " Must"));
      weekDiv.append(wkHead);
      // Secondary group by category
      const cats = { strategic: [], tactical: [], status: [], untagged: [] };
      items.forEach(i => {
        const c = i.category || "untagged";
        (cats[c] || cats.untagged).push(i);
      });
      ["strategic","tactical","status","untagged"].forEach(catKey => {
        const catItems = cats[catKey];
        if (!catItems.length) return;
        catItems.sort((a, b) => new Date(b.archivedAt || 0).getTime() - new Date(a.archivedAt || 0).getTime());
        const cg = ce("div", { class: "archive-cat-group" });
        cg.append(ce("div", { class: "archive-cat-head" }, catKey === "untagged" ? "Uncategorized" : catKey));
        catItems.forEach(a => {
          const source = a.sourceRef
            ? { kind: a.sourceRef.kind, id: a.sourceRef.id, name: _sourceNameForRef(a.sourceRef), lane: a.sourceRef.lane }
            : { kind: "partner", id: null, name: "(unknown)" };
          const row = renderTaskRow(a, source, {}, { locked: true, itemType: a.title ? "agenda" : "action" });
          const rr = row.querySelector(".row-right");
          if (rr) {
            rr.append(ce("button", { class: "unarchive-btn", title: "Restore this item to its source",
              onclick: (e) => { e.stopPropagation(); unarchiveItem(a); } }, "↩ Unarchive"));
          }
          cg.append(row);
        });
        weekDiv.append(cg);
      });
      wrap.append(weekDiv);
    });
    parent.append(wrap);
  }

  function _sourceNameForRef(ref) {
    if (!ref) return "(unknown)";
    if (ref.kind === "partner") {
      const p = (STATE.partners || []).find(x => x.id === ref.id);
      return p ? (p.name || "(partner)") : "(partner — removed)";
    }
    if (ref.kind === "committee") {
      const c = (STATE.committees || []).find(x => x.id === ref.id);
      return c ? (c.name || "(committee)") : "(committee — removed)";
    }
    if (ref.kind === "project") {
      const pr = (STATE.projects || []).find(x => x.id === ref.id);
      return pr ? (pr.name || "(project)") : "(project — removed)";
    }
    return "(unknown)";
  }

  // TSKMGR-53 — MY TASKS section dispatcher (called from renderDossier when selectedView === "mytasks")
  function renderMyTasksView() {
    // TSKMGR-54 — run archive sweep on every render (cheap; covers midnight crossings during a session)
    runArchiveSweep();

    const dos = document.getElementById("dossier"); dos.innerHTML = "";
    const filter = getMyTasksFilter();
    const panel = ce("div", { class: "panel" });
    panel.append(ce("h2", {}, "My Tasks"));

    // Tab strip — real Needs Attention count fed in (TSKMGR-51)
    const tabs = ce("div", { class: "mytasks-tabs" });
    const TABS = [
      { id: "this-week",        label: "This Week" },
      { id: "all-uat",          label: "All UAT" },
      { id: "must-tasks",       label: "Must Tasks" },
      { id: "needs-attention",  label: "Needs Attention" }
    ];
    const needsAttentionCount = countNeedsAttention();
    let allUatCount = 0;
    try { allUatCount = countAllUat(); } catch (e) { console.warn("[mytasks panel UAT count] failed", e); }
    TABS.forEach(t => {
      const tab = ce("div", { class: "mytasks-tab" + (filter === t.id ? " active" : ""),
        onclick: () => { setMyTasksFilter(t.id); renderRoster(); renderDossier(); }
      }, t.label);
      if (t.id === "needs-attention" && needsAttentionCount > 0) {
        const cls = needsAttentionCount >= 10 ? "tab-badge red" : "tab-badge";
        tab.append(ce("span", { class: cls }, String(needsAttentionCount)));
      }
      // TSKMGR-47 — All UAT count badge (neutral; UAT count rising isn't inherently bad).
      if (t.id === "all-uat" && allUatCount > 0) {
        tab.append(ce("span", { class: "tab-badge neutral" }, String(allUatCount)));
      }
      tabs.append(tab);
    });
    panel.append(tabs);

    // Active filter panel (always rendered)
    const filterPanel = ce("div", { class: "mytasks-panel" });
    if (filter === "this-week") {
      renderThisWeekPanel(filterPanel);
    } else if (filter === "all-uat") {
      renderAllUatPanel(filterPanel);
    } else if (filter === "must-tasks") {
      renderMustTasksPanel(filterPanel);
    } else if (filter === "needs-attention") {
      renderNeedsAttentionPanel(filterPanel);
    } else {
      renderMyTasksPlaceholder(filterPanel, "Wave 1", "TSKMGR-44", "This Week");
    }
    panel.append(filterPanel);

    // Archive surface BELOW the active filter (TSKMGR-54) — gated by Show-archived toggle
    if (getShowArchived()) renderArchivePanel(panel);

    dos.append(panel);
  }

  // localStorage-backed prefs for MY TASKS (TSKMGR-53)
  const MYTASKS_FILTER_KEY = "tmm.v3.myTasksFilter";
  const MYTASKS_ARCHIVE_KEY = "tmm.v3.showArchived";
  function getMyTasksFilter() {
    try { return localStorage.getItem(MYTASKS_FILTER_KEY) || "this-week"; } catch (e) { return "this-week"; }
  }
  function setMyTasksFilter(v) {
    try { localStorage.setItem(MYTASKS_FILTER_KEY, v); } catch (e) {}

  function getShowArchived() {
    try { return localStorage.getItem(MYTASKS_ARCHIVE_KEY) === "1"; } catch (e) { return false; }

  function setShowArchived(v) {

    // v3.4.4b — walk committees too, with synthetic partner objects routed by gotoSource
    const matches = { agenda: [], commitments: [], actionItems: [], decisions: [], topicThreads: [] };
    STATE.partners.forEach(p => {
      (p.agenda || []).forEach(a => { if ((a.tags || []).includes(tag)) matches.agenda.push({ partner: p, item: a }); });
      ["ownerToPartner","partnerToOwner","joint"].forEach(k => { (p.commitments[k] || []).forEach(c => { if ((c.tags || []).includes(tag)) matches.commitments.push({ partner: p, item: c }); }); });
      (p.decisions || []).forEach(d => { if ((d.tags || []).includes(tag)) matches.decisions.push({ partner: p, item: d }); });
      (p.topicThreads || []).forEach(t => { if ((t.tags || []).includes(tag)) matches.topicThreads.push({ partner: p, item: t }); });
    });

      (co.actionItems || []).forEach(a => { if ((a.tags || []).includes(tag)) matches.actionItems.push({ partner: cs, item: a }); });

    const sections = [

  function renderPreReadDigest(p) {
    const live = liveCache[p.id];
    const lastMeet = live && live.lastMeeting;
    const wrap = ce("div", { class: "digest" });
    wrap.append(ce("div", { class: "title" }, "Pre-read digest"));
    if (lastMeet) {
      const lastDate = fmtDT(lastMeet.start);
      const days = Math.floor((Date.now() - new Date(lastMeet.start).getTime()) / 86400000);
      wrap.append(ce("div", { class: "since" }, [document.createTextNode("Since last meeting: "), ce("strong", {}, lastDate), document.createTextNode(" (" + (days <= 0 ? "today" : (days + "d ago")) + ")")]));
    } else { wrap.append(ce("div", { class: "since" }, "No prior 1:1 found in the last 14 days.")); }
    const all = [...(p.commitments.ownerToPartner || []), ...(p.commitments.partnerToOwner || []), ...(p.commitments.joint || [])];
    const open = all.filter(c => !c.status || c.status === "open").length;
    const inprog = all.filter(c => c.status === "in_progress").length;
    const blockedCount = all.filter(c => c.status === "blocked").length;
    const done = all.filter(c => c.status === "done").length;
    const overdueCount = all.filter(c => isOverdue(c)).length;
    const trayCount = (p.agenda || []).filter(a => a.coveredStatus === "needs_review").length + (p.decisions || []).filter(d => d.pendingConfirmation).length;
    const carriedFwd = (p.agenda || []).filter(a => a.carriedForwardFrom).length;

    stats.append(stat("", open, "open"));

    if (blockedCount) stats.append(stat("blocked", blockedCount, "blocked"));

  function renderBalanceRibbon(p) {
    const all = [...(p.agenda || []), ...(p.commitments.ownerToPartner || []), ...(p.commitments.partnerToOwner || []), ...(p.commitments.joint || [])];
    const cats = { strategic: 0, tactical: 0, status: 0, untagged: 0 };
    all.forEach(item => { const c = item.category || null; if (c === "strategic") cats.strategic++; else if (c === "tactical") cats.tactical++; else if (c === "status") cats.status++; else cats.untagged++; });
    const total = cats.strategic + cats.tactical + cats.status;
    if (!total) return null;
    const pct = { strategic: Math.round(cats.strategic / total * 100), tactical: Math.round(cats.tactical / total * 100), status: Math.round(cats.status / total * 100) };
    const ribbon = ce("div", { class: "balance-ribbon", title: "Phase 2.3 will compute this as a 4-meeting trailing average via the post-meeting reconciler. Today's view is the current snapshot." });
    ribbon.append(ce("span", { class: "lbl" }, "Balance"));
    const bar = ce("div", { class: "balance-bar" });
    if (cats.strategic) bar.append(ce("div", { class: "seg strategic", style: "width:" + pct.strategic + "%" }));
    if (cats.tactical) bar.append(ce("div", { class: "seg tactical", style: "width:" + pct.tactical + "%" }));
    if (cats.status) bar.append(ce("div", { class: "seg status", style: "width:" + pct.status + "%" }));
    ribbon.append(bar);
    const txt = ce("span", { class: "balance-pct" });
    txt.append(ce("span", { class: "strategic" }, pct.strategic + "% strategic"));
    txt.append(document.createTextNode(" · "));

    if (cats.status) { txt.append(document.createTextNode(" · ")); txt.append(ce("span", { class: "status" }, pct.status + "% status")); }
    ribbon.append(txt);
    if (pct.tactical > 85) ribbon.append(ce("span", { class: "balance-warn" }, "⚠ tactical-heavy — consider a strategic topic"));
