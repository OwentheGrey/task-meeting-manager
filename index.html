  }

  // TSKMGR-67 — Source label for the detail modal's provenance row.
  // The internal source_type enum drives the display label per Owen's spec.
  // Returns "" / null when there's no source line worth rendering — caller decides whether
  // to show the section. The row's inline source-link icon (renderSourceLinkSlot) is a
  // separate surface and remains unchanged.
  function sourceLabelFor(item) {
    if (!item) return null;
    const type = item.source_type;
    if (!type) return null; // legacy items without source_type — don't render a source line at all
    if (type === "gemini_notes") {
      return item.source_title ? "Call Notes - " + item.source_title : "Call Notes";
    }
    if (type === "gmail") return "Email";
    if (type === "slack") return "Slack";
    if (type === "gdrive") return "Drive";
    if (type === "jira") {
      // For UAT/Jira-sourced items, just the ticket key (no "Source:" prefix).
      // _jiraKeyFor walks verifyVia + tag heuristics; fall back to source_title.
      try {
        const key = (typeof _jiraKeyFor === "function") ? _jiraKeyFor(item) : null;
        if (key) return key;
      } catch (e) {}
      return item.source_title || "Jira";
    }
    if (type === "manual") return "Manual";
    if (type === "cowork_chat") return "Cowork";
    if (type === "other") return "Other";
    return type; // unknown future enum value — show raw so it's debuggable
  }

  // TSKMGR-67 — Tiny markdown renderer for the description field.
  // Supports: ## headings, **bold-line headings**, - bullets, > blockquotes, blank-line paragraphs.
  // Intentionally minimal — no inline emphasis, no links, no nested lists. Owen's spec is short.
  function renderDescriptionMarkdown(text) {
    const wrap = ce("div");
    if (!text) return wrap;
    const lines = String(text).replace(/\r\n/g, "\n").split("\n");
    let i = 0;
    function esc(s) {
      return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    while (i < lines.length) {
      const line = lines[i];
      const trimmed = line.trim();
      if (!trimmed) { i++; continue; }
      // ## heading
      const hMatch = trimmed.match(/^#{1,6}\s+(.*)$/);
      if (hMatch) {
        const h = ce("h3"); h.textContent = hMatch[1].trim();
        wrap.append(h); i++; continue;
      }
      // **Bold-only line** -> heading (per spec, sub-section heads are **What I committed to** etc.)
      const boldOnly = trimmed.match(/^\*\*(.+?)\*\*:?$/);
      if (boldOnly) {
        const h = ce("h3"); h.textContent = boldOnly[1].trim();
        wrap.append(h); i++; continue;
      }
      // Bullet list block
      if (/^[-*]\s+/.test(trimmed)) {
        const ul = ce("ul");
        while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
          const li = ce("li");
          li.textContent = lines[i].trim().replace(/^[-*]\s+/, "");
          ul.append(li);
          i++;
        }
        wrap.append(ul); continue;
      }
      // Blockquote block
      if (/^>\s?/.test(trimmed)) {
        const bq = ce("blockquote");
        const chunks = [];
        while (i < lines.length && /^>\s?/.test(lines[i].trim())) {
          chunks.push(lines[i].trim().replace(/^>\s?/, ""));
          i++;
        }
        bq.textContent = chunks.join(" ");
        wrap.append(bq); continue;
      }
      // Paragraph block (collect contiguous non-special lines)
      const para = ce("p");
      const buf = [];
      while (i < lines.length) {
        const cur = lines[i];
        const tcur = cur.trim();
        if (!tcur) break;
        if (/^#{1,6}\s+/.test(tcur)) break;
        if (/^\*\*(.+?)\*\*:?$/.test(tcur)) break;
        if (/^[-*]\s+/.test(tcur)) break;
        if (/^>\s?/.test(tcur)) break;
        buf.push(tcur);
        i++;
      }
      para.textContent = buf.join(" ");
      wrap.append(para);
    }
    return wrap;
  }

  // TSKMGR-67 — Format a source_context.location object as a concise citation string.
  // Examples: "p. 3, lines 12–18" / "p. 3–4" / "lines 12–18" / "p. 3" / ""
  function _formatSourceLocation(loc) {
    if (!loc || typeof loc !== "object") return "";
    const ps = loc.page_start, pe = loc.page_end;
    const ls = loc.line_start, le = loc.line_end;
    let pagePart = "";
    if (ps != null && pe != null && ps !== pe) pagePart = "p. " + ps + "–" + pe;
    else if (ps != null) pagePart = "p. " + ps;
    else if (pe != null) pagePart = "p. " + pe;
    let linePart = "";
    if (ls != null && le != null && ls !== le) linePart = "lines " + ls + "–" + le;
    else if (ls != null) linePart = "line " + ls;
    else if (le != null) linePart = "line " + le;
    if (pagePart && linePart) return pagePart + ", " + linePart;
    return pagePart || linePart || "";
  }

  // TSKMGR-67 — Task Detail Modal open/close + body builder.
  // The modal is a separate surface from the row's inline affordances; clicking the row outside
  // an editable affordance opens it. Title + due-date + description are editable inline here too.
  let _taskDetailCurrent = null; // { item, source } — populated while modal is open
  function openTaskDetailModal(item, source) {
    if (!item) return;
    _taskDetailCurrent = { item, source: source || null };
    const body = document.getElementById("task-detail-body");
    if (!body) return;
    body.innerHTML = "";
    body.append(renderTaskDetailModal(item, source || null));
    const back = document.getElementById("task-detail-backdrop");
    back.classList.add("open");
    // Focus the modal panel for screen-reader / Escape pickup
    const modal = document.getElementById("task-detail-modal");
    if (modal) { try { modal.focus({ preventScroll: true }); } catch (e) {} }
  }
  function closeTaskDetailModal() {
    const back = document.getElementById("task-detail-backdrop");
    if (back) back.classList.remove("open");
    _taskDetailCurrent = null;
  }
  function _refreshTaskDetailModalIfOpen(item) {
    if (!_taskDetailCurrent || _taskDetailCurrent.item !== item) return;
    const body = document.getElementById("task-detail-body");
    if (!body) return;
    body.innerHTML = "";
    body.append(renderTaskDetailModal(item, _taskDetailCurrent.source));
  }

  // TSKMGR-67 — Build the detail modal body.
  // Reuses inlineEdit() for title + due date; pillSelect family for status/priority/category/UAT;
  // sourceLabelFor() for the provenance label.
  function renderTaskDetailModal(item, source) {
    const wrap = ce("div");
    const itemType = item.title ? "agenda" : (item.text != null ? "commitment" : "agenda");

    // --- Title row ---
    const titleRow = ce("div", { class: "td-title-row" });
    const titleSpan = ce("span", { class: "td-title", id: "task-detail-title-text" }, item.title || item.text || "(click to edit)");
    inlineEdit(titleSpan,
      () => (itemType === "agenda" ? item.title : item.text),
      (v) => { if (itemType === "agenda") item.title = v; else item.text = v; },
      { size: "title", multiline: true, persistReason: "Edit task title (detail modal)" });
    titleRow.append(titleSpan);
    wrap.append(titleRow);

    // --- Pills row (priority / category / status / UAT / due) ---
    const pills = ce("div", { class: "td-pills" });
    // Priority
    pills.append(ce("span", { class: "td-pill-label" }, "Priority"));
    pills.append(prioritySelect(item));
    // Category
    pills.append(ce("span", { class: "td-pill-label" }, "Category"));
    pills.append(categorySelect(item));
    // Project
    pills.append(ce("span", { class: "td-pill-label" }, "Project"));
    pills.append(projectSelect(item));
    // Status (only meaningful for non-agenda items)
    if (itemType !== "agenda") {
      pills.append(ce("span", { class: "td-pill-label" }, "Status"));
      pills.append(statusSelectEl(item));
    }
    // UAT column (when item is in UAT)
    if (item.uatColumn || typeof uatSelect === "function") {
      pills.append(ce("span", { class: "td-pill-label" }, "UAT"));
      try { pills.append(uatSelect(item)); } catch (e) {}
    }
    wrap.append(pills);

    // --- Due date row (editable) ---
    const dueRow = ce("div", { class: "td-pills" });
    dueRow.append(ce("span", { class: "td-pill-label" }, "Due"));
    const dueSpan = ce("span", { class: "due-date " + (dueColorClass(item) || "") }, item.dueBy ? fmtDate(item.dueBy) : "TBD");
    inlineEdit(dueSpan, () => item.dueBy, (v) => {
      item.dueBy = v;
      if (v) item.dueBySource = "user";
    }, { size: "date", inputType: "date", persistReason: "Edit due date (detail modal)" });
    dueRow.append(dueSpan);
    // Tester (UAT only)
    if (item.uatColumn) {
      dueRow.append(ce("span", { class: "td-pill-label" }, "Tester"));
      dueRow.append(renderTesterDropdown(item, null, source));
    }
    wrap.append(dueRow);

    // --- Description section ---
    // TODO TSKMGR-67 — ingestion classifier needs to populate item.description on Claude-generated
    // tasks using the template from the ticket spec ("What I committed to" / "Expectations" /
    // "Source excerpt"). For now the field defaults to null on manual capture; this surface just
    // renders + edits whatever's there.
    const descSection = ce("div", { class: "td-section" });
    descSection.append(ce("div", { class: "td-section-head" }, "Description"));
    const descBlock = ce("div", { class: "td-description" + (item.description ? "" : " placeholder") },
      item.description ? "" : "Add description…");
    if (item.description) descBlock.append(renderDescriptionMarkdown(item.description));
    descBlock.title = "Click to edit description (Markdown — supports ## headings, - bullets, > blockquotes)";
    descBlock.addEventListener("click", (e) => {
      // Don't intercept clicks on rendered links inside the description
      if (e.target && (e.target.tagName === "A" || e.target.tagName === "BUTTON")) return;
      e.stopPropagation();
      const ta = document.createElement("textarea");
      ta.className = "td-description-edit";
      ta.value = item.description || "";
      ta.placeholder = "**What I committed to:**\n- bullet\n\n**Expectations:**\nprose\n\n**Source excerpt:**\n> quote";
      descBlock.replaceWith(ta);
      ta.focus();
      let cancelled = false;
      function commit() {
        if (cancelled) return;
        const next = ta.value;
        item.description = next ? next : null;
        persistState("Edit description (detail modal)");
        // Re-render the modal body so the new markdown shows
        _refreshTaskDetailModalIfOpen(item);
        // Also refresh dossier behind the modal in case other surfaces care
        try { renderDossier(); } catch (e) {}
      }
      ta.addEventListener("blur", commit);
      ta.addEventListener("keydown", (k) => {
        if (k.key === "Escape") { cancelled = true; _refreshTaskDetailModalIfOpen(item); }
      });
    });
    descSection.append(descBlock);
    wrap.append(descSection);

    // --- Source provenance section ---
    const srcLabel = sourceLabelFor(item);
    if (srcLabel || item.source_link || (item.source_context && (item.source_context.excerpt || item.source_context.location))) {
      const provSection = ce("div", { class: "td-section" });
      provSection.append(ce("div", { class: "td-section-head" }, "Source"));
      if (srcLabel) {
        const row = ce("div", { class: "td-prov-row" });
        row.append(ce("span", { class: "lbl" }, "Label"));
        row.append(ce("span", {}, srcLabel));
        provSection.append(row);
      }
      if (item.source_link) {
        const row = ce("div", { class: "td-prov-row" });
        row.append(ce("span", { class: "lbl" }, "Link"));
        const a = ce("a", { href: item.source_link, target: "_blank", rel: "noopener noreferrer" },
          item.source_title || item.source_link);
        row.append(a);
        if (item.source_timestamp) row.append(ce("span", { class: "td-prov-citation" }, " (" + relTime(item.source_timestamp) + ")"));
        provSection.append(row);
      }
      // Citation (page/line range)
      const ctx = item.source_context || null;
      if (ctx && ctx.location) {
        const citation = _formatSourceLocation(ctx.location);
        if (citation) {
          const row = ce("div", { class: "td-prov-row" });
          row.append(ce("span", { class: "lbl" }, "Citation"));
          row.append(ce("span", { class: "td-prov-citation" }, citation));
          provSection.append(row);
        }
      }
      if (ctx && ctx.excerpt) {
        const bq = ce("blockquote", { class: "td-prov-excerpt" }, ctx.excerpt);
        provSection.append(bq);
      }
      if (ctx && ctx.meeting_label && !item.source_link) {
        provSection.append(ce("div", { class: "td-meta-line" }, ctx.meeting_label));
      }
      wrap.append(provSection);
    }

    // --- Attached documents section ---
    const docs = Array.isArray(item.attachedDocuments) ? item.attachedDocuments : [];
    if (docs.length > 0) {
      const docSection = ce("div", { class: "td-section" });
      docSection.append(ce("div", { class: "td-section-head" }, "Associated documents"));
      const ul = ce("ul", { class: "td-attached-list" });
      docs.forEach(d => {
        if (!d) return;
        const li = ce("li");
        if (d.url) {
          li.append(ce("a", { href: d.url, target: "_blank", rel: "noopener noreferrer" }, d.title || d.url));
        } else {
          li.textContent = d.title || "(untitled)";
        }
        ul.append(li);
      });
      docSection.append(ul);
      wrap.append(docSection);
    }

    // --- Footer ---
    const footer = ce("div", { class: "td-footer" });
    const closeBtn = ce("button", { class: "btn", onclick: closeTaskDetailModal }, "Close");
    footer.append(closeBtn);
    wrap.append(footer);

    return wrap;
  }

  // TSKMGR-44 — Unified row factory
  // itemData: the task object (agenda / commitment / action item)
  // source: { kind: "partner"|"committee"|"project", id, name }
  // handlers: { onNavigate?: fn, onTesterChange?: fn(item, nextTester) }
  // options: {
  //   uat?: { column, testerLabel, daysCumulative } (Wave 3 — All UAT view passes this for highlight + clock + tester display),
  //   locked?: bool, uatEditable?: bool (Wave 3 — when locked but UAT column should still be editable),
  //   showTester?: bool, showUatPill?: bool ("test2" auto on This Week),
  //   showSourceLink?: bool,
  //   itemType?: "agenda"|"commitment"|"action",
  //   assigneeLabel?: string
  // }
  function renderTaskRow(itemData, source, handlers, options) {
    options = options || {};
    handlers = handlers || {};
    const itemType = options.itemType || (itemData.title ? "agenda" : "commitment");
    const priority = itemData.priority || "should";
    const status = itemData.status || (itemData.completed ? "done" : "open");
    const isDone = status === "done" || status === "cancelled" || itemData.completed;
    const isOverdueFlag = isOverdue(itemData);
    const isTodayFlag = itemData.dueBy && isToday(itemData.dueBy);

    // Wave 3 — UAT cumulative clock + highlight
    const uatDays = options.uat ? (options.uat.daysCumulative != null ? options.uat.daysCumulative : uatDaysCumulative(itemData)) : 0;
    const uatHighlight = options.uat
      ? (uatDays >= 7 ? "uat-breached" : (uatDays >= 5 ? "uat-watch" : ""))
      : "";

    const classes = [
      "row", "row-item", itemType,
      "priority-" + priority,
      "status-" + status,
      isOverdueFlag ? "is-overdue" : "",
      isTodayFlag ? "is-today" : "",
      isDone ? (status === "cancelled" ? "is-cancelled" : "is-done") : "",
      itemData.aiSuggested ? "ai-suggested" : "",
      options.locked ? "uat-locked" : "",
      uatHighlight
    ].filter(Boolean).join(" ");

    const row = ce("div", { class: classes, "data-item-id": itemData.id || "" });

    // ----- Left zone -----
    const left = ce("div", { class: "row-left" });
    const sourceIconGlyph = source && source.kind === "committee" ? "👥"
                          : source && source.kind === "project" ? "📋"
                          : "👤"; // 👤 partner default
    const sourceIcon = ce("div", { class: "source-icon", title: (source && source.kind ? source.kind + ": " : "") + (source && source.name ? source.name : "") }, sourceIconGlyph);
    if (handlers.onNavigate) {
      sourceIcon.style.cursor = "pointer";
      sourceIcon.addEventListener("click", (e) => { e.stopPropagation(); handlers.onNavigate(); });
    }
    left.append(sourceIcon);
    left.append(ce("div", { class: "priority-bar priority-" + priority }));
    row.append(left);

    // ----- Center zone -----
    const center = ce("div", { class: "row-center" });
    const head = ce("div", { class: "row-head" });
    appendNewBadge(head, itemData);
    if (isTodayFlag) head.append(ce("span", { class: "today-chip" }, "TODAY"));
    const titleSpan = ce("span", { class: "row-title" }, itemData.title || itemData.text || "(click to edit)");
    if (!options.locked) {
      inlineEdit(titleSpan,
        () => (itemType === "agenda" ? itemData.title : itemData.text),
        (v) => { if (itemType === "agenda") itemData.title = v; else itemData.text = v; },
        { size: "title", multiline: true, persistReason: "Edit task title" });
    }
    head.append(titleSpan);
    if (!options.locked && itemType !== "agenda") head.append(statusSelectEl(itemData));
    if (itemData.status === "blocked" && itemData.blockedOn) head.append(ce("span", { class: "blocked-on" }, "blocked on: " + itemData.blockedOn));
    if (!options.locked) head.append(categorySelect(itemData));
    // Project assignment pill — after category, before UAT.
    if (!options.locked) head.append(projectSelect(itemData));
    // TSKMGR-47 — inline UAT pill (after category, before source-link slot).
    // Editable in normal contexts; in locked contexts (e.g. All UAT view) only renders editable
    // when options.uatEditable === true (the row-contract carve-out for column moves within UAT).
    if (!options.locked || options.uatEditable) head.append(uatSelect(itemData));
    // Read-only UAT2 chip on This Week (when row is in test2 and pill isn't editable here).
    // Skip when uatSelect was already appended (above) — the editable pill already shows the state.
    if (options.locked && !options.uatEditable && itemData.uatColumn === "test2") {
      const chip = uatPillReadonly("test2");
      if (chip) head.append(chip);
    }
    center.append(head);

    const body = ce("div", { class: "row-body" });
    const dueWrap = ce("span", { class: "meta due" });
    // Assignee chip
    // - For committee/project rows with an assigneeEmail, look up the member name.
    // - For partner-rooted commitments, derive from source.lane:
    //     ownerToPartner -> "Owen"   (Owen owes the partner)
    //     partnerToOwner -> partner.name  (partner owes Owen)
    //     joint          -> "Owen"   (single-owner rule per Owen; shared work still has one owner)
    //   Falls back to "Owen" if lane is missing (legacy / agenda items).
    // - Caller passes options.assigneeLabel to override entirely.
    let assigneeName = "TBD";
    if (options.assigneeLabel) {
      assigneeName = options.assigneeLabel;
    } else if (itemData.assigneeEmail) {
      const co = source && source.kind === "committee" ? (STATE.committees || []).find(x => x.id === source.id) : null;
      if (co) {
        const m = (co.members || []).find(x => (x.email || "").toLowerCase() === itemData.assigneeEmail.toLowerCase());
        assigneeName = m ? (m.name || m.email) : itemData.assigneeEmail;
      } else {
        assigneeName = itemData.assigneeEmail;
      }
    } else if (source && source.kind === "partner") {
      if (source.lane === "partnerToOwner") {
        assigneeName = source.name || "Partner";
      } else {
        // ownerToPartner, joint, or lane-less (e.g. partner agenda) -> Owen owns it
        assigneeName = "Owen";
      }
    }
    dueWrap.append(ce("span", { class: "assignee" + (assigneeName === "TBD" ? " tbd" : "") }, assigneeName));
    dueWrap.append(document.createTextNode(" · due "));
    const dueClass = "due-date " + dueColorClass(itemData);
    const dueSpan = ce("span", { class: dueClass.trim() }, itemData.dueBy ? fmtDate(itemData.dueBy) : "TBD");
    if (!options.locked) {
      inlineEdit(dueSpan, () => itemData.dueBy, (v) => {
        itemData.dueBy = v;
        // TSKMGR-44 — user-set dates mark dueBySource user
        if (v) itemData.dueBySource = "user";
      }, { size: "date", inputType: "date", persistReason: "Edit due date" });
    }
    dueWrap.append(dueSpan);
    body.append(dueWrap);
    if (itemData.tags && itemData.tags.length) body.append(tagPills(itemData.tags));
    center.append(body);

    // Context line
    const ctxEl = renderContextLine(itemData);
    if (ctxEl) center.append(ctxEl);

    row.append(center);

    // ----- Right zone -----
    const right = ce("div", { class: "row-right" });
    // Source-link slot (TSKMGR-56) — only render when present
    if (options.showSourceLink !== false && itemData.source_link) {
      right.append(renderSourceLinkSlot(itemData));
    }
    // Priority pill (sort affordance)
    if (!options.locked) {
      const pSel = prioritySelect(itemData);
      // Decorate ai-suggested as "Must*" via tooltip; the asterisk render-time decoration is handled via row class
      if (itemData.aiSuggested) pSel.title = (pSel.title || "") + " (Claude-suggested)";
      right.append(pSel);
    }
    // TSKMGR-47 — UAT extras (tester dropdown + cumulative day clock + per-row nudge).
    // Only rendered when options.uat is set (All UAT view path).
    if (options.uat) {
      const days = uatDays;
      const dayChip = ce("span", { class: "uat-days " + uatHighlight, title: "Cumulative days in UAT (Test 1 + Test 2)" }, days + "d in UAT");
      right.append(dayChip);
      const testerSel = renderTesterDropdown(itemData, handlers.onTesterChange, source);
      right.append(testerSel);
      // Nudge button per row — only when stuck (>=5 days) AND tester assigned.
      if (days >= 5 && itemData.uatTester) {
        const nudgeBtn = ce("button", { class: "nudge-btn", title: "Draft a Slack DM to nudge the tester",
          onclick: (e) => { e.stopPropagation(); nudgeTester(itemData); } }, "Nudge " + (itemData.uatTester || "tester"));
        right.append(nudgeBtn);
      }
    }
    row.append(right);

    // TSKMGR-87 — All view extras: assign icon + agenda flag icon + committee dropdown + agenda chips
    if (options.allViewExtras && !options.locked) {
      // --- Assign icon button (person affordance) ---
      const assignWrap = ce("span", { style: "position:relative;display:inline-block" });
      const isAssignedToOwen = !itemData.assigneeEmail || itemData.assigneeEmail.toLowerCase() === OWNER_EMAIL.toLowerCase();
      const assignBtn = ce("button", {
        class: "assign-icon-btn" + (itemData.assigneeEmail ? " assigned" : ""),
        title: "Assign task to…",
        onclick: function (ev) {
          ev.stopPropagation();
          openAssignPopover(assignBtn, assignWrap, itemData, function () {
            renderRoster(); renderDossier();
          });
        }
      }, "👤");
      assignWrap.append(assignBtn);
      right.append(assignWrap);

      // --- Agenda flag button ---
      const flagWrap = ce("span", { style: "position:relative;display:inline-block" });
      const hasTargets = itemData.agenda_targets && itemData.agenda_targets.length > 0;
      const flagBtn = ce("button", {
        class: "agenda-flag-btn" + (hasTargets ? " has-targets" : ""),
        title: "Flag for agenda…",
        onclick: function (ev) {
          ev.stopPropagation();
          openAgendaFlagPopover(flagBtn, flagWrap, itemData, function () {
            renderRoster(); renderDossier();
          });
        }
      }, "🗓");
      flagWrap.append(flagBtn);
      right.append(flagWrap);

      // --- Agenda chips ---
      if (hasTargets) {
        const chipWrap = ce("div", { style: "display:flex;flex-wrap:wrap;gap:3px;justify-content:flex-end;margin-top:2px" });
        (itemData.agenda_targets || []).forEach(function (t) {
          let label = t.id;
          if (t.kind === "partner") {
            const p = (STATE.partners || []).find(x => x.id === t.id);
            if (p) label = derivePartnerShortCode(STATE.partners, p) || (p.name || "").split(" ")[0] || t.id;
          } else if (t.kind === "committee") {
            const co = (STATE.committees || []).find(x => x.id === t.id);
            if (co) label = co.shortCode || (co.name || "").split(" ")[0] || t.id;
          }
          chipWrap.append(ce("span", { class: "agenda-chip", title: "Flagged for " + (t.kind || "") + ": " + label }, "🗓 " + label));
        });
        right.append(chipWrap);
      }

      // --- Committee assignment dropdown ---
      const coSel = ce("select", { class: "committee-select-inline", title: "Assign to committee" });
      const blankOpt = ce("option", { value: "" }, "— committee —");
      if (!itemData.committeeId) blankOpt.selected = true;
      coSel.append(blankOpt);
      (STATE.committees || []).forEach(function (co) {
        const opt = ce("option", { value: co.id }, co.shortCode ? co.shortCode + " – " + (co.name || co.id) : (co.name || co.id));
        if (itemData.committeeId === co.id) opt.selected = true;
        coSel.append(opt);
      });
      coSel.addEventListener("change", function () {
        itemData.committeeId = coSel.value || null;
        persistState("Assign committee (TSKMGR-87)");
      });
      right.append(coSel);
    }

    // TSKMGR-67 — Click anywhere on the row outside an inline-editable affordance opens the
    // task detail modal. The selector mirrors every interactive sub-control we already render
    // into the row so single-click editing keeps working.
    row.addEventListener("click", (e) => {
      const t = e.target;
      if (!t || t === row) {
        // bare row click — open modal
        openTaskDetailModal(itemData, source);
        return;
      }
      // Skip when click landed on an editable affordance, pill, link, or other inline button
      if (t.closest && t.closest(".editable, .pill-select, .tester-select, .jira-link, .source-link-slot, .nudge-btn, .triage-btn, .unarchive-btn, .assign-icon-btn, .agenda-flag-btn, .row-inline-popover, .committee-select-inline, input, textarea, select, button, a")) {
        return;
      }
      openTaskDetailModal(itemData, source);
    });

    return row;
  }

  // TSKMGR-87 — Shared popover close utility (closes any open inline popover)
  let _activePopoverCleanup = null;
  function _closeActivePopover() {
    if (_activePopoverCleanup) { _activePopoverCleanup(); _activePopoverCleanup = null; }
  }

  // TSKMGR-87 — Assignment popover
  function openAssignPopover(anchorBtn, wrapEl, item, onAssign) {
    _closeActivePopover();
    const pop = ce("div", { class: "row-inline-popover" });
    // "Me" option
    const meItem = ce("div", { class: "pop-item" + (item.assigneeEmail && item.assigneeEmail.toLowerCase() === OWNER_EMAIL.toLowerCase() ? " active" : "") }, "👤 Me (Owen)");
    meItem.addEventListener("click", function (e) {
      e.stopPropagation();
      item.assigneeEmail = OWNER_EMAIL;
      persistState("Assign task to Owen (TSKMGR-87)");
      _closeActivePopover();
      if (onAssign) onAssign();
    });
    pop.append(meItem);
    // Partner options
    if ((STATE.partners || []).length) {
      pop.append(ce("div", { class: "pop-section-head" }, "Partners"));
      (STATE.partners || []).forEach(function (p) {
        const pEmail = p.email || p.id;
        const isActive = item.assigneeEmail && item.assigneeEmail.toLowerCase() === (p.email || "").toLowerCase();
        const pItem = ce("div", { class: "pop-item" + (isActive ? " active" : "") }, (p.name || pEmail));
        pItem.addEventListener("click", function (e) {
          e.stopPropagation();
          item.assigneeEmail = p.email || p.id;
          persistState("Assign task to partner (TSKMGR-87)");
          _closeActivePopover();
          if (onAssign) onAssign();
        });
        pop.append(pItem);
      });
    }
    wrapEl.append(pop);
    // Close on outside click or Escape
    const outsideClick = function (e) {
      if (!wrapEl.contains(e.target)) _closeActivePopover();
    };
    const escKey = function (e) {
      if (e.key === "Escape") _closeActivePopover();
    };
    setTimeout(function () {
      document.addEventListener("click", outsideClick, { capture: true, once: false });
      document.addEventListener("keydown", escKey, { once: false });
    }, 10);
    _activePopoverCleanup = function () {
      if (pop.parentNode) pop.parentNode.removeChild(pop);
      document.removeEventListener("click", outsideClick, { capture: true });
      document.removeEventListener("keydown", escKey);
    };
  }

  // TSKMGR-87 — Agenda flag popover
  function openAgendaFlagPopover(anchorBtn, wrapEl, item, onToggle) {
    _closeActivePopover();
    if (!item.agenda_targets) item.agenda_targets = [];
    const pop = ce("div", { class: "row-inline-popover" });

    function isTargeted(kind, id) {
      return (item.agenda_targets || []).some(function (t) { return t.kind === kind && t.id === id; });
    }
    function toggleTarget(kind, id) {
      if (!item.agenda_targets) item.agenda_targets = [];
      var idx = item.agenda_targets.findIndex(function (t) { return t.kind === kind && t.id === id; });
      if (idx >= 0) {
        item.agenda_targets.splice(idx, 1);
      } else {
        item.agenda_targets.push({ kind: kind, id: id });
      }
      persistState("Toggle agenda target (TSKMGR-87)");
      // Refresh popover checkboxes without closing
      pop.querySelectorAll("input[type=checkbox]").forEach(function (cb) {
        var ck = cb.getAttribute("data-kind");
        var ci = cb.getAttribute("data-id");
        if (ck && ci) cb.checked = isTargeted(ck, ci);
      });
      anchorBtn.className = "agenda-flag-btn" + ((item.agenda_targets && item.agenda_targets.length > 0) ? " has-targets" : "");
      if (onToggle) onToggle();
    }

    // Partners section
    if ((STATE.partners || []).length) {
      pop.append(ce("div", { class: "pop-section-head" }, "Partners"));
      (STATE.partners || []).forEach(function (p) {
        const row = ce("div", { class: "pop-item" });
        const cb = ce("input", { type: "checkbox", "data-kind": "partner", "data-id": p.id });
        cb.checked = isTargeted("partner", p.id);
        cb.addEventListener("change", function (e) { e.stopPropagation(); toggleTarget("partner", p.id); });
        row.append(cb);
        row.append(document.createTextNode(p.name || p.id));
        row.addEventListener("click", function (e) {
          if (e.target === cb) return;
          e.stopPropagation();
          cb.checked = !cb.checked;
          toggleTarget("partner", p.id);
        });
        pop.append(row);
      });
    }
    // Committees section
    if ((STATE.committees || []).length) {
      pop.append(ce("div", { class: "pop-section-head" }, "Committees"));
      (STATE.committees || []).forEach(function (co) {
        const row = ce("div", { class: "pop-item" });
        const cb = ce("input", { type: "checkbox", "data-kind": "committee", "data-id": co.id });
        cb.checked = isTargeted("committee", co.id);
        cb.addEventListener("change", function (e) { e.stopPropagation(); toggleTarget("committee", co.id); });
        row.append(cb);
        row.append(document.createTextNode(co.name || co.id));
        row.addEventListener("click", function (e) {
          if (e.target === cb) return;
          e.stopPropagation();
          cb.checked = !cb.checked;
          toggleTarget("committee", co.id);
        });
        pop.append(row);
      });
    }
    if (!(STATE.partners || []).length && !(STATE.committees || []).length) {
      pop.append(ce("div", { class: "pop-item" }, "(No partners or committees yet)"));
    }
    wrapEl.append(pop);
    // Close on outside click or Escape
    const outsideClick = function (e) {
      if (!wrapEl.contains(e.target)) _closeActivePopover();
    };
    const escKey = function (e) {
      if (e.key === "Escape") _closeActivePopover();
    };
    setTimeout(function () {
      document.addEventListener("click", outsideClick, { capture: true, once: false });
      document.addEventListener("keydown", escKey, { once: false });
    }, 10);
    _activePopoverCleanup = function () {
      if (pop.parentNode) pop.parentNode.removeChild(pop);
      document.removeEventListener("click", outsideClick, { capture: true });
      document.removeEventListener("keydown", escKey);
    };
  }

  // TSKMGR-87 — "Proposed for discussion" panel: tasks flagged for this partner/committee
  function renderProposedForDiscussion(kind, id) {
    const allEntries = collectMyTasksAll();
    const proposed = allEntries.filter(function (e) {
      return (e.item.agenda_targets || []).some(function (t) { return t.kind === kind && t.id === id; });
    });
    if (!proposed.length) return null;
    const sec = ce("div", { class: "proposed-tasks-section" });
    sec.append(ce("h4", {}, "Proposed for discussion"));
    proposed.forEach(function (e) {
      const it = e.item;
      const row = ce("div", { class: "proposed-task-row" });
      row.append(ce("span", {}, "🗓"));
      const titleSpan = ce("span", { class: "pt-title" }, it.title || it.text || "(untitled)");
      row.append(titleSpan);
      const removeBtn = ce("button", { class: "pt-remove", title: "Remove from agenda queue" }, "×");
      removeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        if (!it.agenda_targets) return;
        var idx = it.agenda_targets.findIndex(function (t) { return t.kind === kind && t.id === id; });
        if (idx >= 0) it.agenda_targets.splice(idx, 1);
        persistState("Remove agenda target (TSKMGR-87)");
        renderRoster(); renderDossier();
      });
      row.append(removeBtn);
      sec.append(row);
    });
    return sec;
  }

  // TSKMGR-47 — Tester directory lookup. Returns a sorted list of { value, label, slackUserId, source }
  // Source priority (TSKMGR-70 pivot from TSKMGR-45):
  //   0) Meeting attendees from the row's resolved committee (or union across linked committees)
  //   1) Owen at the top (label "Owen", value = OWNER_EMAIL)
  //   2) Partners with an email or slackUserId
  //   3) Free-text entries previously saved in STATE.uatTesterDirectory
  // `ctx` shape: { recurringEventIds: [...] } — when present, calendar attendees
  // from those events are prepended (source:"calendar" or "manual") so the UI
  // can group them visually under a "Meeting attendees" optgroup.
  function _buildTesterDirectory(ctx) {
    const out = [];
    // TSKMGR-70 — meeting attendees first when a committee context resolves
    const eventIds = (ctx && Array.isArray(ctx.recurringEventIds)) ? ctx.recurringEventIds : [];
    eventIds.forEach(eid => {
      const cached = (STATE.committeeAttendees || {})[eid];
      const atts = (cached && Array.isArray(cached.attendees)) ? cached.attendees : [];
      atts.forEach(a => {
        if (!a) return;
        const v = a.email || a.displayName;
        if (!v) return;
        if (out.some(x => x.value === v)) return;
        out.push({
          value: v,
          label: a.displayName || a.email || v,
          slackUserId: null,
          source: (a.source === "manual") ? "attendee-manual" : "attendee-calendar",
          responseStatus: a.responseStatus || null
        });
      });
    });
    if (!out.some(x => x.value === OWNER_EMAIL)) {
      out.push({ value: OWNER_EMAIL, label: "Owen", slackUserId: null, source: "owner" });
    }
    (STATE.partners || []).forEach(p => {
      const v = p.email || p.id;
      if (!v) return;
      if (out.some(x => x.value === v)) return;
      out.push({ value: v, label: p.name || v, slackUserId: p.slackUserId || null, source: "partner" });
    });
    (STATE.uatTesterDirectory || []).forEach(t => {
      if (!t || !t.value) return;
      if (out.some(x => x.value === t.value)) return;
      out.push({ value: t.value, label: t.label || t.value, slackUserId: t.slackUserId || null, source: "directory" });
    });
    return out;
  }
  function _findTesterEntry(value, ctx) {
    return _buildTesterDirectory(ctx).find(t => t.value === value) || null;
  }
  // TSKMGR-70 — resolve the meeting (calendar) context for a task row.
  // Returns { recurringEventIds: string[], committees: committee[] }.
  // Dispatch: item.projectId > source.kind=project > source.kind=committee >
  // committee → linked project fallback. Project context unions every linked
  // committee's recurringEventId.
  function _meetingContextForEntry(item, source) {
    const empty = { recurringEventIds: [], committees: [] };
    if (!item || !source) return empty;
    const collectFromProject = (projectId) => {
      const committees = (STATE.committees || []).filter(c => Array.isArray(c.projectIds) && c.projectIds.includes(projectId) && c.recurringEventId);
      return { recurringEventIds: committees.map(c => c.recurringEventId), committees };
    };
    // 1) item.projectId override
    if (item.projectId) {
      const got = collectFromProject(item.projectId);
      if (got.recurringEventIds.length) return got;
    }
    if (source.kind === "project") {
      const got = collectFromProject(source.id);
      if (got.recurringEventIds.length) return got;
    }
    if (source.kind === "committee") {
      const co = (STATE.committees || []).find(x => x.id === source.id);
      if (co && co.recurringEventId) return { recurringEventIds: [co.recurringEventId], committees: [co] };
      // Fall through: committee → single linked project → unioned committees
      if (co && Array.isArray(co.projectIds) && co.projectIds.length === 1) {
        const got = collectFromProject(co.projectIds[0]);
        if (got.recurringEventIds.length) return got;
      }
    }
    return empty;
  }
  function renderTesterDropdown(item, onChange, source) {
    // TSKMGR-70 — when a row resolves to one or more committees with a
    // recurringEventId, their calendar attendees are promoted to the top of
    // the dropdown under a "Meeting attendees" optgroup.
    const ctx = _meetingContextForEntry(item, source);
    const dir = _buildTesterDirectory(ctx);
    // TSKMGR-45 bugfix — wrap the <select> in a container so we can mount an
    // inline text input when the user picks "+ Add tester…". (Artifact iframes
    // typically block window.prompt(); inline input is the safe path.)
    const wrap = ce("span", { class: "tester-select-wrap", style: "display:inline-flex;gap:4px;align-items:center" });
    const sel = ce("select", { class: "tester-select", title: "Assigned UAT tester" });
    // Sentinel "no tester" option (default for null)
    const noOpt = document.createElement("option");
    noOpt.value = "";
    noOpt.textContent = "<no tester assigned>";
    if (!item.uatTester) noOpt.selected = true;
    sel.append(noOpt);
    // TSKMGR-70 — Group: meeting attendees (calendar + manual) vs everyone else.
    const attendeeMembers = dir.filter(t => t.source === "attendee-calendar" || t.source === "attendee-manual");
    const otherMembers    = dir.filter(t => t.source !== "attendee-calendar" && t.source !== "attendee-manual");
    const appendOpt = (parent, t) => {
      const o = document.createElement("option");
      o.value = t.value;
      o.textContent = t.label;
      if (item.uatTester === t.value || item.uatTester === t.label) o.selected = true;
      parent.append(o);
    };
    if (attendeeMembers.length) {
      const atGroup = document.createElement("optgroup");
      atGroup.label = "Meeting attendees";
      attendeeMembers.forEach(t => appendOpt(atGroup, t));
      sel.append(atGroup);
      if (otherMembers.length) {
        const otherGroup = document.createElement("optgroup");
        otherGroup.label = "Partners + others";
        otherMembers.forEach(t => appendOpt(otherGroup, t));
        sel.append(otherGroup);
      }
    } else {
      // No meeting context resolved — flat list preserves the legacy look.
      otherMembers.forEach(t => appendOpt(sel, t));
    }
    // "+ Add tester…" sentinel — prompts for a name and pushes into STATE.uatTesterDirectory.
    // When a channel is mapped, also seed the entry into that channel's member cache so
    // it survives a refresh and shows up as a channel member next time.
    const addOpt = document.createElement("option");
    addOpt.value = "__add__";
    addOpt.textContent = "+ Add tester…";
    sel.append(addOpt);
    // TSKMGR-45 bugfix — inline "Add tester…" flow. window.prompt() is blocked
    // inside the artifact iframe sandbox, which is why the old prompt-based
    // version silently did nothing. We mount a temporary text input next to
    // the dropdown instead, commit on Enter/blur, cancel on Escape.
    function commitNewTester(rawName) {
      const trimmed = (rawName || "").trim();
      if (!trimmed) return false;
      // TSKMGR-70 — when committee context is in scope, seed into the FIRST
      // resolved committee's attendee cache as source:"manual" so it survives a
      // refresh and shows up as a meeting attendee next time. Otherwise fall
      // back to STATE.uatTesterDirectory (legacy free-text behavior).
      const eventIds = (ctx && Array.isArray(ctx.recurringEventIds)) ? ctx.recurringEventIds : [];
      if (eventIds.length) {
        addAttendeeManually(eventIds[0], { email: trimmed.includes("@") ? trimmed : null, displayName: trimmed });
      } else {
        if (!Array.isArray(STATE.uatTesterDirectory)) STATE.uatTesterDirectory = [];
        const exists = STATE.uatTesterDirectory.find(t => t.value === trimmed || t.label === trimmed);
        if (!exists) STATE.uatTesterDirectory.push({ value: trimmed, label: trimmed, slackUserId: null });
      }
      item.uatTester = trimmed;
      persistState("Add UAT tester (free text)");
      if (typeof onChange === "function") onChange(item, trimmed);
      try { renderDossier(); } catch (e) {}
      try { renderRoster(); } catch (e) {}
      return true;
    }
    function mountInlineAddInput() {
      // Hide select while the input is live so the sentinel doesn't fire repeatedly.
      sel.style.display = "none";
      const input = ce("input", {
        type: "text",
        placeholder: "Tester name or email…",
        style: "min-width:180px;padding:2px 6px;font-size:12px;border:1px solid var(--accent);border-radius:3px"
      });
      const okBtn = ce("button", { class: "btn tiny", style: "padding:2px 6px" }, "Add");
      const cancelBtn = ce("button", { class: "btn tiny", style: "padding:2px 6px" }, "×");
      function cleanup() {
        try { input.remove(); } catch (e) {}
        try { okBtn.remove(); } catch (e) {}
        try { cancelBtn.remove(); } catch (e) {}
        sel.style.display = "";
        sel.value = item.uatTester || "";
      }
      function commit() {
        const ok = commitNewTester(input.value);
        cleanup();
        if (!ok) {
          // nothing entered — just restore
          return;
        }
      }
      okBtn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); commit(); });
      cancelBtn.addEventListener("click", (e) => { e.preventDefault(); e.stopPropagation(); cleanup(); });
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") { e.preventDefault(); commit(); }
        else if (e.key === "Escape") { e.preventDefault(); cleanup(); }
      });
      // If the user clicks elsewhere without committing, still cancel — but
      // give the Add button a chance to fire first (relatedTarget guard).
      input.addEventListener("blur", (e) => {
        setTimeout(() => {
          if (document.activeElement === okBtn || document.activeElement === cancelBtn || document.activeElement === input) return;
          if (!input.isConnected) return;
          if (input.value.trim()) commit(); else cleanup();

      });
      wrap.append(input, okBtn, cancelBtn);
      input.focus();
    }
    sel.addEventListener("change", () => {
      if (sel.value === "__add__") {
        mountInlineAddInput();
        return;
      }
      item.uatTester = sel.value || null;
      persistState("Set UAT tester");
      if (typeof onChange === "function") onChange(item, sel.value || null);
      try { renderDossier(); } catch (e) {}
      try { renderRoster(); } catch (e) {}
    });
    wrap.append(sel);
    return wrap;
  }

  // ============================================================
  // TSKMGR-45 Part B — Canvas proposal cache + parsing + fetch
  // ============================================================
  // Per-canvas cache of parsed heading/bullet items from a Slack canvas.
  // Same 24h soft-stale TTL as channel members. Stale entries still served.
  const CANVAS_PROPOSALS_TTL_MS = 24 * 60 * 60 * 1000;

  function getCanvasProposals(canvasId) {
    if (!canvasId) return null;
    return (STATE.canvasProposals || {})[canvasId] || null;
  }
  function isCanvasProposalsStale(canvasId) {
    const rec = getCanvasProposals(canvasId);
    if (!rec || !rec.fetchedAt) return true;
    return (Date.now() - new Date(rec.fetchedAt).getTime()) > CANVAS_PROPOSALS_TTL_MS;
  }
  function setCanvasProposals(canvasId, items, source, error) {
    if (!canvasId) return;
    if (!STATE.canvasProposals || typeof STATE.canvasProposals !== "object") STATE.canvasProposals = {};
    var rec = {
      fetchedAt: nowIso(),
      canvasId: canvasId,
      source: source || "slack_read_canvas",
      items: Array.isArray(items) ? items : []

    if (error) rec.error = String(error);

    persistState("Update canvas proposals " + canvasId);
  }

  function _canvasItemHashId(canvasId, text) {
    var raw = (text || "") + "|" + (canvasId || "");
    var ascii = raw.replace(/[^\x20-\x7E]/g, "");
    try { return btoa(ascii).replace(/[^A-Za-z0-9]/g, "").slice(0, 32); }
    catch (_) { return ascii.replace(/[^A-Za-z0-9]/g, "").slice(0, 32); }
  }

  function parseCanvasMarkdownToItems(markdown, canvasId) {
    if (!markdown) return [];
    var items = [];
    var lines = markdown.split("\n");
    var dateRe = /^!\[\]\(slack_date:(\d{4}-\d{2}-\d{2})\)/;
    var inFirstSection = false;
    var dateCount = 0;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      var dm = line.trim().match(dateRe);
      if (dm) {
        dateCount++;
        if (dateCount === 1) { inFirstSection = true; continue; }
        break;
      }
      if (dateCount > 0 && !inFirstSection) break;
      if (!inFirstSection && dateCount === 0) {
        if (/^\s*[-*+]\s/.test(line) || /^(#{1,6})\s/.test(line)) {
          inFirstSection = true;
        }
      }
      if (!inFirstSection) continue;
      if (!line.trim() || /^[-*_]{3,}\s*$/.test(line.trim())) continue;
      var text = null;
      var level = null;
      var hMatch = line.match(/^(#{1,6})\s+(.+)/);
      if (hMatch) {
        level = "h" + hMatch[1].length;
        text = hMatch[2].trim();
      }
      if (!text) {
        var labelMatch = line.match(/^([A-Za-z][A-Za-z ]*):?\s*$/);
        if (labelMatch) { level = "h2"; text = labelMatch[1].trim(); }
      }
      if (!text) {
        var bMatch = line.match(/^\s*[-*+]\s+(?:\[[ xX]\]\s+)?(.+)/);
        if (bMatch) { level = "bullet"; text = bMatch[1].trim(); }
      }
      if (!text) continue;
      text = text.replace(/\*\*(.+?)\*\*/g, "$1");
      text = text.replace(/__(.+?)__/g, "$1");
      text = text.replace(/\*(.+?)\*/g, "$1");
      text = text.replace(/_(.+?)_/g, "$1");
      text = text.replace(/`(.+?)`/g, "$1");
      text = text.replace(/\[([^\]]+)\]\([^)]+\)/g, "$1");
      text = text.replace(/<!date\^(\d+)\^[^|]*\|([^>]+)>/g, "$2");
      if (!text.trim()) continue;
      items.push({
        canvasItemId: _canvasItemHashId(canvasId, text),
        text: text.trim(),
        level: level
      });
    }
    return items;
  }

  const _canvasFetchInFlight = {};

  function fetchCanvasProposals(canvasId) {
    if (!canvasId) return Promise.resolve(null);
    if (_canvasFetchInFlight[canvasId]) return _canvasFetchInFlight[canvasId];
    const p = (window.cowork && typeof window.cowork.callMcpTool === "function")
      ? window.cowork.callMcpTool(
          "mcp__41e23f2c-10b6-43fa-ae26-3ec63b9776d0__slack_read_canvas",
          { canvas_id: canvasId }
        )
      : Promise.reject(new Error("Cowork bridge not available"));
    _canvasFetchInFlight[canvasId] = p.then(function (res) {
      delete _canvasFetchInFlight[canvasId];
      var resType = typeof res;
      var resPreview = "";
      try { resPreview = JSON.stringify(res).substring(0, 400); } catch (_) { resPreview = String(res).substring(0, 400); }
      console.log("[TSKMGR-45B] raw:", resType, resPreview);
      if (res == null) {
        setCanvasProposals(canvasId, [], "slack_read_canvas", "Bridge returned null/undefined");
        return [];
      }
      if (resType === "string" && (/not in this artifact/i.test(res) || /Tool .* is not/i.test(res) || /error/i.test(res) && res.length < 500)) {

      }

      if (resType === "string") {

        else if (parsed && Array.isArray(parsed)) { res = parsed; resType = "array"; }

        for (var ai = 0; ai < res.length && !md; ai++) {
          var item = res[ai];
          var txt = (item && item.text) || (typeof item === "string" ? item : "");
          if (!txt) continue;
          var obj = (function () { try { return JSON.parse(txt); } catch (_) { return null; } })();
          if (obj && obj.markdown_content) { md = obj.markdown_content; }
        }
      }

        if (res.markdown_content) { md = res.markdown_content; }
        else if (res.content && Array.isArray(res.content)) {

          return [];
        }
      }
      if (!md) {
        setCanvasProposals(canvasId, [], "slack_read_canvas", "No markdown found. Response (" + resType + "): " + resPreview);
        return [];
      }
      var items = parseCanvasMarkdownToItems(md, canvasId);
      if (!items.length) {
        setCanvasProposals(canvasId, items, "slack_read_canvas", "Markdown received (" + md.length + " chars) but parser returned 0 items. First 200: " + md.substring(0, 200));
        return items;
      }
      setCanvasProposals(canvasId, items, "slack_read_canvas");
      return items;
    }).catch(function (err) {
      delete _canvasFetchInFlight[canvasId];
      var errMsg = (err && err.message) || String(err);
      console.error("[TSKMGR-45B] Canvas fetch threw:", errMsg);
      setCanvasProposals(canvasId, [], "slack_read_canvas", "Fetch threw: " + errMsg);
      return [];
    });

  function _extractCanvasFileId(input) {

    if (/^F[A-Z0-9]{8,}$/.test(trimmed)) return trimmed;

  // ============================================================
