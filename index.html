        try {
          var result = await scanEmailInbox();
          showSave("saved", "Scanned " + result.scanned + " threads, classified " + result.classified + (result.autoIgnored ? ", " + result.autoIgnored + " auto-ignored" : ""));
        } catch (e) {
          showSave("error", "Scan failed: " + (e.message || e));
        }
        emailRefreshBtn.classList.remove("spinning");
        renderMyTasksView();
      }
    }, "↻");
    scanBar.append(emailRefreshBtn);
    if (STATE.emailTriage.lastScanAt) {
      scanBar.append(ce("span", { class: "meta", style: "font-size:11px;color:var(--muted)" }, "Last scanned: " + fmtDT(STATE.emailTriage.lastScanAt)));
    } else {
      scanBar.append(ce("span", { class: "meta", style: "font-size:11px;color:var(--warn)" }, "Not yet scanned — click ↻ to scan"));
    }
    panel.append(scanBar);

    // ---- TSKMGR-95: Pattern summary bar ----
    var patternSummaries = _emailPatternSummaries();
    if (patternSummaries.length) {
      var patternParts = patternSummaries.map(function (s) {
        var txt = s.count + " " + s.signalLabel + (s.count !== 1 ? "s" : "");
        if (s.createdCount) txt += " — " + s.createdCount + " became task" + (s.createdCount !== 1 ? "s" : "");
        if (s.senders.length > 1) txt += " from " + s.senders.length + " senders";
        return txt;
      });
      var patternBar = ce("div", { class: "email-pattern-bar" });
      patternBar.append(ce("span", { class: "pb-icon" }, "📊"));
      patternBar.append(ce("span", { class: "pb-text" }, "This month: " + patternParts.join(" · ")));
      panel.append(patternBar);
    }

    // ---- Partition threads by classification ----
    var phishing = [], quickReply = [], longResponse = [], fyi = [], tasks = [];
    // TSKMGR-95: run _emailAnalyze on all non-dismissed, non-created threads
    var candidates = []; // { thread, analysis }
    Object.values(threads).forEach(function (t) {
      if (t.dismissed || t.taskCreated) return;
      // Run candidate detection on every thread regardless of subject prefix
      var analysis = _emailAnalyze(t);
      if (analysis.isCandidate) { candidates.push({ thread: t, analysis: analysis }); return; }
      if (t.classification === "phishing") phishing.push(t);
      else if (t.classification === "quick_reply") quickReply.push(t);
      else if (t.classification === "long_response") longResponse.push(t);
      else if (t.classification === "task") tasks.push(t);
      else if (t.classification === "fyi") fyi.push(t);
    });

    // Sort each group by date desc
    var dateSorter = function (a, b) { return new Date(b.date || 0) - new Date(a.date || 0); };
    [phishing, quickReply, longResponse, tasks, fyi].forEach(function (arr) { arr.sort(dateSorter); });
    candidates.sort(function (a, b) { return new Date(b.thread.date || 0) - new Date(a.thread.date || 0); });

    if (!phishing.length && !quickReply.length && !longResponse.length && !tasks.length && !fyi.length && !candidates.length) {
      panel.append(ce("div", { class: "mytasks-panel-empty" }, STATE.emailTriage.lastScanAt ? "Inbox clear — nothing needs your attention." : "Hit \"Scan Inbox\" to check your email."));
      return;
    }

    // ---- TSKMGR-95: Candidate task cards ----
    if (candidates.length) {
      var SIGNAL_ICONS = { access_issue: "🔑", stale_data: "📅", feature_request: "💡", broken: "🔧", ownership_domain: "🎯" };
      var candHdr = ce("div", { class: "email-group-header" });
      candHdr.append("Task Candidates ");
      candHdr.append(ce("span", { class: "email-group-badge" }, String(candidates.length)));
      panel.append(candHdr);
      candidates.forEach(function (c) {
        var t = c.thread;
        var analysis = c.analysis;
        var card = ce("div", { class: "email-candidate-card" });
        // Top row: signal badge + sender + age
        var topRow = ce("div", { style: "display:flex;align-items:center;gap:8px;flex-wrap:wrap" });
        var icon = SIGNAL_ICONS[analysis.signalType] || "📬";
        topRow.append(ce("span", { class: "email-signal-badge " + analysis.signalType }, icon + " " + (analysis.signalLabel || analysis.signalType)));
        topRow.append(ce("span", { class: "email-sender", style: "font-weight:600" }, extractDisplayName(t.sender)));
        topRow.append(ce("span", { style: "color:var(--muted);font-size:11px;margin-left:auto" }, t.date ? daysAgo(t.date) : ""));
        card.append(topRow);
        // Subject
        card.append(ce("div", { class: "email-subject", style: "margin-top:4px" }, t.subject || "(no subject)"));
        // Suggested title
        if (analysis.suggestedTitle) {
          card.append(ce("div", { class: "suggested-title" }, "Suggested task: " + analysis.suggestedTitle));
        }
        // Confidence
        var confPct = Math.round((analysis.confidence || 0) * 100);
        var confColor = confPct >= 80 ? "var(--good)" : confPct >= 60 ? "var(--warn)" : "var(--bad)";
        card.append(ce("span", { style: "font-size:9px;color:" + confColor + ";display:block;margin-top:2px" }, confPct + "% confidence"));
        // Actions
        var acts = ce("div", { class: "email-actions" });
        acts.append(ce("a", { class: "btn tiny", href: "https://mail.google.com/mail/u/0/#inbox/" + t.id, target: "_blank", style: "text-decoration:none" }, "Open"));
        (function (captThread, captAnalysis) {
          acts.append(ce("button", { class: "btn tiny primary", onclick: function () {
            createTaskFromEmailCandidate(captThread, captAnalysis, renderMyTasksView);
          } }, "Create Task"));
          acts.append(ce("button", { class: "btn tiny", onclick: function () {
            dismissEmailCandidate(captThread, captAnalysis, renderMyTasksView);
          } }, "Dismiss"));
          if (captThread.senderEmail) {
            acts.append(ce("button", { class: "btn tiny", style: "color:var(--muted)", onclick: function () {
              STATE.emailFeedback = STATE.emailFeedback || [];
              STATE.emailFeedback.push({ threadId: captThread.id, senderEmail: captThread.senderEmail, signalType: captAnalysis.signalType, decision: "ignored_sender", timestamp: nowIso() });
              ignoreSender(captThread.senderEmail, captThread.subject);
              renderMyTasksView();
            } }, "Ignore sender"));
          }
        })(t, analysis);
        card.append(acts);
        panel.append(card);
      });
    }

    // ---- Phishing banner ----
    if (phishing.length) {
      var phishBanner = ce("div", { class: "email-card phishing", style: "margin-bottom:12px" });
      phishBanner.append(ce("div", { style: "font-weight:700;color:#c11;margin-bottom:4px" }, "⚠ Suspected phishing (" + phishing.length + ")"));
      phishing.forEach(function (t) {
        var row = ce("div", { style: "display:flex;align-items:center;gap:8px;margin:4px 0" });
        row.append(ce("span", { class: "email-sender" }, t.sender));
        row.append(ce("span", { class: "email-subject", style: "flex:1" }, t.subject));
        row.append(ce("button", { class: "btn tiny", onclick: function () { t.dismissed = true; persistState("Dismiss phishing"); renderMyTasksView(); } }, "Dismiss"));
        phishBanner.append(row);
      });
      panel.append(phishBanner);
    }

    // ---- Task-classified emails (need routing) ----
    if (tasks.length) {
      panel.append(renderEmailGroup("Needs Task", tasks, "task"));
    }

    // ---- Quick Reply group ----
    if (quickReply.length) {
      panel.append(renderEmailGroup("Quick Reply", quickReply, "quick_reply"));
    }

    // ---- Long Response group ----
    if (longResponse.length) {
      panel.append(renderEmailGroup("Long Response", longResponse, "long_response"));
    }

    // ---- FYI group (collapsed) ----
    if (fyi.length) {
      var fyiSection = ce("details", { style: "margin-top:10px" });
      var fyiSummary = ce("summary", { class: "email-group-header", style: "cursor:pointer" });
      fyiSummary.append("FYI ");
      fyiSummary.append(ce("span", { class: "email-group-badge" }, String(fyi.length)));
      fyiSection.append(fyiSummary);
      fyi.forEach(function (t) {
        var row = ce("div", { style: "display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px" });
        row.append(ce("span", { style: "color:var(--muted);min-width:100px" }, extractDisplayName(t.sender)));
        row.append(ce("span", { style: "flex:1" }, t.subject));
        row.append(ce("button", { class: "btn tiny", onclick: function () { ignoreSender(t.senderEmail, t.subject); renderMyTasksView(); } }, "Ignore sender"));
        row.append(ce("button", { class: "btn tiny", style: "color:var(--muted)", onclick: function () { openCreateRuleModal(t); } }, "Rule"));
        fyiSection.append(row);
      });
      panel.append(fyiSection);
    }

    // ---- Stats footer ----
    var dismissed = Object.values(threads).filter(function (t) { return t.dismissed; }).length;
    var created = Object.values(threads).filter(function (t) { return t.taskCreated; }).length;
    panel.append(ce("div", { class: "meta", style: "margin-top:14px;font-size:11px;color:var(--muted)" },
      quickReply.length + " quick replies · " + longResponse.length + " long responses · " + tasks.length + " need tasks · " + created + " tasks created · " + dismissed + " dismissed" +
      ((STATE.emailTriage.ignoredSenders || []).length ? " · " + STATE.emailTriage.ignoredSenders.length + " senders ignored" : "") +
      ((STATE.emailTriage.filterRules || []).filter(function (r) { return r.enabled; }).length ? " · " + STATE.emailTriage.filterRules.filter(function (r) { return r.enabled; }).length + " filter rules" : "")));

  /** Render a single email card. */

    var card = ce("div", { class: "email-card" });

    headerRow.append(ce("span", { class: "email-sender" }, extractDisplayName(t.sender)));
    if (t.date) headerRow.append(ce("span", { class: "meta", style: "font-size:10px;color:var(--muted);margin-left:auto" }, daysAgo(t.date)));
    card.append(headerRow);

    // Subject
    card.append(ce("div", { class: "email-subject" }, t.subject || "(no subject)"));

    // Snippet
    if (t.snippet) card.append(ce("div", { class: "email-snippet" }, t.snippet));

    // Candidate task title for task-classified emails
    if (groupType === "task" && t.candidateTaskTitle) {
      card.append(ce("div", { style: "font-size:11px;color:var(--accent);margin-top:4px" }, "Suggested task: " + t.candidateTaskTitle));
    }

    // Confidence badge
    if (t.confidence != null) {
      var confPct = Math.round(t.confidence * 100);
      var confColor = confPct >= 80 ? "var(--good)" : confPct >= 60 ? "var(--warn)" : "var(--bad)";
      card.append(ce("span", { style: "font-size:9px;color:" + confColor + ";margin-top:2px;display:block" }, confPct + "% confidence"));
    }

    // Actions
    var actions = ce("div", { class: "email-actions" });

    actions.append(ce("a", { class: "btn tiny", href: "https://mail.google.com/mail/u/0/#inbox/" + t.id, target: "_blank", style: "text-decoration:none" }, "Open"));

    // Dismiss (just this thread) vs Ignore sender (blocks future emails from this sender)
    actions.append(ce("button", { class: "btn tiny", onclick: function () { t.dismissed = true; persistState("Dismiss email"); renderMyTasksView(); } }, "Dismiss"));
    if (t.senderEmail) {
      actions.append(ce("button", { class: "btn tiny", style: "color:var(--muted)", onclick: function () { ignoreSender(t.senderEmail, t.subject); renderMyTasksView(); } }, "Ignore sender"));
    }
    // Create filter rule (granular: subject pattern or calendar invite)
    actions.append(ce("button", { class: "btn tiny", style: "color:var(--muted)", onclick: function () { openCreateRuleModal(t); } }, "Create rule"));

    // Create Task (for any group)
    actions.append(ce("button", { class: "btn tiny", onclick: function () { createTaskFromEmail(t); renderMyTasksView(); } }, "Create Task"));

    // Reclassify buttons
    if (groupType === "long_response") {
      actions.append(ce("button", { class: "btn tiny", onclick: function () { t.classification = "quick_reply"; t.classifiedAt = nowIso(); persistState("Reclassify → quick"); renderMyTasksView(); } }, "Mark Quick"));
    }
    if (groupType === "quick_reply") {
      actions.append(ce("button", { class: "btn tiny", onclick: function () { t.classification = "long_response"; t.classifiedAt = nowIso(); persistState("Reclassify → long"); renderMyTasksView(); } }, "Mark Long"));
    }

    card.append(actions);
    return card;
  }

  /** Extract display name from "Name <email>" format. */
  function extractDisplayName(s) {
    if (!s) return "(unknown)";
    var m = s.match(/^([^<]+)</);
    return m ? m[1].trim() : s.replace(/<[^>]+>/, "").trim() || s;
  }

  /** Open modal to create a filter rule, pre-populated from a thread's data. */
  function openCreateRuleModal(thread) {
    // Use a dynamically-created backdrop matching the existing .modal-backdrop pattern
    var overlay = ce("div", { class: "modal-backdrop", style: "display:flex" });
    overlay.addEventListener("click", function (e) { if (e.target === overlay) overlay.remove(); });
    // TSKMGR-81 fix: prevent Backspace from closing the modal or triggering browser back.
    // Backspace inside inputs should only delete characters; outside inputs, do nothing.
    overlay.addEventListener("keydown", function (e) {
      if (e.key === "Backspace") {
        var tag = e.target && e.target.tagName ? e.target.tagName.toLowerCase() : "";
        var isEditable = tag === "input" || tag === "textarea" || tag === "select" || (e.target && e.target.isContentEditable);
        if (isEditable) {
          e.stopPropagation(); // let the input handle it, but don't let it bubble to global handlers
        } else {
          e.preventDefault(); // not in an input — block entirely
          e.stopPropagation();
        }
      }
      if (e.key === "Escape") { overlay.remove(); }
    });
    var modal = ce("div", { class: "modal", style: "max-width:440px" });
    modal.append(ce("h2", { style: "margin:0 0 4px" }, "Create filter rule"));
    modal.append(ce("div", { class: "sub" },
      "Filter future emails matching this pattern. The sender can still email you — only matching emails are auto-dismissed."));

    // Detect if this looks like a calendar invite
    var calRe = /^(invitation|updated invitation|accepted|declined|tentative|canceled|cancelled|proposed new time):/i;
    var isCalendar = calRe.test(thread.subject || "") ||
      (thread.senderEmail || "").toLowerCase() === "calendar-notification@google.com";

    // Pre-compute a subject prefix (strip date-like suffixes for recurring emails)
    var rawSubject = (thread.subject || "").replace(/^(re:|fwd?:)\s*/gi, "").trim();
    // Try to find a stable prefix before any date-like pattern
    var prefixMatch = rawSubject.match(/^(.{8,}?)\s*[\-–—:]\s*\d/);
    var suggestedPrefix = prefixMatch ? prefixMatch[1].trim() : rawSubject.slice(0, 50);

    // Rule type selector
    var typeLabel = ce("label", { style: "display:block;margin-bottom:6px;font-size:12px;font-weight:600" }, "Rule type");
    var typeSelect = ce("select", { style: "width:100%;padding:6px;font-size:12px;margin-bottom:10px;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--fg)" });
    typeSelect.append(ce("option", { value: "subject_contains" }, "Subject contains pattern"));
    typeSelect.append(ce("option", { value: "calendar_update" }, "Calendar invitations & updates"));
    if (isCalendar) typeSelect.value = "calendar_update";

    // Subject pattern fields (shown for subject_contains type)
    var subjectGroup = ce("div", {});
    subjectGroup.append(ce("label", { style: "display:block;margin-bottom:4px;font-size:12px;font-weight:600" }, "Subject contains"));
    var subjectInput = ce("input", { type: "text", value: suggestedPrefix, style: "width:100%;box-sizing:border-box;padding:6px;font-size:12px;border:1px solid var(--line);border-radius:4px;margin-bottom:8px;background:var(--bg);color:var(--fg)", placeholder: "e.g. AIA Div Sum" });
    subjectGroup.append(subjectInput);
    subjectGroup.append(ce("label", { style: "display:block;margin-bottom:4px;font-size:12px;font-weight:600" }, "From sender (optional — leave blank for any sender)"));
    var senderInput = ce("input", { type: "text", value: thread.senderEmail || "", style: "width:100%;box-sizing:border-box;padding:6px;font-size:12px;border:1px solid var(--line);border-radius:4px;margin-bottom:8px;background:var(--bg);color:var(--fg)", placeholder: "e.g. frank.harl@ or leave blank" });
    subjectGroup.append(senderInput);

    // Calendar options (shown for calendar_update type)
    var calGroup = ce("div", { style: isCalendar ? "display:block" : "display:none" });
    var exceptCb = ce("input", { type: "checkbox", checked: true });
    var exceptLabel = ce("label", { style: "display:flex;align-items:center;gap:6px;font-size:12px;margin-bottom:8px" });
    exceptLabel.append(exceptCb);
    exceptLabel.append(document.createTextNode("Except when description is updated by someone else"));
    calGroup.append(exceptLabel);
    calGroup.append(ce("div", { class: "sub", style: "font-size:11px" },
      "Calendar invites, RSVPs, and updates will be auto-ignored. If someone other than you changes the event description, that email will still come through."));

    // Label
    var labelGroup = ce("div", { style: "margin-top:10px" });
    labelGroup.append(ce("label", { style: "display:block;margin-bottom:4px;font-size:12px;font-weight:600" }, "Rule label"));
    var defaultLabel = isCalendar ? "Calendar invitations & updates" : suggestedPrefix + (thread.senderEmail ? " from " + extractDisplayName(thread.sender) : "");
    var labelInput = ce("input", { type: "text", value: defaultLabel, style: "width:100%;box-sizing:border-box;padding:6px;font-size:12px;border:1px solid var(--line);border-radius:4px;background:var(--bg);color:var(--fg)", placeholder: "A friendly name for this rule" });
    labelGroup.append(labelInput);

    // Toggle visibility based on type
    typeSelect.addEventListener("change", function () {
      subjectGroup.style.display = typeSelect.value === "subject_contains" ? "block" : "none";
      calGroup.style.display = typeSelect.value === "calendar_update" ? "block" : "none";
    });
    subjectGroup.style.display = isCalendar ? "none" : "block";

    // Save + Cancel
    var btnRow = ce("div", { class: "footer" });
    btnRow.append(ce("button", { class: "btn", onclick: function () { overlay.remove(); } }, "Cancel"));
    btnRow.append(ce("button", { class: "btn primary", onclick: function () {
      var rule = { type: typeSelect.value, label: labelInput.value.trim() || "(unnamed rule)" };
      if (rule.type === "subject_contains") {
        rule.subjectContains = subjectInput.value.trim() || null;
        rule.senderContains = senderInput.value.trim() || null;
        if (!rule.subjectContains && !rule.senderContains) { showSave("error", "Please enter a subject pattern or sender"); return; }
      } else if (rule.type === "calendar_update") {
        rule.exceptDescriptionUpdateByOthers = exceptCb.checked;
      }
      addFilterRule(rule);
      overlay.remove();
      renderMyTasksView();
    } }, "Create Rule"));

    modal.append(typeLabel, typeSelect, subjectGroup, calGroup, labelGroup, btnRow);
    overlay.append(modal);
    document.body.append(overlay);
  }

  function renderFridayPlanning() {
    const dos = document.getElementById("dossier"); dos.innerHTML = "";

    // Header
    const header = ce("div", { style: "display:flex;align-items:center;gap:12px;margin-bottom:6px" });
    header.append(ce("h2", { style: "margin:0;flex:1" }, "Plan Next Week"));
    dos.append(header);
    dos.append(ce("div", { class: "meta" }, "7-step weekly ritual. Celebrate wins → triage → tag meetings → confirm Musts → schedule Focus blocks."));

    // Skipped weeks indicator (TSKMGR-49)

    // ==== STEP 1 — Celebrate last week ====

      wins.sort(function (a, b) { var ap = a.item.priority === "must" ? 0 : 1; var bp = b.item.priority === "must" ? 0 : 1; return ap - bp; });
      wins.forEach(w => {

    // ==== STEP 2 — Stuck UAT roll-up ====

    // ==== STEP 4 — Needs Attention triage ====

    // ==== STEP 5 — Calendar preview + meeting↔project tagging ====

    // ==== STEP 6 — Confirm next week's Musts ====
    var mustsDueNextWeek = collectMyTasksAll().filter(function (e) {

    loadNextWeekCalendar().then(cal => {

      // ---- TSKMGR-49: Meetings without project assignment ----
      // Show ALL next-week meetings that aren't already linked to a committee,
      // so the user can associate one-off meetings with the right project.
      var committeeEventIds = new Set();
      (STATE.committees || []).forEach(function (c) {
        if (c.recurringEventId) committeeEventIds.add(c.recurringEventId);

      // Meetings window = 8 calendar days; tasks window = 14 days (full grid)
      var mtgCutoff = new Date(Date.now() + 8 * 86400000);
      var unlinkedMeetings = (cal.events || []).filter(function (ev) {

          if (self && self.responseStatus === "declined") return false;
        }
        // Skip if already mapped to a project
        if (STATE.meetingProjectMap[ev.id]) return false;

        if ((ev.summary || "").indexOf("🟧") === 0) return false;

      });
      if (unlinkedMeetings.length) {

          card.append(ce("div", { class: "mtg-card-time" }, timeLabel));

          if (sugg.length) {
            sugg.slice(0, 2).forEach(function (s) {
              actions.append(ce("button", { class: "btn tiny primary", onclick: function () {
                STATE.meetingProjectMap[ev.id] = s.project.id;
                persistState("TSKMGR-49: link meeting to project");
                renderFridayPlanning();
              } }, "✓ " + s.project.name));
            });
          }
          // Full project picker
          if (activeProjects.length) {
            var pickSel = ce("select", { class: "pw-action project-btn" });
            pickSel.append(ce("option", { value: "" }, "+ Project"));
            activeProjects.forEach(function (p) {
              pickSel.append(ce("option", { value: p.id }, p.name));
            });
            pickSel.addEventListener("change", function () {
              if (!pickSel.value) return;
              STATE.meetingProjectMap[ev.id] = pickSel.value;
              persistState("TSKMGR-49: link meeting to project");
              renderFridayPlanning();
            });
            actions.append(pickSel);
          }
          // Skip / not relevant
          actions.append(ce("button", { class: "btn tiny", onclick: function () {
            STATE.meetingProjectMap[ev.id] = "__none__";
            persistState("TSKMGR-49: mark meeting no project");
            renderFridayPlanning();
          } }, "Skip"));
          card.append(actions);
          mtgSec.append(card);
        });
        pwSec.append(mtgSec);
      }

      const candidateTasks = collectOpenTasksForBlocking().filter(rec => !rec.item.skipBlockingForNow);
      if (!candidateTasks.length) {
        pwSec.append(ce("div", { class: "good-banner" }, "✓ Nothing left to schedule — open tasks are either already blocked, snoozed, or none exist."));
        // Still show calendar for visibility
        pwSec.append(renderPwWeekCalendar(cal, []));
        return;
      }
      pwSec.append(ce("div", { class: "meta", style: "margin-bottom:8px" }, "Greedy first-fit proposer · 9am–5pm, lunch 12–1, 15-min buffer · strategic → mornings, email-style → afternoons · grouped by source"));
      const proposals = proposeBlocks(candidateTasks, cal.busyByDay);

      // v3.4.4a — Accept all toolbar
      const scheduledProps = proposals.filter(p => !p.unscheduled && p.slot && !p.rec.item.calendar_block_event_id);
      if (scheduledProps.length > 1) {
        const toolbar = ce("div", { class: "pw-toolbar" });
        const acceptAllBtn = ce("button", { class: "btn primary", onclick: async () => {
          if (!confirm("Accept all " + scheduledProps.length + " proposed blocks? This creates real Calendar events for each. You can still edit/delete them in Calendar afterward.")) return;
          acceptAllBtn.disabled = true;
          acceptAllBtn.textContent = "Creating 0 of " + scheduledProps.length + "…";
          let done = 0;
          for (const prop of scheduledProps) {
            await acceptBlock(prop, null);
            done++;
            acceptAllBtn.textContent = "Creating " + done + " of " + scheduledProps.length + "…";
          }
          // acceptBlock triggers re-render at the end of each call so we'd already be re-rendered.
        } }, "✓ Accept all " + scheduledProps.length + " proposals");
        toolbar.append(acceptAllBtn);
        toolbar.append(ce("span", { class: "meta", style: "margin-left:auto" }, scheduledProps.length + " scheduled · " + proposals.filter(p => p.unscheduled).length + " unscheduled · " + proposals.filter(p => p.rec.item.calendar_block_event_id).length + " already blocked"));
        pwSec.append(toolbar);
      }

      pwSec.append(renderPwTwoPane(cal, candidateTasks, proposals));
    });

    // ---- Section 3: Discovery rename suggestions (from cached discovery) ----
    if (discoveryCache && discoveryCache.candidates) {
      const renameCands = discoveryCache.candidates.filter(c => c.possibleRenameOf);
      if (renameCands.length) {
        const sec3 = ce("section", { class: "block" });
        sec3.append(ce("h3", {}, "Pending rename / restart suggestions from discovery"));
        renameCands.forEach(cand => {
          const samp = cand.sample || {};
          const ex = (STATE.committees || []).find(x => x.id === cand.possibleRenameOf);
          const card = ce("div", { class: "friday-card" });
          card.append(ce("div", { style: "font-weight:600" }, samp.summary || "(unnamed)"));
          card.append(ce("div", { class: "meta" }, "May be a rename of: " + (ex && ex.name) + " (≥80% attendee overlap)"));
          const btnRow = ce("div", { style: "display:flex;gap:6px;margin-top:6px;flex-wrap:wrap" });
          btnRow.append(ce("button", { class: "btn tiny primary", onclick: () => {
            if (ex) { ex.recurringEventId = cand.recurringEventId; persistState("Merge rename"); }
            if (discoveryCache) discoveryCache.candidates = discoveryCache.candidates.filter(x => x.recurringEventId !== cand.recurringEventId);
            renderFridayPlanning();
          } }, "Merge into " + (ex && ex.name)));
          btnRow.append(ce("button", { class: "btn tiny", onclick: () => {
            if (discoveryCache) discoveryCache.candidates = discoveryCache.candidates.filter(x => x.recurringEventId !== cand.recurringEventId);
            renderFridayPlanning();
          } }, "Treat as new (skip merge)"));
          card.append(btnRow);
          sec3.append(card);
        });
        dos.append(sec3);
      }
    }

    // ==== Step 8: Email triage ====
    var emailThreads = Object.values(STATE.emailTriage.threads || {}).filter(function (t) {
      return !t.dismissed && !t.taskCreated && t.classification !== "fyi" && t.classification !== "phishing";
    });
    // Filter to time-sensitive: dueBy today or next week, or unreplied > 3 days old
    var emailNow = new Date();
    var todayCutoff = new Date(emailNow); todayCutoff.setHours(23, 59, 59, 999);
    var weekCutoff = new Date(emailNow); weekCutoff.setDate(weekCutoff.getDate() + 7);
    var urgentEmails = emailThreads.filter(function (t) {
      if (t.dueBy && new Date(t.dueBy) <= todayCutoff) return true;
      if (t.dueBy && new Date(t.dueBy) <= weekCutoff) return true;
      var age = (emailNow - new Date(t.date)) / 86400000;
      return age >= 3; // unreplied > 3 days = time-sensitive
    });
    var s8 = ritualStep(8, "Email triage", { badge: urgentEmails.length ? urgentEmails.length + " pending" : "clear" });
    if (urgentEmails.length) {
      // Scan button inside step
      var s8ScanBtn = ce("button", { class: "btn tiny", style: "margin-bottom:10px", onclick: async function () {
        s8ScanBtn.disabled = true; s8ScanBtn.textContent = "Scanning…";
        try { await scanEmailInbox(); } catch (e) { showSave("error", "Scan error: " + (e.message || e)); }
        renderFridayPlanning();
      } }, "Refresh inbox scan");
      s8.body.append(s8ScanBtn);

      // Urgent email cards
      urgentEmails.sort(function (a, b) { return new Date(b.date || 0) - new Date(a.date || 0); });
      urgentEmails.forEach(function (t) {
        var card = ce("div", { class: "email-card" });
        var hdr = ce("div", { style: "display:flex;align-items:center;gap:8px" });
        hdr.append(ce("span", { class: "email-sender" }, extractDisplayName(t.sender)));
        var urgLabel = "";
        if (t.dueBy && new Date(t.dueBy) <= todayCutoff) urgLabel = "due today";
        else if (t.dueBy) urgLabel = "due this week";
        else urgLabel = daysAgo(t.date) + " old";
        hdr.append(ce("span", { style: "margin-left:auto;font-size:10px;color:var(--warn);font-weight:600" }, urgLabel));
        card.append(hdr);
        card.append(ce("div", { class: "email-subject" }, t.subject || "(no subject)"));
        if (t.snippet) card.append(ce("div", { class: "email-snippet" }, t.snippet));
        var acts = ce("div", { class: "email-actions" });
        acts.append(ce("a", { class: "btn tiny", href: "https://mail.google.com/mail/u/0/#inbox/" + t.id, target: "_blank", style: "text-decoration:none" }, "Open"));
        acts.append(ce("button", { class: "btn tiny", onclick: function () { t.dismissed = true; persistState("Dismiss ritual email"); renderFridayPlanning(); } }, "Dismiss"));
        if (t.senderEmail) {
          acts.append(ce("button", { class: "btn tiny", style: "color:var(--muted)", onclick: function () { ignoreSender(t.senderEmail, t.subject); renderFridayPlanning(); } }, "Ignore sender"));
        }
        acts.append(ce("button", { class: "btn tiny", style: "color:var(--muted)", onclick: function () { openCreateRuleModal(t); } }, "Rule"));
        acts.append(ce("button", { class: "btn tiny", onclick: function () { createTaskFromEmail(t); renderFridayPlanning(); } }, "Create Task"));
        card.append(acts);
        s8.body.append(card);
      });
    } else {
      s8.body.append(ce("div", { class: "meta", style: "color:var(--good)" }, "No urgent emails — inbox is clear."));
      // Offer scan if never scanned
      if (!STATE.emailTriage.lastScanAt) {
        var s8FirstScan = ce("button", { class: "btn tiny", style: "margin-top:8px", onclick: async function () {
          s8FirstScan.disabled = true; s8FirstScan.textContent = "Scanning…";
          try { await scanEmailInbox(); } catch (e) { showSave("error", "Scan error: " + (e.message || e)); }
          renderFridayPlanning();
        } }, "Run first inbox scan");
        s8.body.append(s8FirstScan);
      }
    }
    dos.append(s8.container);

    // ==== Ritual complete bar ====
    var allStepsDone = [1,2,3,4,5,6,7,8].every(function (n) { return getRitualStepDone("step" + n); });
    var completeBar = ce("div", { class: "ritual-complete-bar" });
    if (STATE.lastPlanMyWeekRitualAt) {
      completeBar.append(ce("span", { class: "meta" }, "Last completed: " + fmtDate(STATE.lastPlanMyWeekRitualAt)));
    }
    var completeBtn = ce("button", { class: "btn" + (allStepsDone ? " primary" : ""), onclick: function () {
      STATE.lastPlanMyWeekRitualAt = new Date().toISOString();
      // Reset step checkboxes for next ritual
      try { localStorage.removeItem(RITUAL_STEPS_KEY); } catch (e) {}
      persistState("Ritual complete");
      renderFridayPlanning();
    } }, allStepsDone ? "✓ Mark ritual complete" : "Mark ritual complete (steps remaining)");
    completeBar.append(completeBtn);
    var doneCount = [1,2,3,4,5,6,7,8].filter(function (n) { return getRitualStepDone("step" + n); }).length;
    completeBar.append(ce("span", { class: "meta", style: "margin-left:auto" }, doneCount + " of 8 steps done"));
    dos.append(completeBar);
  }

  // Member visibility per charter §"Member visibility rule":
  // required attendees always shown; optional attendees hidden until they own work
  // (action item assigned to them) OR hasContributed flag set by reconciler.
  function visibleMembers(c) {
    return (c.members || []).filter(m => {
      if (!m.optional) return true;
      const hasTask = (c.actionItems || []).some(a => a.assigneeEmail && a.assigneeEmail.toLowerCase() === (m.email || "").toLowerCase());
      return hasTask || m.hasContributed === true;
    });
  }
  function hiddenMemberCount(c) { return (c.members || []).length - visibleMembers(c).length; }

  function memberChips(c, opts) {
    opts = opts || {};
    const wrap = ce("div", { class: "member-chips" });
    visibleMembers(c).forEach(m => {
      const isOwen = (m.email || "").toLowerCase() === OWNER_EMAIL.toLowerCase();
      const chip = ce("span", { class: "member-chip" + (m.optional ? " optional" : "") + (isOwen ? " is-owen" : "") , title: (m.email || "") + (m.memberRole ? " · " + m.memberRole : "") }, [
        ce("span", { class: "avatar tiny" }, initials(m.name || m.email || "?")),
        ce("span", { class: "member-name" }, (m.name || m.email || "—").split(" ")[0])
      ]);
      wrap.append(chip);
    });
    if (opts.showHidden && hiddenMemberCount(c) > 0) wrap.append(ce("span", { class: "member-hidden" }, "+ " + hiddenMemberCount(c) + " optional hidden"));
    if (!visibleMembers(c).length) wrap.append(ce("span", { style: "color:var(--muted);font-size:12px" }, "No members yet"));
    return wrap;
  }

  // Topic derivation (charter §"Topic derivation rule")
  function topicOf(item) {
    if (item.projectId) {
      const p = (STATE.projects || []).find(x => x.id === item.projectId);
      if (p) return p.name;
    }
    return (item.tags && item.tags[0]) || "Untagged";
  }
  function isFirstClassTopic(item) {
    if (item.projectId) return true;
    const firstTag = item.tags && item.tags[0];
    if (!firstTag) return false;
    return (STATE.projects || []).some(p => p.tagAlias === firstTag);
  }

  // Due-date bucket assignment for action items
  function dueBucket(item) {
    if (!item.dueBy) return "Unscheduled";
    const d = new Date(item.dueBy + "T12:00:00");
    if (isNaN(d.getTime())) return "Unscheduled";
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(today.getDate() + 1);
    const weekEnd = new Date(today); weekEnd.setDate(today.getDate() + 7);
    if (d < today) return "Overdue";
    if (d < tomorrow) return "Due today";
    if (d < weekEnd) return "This week";
    return "Later";
  }
  // Metadata-completeness tier per charter §"Within a topic group, sort..."
  function metaTier(item) {
    const hasDue = !!item.dueBy;
    const hasAssignee = !!(item.assigneeEmail && item.assigneeEmail.length);
    if (hasDue && hasAssignee) return 1;
    if (!hasDue && hasAssignee) return 2;
    if (!hasDue && !hasAssignee) return 3;
    return 4; // hasDue + !hasAssignee — pressure without accountability, sinks to bottom
  }
  function priorityRank(item) { return ({ must: 0, should: 1, nice: 2 })[item.priority || "should"] || 1; }

  function renderActionItemsByDueDate(items, c) {
    const wrap = ce("div", { class: "action-items" });
    if (!items.length) { wrap.append(ce("div", { class: "due" }, "No action items yet.")); return wrap; }

    const buckets = ["Overdue", "Due today", "This week", "Later", "Unscheduled"];
    const grouped = {}; buckets.forEach(b => grouped[b] = {});
    items.forEach(it => {
      const b = dueBucket(it);
      const t = topicOf(it);
      grouped[b][t] = grouped[b][t] || [];
      grouped[b][t].push(it);
    });

    buckets.forEach(b => {
      const topics = Object.keys(grouped[b]);
      if (!topics.length) return;
      wrap.append(ce("h4", { class: "ai-bucket" + (b === "Overdue" ? " overdue" : "") }, b));
      topics.sort().forEach(topicName => {
        const list = grouped[b][topicName];
        list.sort((a, b2) => (metaTier(a) - metaTier(b2)) || (priorityRank(a) - priorityRank(b2)) || ((a.dueBy || "").localeCompare(b2.dueBy || "")));
        const sample = list[0];
        const isFC = sample && isFirstClassTopic(sample);
        wrap.append(ce("div", { class: "ai-topic" + (isFC ? " first-class" : "") }, "▸ " + topicName));
        list.forEach(it => wrap.append(renderActionItemRow(it, c)));
      });
    });
    return wrap;
  }
  function renderActionItemRow(it, c) {
    const row = ce("div", { class: "ai-row priority-" + (it.priority || "should") });
    const head = ce("div", { class: "ai-head" });
    head.append(prioritySelect(it));
    appendNewBadge(head, it); // v3.4.9
    const titleSpan = ce("span", { class: "ai-text" }, it.text || "(click to edit)");
    inlineEdit(titleSpan, () => it.text, (v) => it.text = v, { size: "title", multiline: true, persistReason: "Edit action item text" });
    head.append(titleSpan);
    head.append(statusSelectEl(it));
    if (it.status === "blocked" && it.blockedOn) head.append(ce("span", { class: "blocked-on" }, "blocked on: " + it.blockedOn));
    head.append(categorySelect(it));
    row.append(head);

    const meta = ce("div", { class: "due ai-meta" });
    // assignee chip
    const assigneeName = (() => {
      if (!it.assigneeEmail) return "TBD";
      const m = c && (c.members || []).find(x => (x.email || "").toLowerCase() === it.assigneeEmail.toLowerCase());
      return m ? (m.name || m.email) : it.assigneeEmail;
    })();
    meta.append(ce("span", { class: "ai-assignee" + (!it.assigneeEmail ? " tbd" : "") }, assigneeName));
    meta.append(document.createTextNode(" · due "));
    const dueSpan = ce("span", {}, it.dueBy ? fmtDate(it.dueBy) : "TBD");
    inlineEdit(dueSpan, () => it.dueBy, (v) => it.dueBy = v, { size: "date", inputType: "date", persistReason: "Edit due date" });
    meta.append(dueSpan);
    if (it.tags && it.tags.length) meta.append(tagPills(it.tags));
    row.append(meta);
    if (it.verifyStatus && it.verifyStatus !== "pending") {
      const v = ce("div", { class: "ai-verify" }, [ce("span", { class: "verify-icon " + it.verifyStatus }, iconFor(it.verifyStatus)), document.createTextNode(" " + (it.verifyNote || it.verifyStatus))]);
      row.append(v);
    }
    // v3.4.2a — context line if source_context is set
    const ctxEl = renderContextLine(it);
    if (ctxEl) row.append(ctxEl);
    // v3.4.3a — cross-pollination link badge if assignee is a known 1:1 partner
    const cpBadge = crossPolLinkBadge(it);
    if (cpBadge) row.append(cpBadge);
    return row;
  }

  // v3.4.4d — effective role for a committee on a given date (default = c.role; override if matching).
  // Returns { role, override } where override is the matching {instanceDate, role, reason} or null.
  function effectiveRoleOn(c, dateStr) {
    const dflt = c.role || "contributor";
    if (!c.roleOverrides || !c.roleOverrides.length) return { role: dflt, override: null };
    const targetDate = dateStr || new Date().toISOString().slice(0, 10);
    const match = c.roleOverrides.find(o => o.instanceDate === targetDate);
    if (match) return { role: match.role || dflt, override: match };
    return { role: dflt, override: null };
  }

  // Three role shapes + dispatcher
  function renderCommitteeDossier(c) {
    const dos = document.getElementById("dossier"); dos.innerHTML = "";
    dos.append(renderSprintStrip());

    // v3.4.4d — effective role honors per-instance overrides
    const eff = effectiveRoleOn(c, new Date().toISOString().slice(0, 10));
    const effectiveRole = eff.role;

    var committeeRefreshBtn = ce("button", {
      class: "refresh-btn",
      title: "Refresh calendar & Jira data for " + (c.name || "this committee"),
      onclick: async function () {
        committeeRefreshBtn.classList.add("spinning");
        try {
          // Clear caches for all committee members so live data re-fetches
          (c.members || []).forEach(function (m) { delete liveCache[m.id || m.email]; delete jiraCache[m.id || m.email]; });
          // Also clear any committee-keyed cache entries
          delete liveCache[c.id]; delete jiraCache[c.id];
        } catch (e) { console.warn("[committee refresh]", e); }
        committeeRefreshBtn.classList.remove("spinning");
        renderDossier();
      }
    }, "↻");
    const head = ce("div", { class: "pheader" }, [
      ce("div", {}, [
        ce("h1", {}, [c.name || "(unnamed committee)", ce("span", { class: "role role-" + effectiveRole }, effectiveRole + (eff.override ? " (override)" : "")), committeeRefreshBtn]),
        c.cadence ? ce("div", { class: "cadence" }, c.cadence) : null,
        c.purpose ? ce("div", { class: "purpose meta" }, c.purpose) : null
      ].filter(Boolean))
    ]);
    dos.append(head);

    if (eff.override) {
      const ovrBanner = ce("div", { class: "override-banner" }, [
        ce("strong", {}, "★ Role override active for today. "),
        document.createTextNode("Default role is " + (c.role || "contributor") + "; today running as " + effectiveRole + (eff.override.reason ? " — " + eff.override.reason : "") + ".")
      ]);

    dos.append(memberChips(c, { showHidden: true }));

    else if (effectiveRole === "optional") renderOptionalShape(c, dos);

  }

  function renderOwnerShape(c, dos) {
    // TSKMGR-45 Part B — Canvas-driven proposed agenda (above suggested agenda)
    dos.append(renderCanvasProposalsSection(c));

    // Suggested agenda

    c.agenda.forEach(a => {

      row.append(prioritySelect(a));
      appendNewBadge(row, a); // v3.4.9
      const titleSpan = ce("span", { class: "ag-title" }, a.title || "(untitled)");
      inlineEdit(titleSpan, () => a.title, v => a.title = v, { size: "title", persistReason: "Edit agenda title" });
      row.append(titleSpan);
      row.append(categorySelect(a));
      if (a.tags && a.tags.length) row.append(tagPills(a.tags));
      const detail = ce("div", { class: "meta" }, a.detail || "");
      inlineEdit(detail, () => a.detail, v => a.detail = v, { size: "detail", multiline: true, persistReason: "Edit agenda detail" });
      ag.append(row); ag.append(detail);
    });
    dos.append(ag);

    // Action items
    const ai = ce("section", { class: "block" });

    ai.append(renderActionItemsByDueDate(c.actionItems || [], c));
    // TSKMGR-87 — Proposed for discussion mirror (tasks flagged for this committee)
    try {

    const dec = ce("section", { class: "block" });

      ].filter(Boolean)));
    });

    // v3.4.3a — Documents section

  function renderContributorShape(c, dos) {

    const ag = ce("section", { class: "block" });
    ag.append(ce("h3", {}, "Agenda preview"));
    ag.append(ce("div", { class: "meta" }, "Reads from the calendar event description when posted. Live fetch lands with the merged scheduled task in v3.4. For now this section will show 'no agenda posted' until that wiring is in place."));
    ag.append(ce("div", { class: "due" }, "(no agenda posted)"));
    dos.append(ag);

    // Last 3 meetings high points
    const last = ce("section", { class: "block" });
    last.append(ce("h3", {}, "Last 3 meetings — high points"));
    const log = (c.meetingLog || []).slice(-3).reverse();
    if (!log.length) last.append(ce("div", { class: "due" }, "No meetings reconciled yet for this committee. Reconciler populates this once v3.4 ships."));
    log.forEach(m => {
      last.append(ce("div", { class: "decision" }, [
        ce("div", {}, ce("strong", {}, fmtDate(m.date))),

      ]));

    // Owen's due-at-this-meeting list
    const due = ce("section", { class: "block" });
    due.append(ce("h3", {}, "Your due at this meeting"));
    const mine = (c.actionItems || []).filter(a => a.assigneeEmail && a.assigneeEmail.toLowerCase() === OWNER_EMAIL.toLowerCase() && a.status !== "done" && a.status !== "cancelled");
    if (!mine.length) due.append(ce("div", { class: "due" }, "Nothing assigned to you in this committee right now."));
    else due.append(renderActionItemsByDueDate(mine, c));
    dos.append(due);

    // v3.4.3a — Documents
    const docsSec = renderDocumentsSection(c);
    if (docsSec) dos.append(docsSec);
  }

  function renderOptionalShape(c, dos) {
    const last = ce("section", { class: "block" });
    last.append(ce("h3", {}, "Last meeting"));
    const lastMtg = (c.meetingLog || []).slice(-1)[0];
    if (!lastMtg) last.append(ce("div", { class: "due" }, "No meetings reconciled yet."));
    else last.append(ce("div", { class: "meta" }, fmtDate(lastMtg.date) + " — " + (lastMtg.summary || "(no summary)")));
    dos.append(last);

    dos.append(renderDropPrompt(c));
  }

  // Engagement-based drop-this prompt (charter §Optional shape)
  function renderDropPrompt(c) {
    const block = ce("section", { class: "block drop-prompt" });
    block.append(ce("h3", {}, "Should you drop this committee?"));
    const me = (c.members || []).find(m => (m.email || "").toLowerCase() === OWNER_EMAIL.toLowerCase());
    const tasks = (me && me.taskCountIn90d) || 0;
    const inputs = (me && me.inputCountIn90d) || 0;
    const total = tasks + inputs;
    const threshold = c.dropThreshold || 3;
    const lowEngagement = total < threshold;
    block.append(ce("div", { class: "meta" }, [
      "Engagement signal over 90 days: ",
      ce("strong", {}, tasks + " tasks assigned + " + inputs + " decision-input mentions = " + total),
      ". Threshold: ", ce("strong", {}, "< " + threshold)
    ]));
    if (lowEngagement) block.append(ce("div", { class: "warn-banner" }, "Low engagement — consider declining future instances."));
    else block.append(ce("div", { class: "good-banner" }, "Engagement OK."));
    block.append(ce("div", { class: "meta", style: "margin-top:8px" }, "Note: engagement metrics are populated by the merged scheduled task starting in v3.4. Until then this shows 0/0."));
    return block;
  }

  // "What to ask the team this week" prompt for owner-shape committees
  function renderAskTeamPrompt(c) {
    const block = ce("section", { class: "block ask-team" });
    block.append(ce("h3", {}, "What to ask the team this week"));
    const projectBits = (c.projectIds || []).map(pid => (STATE.projects || []).find(p => p.id === pid)).filter(Boolean);
    if (projectBits.length) {
      block.append(ce("div", { class: "meta" }, "Linked projects:"));
      projectBits.forEach(p => block.append(ce("div", { style: "margin-left:12px;font-size:13px" }, [ce("strong", {}, p.name + " — "), ce("span", { class: "meta" }, p.description || "(no description set)")])));
    }
    const blockers = (c.actionItems || []).filter(a => a.status === "blocked");
    if (blockers.length) {
      block.append(ce("div", { style: "margin-top:8px;font-weight:600" }, "Blockers to surface:"));
      blockers.forEach(b => block.append(ce("div", { class: "meta", style: "margin-left:12px" }, "• " + b.text + (b.blockedOn ? " (on: " + b.blockedOn + ")" : ""))));
    }
    const undecidedDecisions = (c.decisions || []).filter(d => d.pendingConfirmation);
    if (undecidedDecisions.length) {
      block.append(ce("div", { style: "margin-top:8px;font-weight:600" }, "Pending decisions to confirm:"));
      undecidedDecisions.forEach(d => block.append(ce("div", { class: "meta", style: "margin-left:12px" }, "• " + d.text)));
    }
    if (!projectBits.length && !blockers.length && !undecidedDecisions.length) {
      block.append(ce("div", { class: "due" }, "No specific prompts derived yet. Will populate once linked projects + active blockers + pending decisions accumulate."));
    }
    return block;
  }

  // ============================================================
  // TSKMGR-45 Part B — Proposed agenda from Slack canvas
  // ============================================================
  const _showDismissedCanvasItems = {};

  function acceptCanvasProposalToAgenda(c, proposal) {
    c.agenda = c.agenda || [];
    const agId = "canvas-" + Date.now();
    c.agenda.push({
      id: agId,
      title: proposal.text,
      detail: "",
      completed: false, relatedDoc: null,
      coveredStatus: "pending", coveredConfidence: null, coveredNote: null, coveredCheckedAt: null, rolledForward: false,
      tags: [], priority: "should", minutes: null, category: "tactical",
      projectId: null, carriedForwardFrom: null,
      created_at: nowIso(),
      source_link: null, source_type: "slack", source_title: "From Slack canvas", source_timestamp: nowIso(),
      source_context: {
        kind: "slack_canvas",
        created_at: nowIso(),
        meeting_id: null,
        meeting_label: null,
        excerpt: proposal.text
      },
      description: null, attachedDocuments: [],
      dueBySource: null
    });
    if (!c.canvasItemDecisions) c.canvasItemDecisions = {};
    c.canvasItemDecisions[proposal.canvasItemId] = {
      decision: "accepted",
      timestamp: nowIso(),
      acceptedAgendaItemId: agId
    };
    persistState("Accept canvas proposal to agenda");
    renderDossier();
  }

  function dismissCanvasProposal(c, canvasItemId) {
    if (!c.canvasItemDecisions) c.canvasItemDecisions = {};
    c.canvasItemDecisions[canvasItemId] = {
      decision: "dismissed",
      timestamp: nowIso()
    };
    persistState("Dismiss canvas proposal");
    renderDossier();
  }

  function undoDismissCanvasProposal(c, canvasItemId) {
    if (c.canvasItemDecisions && c.canvasItemDecisions[canvasItemId]) {
      delete c.canvasItemDecisions[canvasItemId];
    }
    persistState("Undo dismiss canvas proposal");
    renderDossier();
  }

  var _canvasPasteOpen = {};

  function renderCanvasProposalsSection(c) {
    var frag = document.createDocumentFragment();
    if (!c.canvasId) return frag;

    var sec = ce("section", { class: "block canvas-proposals" });
    var hdr = ce("h3", {}, ["Proposed agenda (from canvas)", ce("span", { style: "font-size:10px;opacity:0.5;margin-left:6px;font-weight:normal;font-family:ui-monospace,monospace" }, c.canvasId)]);

    var cached = getCanvasProposals(c.canvasId);
    var stale = isCanvasProposalsStale(c.canvasId);

    if (cached && stale) {
      hdr.append(ce("span", { class: "pill warn", style: "margin-left:6px;font-size:11px" }, "stale >24h"));
    }

    var refreshBtn = ce("button", {
      class: "pill-btn",
      style: "margin-left:8px;font-size:11px;cursor:pointer",
      title: "Refresh from Slack canvas via MCP"
    }, "Refresh");
    refreshBtn.addEventListener("click", function () {
      if (STATE.canvasProposals) delete STATE.canvasProposals[c.canvasId];
      refreshBtn.textContent = "Fetching…";
      refreshBtn.disabled = true;
      fetchCanvasProposals(c.canvasId).then(function () {
        renderDossier();
      });
    });
    hdr.append(refreshBtn);

    var pasteToggle = ce("button", {
      class: "pill-btn",
      style: "margin-left:4px;font-size:11px;cursor:pointer;opacity:0.7",
      title: "Paste canvas markdown manually"
    }, "Paste");
    pasteToggle.addEventListener("click", function () {
      _canvasPasteOpen[c.id] = !_canvasPasteOpen[c.id];
      renderDossier();
    });
    hdr.append(pasteToggle);

    sec.append(hdr);

    if (_canvasPasteOpen[c.id]) {
      var pasteWrap = ce("div", { style: "margin:6px 0;padding:8px;border:1px solid var(--border,#444);border-radius:6px;background:var(--bg2,#1a1a1a)" });
      pasteWrap.append(ce("div", { style: "font-size:12px;margin-bottom:4px;opacity:0.8" }, "Paste the canvas markdown below (copy from Slack canvas), then click Parse:"));
      var ta = ce("textarea", {
        style: "width:100%;min-height:120px;font-family:ui-monospace,monospace;font-size:12px;background:var(--bg,#111);color:var(--fg,#eee);border:1px solid var(--border,#555);border-radius:4px;padding:6px",
        placeholder: "Paste canvas content here…"
      });
      pasteWrap.append(ta);
      var parseBtn = ce("button", {
        class: "pill-btn",
        style: "margin-top:6px;font-size:12px;cursor:pointer;color:var(--accent,#0071e3)"
      }, "Parse pasted content");
      parseBtn.addEventListener("click", function () {
        var md = ta.value || "";
        if (!md.trim()) { try { showSave("error", "Nothing to parse"); } catch (_) {} return; }
        var items = parseCanvasMarkdownToItems(md, c.canvasId);
        if (!items.length) {
          try { showSave("error", "Parser returned 0 items — check the format"); } catch (_) {}
          return;
        }
        setCanvasProposals(c.canvasId, items, "manual_paste");
        _canvasPasteOpen[c.id] = false;
        try { showSave("saved", "Parsed " + items.length + " items from pasted content"); } catch (_) {}
        renderDossier();
      });
      pasteWrap.append(parseBtn);
      sec.append(pasteWrap);
    }

    if (!cached || stale) {
      fetchCanvasProposals(c.canvasId).then(function (items) {
        if (items && items.length) renderDossier();
      });
    }

    if (cached && cached.error) {
      var errBox = ce("div", { style: "margin:6px 0;padding:8px;border:1px solid #a33;border-radius:6px;background:rgba(170,50,50,0.15);font-size:12px" });
      errBox.append(ce("strong", { style: "color:#f66" }, "MCP bridge error: "));
      errBox.append(document.createTextNode(cached.error));
      errBox.append(ce("div", { style: "margin-top:4px;opacity:0.7;font-size:11px" }, "Use the Paste button above to manually provide canvas content."));
      sec.append(errBox);
    }

    if (!cached || !cached.items || !cached.items.length) {
      if (!cached || !cached.error) {
        sec.append(ce("div", { class: "due" }, cached ? "No items found in canvas." : "Loading canvas…"));
      }
      frag.append(sec);
      return frag;
    }

    var decisions = c.canvasItemDecisions || {};
    var pending = [];
    var dismissed = [];

    cached.items.forEach(function (item) {
      var d = decisions[item.canvasItemId];
      if (d && d.decision === "accepted") return;
      if (d && d.decision === "dismissed") { dismissed.push(item); return; }
      pending.push(item);
    });

    if (!pending.length && !dismissed.length) {
      sec.append(ce("div", { class: "due" }, "All canvas items have been reviewed."));
      frag.append(sec);
      return frag;
    }

    pending.forEach(function (item) {
      var row = ce("div", { class: "ag-row", style: "display:flex;align-items:center;gap:6px" });
      if (item.level && item.level.startsWith("h")) {
        row.append(ce("span", { class: "pill", style: "font-size:10px" }, item.level.toUpperCase()));
      }
      row.append(ce("span", { style: "flex:1" }, item.text));

      var acceptBtn = ce("button", {
        class: "pill-btn",
        style: "font-size:11px;cursor:pointer;color:var(--accent, #0071e3)",
        title: "Accept to agenda"
      }, "Accept");
      acceptBtn.addEventListener("click", function () {
        acceptCanvasProposalToAgenda(c, item);
      });

      var dismissBtn = ce("button", {
        class: "pill-btn",
        style: "font-size:11px;cursor:pointer;opacity:0.6",
        title: "Dismiss"
      }, "Dismiss");
      dismissBtn.addEventListener("click", function () {
        dismissCanvasProposal(c, item.canvasItemId);
      });

      row.append(acceptBtn, dismissBtn);
      sec.append(row);
    });

    if (dismissed.length) {
      var cId = c.id;
      var showDismissed = _showDismissedCanvasItems[cId] || false;
      var toggleBtn = ce("button", {
        class: "pill-btn",
        style: "font-size:11px;cursor:pointer;margin-top:4px;opacity:0.6"
      }, (showDismissed ? "Hide" : "Show") + " dismissed (" + dismissed.length + ")");
      toggleBtn.addEventListener("click", function () {
        _showDismissedCanvasItems[cId] = !_showDismissedCanvasItems[cId];
        renderDossier();
      });
      sec.append(toggleBtn);

      if (showDismissed) {
        dismissed.forEach(function (item) {
          var row = ce("div", { class: "ag-row", style: "display:flex;align-items:center;gap:6px;opacity:0.5" });
          row.append(ce("span", { style: "flex:1;text-decoration:line-through" }, item.text));
          var undoBtn = ce("button", {
            class: "pill-btn",
            style: "font-size:11px;cursor:pointer"
          }, "Undo");
          undoBtn.addEventListener("click", function () {
            undoDismissCanvasProposal(c, item.canvasItemId);
          });
          row.append(undoBtn);
          sec.append(row);
        });
      }
    }

    frag.append(sec);
    return frag;
  }

  function renderCommitteeProfile(c) {
    const sec = ce("section", { class: "block" });
    sec.append(ce("h3", {}, ["Committee profile", ce("span", { class: "pill synth" }, "editable")]));
    const grid = ce("div", { class: "profile-grid" });
    const fields = [
      { key: "name", label: "Name", tag: "input", type: "text", spellcheck: true },
      { key: "shortCode", label: "Short code", tag: "input", type: "text", maxlength: 2, help: "Optional 2-character label shown in the avatar circle when sidebar is collapsed (e.g. 'CR' for Connections Requirements). Falls back to name initials if blank." },
      { key: "purpose", label: "Purpose", tag: "textarea", spellcheck: true, help: "Why this meeting exists. Feeds the 'what to ask the team' prompt." },
      { key: "cadence", label: "Cadence", tag: "input", type: "text", spellcheck: true },
      { key: "manualNotesUrl", label: "Manual notes URL", tag: "input", type: "url", help: "Optional. Paste a Google Doc URL where this committee tracks notes manually (in addition to or instead of Gemini Notes). The scheduled task will read both when reconciling." },
      { key: "notes", label: "Notes", tag: "textarea", spellcheck: true }
    ];
    fields.forEach(f => {
      grid.append(ce("label", {}, f.label));
      const inp = ce(f.tag, { type: f.type || undefined });
      if (f.maxlength) inp.maxLength = f.maxlength;
      if (f.spellcheck) inp.spellcheck = true;
      inp.value = c[f.key] || "";
      inp.addEventListener("input", () => {
        let v = inp.value;
        if (f.maxlength && v.length > f.maxlength) v = v.slice(0, f.maxlength);
        if (f.key === "shortCode") v = v.toUpperCase();
        if (v !== inp.value) inp.value = v;
        c[f.key] = v;
      });
      inp.addEventListener("blur", () => { if (f.key === "shortCode") renderRoster(); persistState("Edit committee." + f.key); });
      const wrap = ce("div", {}, [inp]);
      if (f.help) wrap.append(ce("div", { class: "meta" }, f.help));
      grid.append(wrap);
    });

    // Role select (Owner / Contributor / Optional)
    grid.append(ce("label", {}, "Your role"));
    const roleSel = ce("select", {});
    [["owner","Owner — I drive this meeting"],["contributor","Contributor — I attend and engage"],["optional","Optional — I'm on the invite but rarely engage"]].forEach(([val, lbl]) => {
      const o = ce("option", { value: val }, lbl);
      if ((c.role || "contributor") === val) o.selected = true;
      roleSel.append(o);
    });
    roleSel.addEventListener("change", () => { c.role = roleSel.value; persistState("Edit committee.role"); renderRoster(); renderDossier(); });
    grid.append(ce("div", {}, [roleSel, ce("div", { class: "meta" }, "Determines the dossier shape: Owner = full surface, Contributor = preview + your due-list, Optional = drop-this prompt.")]));

    // Members editor
    grid.append(ce("label", {}, "Members"));
    const memWrap = ce("div", {});
    if (!c.members) c.members = [];
    c.members.forEach((m, idx) => {
      const row = ce("div", { class: "member-row" });
      const nameInp = ce("input", { type: "text", spellcheck: "true", placeholder: "Name", value: m.name || "" });
      nameInp.addEventListener("input", () => m.name = nameInp.value);
      nameInp.addEventListener("blur", () => persistState("Edit member name"));
      const emailInp = ce("input", { type: "email", placeholder: "email@org", value: m.email || "" });
      emailInp.addEventListener("input", () => m.email = emailInp.value);
      emailInp.addEventListener("blur", () => persistState("Edit member email"));
      const optBox = ce("input", { type: "checkbox" }); optBox.checked = !!m.optional;
      optBox.addEventListener("change", () => { m.optional = optBox.checked; persistState("Toggle member optional"); renderDossier(); });
      const optLbl = ce("label", { class: "inline-lbl" }, [optBox, document.createTextNode(" optional")]);
      const del = ce("button", { class: "btn tiny danger", onclick: () => { c.members.splice(idx, 1); persistState("Remove member"); renderDossier(); } }, "×");
      row.append(nameInp, emailInp, optLbl, del);
      memWrap.append(row);
    });
    memWrap.append(ce("button", { class: "btn tiny", onclick: () => { c.members.push({ email: "", name: "", optional: false, hasContributed: false, taskCountIn90d: 0, inputCountIn90d: 0 }); persistState("Add member"); renderDossier(); } }, "+ Add member"));
    grid.append(memWrap);

    // v3.3.0b — Linked projects: chip + dropdown multi-select (scales with project count, hides archived)
    grid.append(ce("label", {}, "Linked projects"));
    const projWrap = ce("div", { class: "project-multi" });
    const activeProjects = (STATE.projects || []).filter(p => p.status !== "done");
    const selectedIds = c.projectIds || [];
    const selectedProjects = activeProjects.filter(p => selectedIds.includes(p.id));
    const unselectedProjects = activeProjects.filter(p => !selectedIds.includes(p.id));

    if (!selectedProjects.length && !unselectedProjects.length) {
      projWrap.append(ce("div", { class: "meta" }, "No projects yet — click + Projects in the sidebar to add one. Tag-only labels still work via the tags field."));
    } else {
      // Selected as chips with × remove
      selectedProjects.forEach(p => {
        const chip = ce("span", { class: "project-chip" }, [
          ce("span", {
            style: "cursor:pointer",
            onclick: () => { STATE.selectedProjectId = p.id; STATE.selectedKind = "project"; STATE.selectedView = "project"; renderRoster(); renderDossier(); }
          }, projectLabel(p, false)),
          ce("button", { class: "chip-x", title: "Remove project link", onclick: () => {
            // TSKMGR-61 — bidirectional unlink keeps project.committeeIds in sync.
            unlinkCommitteeFromProject(c.id, p.id, "Edit committee.projectIds");
            renderDossier();
          } }, "×")
        ]);
        projWrap.append(chip);
      });

      if (unselectedProjects.length) {
        const sel = ce("select", { class: "project-add-select" });
        sel.append(ce("option", { value: "" }, "+ Link a project…"));
        unselectedProjects.forEach(p => sel.append(ce("option", { value: p.id }, p.name)));
        sel.addEventListener("change", () => {
          if (!sel.value) return;
          // TSKMGR-61 — bidirectional link keeps project.committeeIds in sync.
          linkCommitteeToProject(c.id, sel.value, "Edit committee.projectIds");
          renderDossier();
        });
        projWrap.append(sel);
      } else if (selectedProjects.length) {
        projWrap.append(ce("span", { class: "meta" }, "All projects linked."));
      }
    }
    grid.append(projWrap);

    grid.append(ce("label", {}, "Detected"));
    grid.append(ce("div", { class: "meta" }, c.recurringEventId ? ["Matched by recurringEventId: ", ce("code", {}, c.recurringEventId)] : "Live match by recurringEventId pending — will populate after first reconciler run on this committee."));

    // v3.4.4d — Per-instance role override (e.g. "this Tuesday I delegated to Patricia")
    grid.append(ce("label", {}, "Role overrides"));
    const overrideWrap = ce("div", {});
    if (!c.roleOverrides) c.roleOverrides = [];
    if (c.roleOverrides.length) {
      c.roleOverrides.forEach((ovr, idx) => {
        const row = ce("div", { class: "override-row" });
        const dateInp = ce("input", { type: "date", value: ovr.instanceDate || "", title: "Date of the meeting instance this override applies to" });
        dateInp.addEventListener("change", () => { ovr.instanceDate = dateInp.value; persistState("Edit role override date"); });
        const roleSel = ce("select", {});
        [["owner","Owner"],["contributor","Contributor"],["optional","Optional"]].forEach(([v, lbl]) => { const o = ce("option", { value: v }, lbl); if ((ovr.role || c.role) === v) o.selected = true; roleSel.append(o); });
        roleSel.addEventListener("change", () => { ovr.role = roleSel.value; persistState("Edit role override"); renderDossier(); });
        const reasonInp = ce("input", { type: "text", spellcheck: "true", placeholder: "Reason (optional, e.g. 'delegated to Patricia')", value: ovr.reason || "" });
        reasonInp.addEventListener("input", () => { ovr.reason = reasonInp.value; });
        reasonInp.addEventListener("blur", () => persistState("Edit role override reason"));
        const del = ce("button", { class: "btn tiny danger", onclick: () => { c.roleOverrides.splice(idx, 1); persistState("Remove role override"); renderDossier(); } }, "×");
        row.append(dateInp, roleSel, reasonInp, del);
        overrideWrap.append(row);
      });
    } else {
      overrideWrap.append(ce("div", { class: "meta" }, "No overrides. Default role for every instance: " + (c.role || "contributor") + "."));
    }
    overrideWrap.append(ce("button", { class: "btn tiny", style: "margin-top:6px", onclick: () => {
      c.roleOverrides = c.roleOverrides || [];
      const today = new Date().toISOString().slice(0, 10);
      c.roleOverrides.push({ instanceDate: today, role: "contributor", reason: "" });
      persistState("Add role override"); renderDossier();
    } }, "+ Add override"));
    grid.append(overrideWrap);

    grid.append(ce("label", {}, "Hidden optional"));
    const hidden = (c.members || []).filter(m => m.optional && !visibleMembers(c).includes(m));
    if (!hidden.length) grid.append(ce("div", { class: "meta" }, "All members visible."));
    else {
      const wrap = ce("div", { class: "meta" });
      wrap.append(document.createTextNode(hidden.length + " optional member" + (hidden.length === 1 ? "" : "s") + " hidden until they own work or contribute: "));
      hidden.forEach((m, i) => { wrap.append(document.createTextNode((i ? ", " : "") + (m.name || m.email))); });
      grid.append(wrap);
    }

    // TSKMGR-70 — Meeting attendees editor (calendar-invitee sourced)
    grid.append(ce("label", {}, "Meeting attendees"));
    grid.append(_renderCommitteeAttendeesEditor(c));

    // TSKMGR-45 — Slack channel mapping editor.
    grid.append(ce("label", {}, "Slack channel"));
    grid.append(_renderSlackChannelEditor(c, "committee"));

    grid.append(ce("label", {}, "Committee ID"));
    grid.append(ce("div", { class: "meta" }, [ce("code", {}, c.id)]));

    sec.append(grid);
    sec.append(ce("div", { class: "profile-actions" }, [ce("button", { class: "btn tiny danger", onclick: () => removeCommittee(c.id) }, "Remove this committee")]));
    return sec;
  }

  // ============================================================
  // TSKMGR-45 / TSKMGR-70 — Shared Slack channel mapping editor
  // ============================================================
  // After TSKMGR-70 (calendar-invitee pivot) this editor no longer derives or
  // shows channel members — that workflow lived in TSKMGR-45 Part A but was
  // unreliable in practice (poster-derivation misses lurkers; most committee
  // channels are too quiet to derive anything useful). The channel ID + name
  // fields stay because future targeted Slack search still needs the mapping.
  //
  // `entity` is either a project or committee record with `slackChannelId` and
  // `slackChannelName` fields. `kind` is "project" | "committee" — used only for
  // persistState reason strings.
  function _renderSlackChannelEditor(entity, kind) {
    const wrap = ce("div", { class: "slack-channel-editor" });

    // Channel ID + name inputs
    const row = ce("div", { class: "slack-channel-row", style: "display:flex;gap:6px;flex-wrap:wrap;align-items:center" });
    const idInp = ce("input", {
      type: "text",
      placeholder: "Channel ID (e.g. C0123ABCD)",
      value: entity.slackChannelId || "",
      style: "flex:1;min-width:180px;font-family:ui-monospace,monospace;font-size:12px"
    });
    const nameInp = ce("input", {
      type: "text",
      placeholder: "Channel name (e.g. #connections-team)",
      value: entity.slackChannelName || "",
      style: "flex:1;min-width:180px"
    });
    idInp.addEventListener("input", () => {
      entity.slackChannelId = idInp.value.trim() || null;
    });

  // ============================================================
  // TSKMGR-70 — Committee meeting-attendee editor

    } else {

    var chIdRaw = committee.slackChannelId;

          var existing = getCommitteeAttendees(eid);

          var manualKept = (existing && Array.isArray(existing.attendees))

    attendees.forEach((a, idx) => {

    const emailAddInp = ce("input", { type: "email", placeholder: "email@org (optional)", style: "flex:1;min-width:160px" });
    const addBtn = ce("button", { class: "btn tiny", onclick: () => {
